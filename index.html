            <span style={{ fontSize: 14, width: 18, textAlign: "center", flexShrink: 0 }}>{n.icon}</span>
            <span style={{ flex: 1 }}>{n.label}</span>
            {!!n.badge && <span style={{ background: "#C0392B", color: "white", borderRadius: 8, fontSize: 9, fontFamily: "'DM Mono',monospace", padding: "1px 6px" }}>{n.badge}</span>}
          </button>
        ))}
        {/* Section : Compte */}
        <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "rgba(255,255,255,0.3)", padding: "14px 18px 4px", letterSpacing: "1.5px", textTransform: "uppercase", flexShrink: 0 }}>Compte</div>
        {visibleNav.filter(n => ["settings"].includes(n.id)).map(n => (
          <button key={n.id} onClick={() => { setView(n.id); setSidebarOpen(false); }}
            style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", border: "none", background: view === n.id ? "rgba(255,255,255,0.13)" : "transparent", color: view === n.id ? "white" : "rgba(255,255,255,0.55)", borderLeft: view === n.id ? "3px solid #7EB8F7" : "3px solid transparent", padding: "10px 18px", cursor: "pointer", fontFamily: "'Lora',serif", fontSize: 12.5, fontWeight: view === n.id ? 700 : 400, textAlign: "left", transition: "all 0.15s", whiteSpace: "nowrap", flexShrink: 0 }}>
            <span style={{ fontSize: 14, width: 18, textAlign: "center", flexShrink: 0 }}>{n.icon}</span>
            <span style={{ flex: 1 }}>{n.label}</span>
          </button>
        ))}
        {/* Footer version */}
        <div style={{ marginTop: "auto", padding: "14px 18px", borderTop: "1px solid rgba(255,255,255,0.08)", fontSize: 9, fontFamily: "'DM Mono',monospace", color: "rgba(255,255,255,0.25)", lineHeight: 1.6, flexShrink: 0 }}>
          v.0.179<br />01/05/26 à 15h46
        </div>
      </div>

      {/* ── MAIN ── */}
      <div style={{ marginLeft: isMobile ? 0 : 200, flex: 1, display: "flex", flexDirection: "column", minHeight: "100vh", minWidth: 0 }}>
        {/* Topbar */}
        <div style={{ background: "white", borderBottom: "1px solid #ECEAE5", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 1px 8px rgba(0,0,0,0.05)", display: "flex", alignItems: "center", height: 56, padding: "0 24px", gap: 12, boxSizing: "border-box" }}>
          {isMobile && <button onClick={() => setSidebarOpen(s => !s)} style={{ border: "none", background: "none", fontSize: 20, cursor: "pointer", color: "#102A63", padding: "0 4px", flexShrink: 0 }}>☰</button>}
          <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Lora',serif", color: "#102A63", flex: 1 }}>
            {(visibleNav.find(n => n.id === view) || {}).icon} {(visibleNav.find(n => n.id === view) || {}).label || ""}
          </div>
          <button onClick={() => openNew()} style={{ ...S.btn("#102A63"), padding: "7px 14px", fontSize: 12, display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            + {isMobile ? "" : "Nouvelle tâche"}
          </button>
        </div>

      {overdueCount > 0 && (
        <div style={{ background: "#102A63", color: "white", padding: "8px 24px", textAlign: "center", fontSize: 12, fontFamily: "'DM Mono',monospace", letterSpacing: "0.04em" }}>
          ⚠ {overdueCount} tâche{overdueCount > 1 ? "s" : ""} en retard —{" "}
          <span style={{ textDecoration: "underline", cursor: "pointer" }} onClick={() => setView("tasks")}>Voir les tâches</span>
        </div>
      )}

      {/* Full-width views (tasks, categorytasks) vs contained views */}
      {isFullWidthView ? (
        <div style={{ width: "100%" }}>
          {view === "tasks" && (
            <TasksView tasks={tasks} onDelete={delTask} onToggle={togTask} onEdit={openEdit} onAdd={openNew} onSaveComment={saveComment} fullscreen={fullscreen} onToggleFullscreen={() => setFullscreen(f => !f)} settings={settings} />
          )}
          {view === "categorytasks" && (
            <CategoryTasksView tasks={tasks} onDelete={delTask} onToggle={togTask} onEdit={openEdit} onAdd={openNew} onSaveComment={saveComment} settings={settings} />
          )}
          {view === "suiviclient" && (
            <SuiviClientView settings={settings} />
          )}
          {view === "cotation" && (
            <Tasks2View fullscreen={fullscreen} onToggleFullscreen={() => setFullscreen(f => !f)} />
          )}
        </div>
      ) : (
        <div style={{ maxWidth: view === "payments" ? 1200 : view === "cotation" ? 1400 : view === "reporting" ? "100%" : 960, margin: "0 auto", padding: view === "cotation" ? "20px 0px" : view === "payments" ? "20px 10px" : view === "reporting" ? "20px 12px" : "24px" }}>
          {view === "dashboard"     && <Dashboard      tasks={tasks} onNavigate={setView} settings={settings} />}
          {view === "myday"         && <MyDayView       tasks={tasks} onEdit={openEdit} onToggle={togTask} onSaveComment={saveComment} settings={settings} />}
          {view === "meetings"      && <MeetingsView    onAddTask={addTask} />}
          {view === "calendar"      && <CalendarView    tasks={tasks} onEdit={openEdit} onAdd={d => openNew(d)} settings={settings} />}
          {view === "notifications" && <NotificationsView tasks={tasks} onUpdate={updTask} settings={settings} />}
          {view === "reporting"     && <ReportingView   tasks={tasks} onEdit={openEdit} onToggle={togTask} onSaveComment={saveComment} settings={settings} />}
          {/* cotation view supprimée */}
          {view === "payments"      && <PaymentsView settings={settings} />}
          {view === "settings"      && <SettingsView    settings={settings} onSave={saveSettingsFn} />}
        </div>
      )}

      </div>{/* fin main */}

      {/* ── MODALE CORBEILLE ── */}
      {showTrash && (() => {
        const deleted = getDeletedTasks();
        const fmtD = ts => new Date(ts).toLocaleDateString("fr-FR", { day: "2-digit", month: "short" });
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }}
            onClick={() => { setShowTrash(false); setTrashSelected([]); }}>
            <div style={{ background: "white", borderRadius: 14, width: 560, maxHeight: "75vh", display: "flex", flexDirection: "column", boxShadow: "0 8px 40px rgba(0,0,0,0.18)" }}
              onClick={e => e.stopPropagation()}>
              <div style={{ padding: "18px 24px 14px", borderBottom: "1px solid #F0F0F0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Lora',serif", color: "#102A63" }}>🗑️ Tâches supprimées <span style={{ fontSize: 12, color: "#AAA", fontWeight: 400 }}>({deleted.length})</span></div>
                <button onClick={() => { setShowTrash(false); setTrashSelected([]); }} style={{ border: "none", background: "none", fontSize: 18, cursor: "pointer", color: "#AAA" }}>×</button>
              </div>
              {deleted.length === 0 ? (
                <div style={{ padding: 40, textAlign: "center", color: "#CCC", fontFamily: "'Lora',serif", fontSize: 13 }}>Aucune tâche supprimée dans les 30 derniers jours</div>
              ) : (
                <>
                  <div style={{ padding: "8px 24px 6px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid #F5F5F5" }}>
                    <input type="checkbox" checked={trashSelected.length === deleted.length}
                      onChange={e => setTrashSelected(e.target.checked ? deleted.map(t => t.id) : [])}
                      style={{ cursor: "pointer", accentColor: "#102A63" }} />
                    <span style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#888" }}>Tout sélectionner</span>
                  </div>
                  <div style={{ overflowY: "auto", flex: 1 }}>
                    {deleted.map(t => (
                      <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 24px", borderBottom: "1px solid #F8F8F8", background: trashSelected.includes(t.id) ? "#EEF2FF" : "white" }}>
                        <input type="checkbox" checked={trashSelected.includes(t.id)}
                          onChange={e => setTrashSelected(s => e.target.checked ? [...s, t.id] : s.filter(x => x !== t.id))}
                          style={{ cursor: "pointer", accentColor: "#102A63", flexShrink: 0 }} />
                        <div style={{ flex: 1, overflow: "hidden" }}>
                          <div style={{ fontSize: 13, fontFamily: "'Lora',serif", color: "#2C3E50", fontWeight: 600, textOverflow: "ellipsis", overflow: "hidden", whiteSpace: "nowrap" }}>{t.title}</div>
                          <div style={{ fontSize: 10, fontFamily: "'Lora',serif", color: "#AAA", marginTop: 2 }}>{t.category} · supprimée le {fmtD(t._deletedAt)}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  {trashSelected.length > 0 && (
                    <div style={{ padding: "12px 24px", borderTop: "1px solid #F0F0F0", display: "flex", alignItems: "center", gap: 10 }}>
                      <button onClick={() => {
                        const deleted = getDeletedTasks();
                        const toRestore = deleted.filter(t => trashSelected.includes(t.id));
                        toRestore.forEach(t => { const { _deletedAt, ...task } = t; addTask(task); });
                        const remaining = deleted.filter(t => !trashSelected.includes(t.id));
                        localStorage.setItem("deletedTasks", JSON.stringify(remaining));
                        setTrashSelected([]);
                        setShowTrash(false);
                      }} style={{ background: "#102A63", color: "white", border: "none", borderRadius: 8, padding: "8px 18px", fontSize: 12, fontFamily: "'Lora',serif", fontWeight: 700, cursor: "pointer" }}>
                        ↩ Restaurer {trashSelected.length} tâche{trashSelected.length > 1 ? "s" : ""}
                      </button>
                      <span style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#AAA" }}>Les tâches seront restaurées dans leur état d'origine</span>
                    </div>
                  )}
                </>
              )}
            </div>
          </div>
        );
      })()}

      {modal && <TaskModal task={modal} onSave={handleSave} onClose={() => setModal(null)} onAddTask={addTask} settings={settings} />}
      <Toast notifs={toasts} onDismiss={id => setToasts(p => p.filter(x => x.id !== id))} />
      {undoTask && <UndoBanner task={undoTask} onUndo={undoDelete} onDismiss={() => setUndoTask(null)} />}
    </div>
  );
}

    window._reactRoot = null;
    function doMount() {
      if (!window._reactRoot) window._reactRoot = ReactDOM.createRoot(document.getElementById('root'));
      window._reactRoot.render(<App />);
    }
    window._doMount = doMount;
    if (window._pendingMount) doMount();
  </script>

<script>
window.exportPaymentsCSV = function(payments) {
  try {
    var statusMap = {"pending":"En attente","approved":"Approuvé","paid":"Payé","rejected":"Rejeté","scheduled":"Planifié"};
    var prioMap = {"urgent":"Urgent","high":"Haute","normal":"Normale","low":"Basse"};
    var toExport = (payments || []).filter(function(p){ return p.status !== "paid"; });
    if (toExport.length === 0) { alert("Aucun paiement à exporter."); return; }
    var wsData = [["Priorité","Fournisseur","Compte","Date demande","Demandeur","Paiement estimé","Montant","Statut","Notes"]];
    toExport.forEach(function(p){
      var rawAmount = p.amount ? String(p.amount).replace(/[^0-9.,]/g,"").replace(",",".") : "";
      var numAmount = rawAmount ? parseFloat(rawAmount) : "";
      wsData.push([
        prioMap[p.priority||"normal"]||"",
        p.supplier||"", p.account||"",
        p.requestDate||"", p.requester||"", p.estimatedDate||"",
        numAmount,
        statusMap[p.status]||p.status||"",
        (p.notes||"").replace(/[\r\n]+/g," ")
      ]);
    });
    var ws = XLSX.utils.aoa_to_sheet(wsData);
    // Format numérique français pour la colonne Montant (colonne G = index 6)
    var fmtFR = "# ##0,00";
    for (var r = 1; r < wsData.length; r++) {
      var cellRef = XLSX.utils.encode_cell({r: r, c: 6});
      if (ws[cellRef] && typeof ws[cellRef].v === "number") {
        ws[cellRef].z = "#,##0.00";
        ws[cellRef].t = "n";
      }
    }
    // Largeurs colonnes
    ws["!cols"] = [
      {wch:10},{wch:22},{wch:10},{wch:14},{wch:12},{wch:16},{wch:14},{wch:14},{wch:40}
    ];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Paiements");
    XLSX.writeFile(wb, "paiements_" + new Date().toISOString().split("T")[0] + ".xlsx");
  } catch(e) { alert("Erreur export: " + e.message); }
};
</script>
