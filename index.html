/* ═══════════════════════════════════════════════════════════════
   ÉCHÉANCIER — Storage
   ═══════════════════════════════════════════════════════════════ */
const ECH_KEY = "echeancier_dossiers_v1";
function loadEchDossiers()  { try { const s=localStorage.getItem(ECH_KEY); return s?JSON.parse(s):[]; } catch { return []; } }
function saveEchDossiers(v) { try { localStorage.setItem(ECH_KEY, JSON.stringify(v)); } catch {} }

const ECH_NATURE_OPTIONS = ["Prêt amortissable","Prêt in fine","Crédit-bail","Découvert","Affacturage","Prêt d'honneur","Autre"];
const ECH_GARANTIE_OPTIONS = ["Hypothèque","Caution personnelle","Nantissement","Gage","Caution bancaire","Aucune","Autre"];

/* ── Calcul échéancier avec structure réelle
   CARENCE    = aucun paiement (ni capital, ni intérêts)
   DIFFÉRÉ    = paiement des intérêts seulement (pas de capital)
   AMORTISSMT = capital + intérêts (mensualité constante)
   CAPITALISA = rang 1 spécial PGE : intérêts annuels capitalisés (aucun flux sortant)
── */
function calcEcheancier(montant, tauxAnnuel, dureeM, dateDebut, assuranceMensuelle=0,
  carenceMois=0, tauxGarantieAnnuel=0, tauxDiffere=null, tauxCapita=0, differeMois=0, typeAmort="annuites", tauxGarantie2=0, dureeGarantie1=0) {
  if (!montant || !dureeM) return [];
  // dureeM = durée de remboursement du capital uniquement
  // dureeTotal = durée complète incluant toutes les périodes
  const _avecCap = tauxCapita > 0;
  const dureeTotal = dureeM + carenceMois + (_avecCap ? 1 : 0) + differeMois;

  const r    = tauxAnnuel > 0 ? (tauxAnnuel / 100) / 12 : 0;
  const rD   = tauxDiffere !== null ? (tauxDiffere / 100) / 12 : r; // taux pendant différé
  const rG1  = tauxGarantieAnnuel > 0 ? (tauxGarantieAnnuel / 100) / 12 : 0;
  const rG2  = tauxGarantie2 > 0 ? (tauxGarantie2 / 100) / 12 : rG1;
  const _dG1 = dureeGarantie1 > 0 ? dureeGarantie1 : 999999; // si pas de durée saisie → taux 1 toujours
  const ass  = parseNum(assuranceMensuelle) || 0;

  // Structure chronologique :
  // Rangs 1..carenceMois          → Carence (aucun paiement, capital = montant)
  // Rang  carenceMois+1           → Capitalisation (si avecCapita, capital += intérêts)
  // Rangs carenceMois+2..+differ  → Différé (intérêts seulement)
  // Rangs suivants                → Amortissement
  const avecCapita  = tauxCapita > 0;
  const rangCapita  = avecCapita ? carenceMois + 1 : -1;
  const offsetAmort = avecCapita ? 1 : 0;

  // Capital AVANT capitalisation = montant initial
  // Capital APRÈS capitalisation = montant * (1 + tauxCapita/100)
  let capital = montant; // démarre au montant initial

  // Durée amortissement = total - carence - (1 si capita) - différé
  const capitalCapitalise = avecCapita ? montant * (1 + tauxCapita / 100) : montant;
  const dureeAmort = dureeM; // dureeM = durée amortissement saisie directement
  const pmtBase    = r > 0 && dureeAmort > 0
    ? capitalCapitalise * r * Math.pow(1+r, dureeAmort) / (Math.pow(1+r, dureeAmort) - 1)
    : (dureeAmort > 0 ? capitalCapitalise / dureeAmort : 0);

  const rows = [];
  let cumulInterets = 0;
  const d0 = dateDebut ? new Date(dateDebut) : new Date();

  for (let i = 1; i <= dureeTotal; i++) {
    // Dates strictement chronologiques
    const date = new Date(d0);
    date.setMonth(date.getMonth() + i - 1);
    const dateStr = date.toISOString().split("T")[0];

    let interets = 0, amort = 0, commGar = 0, echeance = 0;
    let estCapita = false, estCarence = false, estDiffere = false;

    estCarence = i <= carenceMois;
    estCapita  = avecCapita && i === rangCapita;
    estDiffere = !estCarence && !estCapita && i <= carenceMois + offsetAmort + differeMois;

    if (estCarence) {
      // Carence : aucun paiement, capital reste à montant initial
      interets = 0; amort = 0; echeance = 0; commGar = 0;
      // capital inchangé (= montant)
    } else if (estCapita) {
      // Capitalisation : les intérêts s'ajoutent au capital, aucun flux sortant
      interets = montant * (tauxCapita / 100);
      amort = 0; echeance = 0; commGar = 0;
      capital = capitalCapitalise; // capital passe à montant + intérêts capitalisés
      cumulInterets += interets;
    } else if (estDiffere) {
      interets = capital * rD;
      amort    = 0;
      const rGd = i <= _dG1 ? rG1 : rG2;
      commGar  = capital * rGd;
      echeance = interets + commGar + ass;
      cumulInterets += interets;
    } else {
      interets = capital * r;
      const rGa = i <= _dG1 ? rG1 : rG2;
      commGar  = capital * rGa;
      if (typeAmort === "capital") {
        amort    = Math.min(capitalCapitalise / dureeAmort, capital);
      } else {
        amort    = Math.min(pmtBase - interets, capital);
      }
      echeance = amort + interets + commGar + ass;
      cumulInterets += interets;
      capital = Math.max(0, capital - amort);
    }

    const echeanceGlobale = echeance; // = tout inclus
    rows.push({
      n: i, date: dateStr,
      echeance, capital: amort, interets, cumulInterets,
      commGarantie: commGar, assurance: ass,
      echeanceGlobale, capitalRestant: capital,
      estCapita, estCarence, estDiffere,
      paye: false, datePaiement:"", commentaire:""
    });
  }
  return rows;
}

  /* Calcul de l'échéancier */
  const regenerer = () => {
    const rows = calcEcheancier(
      parseNum(d.montant), parseNum(d.tauxAnnuel), parseInt(d.duree)||0,
      d.dateDebut, parseNum(d.assuranceMensuelle)||0,
      parseInt(d.carence)||0, parseNum(d.tauxGarantie)||0,
      d.tauxDiffere ? parseNum(d.tauxDiffere) : null,

      parseNum(d.tauxGarantie2)||0, parseInt(d.dureeGarantie1)||0

    // Préserver les données de paiement si déjà saisies
    const merged = rows.map((r,i) => {
      const existing = (d.lignes||[])[i] || {};
      return { ...r, paye: existing.paye||false, datePaiement: existing.datePaiement||"", commentaire: existing.commentaire||"" };
    });
    // Injecter les versements de fonds dans l'échéancier

    let final = [...merged];
    versements.forEach(v => {
      const dateIso = v.date; // déjà au format YYYY-MM-DD
      // Trouver la position chronologique

      const versRow = {
        n: 0, date: dateIso,

            {/* Timeline structure */}
            {(parseInt(d.carence)||0) + (parseInt(d.differe)||0) + (d.tauxCapita?1:0) > 0 && (() => {

                      </tr>

                    <tbody>
                      {lignes.map((row,i)=>{

                          <tr key={i} style={{ background: row.paye?"#F0FDF4":isNext?"#FFFBEB":i%2===0?"white":"#FAFAFA",

                    <tfoot>
                      <tr style={{ background:"#F8F9FB",borderTop:"2px solid #ECEAE5",fontWeight:700 }}>
                        <td colSpan={2} style={{ padding:"6px 8px",fontSize:10,fontFamily:"'Lora',serif" }}>TOTAL</td>
                        <td style={{ padding:"6px 8px",textAlign:"right",color:"#102A63" }}>{fmtE(totalEch)}</td>
                        <td style={{ padding:"6px 8px",textAlign:"right",color:"#27AE60" }}>{fmtE(lignes.reduce((a,r)=>a+r.capital,0))}</td>
                        <td style={{ padding:"6px 8px",textAlign:"right",color:"#C0392B" }}>{fmtE(totalInt)}</td>

        {/* Footer */}

        </div>
      </div>
    </div>
  );
}

/* ── EchKpisFiscaux ── */
function EchKpisFiscaux({ dossiers }) {
  const fmtE = (v) => isNaN(Number(v))?"—":Number(v).toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0})+" €";
  const now = new Date();
  const thisMonth = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const nextM = new Date(now); nextM.setMonth(nextM.getMonth()+1);
  const nextMonthS = nextM.getFullYear()+"-"+String(nextM.getMonth()+1).padStart(2,"0");
  const fy = now.getMonth()>=9 ? now.getFullYear()+1 : now.getFullYear();
  const fNS=`${fy-1}-10-01`, fNE=`${fy}-09-30`;
  const fN1S=`${fy}-10-01`,  fN1E=`${fy+1}-09-30`;
  let mC=0,mN=0,fN=0,fN1=0;
  dossiers.forEach(dos=>{
    (dos.lignes||[]).forEach(r=>{
      const d=r.date||""; const e=r.echeanceGlobale||r.echeance||0;
      if(d.slice(0,7)===thisMonth) mC+=e;
      if(d.slice(0,7)===nextMonthS) mN+=e;
      if(d>=fNS&&d<=fNE) fN+=e;
      if(d>=fN1S&&d<=fN1E) fN1+=e;
    });
  });
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {[
        {icon:"📅",label:"Ce mois",val:fmtE(mC),color:"#102A63",bg:"#EFF6FF",bd:"#BFDBFE"},
        {icon:"🔜",label:"Mois suivant",val:fmtE(mN),color:"#1D4ED8",bg:"#EFF6FF",bd:"#BFDBFE"},
        {icon:"📊",label:"Exercice N (oct."+String(fy-1)+"-sept."+String(fy)+")",val:fmtE(fN),color:"#065F46",bg:"#F0FDF4",bd:"#BBF7D0"},
        {icon:"📈",label:"Exercice N+1 (oct."+String(fy)+"-sept."+String(fy+1)+")",val:fmtE(fN1),color:"#0E7490",bg:"#ECFEFF",bd:"#A5F3FC"},
      ].map(k=>(
        <div key={k.label} style={{background:k.bg,borderRadius:10,padding:"12px 14px",border:"1px solid "+k.bd}}>
          <div style={{fontSize:16,marginBottom:4}}>{k.icon}</div>
          <div style={{fontSize:16,fontWeight:700,color:k.color,fontFamily:"'Lora',serif",marginBottom:2}}>{k.val}</div>
          <div style={{fontSize:10,color:"#888",fontFamily:"'Lora',serif"}}>{k.label}</div>
        </div>
      ))}
    </div>
  );
}



/* ── EchAttachments : PJ avec type de document ── */
const ECH_DOC_TYPES = ["Contrat","Échéancier","Tableau d'amortissement","Avenant","Garantie","Assurance","Autre"];
function EchAttachments({ attachments, onChange }) {
  const [selType, setSelType] = React.useState("Contrat");
  const add = (files) => {
    const news = Array.from(files).map(f=>({name:f.name, size:f.size, type:selType, date:new Date().toISOString().split("T")[0]}));
    onChange([...(attachments||[]), ...news]);
  };
  const remove = (i) => onChange((attachments||[]).filter((_,idx)=>idx!==i));
  return (
    <div>
      {(attachments||[]).length > 0 && (
        <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:8}}>
          {(attachments||[]).map((a,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",background:"#F8F9FB",borderRadius:6,border:"1px solid #ECEAE5"}}>
              <span style={{fontSize:9,background:"#E0F7FA",color:"#0E7490",borderRadius:3,padding:"1px 6px",fontFamily:"'Lora',serif",fontWeight:700,flexShrink:0}}>{a.type||"—"}</span>
              <span style={{flex:1,fontSize:10,fontFamily:"'Lora',serif",color:"#2C3E50",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
              <span style={{fontSize:9,color:"#AAA",fontFamily:"'Lora',serif",flexShrink:0}}>{a.date||""}</span>
              <button onClick={()=>remove(i)} style={{border:"none",background:"none",color:"#E8A0A0",cursor:"pointer",fontSize:14,flexShrink:0}}>×</button>
            </div>
          ))}
        </div>
      )}
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <select value={selType} onChange={e=>setSelType(e.target.value)}
          style={{border:"1px solid #E0E0E0",borderRadius:6,padding:"4px 8px",fontSize:11,fontFamily:"'Lora',serif",background:"white",outline:"none",flexShrink:0}}>
          {ECH_DOC_TYPES.map(t=><option key={t}>{t}</option>)}
        </select>
        <label style={{cursor:"pointer",flex:1}}>
          <input type="file" multiple style={{display:"none"}} onChange={e=>add(e.target.files)}/>
          <span style={{display:"block",textAlign:"center",padding:"5px 8px",border:"1px dashed #BFDBFE",borderRadius:6,fontSize:11,fontFamily:"'Lora',serif",color:"#1D4ED8",background:"#EFF6FF",cursor:"pointer"}}>📎 Joindre un fichier</span>
        </label>
      </div>
    </div>
  );
}

/* ── EchDossierTab ── */
function EchDossierTab({ dos, saveDossier, deleteDossier, fmtE }) {
  const now = new Date().toISOString().split("T")[0];
  const [localDos, setLocalDos] = React.useState(dos);
  const [editMode, setEditMode] = React.useState(false);
  React.useEffect(()=>setLocalDos(dos),[dos.id]);
  const insertRow = (afterIdx) => {
    const newRow={n:0,date:"",echeance:0,capital:0,interets:0,cumulInterets:0,commGarantie:0,assurance:0,echeanceGlobale:0,capitalRestant:0,versement:0,estCarence:false,estCapita:false,estDiffere:false,paye:false,datePaiement:"",commentaire:""};
    const l=[...lignes];
    l.splice(afterIdx+1,0,newRow);
    const renumbered=l.map((r,i)=>({...r,n:i+1}));
    const updated={...localDos,lignes:renumbered};
    setLocalDos(updated); saveDossier(updated);
  };
  const setL = (k,v) => setLocalDos(p=>({...p,[k]:v}));
  const lignes=dos.lignes||[];
  const payeAuto=lignes.filter(r=>r.date<=now).length;
  const pct=lignes.length>0?Math.round(payeAuto/lignes.length*100):0;
  const restantDu=lignes[payeAuto]?.capitalRestant||(lignes.length>0?lignes[lignes.length-1].capitalRestant:0);
  const totalInt=lignes.reduce((a,r)=>a+(r.interets||0),0);
  const prochaine=lignes.find(r=>r.date>now);

  const dif=parseInt(localDos.differe)||0;
  const dur=parseInt(localDos.duree)||0;
  const amort=dur; // dur = durée amortissement saisie directement
  const total=(hasCap?1:0)+car+dif+amort;
  const inpL={border:"1px solid #E8E8E8",borderRadius:6,padding:"5px 8px",fontSize:11,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"'Lora',serif",color:"#2C3E50",background:"white"};

    const merged=rows.map((r,i)=>{const ex=(localDos.lignes||[])[i]||{};return{...r,paye:ex.paye||false,datePaiement:ex.datePaiement||"",commentaire:ex.commentaire||""};});
    const updated={...localDos,lignes:merged};setLocalDos(updated);saveDossier(updated);
  };
  return (
    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>

        {[{label:"Capital restant dû",val:fmtE(restantDu),color:"#C0392B"},{label:"Avancement",val:`${pct}% (${payeAuto}/${lignes.length})`,color:"#1D4ED8"},{label:"Prochaine échéance",val:prochaine?`${fmtE(prochaine.echeanceGlobale||prochaine.echeance)} (${prochaine.date.split("-").reverse().join("/")})`:"Terminé",color:"#A16207"},{label:"Total intérêts",val:fmtE(totalInt),color:"#C0392B"}].map(k=>(
          <div key={k.label} style={{textAlign:"center"}}><div style={{fontSize:9,color:"#AAA",fontFamily:"'Lora',serif",letterSpacing:"0.06em",marginBottom:2}}>{k.label}</div><div style={{fontSize:12,fontWeight:700,color:k.color,fontFamily:"'Lora',serif"}}>{k.val}</div></div>

            <div>{lblL("Intitulé")}<input value={localDos.intitule||""} onChange={e=>setL("intitule",e.target.value)} style={inpL}/></div>

            <div>{lblL("Durée remboursement (mois)")}<input type="text" value={localDos.duree||""} onChange={e=>setL("duree",e.target.value)} style={inpL}/></div>

            <div>{lblL("Date début éch.")}<input type="date" value={localDos.dateDebut||""} onChange={e=>setL("dateDebut",e.target.value)} style={inpL}/></div>
            <div>{lblL("Assurance (€/m)")}<input type="text" value={localDos.assuranceMensuelle||""} onChange={e=>setL("assuranceMensuelle",e.target.value)} style={inpL}/></div>
            <div>{lblL("Garantie")}<select value={localDos.garantie||""} onChange={e=>setL("garantie",e.target.value)} style={inpL}><option value="">—</option>{ECH_GARANTIE_OPTIONS.map(o=><option key={o}>{o}</option>)}</select></div>
          </div>

          {/* Section Versements */}
          <div style={{background:"#F0FDF4",borderRadius:8,padding:"8px 10px",border:"1px solid #BBF7D0"}}>
            <div style={{fontSize:9,fontWeight:700,color:"#065F46",fontFamily:"'Lora',serif",letterSpacing:"0.06em",marginBottom:6}}>VERSEMENTS DE FONDS</div>
            {(localDos.versements||[]).map((v,i)=>(
              <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:5}}>
                <input type="date" value={v.date||""} onChange={e=>{const vs=[...(localDos.versements||[])];vs[i]={...vs[i],date:e.target.value};setL("versements",vs);}} style={{...inpL,flex:1,fontSize:10}}/>
                <div style={{position:"relative",flex:1}}>
                  <input type="text" value={v.montant||""} onChange={e=>{const vs=[...(localDos.versements||[])];vs[i]={...vs[i],montant:e.target.value};setL("versements",vs);}} placeholder="0,00" style={{...inpL,paddingRight:16,fontSize:10}}/>
                  <span style={{position:"absolute",right:5,top:"50%",transform:"translateY(-50%)",fontSize:9,color:"#AAA"}}>€</span>
                </div>
                <button onClick={()=>{const vs=(localDos.versements||[]).filter((_,j)=>j!==i);setL("versements",vs);}} style={{border:"none",background:"none",color:"#FCA5A5",cursor:"pointer",fontSize:14,flexShrink:0}}>×</button>
              </div>
            ))}
            <button onClick={()=>setL("versements",[...(localDos.versements||[]),{date:"",montant:""}])}
              style={{fontSize:10,fontFamily:"'Lora',serif",background:"white",color:"#065F46",border:"1px solid #BBF7D0",borderRadius:6,padding:"4px 8px",cursor:"pointer",width:"100%"}}>
              + Ajouter un versement
            </button>
          </div>
          <div style={{background:"#F0F5FF",borderRadius:8,padding:"8px 10px",border:"1px solid #BFDBFE"}}>
            <div style={{fontSize:9,fontWeight:700,color:"#102A63",fontFamily:"'Lora',serif",letterSpacing:"0.06em",marginBottom:6}}>TAUX</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <div>{lblL("TEG net (%/an)")}<input type="text" value={localDos.tauxAnnuel||""} onChange={e=>setL("tauxAnnuel",e.target.value)} placeholder="0,73" style={inpL}/></div>
              <div>{lblL("TEG différé (%/an)")}<input type="text" value={localDos.tauxDiffere||""} onChange={e=>setL("tauxDiffere",e.target.value)} placeholder="Si différent" style={inpL}/></div>
              <div>{lblL("Com. gar. 1 (%/an)")}<input type="text" value={localDos.tauxGarantie||""} onChange={e=>setL("tauxGarantie",e.target.value)} placeholder="1,00" style={inpL}/></div>
              <div>{lblL("Com. gar. 2 (%/an)")}<input type="text" value={localDos.tauxGarantie2||""} onChange={e=>setL("tauxGarantie2",e.target.value)} placeholder="2,00" style={inpL}/></div>
              <div style={{gridColumn:"1/-1"}}>{lblL("Durée taux gar. 1 (mois)")}<input type="text" value={localDos.dureeGarantie1||""} onChange={e=>setL("dureeGarantie1",e.target.value)} placeholder="Ex: 24" style={inpL}/></div>
              <div>{lblL("Taux capita. (%/an)")}<input type="text" value={localDos.tauxCapita||""} onChange={e=>setL("tauxCapita",e.target.value)} placeholder="0,5" style={inpL}/></div>
            </div>
          </div>
          <div style={{background:"#FFFBEB",borderRadius:8,padding:"8px 10px",border:"1px solid #FDE68A"}}>
            <div style={{fontSize:9,fontWeight:700,color:"#92400E",fontFamily:"'Lora',serif",letterSpacing:"0.06em",marginBottom:6}}>PÉRIODES</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <div>{lblL("Carence (mois)")}<input type="text" value={localDos.carence||""} onChange={e=>setL("carence",e.target.value)} placeholder="0" style={inpL}/></div>
              <div>{lblL("Différé (mois)")}<input type="text" value={localDos.differe||""} onChange={e=>setL("differe",e.target.value)} placeholder="12" style={inpL}/></div>
            </div>
          </div>
          {total>0 && (
            <div>
              <div style={{display:"flex",height:12,borderRadius:6,overflow:"hidden",gap:1,marginBottom:4}}>
                {car>0&&<div style={{width:`${car/total*100}%`,background:"#FCA5A5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"white",minWidth:16}}>{car}m</div>}
                {hasCap&&<div style={{width:`${1/total*100}%`,background:"#6D28D9",minWidth:4}}/>}
                {dif>0&&<div style={{width:`${dif/total*100}%`,background:"#FCD34D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#92400E",minWidth:16}}>{dif}m</div>}
                {amort>0&&<div style={{flex:1,background:"#6EE7B7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#065F46",minWidth:24}}>{amort}m</div>}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {car>0&&<span style={{fontSize:9,color:"#B91C1C",fontFamily:"'Lora',serif"}}>● Carence {car}m</span>}
                {hasCap&&<span style={{fontSize:9,color:"#6D28D9",fontFamily:"'Lora',serif"}}>● Capitalisation</span>}
                {dif>0&&<span style={{fontSize:9,color:"#A16207",fontFamily:"'Lora',serif"}}>● Différé {dif}m</span>}
                {amort>0&&<span style={{fontSize:9,color:"#065F46",fontFamily:"'Lora',serif"}}>● Amort. {amort}m</span>}
              </div>
            </div>
          )}
          <button onClick={regenererLocal} style={{background:"#102A63",color:"white",border:"none",borderRadius:8,padding:"8px",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif",fontWeight:700}}>🔄 Recalculer l'échéancier</button>
          <label style={{cursor:"pointer"}}>
            <input type="file" accept=".csv" style={{display:"none"}}
              onChange={e=>{
                const file=e.target.files[0];
                if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  const rows=parseCSVEcheancier(ev.target.result);
                  if(rows.length===0){alert("Aucune ligne trouvée dans le CSV.");return;}
                  const updated={...localDos,lignes:rows};
                  const calc = window.calcDossierAuto ? window.calcDossierAuto(updated) : updated;
                  setLocalDos(calc);
                  saveDossier(calc);
                  alert(`✓ ${rows.length} lignes importées depuis ${file.name}`);
                };
                reader.readAsText(file,"UTF-8");
              }}
            />
            <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"7px",background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,fontSize:11,fontFamily:"'Lora',serif",color:"#065F46",fontWeight:600,cursor:"pointer"}}>
              📥 Importer un fichier CSV
            </span>
          </label>
          <button onClick={()=>exportEchPDF(localDos)} style={{background:"#E67E22",color:"white",border:"none",borderRadius:8,padding:"7px",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif",fontWeight:700}}>📄 Exporter en PDF</button>
          <button onClick={()=>{const c=window.calcDossierAuto?window.calcDossierAuto(localDos):localDos;setLocalDos(c);saveDossier(c);}} style={{background:"#27AE60",color:"white",border:"none",borderRadius:8,padding:"7px",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif",fontWeight:700}}>✓ Enregistrer les modifications</button>
          <div style={{borderTop:"1px solid #F0F0F0",paddingTop:10}}>
            <div style={{fontSize:10,fontWeight:700,color:"#102A63",fontFamily:"'Lora',serif",letterSpacing:"0.06em",marginBottom:6}}>NOTES</div>
            <RichTextArea value={localDos.notes||""} onChange={v=>{const u={...localDos,notes:v};setLocalDos(u);saveDossier(u);}} placeholder="Observations…" rows={4}/>
          </div>
          <div style={{borderTop:"1px solid #F0F0F0",paddingTop:10}}>
            <div style={{fontSize:10,fontWeight:700,color:"#102A63",fontFamily:"'Lora',serif",letterSpacing:"0.06em",marginBottom:6}}>PIÈCES JOINTES</div>
            <EchAttachments attachments={localDos.attachments||[]} onChange={v=>{const u={...localDos,attachments:v};setLocalDos(u);saveDossier(u);}}/>
          </div>
          <button onClick={()=>deleteDossier(dos.id)} style={{border:"1px solid #ECEAE5",background:"white",color:"#AAA",borderRadius:8,padding:"6px",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif",marginTop:4}}>🗑 Supprimer</button>
        </div>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {lignes.length===0
            ?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#CCC",fontFamily:"'Lora',serif",flexDirection:"column",gap:10}}><div style={{fontSize:32}}>📅</div><div>Renseignez les paramètres puis cliquez sur "Recalculer"</div></div>
            :<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              {/* Sous-tableau versements */}
              {(localDos.versements||[]).filter(v=>v.date&&v.montant).length > 0 && (() => {
                const vs = (localDos.versements||[]).filter(v=>v.date&&v.montant)
                  .sort((a,b)=>a.date>b.date?1:-1);
                const totalV = vs.reduce((a,v)=>a+(parseNum(v.montant)||0),0);
                return (
                  <div style={{flexShrink:0,borderBottom:"1px solid #ECEAE5",background:"#F0FDF4"}}>
                    <div style={{padding:"8px 16px 6px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:11,fontWeight:700,color:"#15803D",fontFamily:"'Lora',serif",letterSpacing:"0.04em"}}>VERSEMENTS DE FONDS</span>
                        <span style={{fontSize:9,background:"#DCFCE7",color:"#15803D",borderRadius:10,padding:"1px 8px",fontWeight:700,fontFamily:"'Lora',serif"}}>{vs.length} versement{vs.length>1?"s":""}</span>
                      </div>
                      <div style={{fontSize:12,fontWeight:700,color:"#15803D",fontFamily:"'Lora',serif"}}>
                        Total : {totalV.toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0})} €
                      </div>
                    </div>
                    <div style={{overflowX:"auto",paddingBottom:8}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,fontFamily:"'Lora',serif"}}>
                        <thead>
                          <tr style={{background:"#15803D"}}>
                            {["#","Date de versement","Montant versé","Capital mobilisé","Note"].map(h=>(
                              <th key={h} style={{padding:"5px 12px",color:"white",fontWeight:400,textAlign:h==="Montant versé"||h==="Capital mobilisé"?"right":"left",fontSize:9,whiteSpace:"nowrap",letterSpacing:"0.04em"}}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {vs.map((v,i)=>{
                            const cumul = vs.slice(0,i+1).reduce((a,x)=>a+(parseNum(x.montant)||0),0);
                            return (
                              <tr key={i} style={{background:i%2===0?"white":"#F0FDF4",borderBottom:"1px solid #DCFCE7"}}>
                                <td style={{padding:"5px 12px",color:"#888",fontWeight:600,width:28}}>{i+1}</td>
                                <td style={{padding:"5px 12px",color:"#15803D",fontWeight:700}}>
                                  <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                                    <span style={{width:7,height:7,borderRadius:"50%",background:"#22C55E",display:"inline-block",flexShrink:0}}/>
                                    {v.date.split("-").reverse().join("/")}
                                  </span>
                                </td>
                                <td style={{padding:"5px 12px",textAlign:"right",fontWeight:700,color:"#15803D",fontVariantNumeric:"tabular-nums"}}>
                                  +{(parseNum(v.montant)||0).toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0})} €
                                </td>
                                <td style={{padding:"5px 12px",textAlign:"right",color:"#0E7490",fontVariantNumeric:"tabular-nums"}}>
                                  {cumul.toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0})} €
                                </td>
                                <td style={{padding:"5px 12px",color:"#888",fontSize:9,fontStyle:"italic"}}>{v.note||"—"}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot>
                          <tr style={{background:"#DCFCE7",borderTop:"2px solid #22C55E"}}>
                            <td colSpan={2} style={{padding:"5px 12px",fontWeight:700,color:"#15803D",fontFamily:"'Lora',serif",fontSize:10}}>TOTAL</td>
                            <td style={{padding:"5px 12px",textAlign:"right",fontWeight:700,color:"#15803D",fontFamily:"'Lora',serif",fontVariantNumeric:"tabular-nums"}}>
                              +{totalV.toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0})} €
                            </td>
                            <td colSpan={2}></td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  </div>
                );
              })()}

                <div style={{fontSize:10,color:"#888",fontFamily:"'Lora',serif"}}>{lignes.length} ligne{lignes.length>1?"s":""}</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>

                  <button onClick={()=>setEditMode(m=>!m)}
                    style={{fontSize:10,fontFamily:"'Lora',serif",background:editMode?"#27AE60":"white",color:editMode?"white":"#102A63",border:"1px solid #102A63",borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>

                  </button>

              </div>
              <div style={{flex:1,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,fontFamily:"'Lora',serif",fontVariantNumeric:"tabular-nums"}}>
                <thead style={{position:"sticky",top:0,zIndex:2}}>
                  <tr style={{background:"#102A63"}}>
                    {["N°","Date","Type","Échéance","Capital","Intérêts","Cumul int.","Com. gar.","Assurance","Éch. globale","Cap. restant",...(editMode?[""]:[])].map(h=>(
                      <th key={h} style={{padding:"5px 5px",color:"white",fontWeight:400,textAlign:["N°","Type",""].includes(h)?"center":"right",fontSize:9,whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {lignes.map((row,i)=>{
                    const isPast=row.date<=now;
                    const isNext=row.date>now&&i===payeAuto;
                    const TD={padding:"2px 4px",fontFamily:"'Lora',serif",fontSize:10,verticalAlign:"middle"};
                    const updRow=(k,v)=>{
                      const l=[...lignes]; l[i]={...l[i],[k]:v};
                      const updated={...localDos,lignes:l}; setLocalDos(updated); saveDossier(updated);
                    };
                    const inpS={border:"1px solid #BFDBFE",borderRadius:3,padding:"1px 4px",fontSize:9,fontFamily:"'Lora',serif",width:"100%",textAlign:"right",outline:"none"};
                    const typeOpts=["Carence","Sans flux","Capitalisation","Différé","Amortissement","Versement"];
                    const typeVal=row.estCapita?"Capitalisation":row.estCarence?"Carence":row.estDiffere?"Différé":"Amortissement";
                    const setType=(v)=>{
                      const l=[...lignes];
                      l[i]={...l[i],estCapita:v==="Capitalisation",estCarence:v==="Carence",estDiffere:v==="Différé",estSansFlux:v==="Sans flux",estVersement:v==="Versement"};
                      const updated={...localDos,lignes:l}; setLocalDos(updated); saveDossier(updated);
                    };
                    return(
                      <tr key={i} style={{background:isPast?"#F0FDF4":isNext?"#FFFBEB":i%2===0?"white":"#FAFAFA",borderBottom:"1px solid #F0F0F0"}}>
                        <td style={{...TD,textAlign:"center",color:"#888",fontWeight:600,width:26}}>{row.n}</td>
                        <td style={{...TD,textAlign:"center",color:isPast?"#888":"#2C3E50",width:70}}>
                          {editMode
                            ?<input type="date" value={row.date||""} onChange={e=>updRow("date",e.target.value)} style={{...inpS,textAlign:"center",width:100}}/>
                            :row.date?row.date.split("-").reverse().join("/"):"—"}
                        </td>
                        <td style={{...TD,textAlign:"center",width:80}}>
                          {editMode
                            ?<select value={typeVal} onChange={e=>setType(e.target.value)} style={{...inpS,textAlign:"center",width:90}}>
                              {typeOpts.map(o=><option key={o}>{o}</option>)}
                            </select>
                            :row.estCapita?<span style={{fontSize:8,background:"#EDE9FE",color:"#6D28D9",borderRadius:3,padding:"1px 5px",fontWeight:700,whiteSpace:"nowrap"}}>Capitalisation</span>
                            :row.estCarence?<span style={{fontSize:8,background:"#FEE2E2",color:"#B91C1C",borderRadius:3,padding:"1px 5px",fontWeight:700,whiteSpace:"nowrap"}}>Carence</span>
                            :row.estDiffere?<span style={{fontSize:8,background:"#FEF9C3",color:"#A16207",borderRadius:3,padding:"1px 5px",fontWeight:700,whiteSpace:"nowrap"}}>Différé</span>
                            :row.estVersement?<span style={{fontSize:8,background:"#DCFCE7",color:"#15803D",borderRadius:3,padding:"1px 5px",fontWeight:700,whiteSpace:"nowrap"}}>Versement</span>
                            :(row.estSansFlux||(row.echeance===0&&row.capital===0&&row.interets===0&&!row.estCapita&&!row.estCarence&&!row.estDiffere&&!row.estVersement))?<span style={{fontSize:8,background:"#F1F5F9",color:"#64748B",borderRadius:3,padding:"1px 5px",fontWeight:700,whiteSpace:"nowrap"}}>Sans flux</span>
                            :<span style={{fontSize:8,background:"#D1FAE5",color:"#065F46",borderRadius:3,padding:"1px 5px",fontWeight:700,whiteSpace:"nowrap"}}>Amortissement</span>}
                        </td>

                        {editMode?<td style={{...TD,textAlign:"right",width:72}}><input value={row.echeance||""} onChange={e=>updRow("echeance",parseNum(e.target.value))} style={inpS} placeholder="0"/></td>
                          :<td style={{...TD,textAlign:"right",fontWeight:700,color:"#102A63",width:72}}>{fmtE(row.echeance)}</td>}
                        {editMode?<td style={{...TD,textAlign:"right",width:72}}><input value={row.capital||""} onChange={e=>updRow("capital",parseNum(e.target.value))} style={inpS} placeholder="0"/></td>
                          :<td style={{...TD,textAlign:"right",color:"#27AE60",width:72}}>{fmtE(row.capital)}</td>}
                        {editMode?<td style={{...TD,textAlign:"right",width:68}}><input value={row.interets||""} onChange={e=>updRow("interets",parseNum(e.target.value))} style={inpS} placeholder="0"/></td>
                          :<td style={{...TD,textAlign:"right",color:"#C0392B",width:68}}>{fmtE(row.interets)}</td>}
                        <td style={{...TD,textAlign:"right",color:"#888",fontStyle:"italic",width:68}}>{fmtE(row.cumulInterets)}</td>
                        {editMode?<td style={{...TD,textAlign:"right",width:65}}><input value={row.commGarantie||""} onChange={e=>updRow("commGarantie",parseNum(e.target.value))} style={inpS} placeholder="0"/></td>
                          :<td style={{...TD,textAlign:"right",color:"#6D28D9",width:65}}>{fmtE(row.commGarantie)}</td>}
                        {editMode?<td style={{...TD,textAlign:"right",width:60}}><input value={row.assurance||""} onChange={e=>updRow("assurance",parseNum(e.target.value))} style={inpS} placeholder="0"/></td>
                          :<td style={{...TD,textAlign:"right",color:"#E67E22",width:60}}>{fmtE(row.assurance)}</td>}
                        {editMode?<td style={{...TD,textAlign:"right",width:72}}><input value={row.echeanceGlobale||""} onChange={e=>updRow("echeanceGlobale",parseNum(e.target.value))} style={inpS} placeholder="0"/></td>
                          :<td style={{...TD,textAlign:"right",fontWeight:700,color:"#0E7490",width:72}}>{fmtE(row.echeanceGlobale)}</td>}
                        {editMode?<td style={{...TD,textAlign:"right",width:75}}><input value={row.capitalRestant||""} onChange={e=>updRow("capitalRestant",parseNum(e.target.value))} style={inpS} placeholder="0"/></td>
                          :<td style={{...TD,textAlign:"right",fontWeight:600,color:"#2C3E50",width:75}}>{fmtE(row.capitalRestant)}</td>}

/* ── calcDossierAuto ── */
window.calcDossierAuto = function calcDossierAuto(dos) {
  var lg = dos.lignes || [];
  if (!lg.length) return dos;
  var nowS = new Date().toISOString().split("T")[0];

  // ── Montant = somme versements ou somme capital remboursé ──
  var totalVers = (dos.versements||[]).reduce(function(a,v){
    return a + (parseFloat(String(v.montant||"0").replace(/\s/g,"").replace(",",".")) || 0);
  }, 0);
  var totalCapRbt = lg.reduce(function(a,r){ return a + (r.capital||0); }, 0);
  var montantAuto = totalVers > 0 ? totalVers : totalCapRbt;

  // ── Durée totale ──
  var dureeAuto = String(lg.length);

  // ── Date fin ──
  var dates = lg.map(function(r){ return r.date||""; }).filter(Boolean).sort();
  var dateFin = dates.length ? dates[dates.length-1] : "";

  // ── Détecter la périodicité (en mois) depuis l'écart entre rangs avec flux ──
  var rangsFlux = lg.filter(function(r){ return (r.interets||0) > 0 || (r.capital||0) > 0; });
  var periodicite = 1; // mensuelle par défaut
  if (rangsFlux.length >= 2) {
    var ecarts = [];
    for (var i = 1; i < Math.min(rangsFlux.length, 5); i++) {
      var d1 = new Date(rangsFlux[i-1].date||"2000-01-01");
      var d2 = new Date(rangsFlux[i].date||"2000-01-01");
      var diff = Math.round((d2 - d1) / (1000*60*60*24*30));
      if (diff > 0) ecarts.push(diff);
    }
    if (ecarts.length > 0) {
      ecarts.sort(function(a,b){return a-b;});
      periodicite = ecarts[Math.floor(ecarts.length/2)] || 1;
    }
  }
  var nbPeriodesAn = Math.round(12 / periodicite);

  // ── TEG réel = total intérêts payés / montant initial / durée (années) × 100 ──
  var amortsLg = lg.filter(function(r){ return (r.capital||0) > 0 && (r.interets||0) > 0; });
  var tauxAuto = "";
  if (lg.length > 0) {
    var totalInterets = lg.reduce(function(a,r){ return a + (r.interets||0); }, 0);
    var dureeAn = lg.length / 12;
    var montantBase = parseFloat(String(dos.montant||"0").replace(/\s/g,"").replace(",",".")) || montantAuto;
    if (totalInterets > 0 && montantBase > 0 && dureeAn > 0) {
      tauxAuto = (totalInterets / montantBase / dureeAn * 100).toFixed(2);
    }
  }

  // ── Commission garantie : médiane sur les rangs d'amortissement ──
  var commAuto = "";
  if (amortsLg.length >= 3) {  // toujours recalculer depuis les lignes
    var start2 = Math.floor(amortsLg.length * 0.25);
    var end2   = Math.floor(amortsLg.length * 0.75);
    var comms  = [];
    for (var k = start2; k <= end2; k++) {
      var rc = amortsLg[k];
      var capAvantC = (rc.capitalRestant||0) + (rc.capital||0);
      if (rc && capAvantC > 0 && (rc.commGarantie||0) > 0) {
        comms.push((rc.commGarantie / capAvantC) * nbPeriodesAn * 100);
      }
    }
    if (comms.length > 0) {
      comms.sort(function(a,b){return a-b;});
      commAuto = comms[Math.floor(comms.length/2)].toFixed(2);
    }
  }

  // ── Capital restant actuel ──
  var payeN = lg.filter(function(r){ return r.date <= nowS; }).length;
  var capitalRestantActuel = (lg[payeN] && lg[payeN].capitalRestant) || 0;

  // Fallback sur valeur saisie si pas assez de données pour calculer
  var tauxFinal = tauxAuto || dos.tauxAnnuel || "";
  var commFinal = commAuto || dos.tauxGarantie || "";
  return Object.assign({}, dos, {
    montant:    String(montantAuto) || dos.montant,
    duree:      dureeAuto,
    tauxAnnuel: tauxFinal,
    tauxGarantie: commFinal,
    dateFin:    dateFin,
    capitalRestantActuel: capitalRestantActuel,
    totalVersements: totalVers || montantAuto,
  });
};

                              {dateFin2&&<span style={{ fontSize:9,color:"#AAA",fontFamily:"'DM Mono',monospace" }}>→ {dateFin2.split("-").reverse().join("/")}</span>}
                            </div>
                          </div>
                        </div>
                      )}
                      {/* Barre avancement */}
                      <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                        <div style={{ flex:1,height:6,background:"#F0F0F0",borderRadius:4,overflow:"hidden" }}>
                          <div style={{ width:`${pct}%`,height:"100%",background:pct===100?"#27AE60":"#1D4ED8",borderRadius:4,transition:"width 0.3s" }} />
                        </div>
                        <span style={{ fontSize:11,color:"#888",fontFamily:"'Lora',serif",minWidth:80 }}>{paye}/{lignes.length} mois</span>
                      </div>
                    </div>
                  );
                })}
          </div>
        </div>
      )}

      {/* ── ONGLETS DOSSIERS INDIVIDUELS ── */}
      {dossiers.map(dos=>(
        activeTab===dos.id && (
          <EchDossierTab key={dos.id} dos={dos} saveDossier={saveDossier} deleteDossier={deleteDossier} now={now} fmtE={fmtE}/>
        )
      ))}
      </div>{/* fin contenu principal */}

      {/* Modal */}
      {modal && <EchDossierPanel dossier={modal} onSave={d=>{saveDossier(d);setActiveTab(d.id);}} onClose={()=>setModal(null)} />}
    </div>
  );
}



/* ══════════════════════════════════════════════
   MODULE RCF — Revolving Credit Facilities

const RCF_KEY = "taskmanager_rcf_v1";

function RCFView({ settings }) {
  const [lignes, setLignes] = React.useState([]);
  const [modal, setModal] = React.useState(null); // null | "new" | ligne
  const now = new Date().toISOString().split("T")[0];
  const today = new Date(now);

  React.useEffect(() => {
    if (!_db || !_auth?.currentUser) return;
    const uid = _auth.currentUser.uid;
    _db.collection("users").doc(uid).collection("data").doc(RCF_KEY).get().then(doc => {
      if (doc.exists) setLignes(doc.data().lignes || []);
    });
  }, []);

  const save = (l) => {
    setLignes(l);
    if (!_db || !_auth?.currentUser) return;
    const uid = _auth.currentUser.uid;
    _db.collection("users").doc(uid).collection("data").doc(RCF_KEY).set({ lignes: l });
  };

  const delLigne = (id) => save(lignes.filter(l => l.id !== id));

  const fmtD = (s) => s ? s.split("-").reverse().join("/") : "—";
  const fmtE = (v) => v ? Number(v).toLocaleString("fr-FR", { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + " €" : "—";

  // Calcul alertes
  const alertes = (dateStr, seuils) => {
    if (!dateStr) return null;
    const d = new Date(dateStr);
    const diff = Math.round((d - today) / 86400000);
    if (diff < 0) return { label: "Échu", color: "#DC2626", bg: "#FEE2E2", urgent: true };
    for (const [jours, label, color, bg] of seuils) {
      if (diff <= jours) return { label, color, bg, diff, urgent: diff <= seuils[seuils.length-1][0] };
    }
    return null;
  };

  const alertesContrat = (d) => alertes(d, [
    [90, "< 3 mois", "#D97706", "#FFFBEB"],
    [30, "< 1 mois", "#EA580C", "#FFF7ED"],
    [15, "< 15 jours", "#DC2626", "#FEF2F2"],
  ]);
  const alertesTirage = (d) => alertes(d, [
    [30, "< 30 jours", "#6D28D9", "#F5F3FF"],
    [20, "< 20 jours", "#EA580C", "#FFF7ED"],
    [10, "< 10 jours", "#DC2626", "#FEF2F2"],
  ]);

  // KPIs globaux
  const totalAutorise  = lignes.reduce((a, l) => a + (Number(l.montantAutorise) || 0), 0);
  const totalTire      = lignes.reduce((a, l) => a + (Number(l.montantTire) || 0), 0);
  const totalDispo     = totalAutorise - totalTire;
  const lignesActives  = lignes.filter(l => !l.dateFinContrat || l.dateFinContrat >= now).length;
  const alertesUrgentes = lignes.filter(l =>
    (l.dateFinContrat && alertesContrat(l.dateFinContrat)?.urgent) ||
    (l.tirages || []).some(t => t.dateEcheance && alertesTirage(t.dateEcheance)?.urgent)
  ).length;

  const AlertBadge = ({ date, fn }) => {
    const a = fn(date);
    if (!a) return null;
    return <span style={{ fontSize: 9, background: a.bg, color: a.color, borderRadius: 4, padding: "1px 6px", fontWeight: 700, whiteSpace: "nowrap", fontFamily: "'Lora',serif" }}>
      {a.label}{a.diff !== undefined ? ` (J-${a.diff})` : ""}
    </span>;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <h2 style={{ fontFamily: "'Lora',serif", fontSize: 20, fontWeight: 700, color: "#102A63", margin: 0 }}>Revolving Credit Facilities</h2>
          <p style={{ fontFamily: "'Lora',serif", fontSize: 12, color: "#888", margin: "3px 0 0" }}>Suivi des contrats et tirages RCF</p>
        </div>
        <button onClick={() => setModal("new")}
          style={{ background: "#102A63", color: "white", border: "none", borderRadius: 10, padding: "9px 18px", fontSize: 12, fontFamily: "'Lora',serif", fontWeight: 700, cursor: "pointer" }}>
          + Nouveau RCF
        </button>
      </div>

      {/* KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14 }}>
        {[
          { label: "Montant autorisé total",  val: fmtE(totalAutorise), color: "#102A63", bg: "#EFF6FF", border: "#BFDBFE", icon: "🏛" },
          { label: "Montant tiré",             val: fmtE(totalTire),     color: "#0E7490", bg: "#ECFEFF", border: "#A5F3FC", icon: "📤" },
          { label: "Disponible",               val: fmtE(totalDispo),    color: "#065F46", bg: "#F0FDF4", border: "#BBF7D0", icon: "✅" },
          { label: "Alertes urgentes",         val: String(alertesUrgentes), color: alertesUrgentes > 0 ? "#DC2626" : "#64748B", bg: alertesUrgentes > 0 ? "#FEF2F2" : "#F8FAFC", border: alertesUrgentes > 0 ? "#FECACA" : "#E2E8F0", icon: "⚠️" },
        ].map(k => (
          <div key={k.label} style={{ background: k.bg, border: `1px solid ${k.border}`, borderRadius: 12, padding: "14px 18px" }}>
            <div style={{ fontSize: 18, marginBottom: 6 }}>{k.icon}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: k.color, fontFamily: "'Lora',serif", marginBottom: 3 }}>{k.val}</div>
            <div style={{ fontSize: 10, color: "#888", fontFamily: "'Lora',serif" }}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* Lignes RCF */}
      {lignes.length === 0
        ? <div style={{ background: "white", borderRadius: 16, border: "1px solid #ECEAE5", padding: "60px 24px", textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>↺</div>
            <div style={{ fontFamily: "'Lora',serif", fontSize: 16, color: "#888", marginBottom: 8 }}>Aucun RCF enregistré</div>
            <div style={{ fontFamily: "'Lora',serif", fontSize: 12, color: "#AAA" }}>Cliquez sur "+ Nouveau RCF" pour commencer</div>
          </div>
        : lignes.map(ligne => {
          const alerteC = alertesContrat(ligne.dateFinContrat);
          const pctTire = ligne.montantAutorise > 0 ? Math.round((ligne.montantTire || 0) / ligne.montantAutorise * 100) : 0;
          return (
            <div key={ligne.id} style={{ background: "white", borderRadius: 16, border: `1px solid ${alerteC?.urgent ? "#FECACA" : "#ECEAE5"}`, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
              {/* Header ligne */}
              <div style={{ background: "#102A63", padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 36, height: 36, borderRadius: "50%", background: "rgba(255,255,255,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>↺</div>
                  <div>
                    <div style={{ fontFamily: "'Lora',serif", fontSize: 15, fontWeight: 700, color: "white" }}>{ligne.intitule || "Sans titre"}</div>
                    <div style={{ fontFamily: "'Lora',serif", fontSize: 11, color: "rgba(255,255,255,0.6)" }}>{ligne.banque || ""}{ligne.reference ? " · " + ligne.reference : ""}</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  {alerteC && <AlertBadge date={ligne.dateFinContrat} fn={alertesContrat} />}
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontFamily: "'Lora',serif", fontSize: 16, fontWeight: 700, color: "white" }}>{fmtE(ligne.montantAutorise)}</div>
                    <div style={{ fontFamily: "'Lora',serif", fontSize: 10, color: "rgba(255,255,255,0.55)" }}>autorisé</div>
                  </div>
                  <button onClick={() => setModal(ligne)} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 8, padding: "5px 10px", color: "white", cursor: "pointer", fontSize: 11, fontFamily: "'Lora',serif" }}>✏️ Modifier</button>
                  <button onClick={() => delLigne(ligne.id)} style={{ background: "rgba(255,255,255,0.1)", border: "none", borderRadius: 8, padding: "5px 8px", color: "rgba(255,255,255,0.5)", cursor: "pointer", fontSize: 12 }}>×</button>
                </div>
              </div>

              {/* Corps */}
              <div style={{ padding: "16px 20px", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
                {/* Infos contrat */}
                <div>
                  <div style={{ fontSize: 9, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", letterSpacing: "0.07em", marginBottom: 8 }}>CONTRAT</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                    {[
                      ["Date début", fmtD(ligne.dateDebutContrat)],
                      ["Échéance contrat", fmtD(ligne.dateFinContrat)],
                      ["Taux (%/an)", ligne.taux ? ligne.taux + " %" : "—"],
                      ["Conditions", ligne.conditions || "—"],
                    ].map(([l, v]) => (
                      <div key={l} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontFamily: "'Lora',serif" }}>
                        <span style={{ color: "#888" }}>{l}</span>
                        <span style={{ fontWeight: 600, color: "#2C3E50" }}>{v}</span>
                      </div>
                    ))}
                    <div style={{ marginTop: 4 }}>
                      <AlertBadge date={ligne.dateFinContrat} fn={alertesContrat} />
                    </div>
                  </div>
                </div>

                {/* Utilisation */}
                <div>
                  <div style={{ fontSize: 9, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", letterSpacing: "0.07em", marginBottom: 8 }}>UTILISATION</div>
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontFamily: "'Lora',serif", marginBottom: 4 }}>
                      <span style={{ color: "#888" }}>Tiré</span><span style={{ fontWeight: 700, color: "#0E7490" }}>{fmtE(ligne.montantTire)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontFamily: "'Lora',serif", marginBottom: 8 }}>
                      <span style={{ color: "#888" }}>Disponible</span><span style={{ fontWeight: 700, color: "#065F46" }}>{fmtE((ligne.montantAutorise || 0) - (ligne.montantTire || 0))}</span>
                    </div>
                    <div style={{ background: "#F1F5F9", borderRadius: 6, height: 8, overflow: "hidden" }}>
                      <div style={{ width: `${pctTire}%`, height: "100%", background: pctTire > 90 ? "#DC2626" : pctTire > 70 ? "#EA580C" : "#0E7490", borderRadius: 6, transition: "width 0.3s" }} />
                    </div>
                    <div style={{ fontSize: 9, color: "#888", fontFamily: "'Lora',serif", textAlign: "right", marginTop: 3 }}>{pctTire}% utilisé</div>
                  </div>
                </div>

                {/* Tirages */}
                <div>
                  <div style={{ fontSize: 9, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", letterSpacing: "0.07em", marginBottom: 8 }}>
                    TIRAGES EN COURS ({(ligne.tirages || []).filter(t => t.dateEcheance >= now).length})
                  </div>
                  {(ligne.tirages || []).length === 0
                    ? <div style={{ fontSize: 11, color: "#CCC", fontFamily: "'Lora',serif" }}>Aucun tirage</div>
                    : (ligne.tirages || []).sort((a, b) => (a.dateEcheance || "") > (b.dateEcheance || "") ? 1 : -1).map((t, ti) => {
                        const alerteT = alertesTirage(t.dateEcheance);
                        const isPast = t.dateEcheance < now;
                        return (
                          <div key={ti} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "4px 8px", background: isPast ? "#F0FDF4" : alerteT ? alerteT.bg : "#F8FAFC", borderRadius: 6, marginBottom: 4, border: `1px solid ${alerteT ? alerteT.color + "40" : "#E2E8F0"}` }}>
                            <div>
                              <div style={{ fontSize: 11, fontWeight: 700, color: isPast ? "#888" : "#102A63", fontFamily: "'Lora',serif" }}>{fmtE(t.montant)}</div>
                              <div style={{ fontSize: 9, color: "#888", fontFamily: "'Lora',serif" }}>éch. {fmtD(t.dateEcheance)}</div>
                            </div>
                            {t.renouvAuto && !isPast && <span style={{ fontSize:9,background:"#ECFDF5",color:"#065F46",borderRadius:4,padding:"1px 6px",fontWeight:700,fontFamily:"'Lora',serif",border:"1px solid #6EE7B7" }}>↺ Auto</span>}
                            {alerteT && <AlertBadge date={t.dateEcheance} fn={alertesTirage} />}
                            {isPast && <span style={{ fontSize: 9, background: "#D1FAE5", color: "#065F46", borderRadius: 4, padding: "1px 6px", fontWeight: 700, fontFamily: "'Lora',serif" }}>Remboursé</span>}
                          </div>
                        );
                      })}
                </div>
              </div>

              {/* Notes */}
              {ligne.notes && <div style={{ padding: "0 20px 14px", fontSize: 11, color: "#888", fontFamily: "'Lora',serif", fontStyle: "italic", borderTop: "1px solid #F1F5F9", paddingTop: 10 }}>📝 {ligne.notes}</div>}
            </div>
          );
        })}

      {/* Modal création / édition */}
      {modal && <RCFModal
        ligne={modal === "new" ? null : modal}
        onSave={(l) => {
          const updated = modal === "new"
            ? [...lignes, { ...l, id: "rcf_" + Date.now() }]
            : lignes.map(x => x.id === l.id ? l : x);
          save(updated);
          setModal(null);
        }}
        onClose={() => setModal(null)}
      />}
    </div>
  );
}

function RCFModal({ ligne, onSave, onClose }) {
  const empty = { intitule: "", banque: "", reference: "", montantAutorise: "", montantTire: "", taux: "", dateDebutContrat: "", dateFinContrat: "", conditions: "", notes: "", tirages: [] };
  const [d, setD] = React.useState(ligne ? { ...ligne } : empty);
  const set = (k, v) => setD(p => ({ ...p, [k]: v }));

  const addTirage = () => set("tirages", [...(d.tirages || []), { montant: "", dateEcheance: "", note: "" }]);
  const updTirage = (i, k, v) => { const t = [...(d.tirages || [])]; t[i] = { ...t[i], [k]: v }; set("tirages", t); };
  const delTirage = (i) => set("tirages", (d.tirages || []).filter((_, j) => j !== i));

  const inp = { border: "1px solid #E8E8E8", borderRadius: 8, padding: "8px 10px", fontSize: 12, outline: "none", width: "100%", boxSizing: "border-box", fontFamily: "'Lora',serif", color: "#2C3E50" };
  const lbl = (t) => <div style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", marginBottom: 4, letterSpacing: "0.05em" }}>{t}</div>;

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }}
      onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ width: "min(700px,96vw)", background: "white", borderRadius: 16, overflow: "hidden", maxHeight: "90vh", display: "flex", flexDirection: "column" }}>
        {/* Header */}
        <div style={{ background: "#102A63", padding: "18px 24px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", fontFamily: "'Lora',serif", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 3 }}>Revolving Credit Facility</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>{ligne ? "Modifier le RCF" : "Nouveau RCF"}</div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "white", fontSize: 20, cursor: "pointer" }}>×</button>
        </div>

        <div style={{ overflowY: "auto", padding: "20px 24px", display: "flex", flexDirection: "column", gap: 16 }}>
          {/* Infos générales */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div style={{ gridColumn: "1/-1" }}>{lbl("INTITULÉ")}<input value={d.intitule} onChange={e => set("intitule", e.target.value)} placeholder="RCF BNP 2024" style={inp} /></div>
            <div>{lbl("BANQUE / ORGANISME")}<input value={d.banque} onChange={e => set("banque", e.target.value)} placeholder="BNP Paribas" style={inp} /></div>
            <div>{lbl("RÉFÉRENCE")}<input value={d.reference} onChange={e => set("reference", e.target.value)} placeholder="RCF-2024-001" style={inp} /></div>
            <div>{lbl("MONTANT AUTORISÉ (€)")}<input type="text" value={d.montantAutorise} onChange={e => set("montantAutorise", e.target.value)} placeholder="5 000 000" style={inp} /></div>
            <div>{lbl("MONTANT TIRÉ (€)")}<input type="text" value={d.montantTire} onChange={e => set("montantTire", e.target.value)} placeholder="2 000 000" style={inp} /></div>
            <div>{lbl("TAUX (%/AN)")}<input type="text" value={d.taux} onChange={e => set("taux", e.target.value)} placeholder="3,50" style={inp} /></div>
            <div>{lbl("CONDITIONS")}<input value={d.conditions} onChange={e => set("conditions", e.target.value)} placeholder="Euribor + 1,5%" style={inp} /></div>
            <div>{lbl("DATE DÉBUT CONTRAT")}<input type="date" value={d.dateDebutContrat} onChange={e => set("dateDebutContrat", e.target.value)} style={inp} /></div>
            <div>{lbl("ÉCHÉANCE CONTRAT")}<input type="date" value={d.dateFinContrat} onChange={e => set("dateFinContrat", e.target.value)} style={inp} /></div>
          </div>

          {/* Tirages */}
          <div style={{ background: "#F0F5FF", borderRadius: 10, padding: "14px 16px", border: "1px solid #BFDBFE" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", letterSpacing: "0.07em" }}>TIRAGES EN COURS</div>
              <button onClick={addTirage} style={{ fontSize: 11, fontFamily: "'Lora',serif", background: "#102A63", color: "white", border: "none", borderRadius: 6, padding: "4px 10px", cursor: "pointer" }}>+ Ajouter</button>
            </div>
            {(d.tirages || []).length === 0
              ? <div style={{ fontSize: 11, color: "#AAA", fontFamily: "'Lora',serif" }}>Aucun tirage — cliquez sur "+ Ajouter"</div>
              : (d.tirages || []).map((t, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 2fr auto auto", gap: 8, marginBottom: 8, alignItems: "end" }}>
                  <div>{lbl("Montant (€)")}<input type="text" value={t.montant} onChange={e => updTirage(i, "montant", e.target.value)} placeholder="500 000" style={{ ...inp, fontSize: 11, padding: "6px 8px" }} /></div>
                  <div>{lbl("Échéance")}<input type="date" value={t.dateEcheance} onChange={e => updTirage(i, "dateEcheance", e.target.value)} style={{ ...inp, fontSize: 11, padding: "6px 8px" }} /></div>
                  <div>{lbl("Note")}<input value={t.note || ""} onChange={e => updTirage(i, "note", e.target.value)} placeholder="Tranche A…" style={{ ...inp, fontSize: 11, padding: "6px 8px" }} /></div>
                  <div style={{ display:"flex",alignItems:"center",gap:6,paddingTop:18 }}>
                    <input type="checkbox" id={`renouv_${i}`} checked={t.renouvAuto||false} onChange={e=>updTirage(i,"renouvAuto",e.target.checked)} style={{ cursor:"pointer",width:14,height:14 }}/>
                    <label htmlFor={`renouv_${i}`} style={{ fontSize:11,fontFamily:"'Lora',serif",color:"#065F46",cursor:"pointer",fontWeight:t.renouvAuto?700:400 }}>Renouvellement automatique</label>
                  </div>
                  <button onClick={() => delTirage(i)} style={{ border: "none", background: "#FEE2E2", color: "#DC2626", borderRadius: 6, width: 30, height: 32, cursor: "pointer", fontSize: 14 }}>×</button>
                </div>
              ))}
          </div>

          {/* Notes */}
          <div>{lbl("NOTES")}<textarea value={d.notes} onChange={e => set("notes", e.target.value)} placeholder="Observations…" rows={2} style={{ ...inp, resize: "vertical" }} /></div>
        </div>

        {/* Footer */}
        <div style={{ padding: "14px 24px", borderTop: "1px solid #F0F0F0", display: "flex", justifyContent: "flex-end", gap: 10 }}>
          <button onClick={onClose} style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 8, padding: "8px 18px", fontSize: 12, fontFamily: "'Lora',serif", cursor: "pointer" }}>Annuler</button>
          <button onClick={() => onSave(d)} style={{ background: "#102A63", color: "white", border: "none", borderRadius: 8, padding: "8px 22px", fontSize: 12, fontFamily: "'Lora',serif", fontWeight: 700, cursor: "pointer" }}>✓ Enregistrer</button>
        </div>
      </div>
    </div>
  );
}
