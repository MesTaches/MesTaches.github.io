  const catObj  = settings.categories.find(c => c.name === task.category);
  const typeObj = settings.types.find(t => t.name === task.type);
  const catBg     = catObj?.bg     || "#F0F0F0";
  const catAccent = catObj?.accent || "#888";
  const statusObj = settings.statuses.find(s => s.id === task.status) || settings.statuses[0];
  const doneSubs  = task.subtasks?.filter(s => s.completed).length || 0;
  const ds  = isOverdue(task.dueDate) && !task.completed ? "overdue" : isToday(task.dueDate) ? "today" : daysBefore(task.dueDate, 2) ? "soon" : "ok";
  const dc  = { overdue: "#C0392B", today: "#E67E22", soon: "#F39C12", ok: "#95A5A6" };
  const hasComment = task.notes && task.notes.replace(/<[^>]*>/g, "").trim().length > 0;
  return (
    <>
      <div onClick={() => onEdit(task)} style={{ background: "white", borderRadius: 12, marginBottom: 8, borderLeft: `4px solid ${catAccent}`, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", overflow: "hidden", opacity: task.completed ? 0.55 : 1 }}>
        <div style={{ padding: "12px 14px" }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 8 }}>
            <button onClick={(e) => { e.stopPropagation(); onToggle(task.id); }}
              style={{ width: 20, height: 20, borderRadius: "50%", flexShrink: 0, border: `2px solid ${task.completed ? catAccent : "#CCC"}`, background: task.completed ? catAccent : "white", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "white", marginTop: 1 }}>{task.completed ? "✓" : ""}</button>
            <span style={{ fontSize: 14, fontWeight: 600, color: task.completed ? "#AAA" : "#2C3E50", textDecoration: task.completed ? "line-through" : "none", fontFamily: "'Lora',serif", flex: 1, lineHeight: 1.4 }}>{task.title}</span>
            <span style={{ fontSize: 11, color: PRIORITY_COLORS[task.priority], fontWeight: 700, flexShrink: 0 }}>{PRIORITY_ICONS[task.priority]}</span>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 6 }}>
            <span style={{ fontSize: 9, fontWeight: 700, background: statusObj.bg, color: statusObj.color, borderRadius: 4, padding: "2px 6px", fontFamily: "'DM Mono',monospace" }}>{statusObj.name}</span>
            {task.category && <span style={{ fontSize: 10, fontWeight: 700, background: catBg, color: catAccent, borderRadius: 4, padding: "2px 7px", fontFamily: "'DM Mono',monospace" }}>{task.category}</span>}
            {task.type && <span style={{ fontSize: 10, color: "#777", fontFamily: "'DM Mono',monospace", background: "#F5F5F5", borderRadius: 4, padding: "2px 7px" }}>{typeObj?.icon} {task.type}</span>}
            {task.subtasks?.length > 0 && <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace", background: "#F5F5F5", borderRadius: 4, padding: "2px 7px" }}>{doneSubs}/{task.subtasks.length}✓</span>}
            {task.inMyDay && <span style={{ fontSize: 10, color: "#E67E22", background: "#FEF9E7", borderRadius: 4, padding: "2px 7px", fontFamily: "'DM Mono',monospace" }}>☀ Ma journée</span>}
          </div>
          {(task.dueDate || task.createdAt) && (
            <div style={{ display: "flex", gap: 12 }}>
              {task.createdAt && <span style={{ fontSize: 10, color: "#BDC3C7", fontFamily: "'DM Mono',monospace" }}>+ {fmtDate(task.createdAt.split("T")[0])}</span>}
              {task.dueDate && <span style={{ fontSize: 10, color: dc[ds], fontFamily: "'DM Mono',monospace", fontWeight: 600 }}>{ds === "overdue" ? "⚠" : ds === "today" ? "●" : "○"} {fmtDate(task.dueDate)}</span>}
            </div>
          )}
          {hasComment && <div style={{ marginTop: 6, fontSize: 11, color: "#888", fontFamily: "'Lora',serif", fontStyle: "italic", borderTop: "1px solid #F5F5F5", paddingTop: 6 }} dangerouslySetInnerHTML={{ __html: "💬 " + task.notes }} />}
        </div>
        <div style={{ borderTop: "1px solid #F5F5F5", display: "flex" }}>
          <button onClick={(e) => { e.stopPropagation(); setShowComment(true); }} style={{ flex: 1, border: "none", background: "none", padding: "8px 0", fontSize: 11, color: hasComment ? "#102A63" : "#AAA", cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>💬 Commenter</button>
          <button onClick={(e) => { e.stopPropagation(); onDelete(task.id); }} style={{ flex: 1, border: "none", borderLeft: "1px solid #F5F5F5", background: "none", padding: "8px 0", fontSize: 11, color: "#E8A0A0", cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>× Supprimer</button>
        </div>
      </div>
      {showComment && <CommentPopover task={task} catBg={catBg} catAccent={catAccent} onSave={(txt) => onSaveComment(task.id, txt)} onClose={() => setShowComment(false)} />}
    </>
  );
}

/* ─── DASHBOARD ─── */
function Dashboard({ tasks, onNavigate, settings }) {
  const isMobile = useIsMobile();
  const active  = tasks.filter(t => !t.completed);
  const overdue = active.filter(t => isOverdue(t.dueDate));
  const todayT  = active.filter(t => isToday(t.dueDate));
  const done    = tasks.filter(t => t.completed);
  const total   = tasks.length || 1;
  const byCat   = settings.categories.map(c => ({
    name: c.name, color: c.accent, bg: c.bg,
    total: tasks.filter(t => t.category === c.name).length,
    done:  tasks.filter(t => t.category === c.name && t.completed).length,
  }));
  const byStatus = settings.statuses.map(st => ({
    ...st, count: active.filter(t => (t.status || settings.statuses[0]?.id) === st.id).length
  }));
  const byPrio = [
    { label: 'Urgente', key: 'urgente', color: '#C0392B', bg: '#FDEDEC' },
    { label: 'Haute',   key: 'haute',   color: '#E67E22', bg: '#FEF9E7' },
    { label: 'Normale', key: 'normale', color: '#7F8C8D', bg: '#F5F5F5' },
    { label: 'Basse',   key: 'basse',   color: '#27AE60', bg: '#E8F8F5' },
  ].map(p => ({ ...p, count: active.filter(t => (t.priority || 'normale') === p.key).length }));
  const pct = n => total === 0 ? 0 : Math.round(n / total * 100);
  const weekDays = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - 6 + i);
    const ds = d.toISOString().split('T')[0];
    return {
      label: d.toLocaleDateString('fr-FR', { weekday: 'short' }),
      date: ds,
      created: tasks.filter(t => t.createdAt?.split('T')[0] === ds).length,
      done: tasks.filter(t => t.completed && t.createdAt?.split('T')[0] === ds).length,
    };
  });
  const maxBar = Math.max(1, ...weekDays.map(d => d.created));

  const StatCard = ({ label, value, sub, color, onClick }) => (
    <div onClick={onClick} style={{background:'white', borderRadius:14, padding: isMobile ? '14px 16px' : '18px 20px', border:'1px solid #ECEAE5', cursor: onClick ? 'pointer' : 'default', borderTop: `3px solid ${color}`}}
      onMouseEnter={e => { if(onClick && !isMobile) { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 6px 20px rgba(0,0,0,0.08)'; }}}
      onMouseLeave={e => { e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='none'; }}>
      <div style={{display:'flex', alignItems:'baseline', gap:6}}>
        <div style={{fontSize: isMobile ? 24 : 30, fontWeight:700, color, fontFamily:'DM Mono,monospace'}}>{value}</div>
        {sub && <div style={{fontSize:11, color, fontFamily:'DM Mono,monospace', opacity:0.55}}>{sub}</div>}
      </div>
      <div style={{fontSize: isMobile ? 11 : 13, fontWeight:600, color:'#2C3E50', fontFamily:'Lora,serif', marginTop:5}}>{label}</div>
    </div>
  );

  return <div style={{display:'flex', flexDirection:'column', gap: isMobile ? 14 : 20}}>

    {/* Titre */}
    <div>
      <div style={{fontSize: isMobile ? 18 : 22, fontWeight:700, fontFamily:'Lora,serif', color:'#2C3E50'}}>Tableau de bord</div>
      <div style={{fontSize:12, color:'#AAA', fontFamily:'DM Mono,monospace'}}>{new Date().toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
    </div>

    {/* KPIs */}
    <div style={{display:'grid', gridTemplateColumns: isMobile ? 'repeat(2,1fr)' : 'repeat(4,1fr)', gap: isMobile ? 8 : 20}}>
      <StatCard label="Tâches actives"   value={active.length}  sub={pct(active.length)+"%"}  color="#2C3E50" onClick={() => onNavigate('tasks')} />
      <StatCard label="En retard"        value={overdue.length} sub={pct(overdue.length)+"%"} color="#C0392B" onClick={() => onNavigate('tasks')} />
      <StatCard label="Aujourd'hui"      value={todayT.length}  sub={pct(todayT.length)+"%"}  color="#E67E22" onClick={() => onNavigate('calendar')} />
      <StatCard label="Complétées"       value={done.length}    sub={pct(done.length)+"%"}    color="#27AE60" onClick={() => onNavigate('tasks')} />

    {/* Barre de progression globale */}
    <div style={{background:'white', borderRadius:14, padding: isMobile ? '14px 16px' : '20px 24px', border:'1px solid #ECEAE5'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
        <span style={{fontSize:14, fontWeight:700, fontFamily:'Lora,serif', color:'#2C3E50'}}>Avancement global</span>
        <span style={{fontSize:22, fontWeight:700, fontFamily:'DM Mono,monospace', color:'#27AE60'}}>{Math.round(done.length / total * 100)}%</span>
      </div>
      <div style={{height:10, background:'#F0F0F0', borderRadius:10, overflow:'hidden'}}>
        <div style={{height:'100%', width: (done.length/total*100)+'%', background:'linear-gradient(90deg,#27AE60,#2ECC71)', borderRadius:10, transition:'width 0.5s'}} />
      </div>
      <div style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'#AAA', fontFamily:'DM Mono,monospace', marginTop:8}}>
        <span>{done.length} complétées</span><span>{active.length} restantes</span>
      </div>
    </div>

    {/* 3 colonnes : par catégorie, par statut, par priorité */}
    <div style={{display:'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(3,1fr)', gap: isMobile ? 12 : 20}}>

      {/* Par catégorie */}
      <div style={{background:'white', borderRadius:14, padding: isMobile ? '14px 16px' : '20px 24px', border:'1px solid #ECEAE5'}}>
        <div style={{fontSize:14, fontWeight:700, fontFamily:'Lora,serif', color:'#2C3E50', marginBottom:14}}>Par catégorie</div>
        {byCat.map(c => <div key={c.name} style={{marginBottom:12}}>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
            <span style={{fontSize:12, fontFamily:'DM Mono,monospace', color:'#555'}}>{c.name}</span>
            <span style={{fontSize:11, fontFamily:'DM Mono,monospace', color:'#AAA'}}>{c.done}/{c.total}</span>
          </div>
          <div style={{height:6, background:'#F0F0F0', borderRadius:6, overflow:'hidden'}}>
            <div style={{height:'100%', width: c.total ? (c.done/c.total*100)+'%' : '0%', background: c.color, borderRadius:6, transition:'width 0.5s'}} />
          </div>
        </div>)}
      </div>

      {/* Par statut */}
      <div style={{background:'white', borderRadius:14, padding: isMobile ? '14px 16px' : '20px 24px', border:'1px solid #ECEAE5'}}>
        <div style={{fontSize:14, fontWeight:700, fontFamily:'Lora,serif', color:'#2C3E50', marginBottom:14}}>Par statut</div>
        {byStatus.map(st => <div key={st.id} style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
          <div style={{flex:1}}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
              <span style={{fontSize:11, fontFamily:'DM Mono,monospace', fontWeight:700, background: st.bg, color: st.color, borderRadius:4, padding:'1px 7px'}}>{st.name}</span>
              <span style={{fontSize:11, fontFamily:'DM Mono,monospace', color:'#AAA'}}>{st.count}</span>
            </div>
            <div style={{height:5, background:'#F0F0F0', borderRadius:5, overflow:'hidden'}}>
              <div style={{height:'100%', width: active.length ? (st.count/active.length*100)+'%' : '0%', background: st.color, borderRadius:5, transition:'width 0.5s'}} />
            </div>
          </div>
        </div>)}
      </div>

      {/* Par priorité */}
      <div style={{background:'white', borderRadius:14, padding: isMobile ? '14px 16px' : '20px 24px', border:'1px solid #ECEAE5'}}>
        <div style={{fontSize:14, fontWeight:700, fontFamily:'Lora,serif', color:'#2C3E50', marginBottom:14}}>Par priorité</div>
        {byPrio.map(p => <div key={p.key} style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
          <div style={{flex:1}}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
              <span style={{fontSize:11, fontFamily:'DM Mono,monospace', fontWeight:700, background: p.bg, color: p.color, borderRadius:4, padding:'1px 7px'}}>{p.label}</span>
              <span style={{fontSize:11, fontFamily:'DM Mono,monospace', color:'#AAA'}}>{p.count}</span>
            </div>
            <div style={{height:5, background:'#F0F0F0', borderRadius:5, overflow:'hidden'}}>
              <div style={{height:'100%', width: active.length ? (p.count/active.length*100)+'%' : '0%', background: p.color, borderRadius:5, transition:'width 0.5s'}} />
            </div>
          </div>
        </div>)}
      </div>
    </div>

    {/* Activité 7 derniers jours */}
    <div style={{background:'white', borderRadius:14, padding: isMobile ? '14px 16px' : '20px 24px', border:'1px solid #ECEAE5'}}>
      <div style={{fontSize:14, fontWeight:700, fontFamily:'Lora,serif', color:'#2C3E50', marginBottom:16}}>Activité — 7 derniers jours</div>
      <div style={{display:'flex', alignItems:'flex-end', gap: isMobile ? 8 : 14, height:80}}>
        {weekDays.map(d => <div key={d.date} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4}}>
          <div style={{width:'100%', display:'flex', flexDirection:'column', justifyContent:'flex-end', height:60, gap:2}}>
            <div style={{width:'100%', height: (d.done/maxBar*50)+'px', background:'#27AE60', borderRadius:3, minHeight: d.done ? 3 : 0}} title={d.done+' complétées'} />
            <div style={{width:'100%', height: ((d.created-d.done)/maxBar*50)+'px', background:'#102A63', borderRadius:3, minHeight: d.created > d.done ? 3 : 0}} title={d.created+' créées'} />
          </div>
          <span style={{fontSize:9, color:'#AAA', fontFamily:'DM Mono,monospace'}}>{d.label}</span>
        </div>)}
      </div>
      <div style={{display:'flex', gap:16, marginTop:10}}>
        <span style={{fontSize:10, fontFamily:'DM Mono,monospace', color:'#102A63', display:'flex', alignItems:'center', gap:4}}><span style={{width:10, height:10, background:'#102A63', borderRadius:2, display:'inline-block'}}></span>Créées</span>

    </div>

    {/* Tâches à traiter maintenant */}
    {(overdue.length > 0 || todayT.length > 0) && <div style={{background:'white', borderRadius:14, padding: isMobile ? '14px 16px' : '20px 24px', border:'1px solid #ECEAE5'}}>
      <div style={{fontSize:14, fontWeight:700, fontFamily:'Lora,serif', color:'#2C3E50', marginBottom:12}}>À traiter maintenant</div>
      {[...overdue, ...todayT.filter(t => !overdue.includes(t))].slice(0,6).map(t => {
        const co = settings.categories.find(c => c.name === t.category);
        return <div key={t.id} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:'1px solid #F5F5F5'}}>
          <span style={{fontSize:10, fontWeight:700, background: co?.bg || '#F0F0F0', color: co?.accent || '#888', borderRadius:4, padding:'2px 7px', fontFamily:'DM Mono,monospace', flexShrink:0}}>{t.category}</span>
          <span style={{fontSize:13, fontFamily:'Lora,serif', color:'#333', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{t.title}</span>
          <span style={{fontSize:11, fontFamily:'DM Mono,monospace', color: isOverdue(t.dueDate) ? '#C0392B' : '#E67E22', flexShrink:0}}>{isOverdue(t.dueDate) ? '⚠ Retard' : 'Aujourd\u2019hui'}</span>
        </div>;
      })}
    </div>}

  </div>;
}

            );
          })}

/* ─── CALENDAR VIEW ─── */
function CalendarView({ tasks, onEdit, onUpdate, onAdd, settings }) {
  const [curDate, setCurDate] = useState(new Date());
  const year = curDate.getFullYear(), month = curDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startPad = Math.min((firstDay + 6) % 7, 4);
  const cells = [];
  for (let i = 0; i < startPad; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(year, month, d).getDay();
    if (dow !== 0 && dow !== 6) cells.push(d);
  }
  const tasksByDay = {};
  tasks.forEach(t => {
    if (!t.dueDate) return;
    const td = new Date(t.dueDate);
    if (td.getFullYear() === year && td.getMonth() === month) {
      const k = td.getDate(); if (!tasksByDay[k]) tasksByDay[k] = []; tasksByDay[k].push(t);
    }
  });
  const [selectedDay, setSelectedDay] = useState(null);
  const todayDate = new Date();
  const DAYS = ["Lun", "Mar", "Mer", "Jeu", "Ven"];
  const MONTHS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

  /* ── Drag custom — pas d'attribut draggable HTML pour éviter le click post-drag ── */
  const isDragging   = useRef(false);
  const cellRefs     = useRef({});
  const [ghost, setGhost]       = useState(null);
  const [hoverDay, setHoverDay] = useState(null);

  const getDayAtPos = (x, y) => {
    for (const [day, el] of Object.entries(cellRefs.current)) {
      if (!el) continue;
      const r = el.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return Number(day);
    }
    return null;
  };

  const startDrag = (e, task) => {
    e.preventDefault(); e.stopPropagation();
    let moved = false;
    const ox = e.clientX, oy = e.clientY;
    const onMove = mv => {
      const dx = mv.clientX - ox, dy = mv.clientY - oy;
      if (!moved && Math.hypot(dx, dy) > 5) {
        moved = true;
        isDragging.current = true;
        setGhost({ x: mv.clientX + 12, y: mv.clientY + 12, label: task.title });
      }
      if (moved) {
        setGhost(g => ({ ...g, x: mv.clientX + 12, y: mv.clientY + 12 }));
        setHoverDay(getDayAtPos(mv.clientX, mv.clientY));
      }
    };
    const onUp = up => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      if (moved) {
        /* Drag terminé — sauvegarder seulement, ne PAS ouvrir le détail */
        const day = getDayAtPos(up.clientX, up.clientY);
        if (day) {
          const newDue = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          (onUpdate || onEdit)({ ...task, dueDate: newDue });
        }
        isDragging.current = true;
        setTimeout(() => { isDragging.current = false; }, 150);
      } else {
        /* Simple clic — ouvrir le détail */
        onEdit(task);
        isDragging.current = false;
      }
      setGhost(null); setHoverDay(null);
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  };

  return (
    <div style={{ userSelect: "none" }}>
      {ghost && (
        <div style={{ position:"fixed", left:ghost.x, top:ghost.y, zIndex:9999, pointerEvents:"none",
          background:"#102A63", color:"white", borderRadius:8, padding:"5px 10px",
          fontSize:11, fontFamily:"'Lora',serif", maxWidth:220,
          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
          opacity:0.95, boxShadow:"0 6px 20px rgba(16,42,99,0.4)", cursor:"grabbing" }}>
          📅 {ghost.label}
        </div>
      )}

      {/* Header moderne */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
        <div style={{ fontSize:22, fontWeight:700, fontFamily:"'Lora',serif", color:"#2C3E50" }}>Calendrier</div>
        <div style={{ display:"flex", alignItems:"center", gap:8, background:"#102A63", borderRadius:12, padding:"6px 10px" }}>
          <button onClick={() => setCurDate(new Date(year, month-1, 1))}
            style={{ background:"rgba(255,255,255,0.15)", border:"none", color:"white", borderRadius:8, width:32, height:32, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Lora',serif" }}>‹</button>
          <span style={{ fontSize:15, fontWeight:700, fontFamily:"'Lora',serif", color:"white", minWidth:160, textAlign:"center", letterSpacing:"0.02em" }}>{MONTHS[month]} {year}</span>
          <button onClick={() => setCurDate(new Date(year, month+1, 1))}
            style={{ background:"rgba(255,255,255,0.15)", border:"none", color:"white", borderRadius:8, width:32, height:32, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Lora',serif" }}>›</button>
          <button onClick={() => setCurDate(new Date())}
            style={{ background:"rgba(255,255,255,0.25)", border:"none", color:"white", borderRadius:8, padding:"5px 14px", fontSize:11, cursor:"pointer", fontFamily:"'Lora',serif", fontWeight:700, marginLeft:4 }}>Aujourd'hui</button>
        </div>
      </div>

      {/* Grille */}
      <div style={{ background:"white", borderRadius:16, overflow:"hidden", boxShadow:"0 2px 16px rgba(0,0,0,0.06)", border:"1px solid #ECEAE5", width:"100%" }}>
        {/* Grille unifiée : en-têtes + cellules dans la même grille CSS */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)" }}>
          {DAYS.map((d,i) => (
            <div key={d} style={{ padding:"10px 0", textAlign:"center", fontSize:10, fontWeight:700,
              color: i>=5 ? "rgba(255,255,255,0.5)" : "white",
              fontFamily:"'Lora',serif", letterSpacing:"0.08em",
              background:"#102A63",
              borderBottom:"2px solid rgba(255,255,255,0.15)" }}>{d}</div>
          ))}
          {cells.map((d, i) => {
            if (!d) return <div key={`e${i}`} style={{ minHeight:110, borderRight:"1px solid #F0F0F0", borderBottom:"1px solid #F0F0F0", background:"#F8F7F4" }} />;
            const isToday = todayDate.getDate()===d && todayDate.getMonth()===month && todayDate.getFullYear()===year;
            const isSelected = selectedDay===d;
            const dayTasks = tasksByDay[d] || [];
            const hasOverdue = dayTasks.some(t => !t.completed && isOverdue(t.dueDate));
            const isHover = hoverDay===d;
            return (
              <div key={d}
                ref={el => cellRefs.current[d] = el}
                onClick={() => { if (!isDragging.current) setSelectedDay(isSelected ? null : d); }}
                style={{ minHeight:110, borderRight:"1px solid #ECEAE5", borderBottom:"1px solid #ECEAE5",
                  padding:"8px 6px 6px", cursor:"pointer",
                  background: isHover ? "#E8F0FE" : isSelected ? "#EEF2FF" : "white",
                  transition:"background 0.12s",
                  outline: isHover ? "2px solid #102A63" : "none", outlineOffset:"-2px" }}>
                {/* Numéro du jour */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:5 }}>
                  <span style={{
                    fontSize:12, fontWeight: isToday ? 700 : 400,
                    fontFamily:"'Lora',serif",
                    color: isToday ? "white" : "#444",
                    background: isToday ? "#102A63" : "transparent",
                    borderRadius:"50%", width:24, height:24,
                    display:"flex", alignItems:"center", justifyContent:"center",
                    flexShrink:0
                  }}>{d}</span>
                  {hasOverdue && <span style={{ fontSize:9, color:"#C0392B", marginTop:2 }}>⚠</span>}
                </div>
                {/* Pills de tâches */}
                {dayTasks.slice(0,3).map(t => {
                  const co = settings.categories.find(c => c.name===t.category);
                  const accent = co?.accent || "#888";
                  const bg = co?.bg || "#F0F0F0";
                  return (
                    <div key={t.id}
                      onPointerDown={e => startDrag(e, t)}
                      title={t.title}
                      style={{
                        fontSize:10, fontFamily:"'Lora',serif",
                        background: bg, color: accent,
                        borderRadius:20, padding:"2px 7px", marginBottom:3,
                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                        textDecoration: t.completed ? "line-through" : "none",
                        opacity: t.completed ? 0.5 : 1,
                        cursor:"grab", touchAction:"none",
                        borderLeft:`3px solid ${accent}`,
                        boxShadow:"0 1px 3px rgba(0,0,0,0.06)",
                        transition:"box-shadow 0.15s"
                      }}>
                      {t.title}
                    </div>
                  );
                })}
                {dayTasks.length > 3 && <div style={{ fontSize:9, color:"#AAA", fontFamily:"'Lora',serif", paddingLeft:4 }}>+{dayTasks.length-3} autres</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Panneau détail jour */}
      {selectedDay && (
        <div style={{ marginTop:16, background:"white", borderRadius:14, border:"1px solid #ECEAE5", overflow:"hidden", boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
          <div style={{ background:"#102A63", padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ fontSize:15, fontWeight:700, fontFamily:"'Lora',serif", color:"white" }}>
              📅 {selectedDay} {MONTHS[month]} {year}
              <span style={{ fontSize:11, fontWeight:400, color:"rgba(255,255,255,0.6)", marginLeft:10 }}>
                {(tasksByDay[selectedDay]||[]).length} tâche{(tasksByDay[selectedDay]||[]).length!==1?"s":""}
              </span>
            </div>
            <button onClick={() => onAdd(`${year}-${String(month+1).padStart(2,"0")}-${String(selectedDay).padStart(2,"0")}`)}
              style={{ background:"rgba(255,255,255,0.2)", border:"1px solid rgba(255,255,255,0.3)", color:"white", borderRadius:8, padding:"5px 14px", fontSize:11, cursor:"pointer", fontFamily:"'Lora',serif", fontWeight:700 }}>
              + Ajouter
            </button>
          </div>
          {(tasksByDay[selectedDay]||[]).length === 0
            ? <div style={{ padding:"28px", textAlign:"center", color:"#CCC", fontFamily:"'Lora',serif", fontSize:12 }}>Aucune tâche ce jour</div>
            : (tasksByDay[selectedDay]||[]).map(t => {
                const co = settings.categories.find(c => c.name===t.category);
                const accent = co?.accent || "#888";
                const bg = co?.bg || "#F5F5F5";
                const st = settings.statuses.find(s=>s.id===t.status);
                return (
                  <div key={t.id} onClick={() => onEdit(t)}
                    style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 20px",
                      borderBottom:"1px solid #F5F5F5", cursor:"pointer",
                      transition:"background 0.12s" }}
                    onMouseEnter={e=>e.currentTarget.style.background="#F8F9FB"}
                    onMouseLeave={e=>e.currentTarget.style.background="white"}>
                    <span style={{ width:4, height:36, borderRadius:2, background:accent, flexShrink:0 }} />
                    <span style={{ fontSize:13, fontFamily:"'Lora',serif", color:t.completed?"#AAA":"#2C3E50",
                      textDecoration:t.completed?"line-through":"none", flex:1, fontWeight:500 }}>{t.title}</span>
                    {t.category && <span style={{ fontSize:9, fontWeight:700, background:bg, color:accent, borderRadius:20, padding:"2px 8px", fontFamily:"'Lora',serif", flexShrink:0 }}>{t.category}</span>}
                    {st && <span style={{ fontSize:9, fontWeight:700, background:st.bg||"#EEE", color:st.color||"#888", borderRadius:20, padding:"2px 8px", fontFamily:"'Lora',serif", flexShrink:0 }}>{st.name}</span>}
                  </div>
                );
              })}
        </div>
      )}
    </div>
  );
}

/* ─── NOTIFICATIONS VIEW ─── */
const REMINDER_LABELS = { none: "Aucun", same: "Le jour même", "30min": "30 min avant", "1h": "1h avant", "2h": "2h avant", "1d": "La veille", "2d": "2 jours avant" };
function NotificationsView({ tasks, onUpdate, settings }) {
  const withReminder = tasks.filter(t => !t.completed && t.reminder && t.reminder !== "none" && t.dueDate);
  const triggered = withReminder.filter(t => {
    const diff = (new Date(t.dueDate) - new Date()) / 864e5;
    if (t.reminder === "same") return isToday(t.dueDate);
    if (t.reminder === "30min" || t.reminder === "1h" || t.reminder === "2h") return isToday(t.dueDate) || isOverdue(t.dueDate);
    if (t.reminder === "1d") return diff <= 1;
    if (t.reminder === "2d") return diff <= 2;
    return false;
  });
  const upcoming = withReminder.filter(t => !triggered.includes(t));
  return (
    <div>
      <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 4 }}>Notifications & Rappels</div>
      <div style={{ fontSize: 12, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 24 }}>{withReminder.length} tâche(s) avec rappel configuré</div>
      {triggered.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#E67E22", letterSpacing: "0.08em", fontFamily: "'DM Mono',monospace", marginBottom: 10 }}>🔔 RAPPELS ACTIFS ({triggered.length})</div>
          {triggered.map(t => {
            const co = settings.categories.find(c => c.name === t.category);
            return (
              <div key={t.id} style={{ background: "white", borderRadius: 12, border: "1px solid #E8E8E8", borderLeft: `4px solid ${co?.accent || "#888"}`, padding: "14px 18px", marginBottom: 8, display: "flex", gap: 12, alignItems: "center" }}>
                <span style={{ fontSize: 22 }}>🔔</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 3 }}>{t.title}</div>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", background: co?.bg || "#F0F0F0", color: co?.accent || "#888", borderRadius: 4, padding: "2px 7px" }}>{t.category}</span>
                    <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: isOverdue(t.dueDate) ? "#C0392B" : "#E67E22" }}>{isOverdue(t.dueDate) ? "⚠ En retard" : "● Aujourd'hui"} — {fmtDate(t.dueDate)}</span>
                  </div>
                </div>
                <button onClick={() => onUpdate({ ...t, completed: true, status: "done" })} style={{ ...S.btn("#27AE60"), fontSize: 11, padding: "6px 12px", flexShrink: 0 }}>Marquer fait</button>
              </div>
            );
          })}
        </div>
      )}
      <div>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#AAA", letterSpacing: "0.08em", fontFamily: "'DM Mono',monospace", marginBottom: 10 }}>PROCHAINS RAPPELS ({upcoming.length})</div>
        {upcoming.length === 0 && triggered.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 0", color: "#CCC" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🔕</div>
            <div style={{ fontFamily: "'Lora',serif", fontSize: 14 }}>Aucun rappel configuré</div>
          </div>
        )}
        {upcoming.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).map(t => {
          const co = settings.categories.find(c => c.name === t.category);
          const diff = Math.ceil((new Date(t.dueDate) - new Date()) / 864e5);
          return (
            <div key={t.id} style={{ background: "white", borderRadius: 12, border: "1px solid #ECEAE5", padding: "12px 16px", marginBottom: 6, display: "flex", gap: 10, alignItems: "center" }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: co?.bg || "#F0F0F0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>🔔</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50" }}>{t.title}</div>
                <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#AAA", marginTop: 2 }}>{fmtDate(t.dueDate)} · dans {diff}j</div>
              </div>
              <select value={t.reminder} onChange={e => onUpdate({ ...t, reminder: e.target.value })}
                style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", border: "1px solid #E0E0E0", borderRadius: 6, padding: "4px 8px", background: "white", cursor: "pointer", color: "#555" }}>
                <option value="none">Désactiver</option><option value="same">Le jour même</option>
                <option value="30min">30 min avant</option><option value="1h">1h avant</option>
                <option value="2h">2h avant</option><option value="1d">La veille</option><option value="2d">2 jours avant</option>
              </select>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── MEETINGS VIEW ─── */
function MeetingsView({ onAddTask }) {
  const [meetings, setMeetings] = useState(() => { try { const s = localStorage.getItem(MEETING_STORAGE); return s ? JSON.parse(s) : []; } catch { return []; } });
  const [selected, setSelected] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [newM, setNewM] = useState(null);
  const [recap, setRecap] = useState(null);
  const [loadingRecap, setLoadingRecap] = useState(false);
  useEffect(() => { try { localStorage.setItem(MEETING_STORAGE, JSON.stringify(meetings)); } catch {} }, [meetings]);
  const saveMeeting = m => { const exists = meetings.find(x => x.id === m.id); if (exists) setMeetings(p => p.map(x => x.id === m.id ? m : x)); else setMeetings(p => [m, ...p]); setSelected(m); };
  const delMeeting = id => { setMeetings(p => p.filter(x => x.id !== id)); if (selected?.id === id) setSelected(null); };
  const generateRecap = async m => {
    setLoadingRecap(true); setRecap(null);
    if (!settings ) {
      setResult("⚠️ Clé API manquante — configurez-la dans Paramètres ⚙");
      setLoading(false);
      return;
    }
    try {
      const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${(settings && settings.groqKey) || ""}` }, body: JSON.stringify({ model: "llama-3.3-70b-versatile", max_tokens: 1000, messages: [{ role: "user", content: `Tu es un assistant professionnel. Génère un compte-rendu structuré en français.\n\nRéunion : ${m.title}\nDate : ${m.date}${m.time ? " à " + m.time : ""}\nParticipants : ${m.participants || "Non renseignés"}\nOrdre du jour : ${m.agenda || "Non renseigné"}\nNotes :\n${m.notes || "Aucune note"}\n\nGénère un compte-rendu avec :\n1. Résumé (3-4 phrases)\n2. Points clés discutés\n3. Décisions prises\n4. Actions à mener (avec responsable si mentionné)\n5. Prochaines étapes\n\nSois concis et professionnel.` }] }) });
      const data = await resp.json();
      setRecap(data.choices?.[0]?.message?.content || "Erreur de génération.");
    } catch { setRecap("Erreur de connexion."); }
    setLoadingRecap(false);
  };
  const upcoming = meetings.filter(m => m.date >= today()).sort((a, b) => a.date.localeCompare(b.date));
  const past = meetings.filter(m => m.date < today()).sort((a, b) => b.date.localeCompare(a.date));
  const [tab, setTab] = useState("prep");
  const Tab = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{ border: "none", background: "none", padding: "8px 16px", fontSize: 12, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: tab === id ? "#102A63" : "#888", borderBottom: `2px solid ${tab === id ? "#102A63" : "transparent"}`, fontWeight: tab === id ? 700 : 400 }}>{label}</button>
  );
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>Réunions</div>
        <button onClick={() => { setNewM({ id: uid(), title: "", date: today(), time: "", participants: "", agenda: "", notes: "", docs: "" }); setShowNew(true); setSelected(null); }} style={{ ...S.btn("#102A63"), padding: "7px 16px", fontSize: 12 }}>+ Nouvelle réunion</button>
      </div>
      <div style={{ background: "#EEF2FF", borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 11, color: "#4F46E5", fontFamily: "'DM Mono',monospace", lineHeight: 1.6 }}>
        💡 <strong>Import Outlook :</strong> Exportez votre réunion depuis Outlook (Fichier → Enregistrer sous → .ics) puis renseignez manuellement. Une connexion directe Microsoft 365 nécessiterait une intégration OAuth.
      </div>
      <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
        <div style={{ width: 240, flexShrink: 0 }}>
          {upcoming.length > 0 && <><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.08em", marginBottom: 6 }}>À VENIR</div>
            {upcoming.map(m => <div key={m.id} onClick={() => { setSelected(m); setShowNew(false); setRecap(null); }} style={{ background: selected?.id === m.id ? "#EEF2FF" : "white", border: `1px solid ${selected?.id === m.id ? "#C7D2FE" : "#ECEAE5"}`, borderRadius: 10, padding: "10px 12px", marginBottom: 6, cursor: "pointer" }}>
              <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.title || "Sans titre"}</div>
              <div style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{fmtDate(m.date)}{m.time ? " · " + m.time : ""}</div>
            </div>)}</>}
          {past.length > 0 && <><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.08em", marginTop: 12, marginBottom: 6 }}>PASSÉES</div>
            {past.map(m => <div key={m.id} onClick={() => { setSelected(m); setShowNew(false); setRecap(null); }} style={{ background: selected?.id === m.id ? "#EEF2FF" : "white", border: `1px solid ${selected?.id === m.id ? "#C7D2FE" : "#ECEAE5"}`, borderRadius: 10, padding: "10px 12px", marginBottom: 6, cursor: "pointer", opacity: 0.65 }}>
              <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.title || "Sans titre"}</div>
              <div style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{fmtDate(m.date)}</div>
            </div>)}</>}
          {meetings.length === 0 && !showNew && <div style={{ textAlign: "center", padding: "30px 0", color: "#CCC" }}><div style={{ fontSize: 28, marginBottom: 8 }}>◷</div><div style={{ fontFamily: "'Lora',serif", fontSize: 13 }}>Aucune réunion</div></div>}
        </div>
        <div style={{ flex: 1, minWidth: 300 }}>
          {showNew && newM && (
            <div style={{ background: "white", borderRadius: 14, border: "1px solid #ECEAE5", padding: "20px 24px" }}>
              <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 14 }}>Nouvelle réunion</div>
              <input value={newM.title} onChange={e => setNewM({ ...newM, title: e.target.value })} placeholder="Titre…" style={{ ...S.input, fontSize: 14, marginBottom: 10 }} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                <div><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 4 }}>DATE</div><input type="date" value={newM.date} onChange={e => setNewM({ ...newM, date: e.target.value })} style={{ ...S.input, cursor: "pointer" }} /></div>
                <div><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 4 }}>HEURE</div><input type="time" value={newM.time} onChange={e => setNewM({ ...newM, time: e.target.value })} style={{ ...S.input, cursor: "pointer" }} /></div>
              </div>
              <input value={newM.participants} onChange={e => setNewM({ ...newM, participants: e.target.value })} placeholder="Participants…" style={{ ...S.input, marginBottom: 10 }} />
              <textarea value={newM.agenda} onChange={e => setNewM({ ...newM, agenda: e.target.value })} rows={4} placeholder="Ordre du jour…" style={{ ...S.input, resize: "vertical", marginBottom: 10 }} />
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                <button onClick={() => setShowNew(false)} style={{ ...S.btn("#F0F0F0", "#666"), fontFamily: 'Lora' }}>Annuler</button>
                <button onClick={() => { saveMeeting({ ...newM, notes: "", docs: "" }); setShowNew(false); }} style={{ ...S.btn("#102A63") }}>Créer</button>
              </div>
            </div>
          )}
          {selected && !showNew && (
            <div style={{ background: "white", borderRadius: 14, border: "1px solid #ECEAE5", overflow: "hidden" }}>
              <div style={{ padding: "16px 20px", borderBottom: "1px solid #F0F0F0", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1, marginRight: 8 }}>

                  <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{fmtDate(selected.date)}{selected.time ? " · " + selected.time : ""}{selected.participants ? " · " + selected.participants : ""}</div>

                  <textarea value={selected.agenda || ""} onChange={e => { const m = { ...selected, agenda: e.target.value }; setSelected(m); saveMeeting(m); }} rows={5} placeholder="Points à aborder…" style={{ ...S.input, resize: "vertical", marginBottom: 12 }} />
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>PARTICIPANTS</div>
                  <input value={selected.participants || ""} onChange={e => { const m = { ...selected, participants: e.target.value }; setSelected(m); saveMeeting(m); }} placeholder="Participants…" style={{ ...S.input, marginBottom: 12 }} />
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>DOCUMENTS / LIENS</div>
                  <textarea value={selected.docs || ""} onChange={e => { const m = { ...selected, docs: e.target.value }; setSelected(m); saveMeeting(m); }} rows={2} placeholder="Fichiers, liens…" style={{ ...S.input, resize: "vertical" }} />
                </>}
                {tab === "notes" && <>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>NOTES EN SÉANCE</div>
                  <textarea value={selected.notes || ""} onChange={e => { const m = { ...selected, notes: e.target.value }; setSelected(m); saveMeeting(m); }} rows={12} placeholder={"Prenez vos notes ici…\n\nAstuce : utilisez '-' pour les décisions et '→' pour les actions."} style={{ ...S.input, resize: "vertical", lineHeight: 1.7, fontSize: 13 }} />
                  <AttachmentZone attachments={selected.attachments} onChange={v => { const m = { ...selected, attachments: v }; setSelected(m); saveMeeting(m); }} />
                  <div style={{ marginTop: 10, display: "flex", justifyContent: "flex-end" }}>
                    <button onClick={() => onAddTask({ id: uid(), title: `Actions — ${selected.title}`, category: "Equipe", type: "Réunion", dueDate: "", priority: "normale", status: "todo", notes: `Réunion du ${selected.date}\n${selected.notes || ""}`, completed: false, reminder: "none", recurrence: "none", subtasks: [], createdAt: new Date().toISOString(), totalTime: 0, inMyDay: false })} style={{ ...S.btn("#F0F0F0", "#555"), fontSize: 11, padding: "6px 14px" }}>↗ Créer une tâche</button>
                  </div>

                {tab === "recap" && <>
                  {!recap && !loadingRecap && <div style={{ textAlign: "center", padding: "30px 0" }}>
                    <div style={{ fontSize: 32, marginBottom: 10 }}>🤖</div>

                    {!selected.notes && <div style={{ fontSize: 11, color: "#AAA", fontFamily: "'DM Mono',monospace", marginTop: 10 }}>Ajoutez des notes d'abord</div>}

                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>Compte-rendu</div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={() => generateRecap(selected)} style={{ ...S.btn("#F0F0F0", "#666"), fontSize: 10, padding: "4px 10px" }}>↺ Régénérer</button>
                        <button onClick={() => setRecap(null)} style={{ border: "1px solid #E0E0E0", background: "none", borderRadius: 6, padding: "4px 10px", fontSize: 10, color: "#AAA", cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>×</button>
                      </div>

                    <button onClick={() => navigator.clipboard.writeText(recap)} style={{ ...S.btn("#102A63"), fontSize: 11, padding: "6px 14px", marginTop: 10 }}>📋 Copier</button>
                  </>}
                </>}
              </div>
            </div>
          )}
          {!selected && !showNew && <div style={{ textAlign: "center", padding: "60px 0", color: "#CCC" }}><div style={{ fontSize: 40, marginBottom: 12 }}>◷</div><div style={{ fontFamily: "'Lora',serif", fontSize: 15, color: "#AAA" }}>Sélectionnez ou créez une réunion</div></div>}
        </div>
      </div>
    </div>
  );
}

/* ─── 7) CATEGORY TASKS VIEW ─── */
const CAT_ORDER_KEY = "taskmanager_catorder_v1";

function CategoryTasksView({ tasks, onDelete, onToggle, onEdit, onAdd, onSaveComment, onPin, settings }) {
  const isMobile = useIsMobile();
  const [filterStatus, setFilterStatus] = useState("Actives");
  const [search, setSearch] = useState("");
  const [selectedTypes, setSelectedTypes] = useState([]); // empty = all
  const [selectedCats, setSelectedCats] = useState([]);  // filter by category
  const [colWidths, setColWidths] = useState(() => { try { const s = localStorage.getItem(COL_WIDTHS_KEY); return s ? { ...DEFAULT_COL_WIDTHS, ...JSON.parse(s) } : DEFAULT_COL_WIDTHS; } catch { return DEFAULT_COL_WIDTHS; } });

  // Drag-to-reorder type blocks
  const TYPE_ORDER_KEY = "taskmanager-typeorder-v1";
  const DEFAULT_TYPE_ORDER = ["task", "quick", "report", "meeting", "analyse"];
  const [typeOrder, setTypeOrder] = useState(() => {
    try { const s = localStorage.getItem(TYPE_ORDER_KEY); return s ? JSON.parse(s) : DEFAULT_TYPE_ORDER; } catch { return DEFAULT_TYPE_ORDER; }
  });
  const dragSrc = useRef(null);

  // Ordered types (respects user drag order + adds new types)
  const orderedTypes = [
    ...typeOrder.map(id => settings.types.find(t => t.id === id)).filter(Boolean),
    ...settings.types.filter(t => !typeOrder.includes(t.id)),
  ];

  const saveTypeOrder = (order) => { setTypeOrder(order); try { localStorage.setItem(TYPE_ORDER_KEY, JSON.stringify(order)); } catch {} };

  const toggleType = id => setSelectedTypes(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const showTypes = selectedTypes.length === 0 ? orderedTypes : orderedTypes.filter(t => selectedTypes.includes(t.id));
  const toggleCat = id => setSelectedCats(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const [typeSort, setTypeSort] = useState({ col: null, dir: "asc" });

  const baseFilter = t => {
    if (t.status === "blocked" && filterStatus !== "Toutes") return false;
    if (filterStatus === "Actives" && t.completed) return false;
    if (filterStatus === "Complétées" && !t.completed) return false;
    if (search && !t.title.toLowerCase().includes(search.toLowerCase())) return false;
    if (selectedCats.length > 0 && !selectedCats.includes(t.category)) return false;
    return true;
  };

  const FBtn = ({ label, active, onClick, color }) => (
    <button onClick={onClick} style={{ border: `1px solid ${active ? color || "#102A63" : "#E0E0E0"}`, background: active ? color || "#102A63" : "white", color: active ? "white" : "#888", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", transition: "all 0.15s", whiteSpace: "nowrap" }}>{label}</button>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column" }}>
      {/* Toolbar */}
      <div style={{ background: "white", borderBottom: "1px solid #ECEAE5", padding: "7px 12px", display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", flexShrink: 0 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Rechercher…" className="search-input-small" style={{ ...S.input, width: 140, padding: "4px 8px", fontSize: 10 }} />
        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
        {["Actives", "Complétées", "Toutes"].map(o => <FBtn key={o} label={o} active={filterStatus === o} onClick={() => setFilterStatus(o)} />)}
        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
        <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>FILTRER :</span>
        {orderedTypes.map(tp => (
          <button key={tp.id} onClick={() => toggleType(tp.id)}
            style={{ border: `1px solid ${selectedTypes.includes(tp.id) ? "#102A63" : "#E0E0E0"}`, background: selectedTypes.includes(tp.id) ? "#102A63" : "white", color: selectedTypes.includes(tp.id) ? "white" : "#888", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", fontWeight: selectedTypes.includes(tp.id) ? 700 : 400 }}>{tp.icon} {tp.name}</button>
        ))}
        {selectedTypes.length > 0 && <button onClick={() => setSelectedTypes([])} style={{ ...S.ghost, padding: "2px 7px", fontSize: 9 }}>× Tout</button>}
        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
        <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>CATÉGORIE :</span>
        {settings.categories.map(c => (
          <button key={c.id} onClick={() => toggleCat(c.id)}
            style={{ border: `1px solid ${selectedCats.includes(c.id) ? c.accent : "#E0E0E0"}`, background: selectedCats.includes(c.id) ? c.bg : "white", color: selectedCats.includes(c.id) ? c.accent : "#888", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", fontWeight: selectedCats.includes(c.id) ? 700 : 400 }}>{c.name}</button>
        ))}
        {selectedCats.length > 0 && <button onClick={() => setSelectedCats([])} style={{ ...S.ghost, padding: "2px 7px", fontSize: 9 }}>× Tout</button>}
        <div style={{ flex: 1 }} />
        <button onClick={() => onAdd()} style={{ ...S.btn("#102A63"), padding: "4px 12px", fontSize: 11 }}>+ Nouvelle</button>
      </div>

      {/* Type blocks */}
      <div style={{ padding: "12px 100px", display: "flex", flexDirection: "column", gap: 12 }}>
        {showTypes.map(tp => {
          const TYPE_COLORS = { task: { bg: "#EEF2FF", accent: "#4F46E5" }, quick: { bg: "#FEF9C3", accent: "#A16207" }, report: { bg: "#E8F8F5", accent: "#27AE60" }, meeting: { bg: "#FDEDEC", accent: "#C0392B" }, analyse: { bg: "#F4ECF7", accent: "#8E44AD" } };
          const tc = TYPE_COLORS[tp.id] || { bg: "#F5F5F5", accent: "#888888" };
          const typeTasks = tasks.filter(t => t.type === tp.name && baseFilter(t));
          return (
            <div key={tp.id}
              draggable
              onDragStart={() => { dragSrc.current = tp.id; }}
              onDragOver={e => e.preventDefault()}
              onDrop={() => {
                if (!dragSrc.current || dragSrc.current === tp.id) return;
                const order = orderedTypes.map(t => t.id);
                const from = order.indexOf(dragSrc.current);
                const to   = order.indexOf(tp.id);
                const next = [...order];
                next.splice(from, 1);
                next.splice(to, 0, dragSrc.current);
                saveTypeOrder(next);
                dragSrc.current = null;
              }}
              style={{ background: "white", borderRadius: 12, border: `1px solid ${tc.bg}`, borderLeft: `4px solid ${tc.accent}`, overflow: "hidden", cursor: "grab" }}>
              {/* Block header */}
              <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: tc.bg, borderBottom: `1px solid ${tc.accent}30` }}>
                <span style={{ fontSize: 16 }}>{tp.icon}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: tc.accent, fontFamily: "'Lora',serif", flex: 1 }}>{tp.name}</span>
                <span style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: tc.accent, opacity: 0.7 }}>{typeTasks.length} tâche{typeTasks.length !== 1 ? "s" : ""}</span>
                <button onClick={() => onAdd()} title={`Nouvelle tâche de type ${tp.name}`}
                  style={{ border: `1px solid ${tc.accent}`, background: "white", borderRadius: 6, padding: "2px 8px", fontSize: 10, cursor: "pointer", color: tc.accent, fontFamily: "'DM Mono',monospace" }}>+</button>
              </div>
              {/* Tasks list */}
              {typeTasks.length === 0 ? (
                <div style={{ padding: "12px 16px", fontSize: 11, color: "#CCC", fontFamily: "'Lora',serif", fontStyle: "italic" }}>Aucune tâche de ce type</div>
              ) : isMobile ? (
                <div style={{ padding: "8px" }}>
                  {typeTasks.map(t => <MobileTaskCard key={t.id} task={t} onToggle={onToggle} onEdit={onEdit} onDelete={onDelete} onSaveComment={onSaveComment} settings={settings} />)}
                </div>
              ) : (
                <div>
                  {/* mini header row */}
                  <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "3px 12px 2px", background: "#FAFAF8", borderBottom: "1px solid #F0F0F0", userSelect: "none" }}>
                    <div style={{ width: 14, flexShrink: 0, marginLeft: 5 }} />
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 16 }}>#</span>
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 12 }}>P</span>
                    {[["TÂCHE","title",colWidths.title||220],["STATUT","status",colWidths.status||72],["CATÉGORIE","category",colWidths.category||90]].map(([lbl,col,w]) => (
                      <span key={col} onClick={() => { if(typeSort.col===col){setTypeSort(s=>({...s,dir:s.dir==="asc"?"desc":"asc"}))} else {setTypeSort({col,dir:"asc"})} }}
                        style={{ fontSize: 8, fontWeight: 700, color: typeSort.col===col ? "#102A63" : "#AAA", fontFamily: "'DM Mono',monospace", width: w, flexShrink: 0, cursor: "pointer", display: "flex", alignItems: "center", gap: 2 }}>
                        {lbl}{typeSort.col===col && <span>{typeSort.dir==="asc"?"▲":"▼"}</span>}
                      </span>
                    ))}
                    <div style={{ flex: 1 }} />
                    {[["CRÉATION","createdAt",colWidths.created||82],["ÉCHÉANCE","dueDate",colWidths.due||82]].map(([lbl,col,w]) => (
                      <span key={col} onClick={() => { if(typeSort.col===col){setTypeSort(s=>({...s,dir:s.dir==="asc"?"desc":"asc"}))} else {setTypeSort({col,dir:"asc"})} }}
                        style={{ fontSize: 8, fontWeight: 700, color: typeSort.col===col ? "#102A63" : "#AAA", fontFamily: "'DM Mono',monospace", width: w, flexShrink: 0, cursor: "pointer", textAlign: "right", display: "inline-flex", alignItems: "center", justifyContent: "flex-end", gap: 2 }}>
                        {lbl}{typeSort.col===col && <span>{typeSort.dir==="asc"?"▲":"▼"}</span>}
                      </span>
                    ))}
                    <span style={{ width: 16, flexShrink: 0 }} />
                    <span style={{ width: 36, flexShrink: 0 }} />
                  </div>
                  <div style={{ padding: "3px 0 4px" }}>
                    {(typeSort.col ? [...typeTasks].sort((a,b) => { let va=a[typeSort.col]||""; let vb=b[typeSort.col]||""; const cmp=va.toString().localeCompare(vb.toString(),"fr",{sensitivity:"base"}); return typeSort.dir==="asc"?cmp:-cmp; }) : [...typeTasks].sort((a,b) => { if(a.completed!==b.completed)return a.completed?1:-1; const da=a.dueDate||"9999-99-99",db=b.dueDate||"9999-99-99"; if(da!==db)return da<db?-1:1; return ({urgente:0,haute:1,normale:2,basse:3}[a.priority]??2)-({urgente:0,haute:1,normale:2,basse:3}[b.priority]??2); })).map((t, i) => <TaskCard key={t.id} task={t} num={i + 1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} onPin={onPin} colWidths={colWidths} settings={settings} />)}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* Hint bas de page */}
      <div style={{ textAlign: "center", padding: "8px 0 12px", fontSize: 9, color: "#CCC", fontFamily: "'DM Mono',monospace" }}>⠿ Glissez les blocs pour réordonner</div>
    </div>
  );
}


/* ─── KANBAN VIEW ─── */
function KanbanView({ tasks, onEdit, onToggle, onUpdate, settings }) {
  const statuses = settings.statuses || [];
  const [dragId,   setDragId]   = React.useState(null);
  const [dragOver, setDragOver] = React.useState(null);
  const [showDone, setShowDone] = React.useState(false);

  const activeTasks = tasks.filter(t => !t.completed);
  const doneTasks   = tasks.filter(t =>  t.completed)
    .sort((a,b) => new Date(b.completedAt||b.createdAt||0) - new Date(a.completedAt||a.createdAt||0));
  const cols = statuses.map(st => ({
    ...st,
    tasks: activeTasks.filter(t => (t.status || statuses[0]?.id) === st.id)
  }));
  const prios = { urgentes:'#C0392B', urgente:'#C0392B', haute:'#E67E22', normale:'#7F8C8D', basse:'#27AE60' };

  const handleDrop = colId => {
    if (!dragId) return;
    const task = tasks.find(t => t.id === dragId);
    if (task && task.status !== colId) onUpdate({ ...task, status: colId });
    setDragId(null); setDragOver(null);
  };

  const Card = ({ t, draggable: isDraggable }) => {
    const cat = settings.categories.find(c => c.name === t.category);
    return (
      <div
        draggable={isDraggable}
        onDragStart={isDraggable ? () => setDragId(t.id) : undefined}
        onDragEnd={isDraggable   ? () => { setDragId(null); setDragOver(null); } : undefined}
        style={{
          background: dragId===t.id ? '#EEF2FF' : '#FAFAFA',
          borderRadius:10, padding:'9px 11px',
          borderLeft:`3px solid ${cat?.accent||'#102A63'}`,
          cursor: isDraggable ? 'grab' : 'default',
          boxShadow:'0 1px 4px rgba(0,0,0,0.05)',
          opacity: dragId===t.id ? 0.45 : 1,
          transition:'all 0.15s'
        }}
        onMouseEnter={e => { if(dragId!==t.id){e.currentTarget.style.background='#F0F4FF';e.currentTarget.style.transform='translateY(-1px)';} }}
        onMouseLeave={e => { if(dragId!==t.id){e.currentTarget.style.background='#FAFAFA';e.currentTarget.style.transform='none';} }}
      >
        <div style={{display:'flex',alignItems:'flex-start',gap:7,marginBottom:5}}>
          <input
            type="checkbox" checked={!!t.completed}
            onChange={e => { e.stopPropagation(); onToggle(t.id); }}
            onClick={e => e.stopPropagation()}
            style={{accentColor:'#27AE60',cursor:'pointer',width:13,height:13,marginTop:2,flexShrink:0}}
          />
          <div onClick={() => onEdit(t)} style={{
            fontSize:13,fontWeight:600,fontFamily:'Lora,serif',
            color:t.completed?'#AAA':'#2C3E50',lineHeight:1.3,flex:1,
            textDecoration:t.completed?'line-through':'none',cursor:'pointer'
          }}>{t.title}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',paddingLeft:20}}>
          {cat && <span style={{fontSize:9,fontFamily:'DM Mono,monospace',background:cat.bg,color:cat.accent,borderRadius:4,padding:'1px 6px',fontWeight:700}}>{t.category}</span>}
          {t.dueDate && <span style={{fontSize:9,fontFamily:'DM Mono,monospace',color:isOverdue(t.dueDate)&&!t.completed?'#C0392B':'#888'}}>{t.dueDate.split('-').reverse().join('/')}</span>}
          <span style={{fontSize:9,fontFamily:'DM Mono,monospace',color:prios[t.priority||'normale']||'#7F8C8D',fontWeight:700,marginLeft:'auto'}}>{(t.priority||'normale').charAt(0).toUpperCase()}</span>
        </div>
      </div>
    );
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,position:'relative',zIndex:5}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,fontFamily:"'Lora',serif",color:'#2C3E50'}}>Kanban</div>
          <div style={{fontSize:12,color:'#AAA',fontFamily:"'DM Mono',monospace"}}>{activeTasks.length} tâche{activeTasks.length!==1?'s':''} active{activeTasks.length!==1?'s':''}</div>
        </div>
        <button onClick={() => setShowDone(d => !d)} style={{border:'1px solid #27AE60',background:showDone?'#D1FAE5':'white',color:showDone?'#065F46':'#27AE60',borderRadius:20,padding:'6px 18px',fontSize:12,cursor:'pointer',fontFamily:"'Lora',serif",fontWeight:600,position:'relative',zIndex:20,pointerEvents:'all'}}>
          {showDone ? '▾ Masquer clôturées' : '▸ Voir clôturées'} ({doneTasks.length})
        </button>
      </div>

      <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:8,alignItems:'flex-start'}}>
        {cols.map(col => (
          <div key={col.id}
            onDragOver={e => { e.preventDefault(); setDragOver(col.id); }}
            onDragLeave={() => setDragOver(null)}
            onDrop={() => handleDrop(col.id)}
            style={{minWidth:220,flex:'0 0 220px',background:dragOver===col.id?'#EEF2FF':'white',borderRadius:14,border:`2px solid ${dragOver===col.id?'#102A63':'#ECEAE5'}`,overflow:'hidden',transition:'all 0.15s'}}>
            <div style={{padding:'10px 14px',background:col.bg,borderBottom:'1px solid #E8E8E8',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,fontWeight:700,fontFamily:'DM Mono,monospace',color:col.color}}>{col.name.toUpperCase()}</span>
              <span style={{fontSize:11,fontFamily:'DM Mono,monospace',color:col.color,background:'white',borderRadius:20,padding:'1px 8px',fontWeight:700}}>{col.tasks.length}</span>
            </div>
            <div style={{padding:10,display:'flex',flexDirection:'column',gap:8,minHeight:80}}>
              {col.tasks.length===0
                ? <div style={{fontSize:11,color:'#CCC',fontFamily:'Lora,serif',fontStyle:'italic',textAlign:'center',padding:'16px 0'}}>Aucune tâche</div>
                : col.tasks.map(t => <Card key={t.id} t={t} draggable={true} />)}
            </div>
          </div>
        ))}
      </div>

      {showDone && (
        <div style={{background:'white',borderRadius:14,border:'1px solid #ECEAE5',overflow:'hidden'}}>

            <span style={{fontSize:12,fontWeight:700,fontFamily:'DM Mono,monospace',color:'#065F46'}}>✓ CLÔTURÉES</span>
            <span style={{fontSize:11,fontFamily:'DM Mono,monospace',color:'#065F46',background:'white',borderRadius:20,padding:'1px 8px',fontWeight:700}}>{doneTasks.length}</span>
          </div>
          <div style={{display:'flex',gap:10,overflowX:'auto',padding:12,alignItems:'flex-start'}}>
            {doneTasks.length===0

        </div>
      )}
    </div>

}

function _fd(d){if(!d)return'—';var p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function _fe(v){return v?Number(v).toLocaleString('fr-FR')+'€':'—';}

function exportTasksPDF(tasks, settings) {
  var now=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  var today=new Date().toISOString().split('T')[0];
  var active=tasks.filter(function(t){return !t.completed;}),done=tasks.filter(function(t){return t.completed;});
  var overdue=active.filter(function(t){return t.dueDate&&t.dueDate<today;});
  var urgent=active.filter(function(t){return t.priority==='urgente'||t.priority==='haute';});
  function pb(p){var m={urgente:'pu',haute:'ph',normale:'pn',basse:'pb'};var l={urgente:'Urgente',haute:'Haute',normale:'Normale',basse:'Basse'};return'<span class="b '+(m[p]||'pn')+'">'+(l[p]||p||'Normale')+'</span>';}
  function cb(t){var c=(settings.categories||[]).find(function(c){return c.name===t.category;});return c?'<span class="b" style="background:'+c.bg+';color:'+c.accent+'">'+c.name+'</span>':'';}
  function sb(t){var st=(settings.statuses||[]).find(function(s){return s.id===t.status;})||(settings.statuses||[])[0];return st?'<span class="b" style="background:'+st.bg+';color:'+st.color+'">'+st.name+'</span>':'';}
  function tbl(list,title,color){
    if(!list.length)return'';
    return'<div class="sec"><div class="st" style="color:'+color+'">'+title+' ('+list.length+')</div>'
    +'<table><thead><tr><th>#</th><th>TÂCHE</th><th>CATÉGORIE</th><th>TYPE</th><th>PRIORITÉ</th><th>STATUT</th><th>ÉCHÉANCE</th></tr></thead><tbody>'
    +list.map(function(t,i){
      return'<tr class="'+(t.completed?'dn':'')+'">'
      +'<td style="font-family:\'DM Mono\',monospace;font-size:9px;color:#AAA;width:28px">'+(i+1)+'</td>'
      +'<td><div style="font-weight:600">'+t.title+'</div>'
      +(t.notes?'<div style="font-size:9px;color:#999;margin-top:2px;font-style:italic">'+t.notes.substring(0,110)+(t.notes.length>110?'…':'')+'</div>':'')
      +((t.subtasks||[]).length?'<div style="font-size:8px;color:#AAA;margin-top:2px;font-family:\'DM Mono\',monospace">'+(t.subtasks||[]).filter(function(s){return s.completed;}).length+'/'+(t.subtasks||[]).length+' sous-tâches</div>':'')
      +'</td><td>'+cb(t)+'</td>'
      +'<td style="font-family:\'DM Mono\',monospace;font-size:9px;color:#888">'+(t.type||'—')+'</td>'
      +'<td>'+pb(t.priority)+'</td><td>'+sb(t)+'</td>'
      +'<td style="font-family:\'DM Mono\',monospace;font-size:9px;color:'+(t.dueDate&&t.dueDate<today&&!t.completed?'#C0392B':'#888')+'">'+_fd(t.dueDate)+'</td>'
      +'</tr>';
    }).join('')+'</tbody></table></div>';
  }
  var byType={};active.forEach(function(t){var k=t.type||'Sans type';if(!byType[k])byType[k]=[];byType[k].push(t);});
  var html='<div class="root">'
    +'<div class="hdr"><div><div class="al">GESTIONNAIRE DE TÂCHES</div><div class="ttl">Export des Tâches</div><div class="sub">Généré le '+now+'</div></div>'
    +'<div class="hr"><div><strong>'+tasks.length+'</strong> tâches au total</div><div>'+active.length+' actives · '+done.length+' terminées</div><div>'+overdue.length+' en retard · '+urgent.length+' prioritaires</div></div></div>'
    +'<div class="stats">'
    +'<div class="stat"><div class="sv">'+active.length+'</div><div class="sl">ACTIVES</div></div>'
    +'<div class="stat"><div class="sv" style="color:#C0392B">'+overdue.length+'</div><div class="sl">EN RETARD</div></div>'
    +'<div class="stat"><div class="sv" style="color:#E67E22">'+urgent.length+'</div><div class="sl">PRIORITAIRES</div></div>'
    +'<div class="stat"><div class="sv" style="color:#27AE60">'+done.length+'</div><div class="sl">TERMINÉES</div></div></div>'
    +(overdue.length?tbl(overdue,'🔴 EN RETARD','#C0392B'):'')
    +Object.keys(byType).map(function(k){return tbl(byType[k],'📋 '+k.toUpperCase(),'#102A63');}).join('')
    +(done.length?tbl(done,'✅ TERMINÉES','#27AE60'):'')
    +'<div class="ftr"><span>Export Tâches — '+now+'</span><span>v.0.240</span></div></div>';
  buildPDFWindow(html,'Export Tâches');
}

    +'</div>'
    +ST.map(function(st){return tbl(groups[st.id]||[],st);}).join('')

/* ─── ATTACHMENT ZONE COMPONENT ─── */
function AttachmentZone({ attachments, onChange }) {
  const [dragOver, setDragOver] = React.useState(false);
  const [editingId, setEditingId] = React.useState(null);
  const [editName, setEditName] = React.useState('');
  const inputRef = React.useRef(null);
  const editRef = React.useRef(null);
  const FILE_ICONS = {
    'application/pdf': '📄',
    'image/': '🖼',
    'application/vnd.openxmlformats-officedocument.spreadsheetml': '📊',
    'application/vnd.ms-excel': '📊',
    'application/vnd.openxmlformats-officedocument.wordprocessingml': '📝',
    'application/msword': '📝',
    'text/': '📃',
    'application/zip': '🗜',
    'application/vnd.openxmlformats-officedocument.presentationml': '📋',
  };
  function getIcon(type) { for (var k in FILE_ICONS) { if (type && type.startsWith(k)) return FILE_ICONS[k]; } return '📎'; }
  function fmtSize(b) { if (!b) return ''; if (b < 1024) return b + ' o'; if (b < 1048576) return Math.round(b/1024) + ' Ko'; return (b/1048576).toFixed(1) + ' Mo'; }
  function processFiles(files) {
    var list = attachments ? [...attachments] : [];
    var pending = Array.from(files); var done = 0;
    if (!pending.length) return;
    pending.forEach(function(file) {
      if (file.size > 5*1024*1024) { alert('Fichier trop lourd (max 5 Mo) : ' + file.name); done++; if(done===pending.length) onChange([...list]); return; }
      var r = new FileReader();
      r.onload = function(e) { list.push({ id: Date.now()+Math.random(), name: file.name, size: file.size, type: file.type, dataUrl: e.target.result }); done++; if(done===pending.length) onChange([...list]); };
      r.readAsDataURL(file);
    });
  }
  function removeFile(id) { onChange((attachments||[]).filter(function(a){return a.id!==id;})); }
  function downloadFile(att) { var a=document.createElement('a'); a.href=att.dataUrl; a.download=att.name; a.click(); }
  function startEdit(att) { setEditingId(att.id); setEditName(att.name); setTimeout(function(){ if(editRef.current){editRef.current.focus();editRef.current.select();} }, 50); }
  function commitEdit() {
    if (editName.trim()) {
      onChange((attachments||[]).map(function(a){ return a.id===editingId ? { ...a, name: editName.trim() } : a; }));
    }
    setEditingId(null); setEditName('');
  }
  var atts = attachments || [];
  return (
    <div style={{ marginTop:0 }}>
      <div
        onDragOver={function(e){e.preventDefault();setDragOver(true);}}
        onDragLeave={function(){setDragOver(false);}}
        onDrop={function(e){e.preventDefault();setDragOver(false);processFiles(e.dataTransfer.files);}}
        onClick={function(){inputRef.current&&inputRef.current.click();}}
        style={{ border:'2px dashed '+(dragOver?'#4F46E5':'#C7D2FE'), borderRadius:10, background:dragOver?'#EEF2FF':'#FAFAFA', padding:'12px 16px', display:'flex', alignItems:'center', gap:10, cursor:'pointer', transition:'all 0.18s', marginBottom:atts.length?10:0 }}
      >
        <span style={{fontSize:20}}>📎</span>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Lora',serif",fontSize:10,fontWeight:700,color:dragOver?'#4F46E5':'#888'}}>{dragOver?'Déposer ici…':'Glisser un fichier ou cliquer pour parcourir'}</div>
          <div style={{fontFamily:"'Lora',serif",fontSize:9,color:'#BBB',marginTop:2}}>PDF, Word, Excel, image… · Max 5 Mo</div>
        </div>
        <input ref={inputRef} type="file" multiple style={{display:'none'}} onChange={function(e){processFiles(e.target.files);e.target.value='';}} />
      </div>
      {atts.length > 0 && (
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {atts.map(function(att){return(
            <div key={att.id} style={{display:'flex',alignItems:'center',gap:8,background:'white',border:'1px solid '+(editingId===att.id?'#4F46E5':'#ECEAE5'),borderRadius:8,padding:'7px 10px',transition:'border-color 0.15s'}}>
              <span style={{fontSize:16,flexShrink:0}}>{getIcon(att.type)}</span>
              <div style={{flex:1,minWidth:0}}>
                {editingId === att.id ? (
                  <input
                    ref={editRef}
                    value={editName}
                    onChange={function(e){setEditName(e.target.value);}}
                    onKeyDown={function(e){ if(e.key==='Enter'){e.preventDefault();commitEdit();} if(e.key==='Escape'){setEditingId(null);setEditName('');} }}
                    onBlur={commitEdit}
                    onClick={function(e){e.stopPropagation();}}
                    style={{fontFamily:"'Lora',serif",fontSize:10,fontWeight:700,color:'#2C3E50',width:'100%',border:'none',outline:'none',background:'transparent',padding:0}}
                  />
                ) : (
                  <div style={{fontFamily:"'Lora',serif",fontSize:10,fontWeight:700,color:'#2C3E50',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{att.name}</div>
                )}
                <div style={{fontFamily:"'Lora',serif",fontSize:9,color:'#AAA'}}>{fmtSize(att.size)}</div>
              </div>
              <button type="button" onMouseDown={function(e){e.preventDefault();e.stopPropagation();startEdit(att);}} title="Renommer"
                style={{border:'1px solid #E0E0E0',background:editingId===att.id?'#EEF2FF':'white',borderRadius:6,padding:'3px 7px',fontSize:11,cursor:'pointer',color:'#102A63',flexShrink:0}}>✎</button>
              <button type="button" onMouseDown={function(e){e.preventDefault();e.stopPropagation();downloadFile(att);}} title="Télécharger"
                style={{border:'1px solid #E0E0E0',background:'white',borderRadius:6,padding:'3px 7px',fontSize:11,cursor:'pointer',color:'#4F46E5',flexShrink:0}}>⬇</button>
              <button type="button" onMouseDown={function(e){e.preventDefault();e.stopPropagation();removeFile(att.id);}} title="Supprimer"
                style={{border:'none',background:'none',fontSize:16,cursor:'pointer',color:'#CCC',flexShrink:0,lineHeight:1}}>×</button>
            </div>
          );})}
        </div>
      )}
    </div>
  );
}

function DailySummary({ tasks, onClose }) {
  const today = new Date().toISOString().split("T")[0];
  const todayTasks = tasks.filter(t => !t.completed && t.dueDate === today);
  const overdue = tasks.filter(t => !t.completed && t.dueDate && t.dueDate < today);
  const urgent = tasks.filter(t => !t.completed && (t.priority === "urgente" || t.priority === "haute") && (!t.dueDate || t.dueDate >= today));
  const doneToday = tasks.filter(t => t.completed && t.dueDate === today);
  const dateLabel = new Date().toLocaleDateString("fr-FR", {weekday:"long", day:"numeric", month:"long"});
  const stats = [
    {n: todayTasks.length, l: "A faire",    c: "#7EB8F7"},
    {n: overdue.length,    l: "En retard",  c: "#F1948A"},
    {n: urgent.length,     l: "Urgentes",   c: "#F0B27A"},

  return (
    <div style={{position:"fixed",inset:0,zIndex:9500,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>

              <div style={{fontSize:11,fontFamily:"'DM Mono',monospace",opacity:0.6,letterSpacing:"0.08em"}}>RESUME DU JOUR</div>
              <div style={{fontSize:18,fontWeight:700,fontFamily:"'Lora',serif"}}>{dateLabel}</div>
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",color:"white",fontSize:22,cursor:"pointer",lineHeight:1}}>x</button>
          </div>
          <div style={{display:"flex",gap:8}}>
            {stats.map(item => (
              <div key={item.l} style={{flex:1,background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:700,color:item.c}}>{item.n}</div>
                <div style={{fontSize:10,opacity:0.7,fontFamily:"'DM Mono',monospace"}}>{item.l}</div>

              <div style={{fontSize:10,fontWeight:700,color:"#C0392B",fontFamily:"'DM Mono',monospace",marginBottom:6}}>EN RETARD ({overdue.length})</div>

          <div style={{fontSize:10,fontWeight:700,color:"#102A63",fontFamily:"'DM Mono',monospace",marginBottom:6}}>AUJOURD HUI ({todayTasks.length})</div>

  ];


  const [d, setD] = useState({ ...task, category: task.category||"", type: task.type||"", status: task.status||"backlog", labels: task.labels||[], subtasks: task.subtasks||[] });
  const addDevSub = () => setD(prev => ({...prev, subtasks: [...(prev.subtasks||[]), {id: String(Date.now()), text:"", status:"todo", completed:false}]}));
  const updDevSub = (sub) => setD(prev => ({...prev, subtasks: prev.subtasks.map(x => x.id===sub.id ? sub : x)}));
  const delDevSub = (id) => setD(prev => ({...prev, subtasks: prev.subtasks.filter(x => x.id!==id)}));
  const catObj   = devSettings.categories.find(c => c.name === d.category);

  const statusObj = devSettings.statuses.find(s => s.id === d.status) || devSettings.statuses[0];
  const [showLabelPicker, setShowLabelPicker] = useState(false);

              })}
              <button ref={labelBtnRef} type="button" onClick={() => setShowLabelPicker(p=>!p)}

              </div>
            )}

          {/* Périmètre concerné */}

                <button key={p} type="button"
                  onClick={() => setD({...d, scope: d.scope === p ? "" : p})}

              ))}
            </div>
            <input value={["Global","Onglet Tâches","Onglet Dev","Onglet Reporting","Onglet Réunions","Onglet Calendrier","Onglet Kanban","Paramètres","Firebase / Sync","Interface mobile"].includes(d.scope) ? "" : (d.scope||"")}

          </div>
          {/* Description / Notes */}
          <div style={{ borderTop:"1px solid #F0F0F0", paddingTop:14, marginBottom:14 }}>

          {/* Sous-tâches Dev */}
          <div style={{ borderTop:"1px solid #F0F0F0", paddingTop:14, marginBottom:14 }}>

              <div style={{ fontSize:10,fontWeight:700,color:"#102A63",fontFamily:"'Lora',serif",letterSpacing:"0.06em" }}>SOUS-TÂCHES</div>

            </div>
            {(d.subtasks||[]).map(sub => {
              const ss = subStatuses.find(x=>x.id===sub.status)||subStatuses[0];
              return (
                <div key={sub.id} style={{ display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid #F5F5F5" }}>
                  <button onClick={()=>updDevSub({...sub,completed:!sub.completed,status:sub.completed?"todo":"done"})}

                  <input value={sub.text} onChange={e=>updDevSub({...sub,text:e.target.value})}
                    placeholder="Sous-tâche…"
                    style={{ flex:1,border:"none",outline:"none",fontSize:12,fontFamily:"'Lora',serif",color:sub.completed?"#AAA":"#2C3E50",textDecoration:sub.completed?"line-through":"none",background:"transparent" }} />
                  <SubStatusSelect value={sub.status} onChange={v=>updDevSub({...sub,status:v,completed:v==="done"})} />
                  <button onClick={()=>delDevSub(sub.id)} style={{ border:"none",background:"none",color:"#E8A0A0",cursor:"pointer",fontSize:14,padding:"0 2px",flexShrink:0 }}>🗑</button>
