        {selectedCats.length > 0 && <button onClick={() => setSelectedCats([])} style={{ ...S.ghost, padding: "2px 7px", fontSize: 9 }}>× Tout</button>}
        <div style={{ flex: 1 }} />
        <button onClick={() => onAdd()} style={{ ...S.btn("#102A63"), padding: "4px 12px", fontSize: 11 }}>+ Nouvelle</button>
      </div>

      {/* Type blocks */}
      <div style={{ padding: "12px", display: "flex", flexDirection: "column", gap: 12 }}>
        {showTypes.map(tp => {
          const TYPE_COLORS = { task: { bg: "#EEF2FF", accent: "#4F46E5" }, quick: { bg: "#FEF9C3", accent: "#A16207" }, report: { bg: "#E8F8F5", accent: "#27AE60" }, meeting: { bg: "#FDEDEC", accent: "#C0392B" }, analyse: { bg: "#F4ECF7", accent: "#8E44AD" } };
          const tc = TYPE_COLORS[tp.id] || { bg: "#F5F5F5", accent: "#888888" };
          const typeTasks = tasks.filter(t => t.type === tp.name && baseFilter(t));
          return (
            <div key={tp.id}
              draggable
              onDragStart={() => { dragSrc.current = tp.id; }}
              onDragOver={e => e.preventDefault()}
              onDrop={() => {
                if (!dragSrc.current || dragSrc.current === tp.id) return;
                const order = orderedTypes.map(t => t.id);
                const from = order.indexOf(dragSrc.current);
                const to   = order.indexOf(tp.id);
                const next = [...order];
                next.splice(from, 1);
                next.splice(to, 0, dragSrc.current);
                saveTypeOrder(next);
                dragSrc.current = null;
              }}
              style={{ background: "white", borderRadius: 12, border: `1px solid ${tc.bg}`, borderLeft: `4px solid ${tc.accent}`, overflow: "hidden", cursor: "grab" }}>
              {/* Block header */}
              <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: tc.bg, borderBottom: `1px solid ${tc.accent}30` }}>
                <span style={{ fontSize: 16 }}>{tp.icon}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: tc.accent, fontFamily: "'Lora',serif", flex: 1 }}>{tp.name}</span>
                <span style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: tc.accent, opacity: 0.7 }}>{typeTasks.length} tâche{typeTasks.length !== 1 ? "s" : ""}</span>
                <button onClick={() => onAdd()} title={`Nouvelle tâche de type ${tp.name}`}
                  style={{ border: `1px solid ${tc.accent}`, background: "white", borderRadius: 6, padding: "2px 8px", fontSize: 10, cursor: "pointer", color: tc.accent, fontFamily: "'DM Mono',monospace" }}>+</button>
              </div>
              {/* Tasks list */}
              {typeTasks.length === 0 ? (
                <div style={{ padding: "12px 16px", fontSize: 11, color: "#CCC", fontFamily: "'Lora',serif", fontStyle: "italic" }}>Aucune tâche de ce type</div>
              ) : isMobile ? (
                <div style={{ padding: "8px" }}>
                  {typeTasks.map(t => <MobileTaskCard key={t.id} task={t} onToggle={onToggle} onEdit={onEdit} onDelete={onDelete} onSaveComment={onSaveComment} settings={settings} />)}
                </div>
              ) : (
                <div>
                  {/* mini header row */}
                  <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "3px 12px 2px", background: "#FAFAF8", borderBottom: "1px solid #F0F0F0", userSelect: "none" }}>
                    <div style={{ width: 14, flexShrink: 0, marginLeft: 5 }} />
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 16 }}>#</span>
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 12 }}>P</span>
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", width: colWidths.title || 220, flexShrink: 0 }}>TÂCHE</span>
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 28 }}>ST</span>
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", width: colWidths.status || 72, flexShrink: 0 }}>STATUT</span>
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", width: colWidths.category || 90, flexShrink: 0 }}>CATÉGORIE</span>
                    <div style={{ flex: 1 }} />
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", width: colWidths.created || 82, textAlign: "right" }}>CRÉATION</span>
                    <span style={{ width: 16, flexShrink: 0 }} />
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", width: colWidths.due || 82, textAlign: "right" }}>ÉCHÉANCE</span>
                    <span style={{ width: 36, flexShrink: 0 }} />
                  </div>
                  <div style={{ padding: "3px 0 4px" }}>
                    {typeTasks.map((t, i) => <TaskCard key={t.id} task={t} num={i + 1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} colWidths={colWidths} settings={settings} />)}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* Hint bas de page */}
      <div style={{ textAlign: "center", padding: "8px 0 12px", fontSize: 9, color: "#CCC", fontFamily: "'DM Mono',monospace" }}>⠿ Glissez les blocs pour réordonner</div>
    </div>
  );
}

const ALL_TABS = [
  { id: "dashboard",     label: "Tableau de bord", icon: "◈" },
  { id: "myday",         label: "Ma journée",       icon: "☀" },
  { id: "tasks",         label: "Tâches",           icon: "☰" },
  { id: "categorytasks", label: "Type de tâches",   icon: "◫" },
  { id: "meetings",      label: "Réunions",         icon: "◷" },
  { id: "calendar",      label: "Calendrier",       icon: "◻" },
  { id: "notifications", label: "Rappels",          icon: "🔔" },
];

function SettingsView({ settings, onSave }) {
  const [s, setS] = useState(JSON.parse(JSON.stringify({ ...DEFAULT_SETTINGS, ...settings, hiddenTabs: settings.hiddenTabs || [] })));
  const [tab, setTab] = useState("categories");
  const Tab = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{ border: "none", background: "none", padding: "8px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: tab === id ? "#102A63" : "#888", borderBottom: `2px solid ${tab === id ? "#102A63" : "transparent"}`, fontWeight: tab === id ? 700 : 400 }}>{label}</button>
  );

  const addCat  = () => setS({ ...s, categories: [...s.categories, { id: uid(), name: "Nouvelle catégorie", bg: "#F0F0F0", accent: "#888888" }] });
  const updCat  = (id, field, val) => setS({ ...s, categories: s.categories.map(c => c.id === id ? { ...c, [field]: val } : c) });
  const delCat  = (id) => setS({ ...s, categories: s.categories.filter(c => c.id !== id) });

  const addType = () => setS({ ...s, types: [...s.types, { id: uid(), name: "Nouveau type", icon: "●" }] });
  const updType = (id, field, val) => setS({ ...s, types: s.types.map(t => t.id === id ? { ...t, [field]: val } : t) });
  const delType = (id) => setS({ ...s, types: s.types.filter(t => t.id !== id) });

  const addStat = () => setS({ ...s, statuses: [...s.statuses, { id: uid(), name: "Nouveau statut", bg: "#F0F0F0", color: "#888888" }] });
  const updStat = (id, field, val) => setS({ ...s, statuses: s.statuses.map(st => st.id === id ? { ...st, [field]: val } : st) });
  const delStat = (id) => setS({ ...s, statuses: s.statuses.filter(st => st.id !== id) });

  const toggleTab = id => {
    const hidden = s.hiddenTabs || [];
    setS({ ...s, hiddenTabs: hidden.includes(id) ? hidden.filter(x => x !== id) : [...hidden, id] });
  };

  const Row = ({ children }) => <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #F5F5F5" }}>{children}</div>;

  return (
    <div>
      <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 20 }}>⚙ Paramètres</div>
      <div style={{ background: "white", borderRadius: 14, border: "1px solid #ECEAE5", overflow: "hidden" }}>
        <div style={{ borderBottom: "1px solid #F0F0F0", display: "flex", paddingLeft: 8, flexWrap: "wrap" }}>
          <Tab id="categories" label="📁 Catégories" />
          <Tab id="types" label="🏷 Types" />
          <Tab id="statuses" label="🔵 Statuts" />
          <Tab id="tabs" label="👁 Onglets" />
        </div>
        <div style={{ padding: "20px 24px" }}>
          {tab === "categories" && <>
            <div style={{ fontSize: 12, color: "#888", fontFamily: "'DM Mono',monospace", marginBottom: 14 }}>Gérez les catégories disponibles lors de la création de tâches.</div>
            {s.categories.map(c => (
              <Row key={c.id}>
                <div style={{ width: 24, height: 24, borderRadius: 6, background: c.bg, border: `2px solid ${c.accent}`, flexShrink: 0 }} />
                <input value={c.name} onChange={e => updCat(c.id, "name", e.target.value)} style={{ ...S.input, flex: 1, padding: "5px 8px", fontSize: 12 }} />
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>BG</span>
                  <input type="color" value={c.bg} onChange={e => updCat(c.id, "bg", e.target.value)} style={{ width: 28, height: 28, border: "1px solid #E0E0E0", borderRadius: 4, cursor: "pointer", padding: 2 }} />
                  <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>Accent</span>
                  <input type="color" value={c.accent} onChange={e => updCat(c.id, "accent", e.target.value)} style={{ width: 28, height: 28, border: "1px solid #E0E0E0", borderRadius: 4, cursor: "pointer", padding: 2 }} />
                </div>
                <button onClick={() => delCat(c.id)} style={{ border: "none", background: "none", cursor: "pointer", color: "#E8A0A0", fontSize: 16 }}>×</button>
              </Row>
            ))}
            <button onClick={addCat} style={{ ...S.ghost, marginTop: 10 }}>+ Ajouter une catégorie</button>
          </>}
          {tab === "types" && <>
            <div style={{ fontSize: 12, color: "#888", fontFamily: "'DM Mono',monospace", marginBottom: 14 }}>Gérez les types de tâches disponibles.</div>
            {s.types.map(t => (
              <Row key={t.id}>
                <input value={t.icon} onChange={e => updType(t.id, "icon", e.target.value)} style={{ ...S.input, width: 44, padding: "5px 8px", fontSize: 16, textAlign: "center" }} />
                <input value={t.name} onChange={e => updType(t.id, "name", e.target.value)} style={{ ...S.input, flex: 1, padding: "5px 8px", fontSize: 12 }} />
                <button onClick={() => delType(t.id)} style={{ border: "none", background: "none", cursor: "pointer", color: "#E8A0A0", fontSize: 16 }}>×</button>
              </Row>
            ))}
            <button onClick={addType} style={{ ...S.ghost, marginTop: 10 }}>+ Ajouter un type</button>
          </>}
          {tab === "statuses" && <>
            <div style={{ fontSize: 12, color: "#888", fontFamily: "'DM Mono',monospace", marginBottom: 14 }}>Gérez les statuts disponibles pour vos tâches.</div>
            {s.statuses.map(st => (
              <Row key={st.id}>
                <span style={{ fontSize: 11, fontWeight: 700, background: st.bg, color: st.color, borderRadius: 4, padding: "2px 8px", fontFamily: "'DM Mono',monospace", minWidth: 70, textAlign: "center" }}>{st.name}</span>
                <input value={st.name} onChange={e => updStat(st.id, "name", e.target.value)} style={{ ...S.input, flex: 1, padding: "5px 8px", fontSize: 12 }} />
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>BG</span>
                  <input type="color" value={st.bg} onChange={e => updStat(st.id, "bg", e.target.value)} style={{ width: 28, height: 28, border: "1px solid #E0E0E0", borderRadius: 4, cursor: "pointer", padding: 2 }} />
                  <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>Texte</span>
                  <input type="color" value={st.color} onChange={e => updStat(st.id, "color", e.target.value)} style={{ width: 28, height: 28, border: "1px solid #E0E0E0", borderRadius: 4, cursor: "pointer", padding: 2 }} />
                </div>
                <button onClick={() => delStat(st.id)} style={{ border: "none", background: "none", cursor: "pointer", color: "#E8A0A0", fontSize: 16 }}>×</button>
              </Row>
            ))}
            <button onClick={addStat} style={{ ...S.ghost, marginTop: 10 }}>+ Ajouter un statut</button>
          </>}
          {tab === "tabs" && <>
            <div style={{ fontSize: 12, color: "#888", fontFamily: "'DM Mono',monospace", marginBottom: 14 }}>Masquez les onglets que vous ne souhaitez pas afficher dans la navigation. Les onglets "Tâches" et "Paramètres" sont toujours visibles.</div>
            {ALL_TABS.map(t => {
              const hidden = (s.hiddenTabs || []).includes(t.id);
              return (
                <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid #F5F5F5" }}>
                  <span style={{ fontSize: 16 }}>{t.icon}</span>
                  <span style={{ flex: 1, fontSize: 13, fontFamily: "'Lora',serif", color: hidden ? "#AAA" : "#2C3E50" }}>{t.label}</span>
                  <button onClick={() => toggleTab(t.id)}
                    style={{ border: `1px solid ${hidden ? "#E0E0E0" : "#27AE60"}`, background: hidden ? "#F8F8F8" : "#D1FAE5", color: hidden ? "#AAA" : "#065F46", borderRadius: 20, padding: "4px 14px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>
                    {hidden ? "Masqué" : "Visible"}
                  </button>
                </div>
              );
            })}
          </>}
        </div>
        <div style={{ padding: "14px 24px", borderTop: "1px solid #F0F0F0", display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <button onClick={() => setS(JSON.parse(JSON.stringify(DEFAULT_SETTINGS)))} style={{ ...S.btn("#F0F0F0", "#666") }}>Réinitialiser</button>
          <button onClick={() => { onSave(s); }} style={{ ...S.btn("#102A63") }}>✓ Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

/* ─── TASKS VIEW ─── */
const DEFAULT_COL_WIDTHS = { title: 220, status: 72, category: 90, type: 72, created: 82, due: 82 };

function TasksView({ tasks, onDelete, onToggle, onEdit, onAdd, onSaveComment, fullscreen, onToggleFullscreen, settings }) {
  const isMobile = useIsMobile();
  const [filterCat,    setFilterCat]    = useState("Toutes");
  const [filterType,   setFilterType]   = useState("Tous");
  const [filterStatus, setFilterStatus] = useState("Actives");
  const [search,       setSearch]       = useState("");
  const [grouped,      setGrouped]      = useState(false);
  const [colWidths, setColWidths] = useState(() => { try { const s = localStorage.getItem(COL_WIDTHS_KEY); return s ? { ...DEFAULT_COL_WIDTHS, ...JSON.parse(s) } : DEFAULT_COL_WIDTHS; } catch { return DEFAULT_COL_WIDTHS; } });

  const startResize = (col, e) => {
    e.preventDefault();
    const startX = e.clientX, startW = colWidths[col];
    const onMove = ev => { const nw = Math.max(40, startW + ev.clientX - startX); setColWidths(p => { const n = { ...p, [col]: nw }; try { localStorage.setItem(COL_WIDTHS_KEY, JSON.stringify(n)); } catch {} return n; }); };
    const onUp = () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
    window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
  };

  // 2) Blocked tasks: hidden when filterStatus="Actives", visible when filterStatus="Toutes"
  const displayList = tasks.filter(t => {
    // Hide blocked unless "Toutes" is selected
    if (t.status === "blocked" && filterStatus !== "Toutes") return false;
    if (filterCat !== "Toutes" && t.category !== filterCat) return false;
    if (filterType !== "Tous" && t.type !== filterType) return false;
    if (filterStatus === "Actives" && t.completed) return false;
    if (filterStatus === "Complétées" && !t.completed) return false;
    if (search && !t.title.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  const blockedCount = tasks.filter(t => t.status === "blocked" && !t.completed).length;

  const groups = {};
  settings.categories.forEach(c => { const r = displayList.filter(t => t.category === c.name); if (r.length) groups[c.name] = r; });

  const FBtn = ({ label, active, onClick, color }) => (
    <button onClick={onClick} style={{ border: `1px solid ${active ? color || "#102A63" : "#E0E0E0"}`, background: active ? color || "#102A63" : "white", color: active ? "white" : "#888", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", transition: "all 0.15s", whiteSpace: "nowrap" }}>{label}</button>
  );
  const ResizeHandle = ({ col }) => (
    <span onMouseDown={e => startResize(col, e)} style={{ display: "inline-block", width: 6, cursor: "col-resize", userSelect: "none", flexShrink: 0, marginLeft: 2, alignSelf: "stretch", borderRight: "2px solid transparent", transition: "border-color 0.15s" }}
      onMouseEnter={e => e.currentTarget.style.borderColor = "#BDC3C7"} onMouseLeave={e => e.currentTarget.style.borderColor = "transparent"} />
  );
  const ColHeader = ({ label, col, extra }) => (
    <div style={{ display: "flex", alignItems: "center", flexShrink: 0, width: col ? colWidths[col] : undefined, ...extra }}>
      <span style={{ fontSize: 9, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.06em", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{label}</span>
      {col && <ResizeHandle col={col} />}
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", height: fullscreen ? "calc(100vh - 56px)" : "auto" }}>
      {/* Toolbar */}
      <div style={{ background: "white", borderBottom: "1px solid #ECEAE5", padding: isMobile ? "8px 10px" : "7px 12px", display: "flex", gap: isMobile ? 6 : 8, flexWrap: "wrap", alignItems: "center", flexShrink: 0 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Rechercher…" className="search-input-small" style={{ ...S.input, width: isMobile ? 110 : 140, padding: "4px 8px", fontSize: 10 }} />
        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
        {["Actives", "Complétées", "Toutes"].map(o => <FBtn key={o} label={isMobile ? o.slice(0, 4) : o} active={filterStatus === o} onClick={() => setFilterStatus(o)} />)}
        {!isMobile && <>
          <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
          {["Tous", ...settings.types.map(t => t.name)].map(o => <FBtn key={o} label={o} active={filterType === o} onClick={() => setFilterType(o)} />)}
          <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
          {["Toutes", ...settings.categories.map(c => c.name)].map(c => { const co = settings.categories.find(x => x.name === c); return <FBtn key={c} label={c} active={filterCat === c} onClick={() => setFilterCat(c)} color={co?.accent} />; })}
        </>}
        <div style={{ flex: 1 }} />
        {!isMobile && <>
          <button onClick={() => { setColWidths(DEFAULT_COL_WIDTHS); localStorage.removeItem(COL_WIDTHS_KEY); }} title="Réinitialiser colonnes" style={{ border: "1px solid #E0E0E0", background: "white", color: "#AAA", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>↺</button>
          <button onClick={() => setGrouped(!grouped)} style={{ border: `1px solid ${grouped ? "#2C3E50" : "#E0E0E0"}`, background: grouped ? "#102A63" : "white", color: grouped ? "white" : "#888", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", whiteSpace: "nowrap" }}>{grouped ? "☰ Groupé" : "≡ À plat"}</button>
          <button onClick={onToggleFullscreen} style={{ border: "1px solid #E0E0E0", background: "white", color: "#888", borderRadius: 5, padding: "3px 9px", fontSize: 12, cursor: "pointer", lineHeight: 1 }}>{fullscreen ? "⤡" : "⤢"}</button>
        </>}
        <button onClick={() => onAdd()} style={{ ...S.btn("#102A63"), padding: isMobile ? "6px 12px" : "4px 12px", fontSize: 11, whiteSpace: "nowrap" }}>+ {isMobile ? "Ajouter" : "Nouvelle"}</button>
      </div>


      {isMobile && (
        <div style={{ background: "white", borderBottom: "1px solid #ECEAE5", padding: "6px 10px", display: "flex", gap: 6, overflowX: "auto", flexShrink: 0 }}>
          {["Toutes", ...settings.categories.map(c => c.name)].map(c => { const co = settings.categories.find(x => x.name === c); return <FBtn key={c} label={c} active={filterCat === c} onClick={() => setFilterCat(c)} color={co?.accent} />; })}
        </div>
      )}

      {/* Column headers */}
      {!isMobile && (
        <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "4px 12px 3px", borderBottom: "1px solid #ECEAE5", background: "#F8F8F6", flexShrink: 0, userSelect: "none" }}>
          <div style={{ width: 14, flexShrink: 0, marginLeft: 5 }} />
          <span style={{ fontSize: 9, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 16 }}>#</span>
          <span style={{ fontSize: 9, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 12 }}>P</span>
          <ColHeader label="TÂCHE" col="title" />
          <span style={{ fontSize: 9, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 28 }}>ST</span>
          <ColHeader label="STATUT" col="status" />
          <ColHeader label="CATÉGORIE" col="category" />
          <ColHeader label="TYPE" col="type" />
          <div style={{ flex: 1 }} />
          <ColHeader label="CRÉATION" col="created" extra={{ textAlign: "right" }} />
          <span style={{ width: 16, flexShrink: 0 }} />
          <ColHeader label="ÉCHÉANCE" col="due" extra={{ textAlign: "right" }} />
          <span style={{ width: 36, flexShrink: 0 }} />
        </div>
      )}

      {/* List */}
      <div style={{ flex: 1, overflowY: "auto", padding: isMobile ? "8px 10px" : "4px 12px 8px" }}>
        {displayList.length === 0 ? (
          <div style={{ textAlign: "center", padding: "40px 0", color: "#CCC" }}>
            <div style={{ fontSize: 30, marginBottom: 8 }}>✓</div>
            <div style={{ fontFamily: "'Lora',serif", fontSize: 14 }}>Aucune tâche trouvée</div>
          </div>
        ) : isMobile ? (
          displayList.map(t => <MobileTaskCard key={t.id} task={t} onToggle={onToggle} onEdit={onEdit} onDelete={onDelete} onSaveComment={onSaveComment} settings={settings} />)
        ) : !grouped || filterCat !== "Toutes" ? (
          displayList.map((t, i) => <TaskCard key={t.id} task={t} num={i + 1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} colWidths={colWidths} settings={settings} />)
        ) : (
          Object.entries(groups).map(([cat, catTasks]) => {
            const co = settings.categories.find(c => c.name === cat);
            return (
              <div key={cat} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3, marginTop: 4 }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: co?.accent || "#999" }} />
                  <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", color: "#BBB", fontFamily: "'DM Mono',monospace" }}>{cat.toUpperCase()} — {catTasks.length}</span>
                  <div style={{ flex: 1, height: 1, background: "#F0F0F0" }} />
                </div>
                {catTasks.map((t, i) => <TaskCard key={t.id} task={t} num={i + 1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} colWidths={colWidths} settings={settings} />)}
              </div>
            );
          })
        )}
      </div>
      {/* Stats footer */}
      <div style={{ padding: "5px 12px", borderTop: "1px solid #F0F0F0", background: "white", flexShrink: 0, display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center" }}>
        {(() => {
          const total    = tasks.length;
          const pct      = n => total > 0 ? Math.round((n / total) * 100) : 0;
          const created  = total;
          const active   = tasks.filter(t => !t.completed && t.status !== "cancelled").length;
          const done     = tasks.filter(t => t.completed || t.status === "done").length;
          const cancelled= tasks.filter(t => t.status === "cancelled").length;
          const blocked  = tasks.filter(t => t.status === "blocked").length;
          const overdue  = tasks.filter(t => !t.completed && isOverdue(t.dueDate)).length;
          const stats = [
            { label: "Créées",    val: created,   pct: 100,         color: "#2C3E50" },
            { label: "Actives",   val: active,    pct: pct(active),    color: "#2980B9" },
            { label: "Terminées", val: done,      pct: pct(done),      color: "#27AE60" },
            { label: "Annulées",  val: cancelled, pct: pct(cancelled), color: "#92400E" },
            { label: "Bloquées",  val: blocked,   pct: pct(blocked),   color: "#B91C1C" },
            { label: "En retard", val: overdue,   pct: pct(overdue),   color: "#E67E22" },
          ];
          return stats.map(s => (
            <span key={s.label} style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: s.val > 0 ? s.color : "#CCC", whiteSpace: "nowrap" }}>
              <span style={{ fontWeight: 700 }}>{s.label}</span> {s.val} <span style={{ opacity: 0.6 }}>({s.pct}%)</span>
            </span>
          ));
        })()}
        <span style={{ flex: 1, textAlign: "right", fontSize: 9, color: "#CCC", fontFamily: "'DM Mono',monospace" }}>{displayList.length} affiché{displayList.length !== 1 ? "s" : ""}</span>
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const [settings, setSettings] = useState(() => loadSettings());
  const [tasks, setTasks] = useState(() => { try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : sampleTasks(settings.categories); } catch { return sampleTasks(settings.categories); } });
  const [view, setView] = useState("dashboard");
  const [fullscreen, setFullscreen] = useState(false);
  const [modal, setModal] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [undoTask, setUndoTask] = useState(null); // 2) undo
  const [activeStopwatch, setActiveStopwatch] = useState(null); // 7) global stopwatch
  const notifTimerRef = useRef(null);
  const isMobile = useIsMobile();

  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch {} }, [tasks]);

  useEffect(() => {
    const check = () => {
      const now = new Date();
      const active = tasks.filter(t => !t.completed && t.reminder && t.reminder !== "none" && t.dueDate);
      const fired = active.filter(t => {
        const due = new Date(t.dueDate), diff = (due - now) / 60000;
        if (t.reminder === "same") return isToday(t.dueDate);
        if (t.reminder === "30min") return diff >= 0 && diff <= 30;
        if (t.reminder === "1h") return diff >= 0 && diff <= 60;
        if (t.reminder === "2h") return diff >= 0 && diff <= 120;
        if (t.reminder === "1d") return diff >= 0 && diff <= 1440;
        if (t.reminder === "2d") return diff >= 0 && diff <= 2880;
        return false;
      });
      if (fired.length > 0) setToasts(prev => { const ids = prev.map(x => x.id); return [...prev, ...fired.filter(t => !ids.includes(t.id))].slice(-3); });
    };
    check(); notifTimerRef.current = setInterval(check, 60000);
    return () => clearInterval(notifTimerRef.current);
  }, [tasks]);

  const addTask = t => setTasks(p => [t, ...p]);
  const updTask = t => setTasks(p => p.map(x => x.id === t.id ? t : x));
  // 2) soft delete with undo
  const delTask = id => {
    const task = tasks.find(x => x.id === id);
    setTasks(p => p.filter(x => x.id !== id));
    setUndoTask(task);
  };
  const undoDelete = () => { if (undoTask) { addTask(undoTask); setUndoTask(null); } };

  // 3) Toggle: if toggling to complete → status = done; if uncompleting → status = inprogress
  const togTask = id => setTasks(p => p.map(x => {
    if (x.id !== id) return x;
    const nowDone = !x.completed;
    return { ...x, completed: nowDone, status: nowDone ? "done" : "inprogress" };
  }));
  const saveComment = (id, comment) => setTasks(p => p.map(x => x.id === id ? { ...x, comment } : x));

  // Compute next due date from recurrence object
  const nextOccurrence = (rec, fromDate) => {
    const r = parseRec(rec);
    if (!r || r.type === "none" || !fromDate) return null;
    const d = new Date(fromDate);
    const intv = r.interval || 1;
    if (r.type === "daily") { d.setDate(d.getDate() + intv); }
    else if (r.type === "weekly") {
      // find next occurrence on one of the selected weekdays
      const days = r.weekDays && r.weekDays.length > 0 ? r.weekDays : [d.getDay()];
      let attempts = 0;
      do { d.setDate(d.getDate() + 1); attempts++; } while (!days.includes(d.getDay()) && attempts < 7 * intv + 7);
    }
    else if (r.type === "monthly") {
      if (r.monthMode === "weekday") {
        d.setMonth(d.getMonth() + intv);
        // find Nth weekday in new month
        const targetDay = r.monthWeekDay ?? 1;
        const targetWeek = r.monthWeek || 1;
        const year = d.getFullYear(), month = d.getMonth();
        if (targetWeek === -1) {
          // last weekday of month
          const last = new Date(year, month + 1, 0);
          while (last.getDay() !== targetDay) last.setDate(last.getDate() - 1);
          d.setDate(last.getDate());
        } else {
          let count = 0; const tmp = new Date(year, month, 1);
          while (tmp.getMonth() === month) {
            if (tmp.getDay() === targetDay) { count++; if (count === targetWeek) { d.setDate(tmp.getDate()); break; } }
            tmp.setDate(tmp.getDate() + 1);
          }
        }
      } else {
        const day = r.monthDay || d.getDate();
        d.setMonth(d.getMonth() + intv);
        d.setDate(Math.min(day, new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate()));
      }
    }
    else if (r.type === "yearly") { d.setFullYear(d.getFullYear() + intv); }
    // Check end condition
    if (r.endType === "date" && r.endDate && d > new Date(r.endDate)) return null;
    return d.toISOString().split("T")[0];
  };

  // handle recurrence on save
  const handleSave = t => {
    if (tasks.find(x => x.id === t.id)) updTask(t);
    else addTask(t);
    // If recurrent and being completed, create next occurrence
    if (t.completed && t.recurrence && parseRec(t.recurrence).type !== "none" && t.dueDate) {
      const nextDate = nextOccurrence(t.recurrence, t.dueDate);
      if (nextDate) {
        const rec = parseRec(t.recurrence);
        const newCount = rec.endType === "count" ? (rec.endCount > 1 ? { ...rec, endCount: rec.endCount - 1 } : null) : t.recurrence;
        if (newCount !== null) {
          const next = { ...t, id: uid(), completed: false, status: "todo", dueDate: nextDate, createdAt: new Date().toISOString(), totalTime: 0, recurrence: newCount };
          setTimeout(() => addTask(next), 50);
        }
      }
    }
  };

  const saveSettingsFn = s => { setSettings(s); try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch {} };

  const openNew = (dueDate = "") => setModal({ id: uid(), title: "", category: "", type: "", dueDate, completed: false, status: "todo", priority: "normale", notes: "", reminder: "none", recurrence: { type: "none" }, subtasks: [], createdAt: new Date().toISOString(), totalTime: 0, inMyDay: false });
  const openEdit = t => setModal({ ...t });

  const activeCount  = tasks.filter(t => !t.completed).length;
  const overdueCount = tasks.filter(t => !t.completed && isOverdue(t.dueDate)).length;
  const remCount     = tasks.filter(t => !t.completed && t.reminder && t.reminder !== "none" && t.dueDate && daysBefore(t.dueDate, 2)).length;
  const myDayCount   = tasks.filter(t => !t.completed && (isToday(t.dueDate) || t.inMyDay)).length;

  // Full NAV definition (always includes tasks + settings)
  const NAV = [
    { id: "dashboard",     label: "Tableau de bord", icon: "◈" },
    { id: "myday",         label: "Ma journée",       icon: "☀",  badge: myDayCount },
    { id: "tasks",         label: "Tâches",           icon: "☰",  badge: activeCount },
    { id: "categorytasks", label: "Type de tâches",   icon: "◫" },
    { id: "meetings",      label: "Réunions",         icon: "◷" },
    { id: "calendar",      label: "Calendrier",       icon: "◻" },
    { id: "notifications", label: "Rappels",          icon: "🔔", badge: remCount },
    { id: "settings",      label: "Paramètres",       icon: "⚙" },
  ];

  // 8) Filter hidden tabs — tasks and settings are always visible
  const hiddenTabs = settings.hiddenTabs || [];
  const visibleNav = NAV.filter(n => n.id === "tasks" || n.id === "settings" || !hiddenTabs.includes(n.id));

  const isFullWidthView = view === "tasks" || view === "categorytasks";

  return (
    <div style={{ minHeight: "100vh", background: "#F7F6F3", fontFamily: "'Lora',serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
      <style>{`
        @keyframes slideIn  { from { transform: translateX(100%); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
        @keyframes slideUp  { from { transform: translateX(-50%) translateY(20px); opacity: 0 } to { transform: translateX(-50%) translateY(0); opacity: 1 } }
        @keyframes spin     { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
      `}</style>

      {/* Nav — always centered, max-width 1200 */}
      <div style={{ background: "white", borderBottom: "1px solid #ECEAE5", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 1px 8px rgba(0,0,0,0.05)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", alignItems: "center", height: 56, padding: "0 24px", gap: 4, boxSizing: "border-box" }}>
          <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginRight: 8, flexShrink: 0 }}>✦ Liste de tâches</div>
          {/* Centered nav tabs */}
          <div style={{ flex: 1, display: "flex", justifyContent: "center", gap: 2, flexWrap: "nowrap", overflow: "hidden" }}>
            {visibleNav.map(n => (
              <button key={n.id} onClick={() => setView(n.id)}
                style={{ display: "flex", alignItems: "center", gap: 5, border: "none", background: view === n.id ? "#EEF2FF" : "none", color: view === n.id ? "#102A63" : "#888", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontFamily: "'DM Mono',monospace", fontSize: 11, fontWeight: view === n.id ? 700 : 400, transition: "all 0.15s", whiteSpace: "nowrap", flexShrink: 0 }}>
                <span>{n.icon}</span>
                {!isMobile && n.label}
                {!!n.badge && (
                  <span style={{ background: "#C0392B", color: "white", borderRadius: 8, fontSize: 10, fontWeight: 400, padding: "0 5px", lineHeight: "17px", minWidth: 17, textAlign: "center", display: "inline-block" }}>
                    {n.badge}
                  </span>
                )}
              </button>
            ))}
          </div>
          <button onClick={() => openNew()} style={{ ...S.btn("#102A63"), padding: "7px 14px", fontSize: 12, display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            + {isMobile ? "" : "Nouvelle tâche"}
          </button>
        </div>
      </div>

      {overdueCount > 0 && (
        <div style={{ background: "#102A63", color: "white", padding: "8px 24px", textAlign: "center", fontSize: 12, fontFamily: "'DM Mono',monospace", letterSpacing: "0.04em" }}>
          ⚠ {overdueCount} tâche{overdueCount > 1 ? "s" : ""} en retard —{" "}
          <span style={{ textDecoration: "underline", cursor: "pointer" }} onClick={() => setView("tasks")}>Voir les tâches</span>
        </div>
      )}

      {/* Full-width views (tasks, categorytasks) vs contained views */}
      {isFullWidthView ? (
        <div style={{ width: "100%" }}>
          {view === "tasks" && (
            <TasksView tasks={tasks} onDelete={delTask} onToggle={togTask} onEdit={openEdit} onAdd={openNew} onSaveComment={saveComment} fullscreen={fullscreen} onToggleFullscreen={() => setFullscreen(f => !f)} settings={settings} />
          )}
          {view === "categorytasks" && (
            <CategoryTasksView tasks={tasks} onDelete={delTask} onToggle={togTask} onEdit={openEdit} onAdd={openNew} onSaveComment={saveComment} settings={settings} />
          )}
        </div>
      ) : (
        <div style={{ maxWidth: 960, margin: "0 auto", padding: "24px" }}>
          {view === "dashboard"     && <Dashboard      tasks={tasks} onNavigate={setView} settings={settings} />}
          {view === "myday"         && <MyDayView       tasks={tasks} onEdit={openEdit} onToggle={togTask} onSaveComment={saveComment} settings={settings} />}
          {view === "meetings"      && <MeetingsView    onAddTask={addTask} />}
          {view === "calendar"      && <CalendarView    tasks={tasks} onEdit={openEdit} onAdd={d => openNew(d)} settings={settings} />}
          {view === "notifications" && <NotificationsView tasks={tasks} onUpdate={updTask} settings={settings} />}
          {view === "settings"      && <SettingsView    settings={settings} onSave={saveSettingsFn} />}
        </div>
      )}

      {modal && <TaskModal task={modal} onSave={handleSave} onClose={() => setModal(null)} onAddTask={addTask} settings={settings} />}
      <Toast notifs={toasts} onDismiss={id => setToasts(p => p.filter(x => x.id !== id))} />
      {undoTask && <UndoBanner task={undoTask} onUndo={undoDelete} onDismiss={() => setUndoTask(null)} />}
    </div>
  );
}

    window._reactRoot = null;
    function doMount() {
      if (!window._reactRoot) window._reactRoot = ReactDOM.createRoot(document.getElementById('root'));
      window._reactRoot.render(<App />);
    }
    window._doMount = doMount;
    if (window._pendingMount) doMount();
  </script>
</body>
</html>
