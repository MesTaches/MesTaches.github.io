function GlobalSearch({ tasks, settings, onNavigate }) {
  const [open, setOpen] = React.useState(false);
  const [query, setQuery] = React.useState("");
  const inputRef = React.useRef(null);

  // Load data from localStorage for cross-module search
  const getMeetings = () => { try { return JSON.parse(localStorage.getItem("taskmanager_meetings_v1") || "[]"); } catch { return []; } };
  const getCotations = () => { try { return JSON.parse(localStorage.getItem("taskmanager_cotations") || "[]"); } catch { return []; } };
  const getClients = () => { try { return JSON.parse(localStorage.getItem("taskmanager_suivi_clients") || "[]"); } catch { return []; } };

  React.useEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "f") { e.preventDefault(); setOpen(true); }
      if (e.key === "Escape") setOpen(false);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  React.useEffect(() => {
    if (open && inputRef.current) setTimeout(() => inputRef.current.focus(), 50);
  }, [open]);

  const results = React.useMemo(() => {
    if (!query.trim() || query.length < 2) return [];
    const q = query.toLowerCase();
    const out = [];

    // Tasks
    tasks.filter(t => (t.title||"").toLowerCase().includes(q) || (t.notes||"").toLowerCase().includes(q)).slice(0,5).forEach(t => {
      out.push({ type: "Tâche", icon: "✦", label: t.title, sub: t.category + (t.dueDate ? " · " + t.dueDate : ""), view: "tasks", id: t.id });
    });

    // Meetings
    getMeetings().filter(m => (m.title||"").toLowerCase().includes(q) || (m.agenda||"").toLowerCase().includes(q) || (m.participants||"").toLowerCase().includes(q)).slice(0,3).forEach(m => {
      out.push({ type: "Réunion", icon: "◷", label: m.title || "Sans titre", sub: m.date || "", view: "meetings" });
    });

    // Cotations
    getCotations().filter(c => (c.clientName||"").toLowerCase().includes(q) || (c.clientCode||"").toLowerCase().includes(q) || (c.requester||"").toLowerCase().includes(q)).slice(0,3).forEach(c => {
      out.push({ type: "Cotation", icon: "◎", label: c.clientName || "Sans nom", sub: c.clientCode + " · " + (c.status||""), view: "cotation" });
    });

    // Suivi clients
    getClients().filter(c => (c.clientName||"").toLowerCase().includes(q) || (c.code||"").toLowerCase().includes(q)).slice(0,3).forEach(c => {
      out.push({ type: "Suivi client", icon: "◈", label: c.clientName || "Sans nom", sub: c.code || "", view: "suiviclient" });
    });

    return out;
  }, [query, tasks]);

  if (!open) return (
    <button onClick={() => setOpen(true)} title="Recherche globale (Ctrl+F)"
      style={{ border: "none", background: "none", fontSize: 18, cursor: "pointer", color: "#888", padding: "4px 6px", flexShrink: 0 }}>
      🔍
    </button>
  );

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9000, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "flex-start", justifyContent: "center", paddingTop: 80 }}
      onClick={() => { setOpen(false); setQuery(""); }}>
      <div style={{ background: "white", borderRadius: 14, width: "100%", maxWidth: 560, boxShadow: "0 20px 60px rgba(0,0,0,0.2)", overflow: "hidden" }}
        onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", alignItems: "center", padding: "12px 16px", borderBottom: "1px solid #F0F0F0", gap: 10 }}>
          <span style={{ fontSize: 16 }}>🔍</span>
          <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Rechercher dans tâches, réunions, cotations, suivi clients…"
            style={{ flex: 1, border: "none", outline: "none", fontSize: 14, fontFamily: "'Lora',serif", color: "#2C3E50" }} />
          <span style={{ fontSize: 11, color: "#AAA", fontFamily: "'DM Mono',monospace", cursor: "pointer" }} onClick={() => { setOpen(false); setQuery(""); }}>Échap</span>
        </div>
        {results.length === 0 && query.length >= 2 && (
          <div style={{ padding: 24, textAlign: "center", color: "#AAA", fontSize: 13, fontFamily: "'Lora',serif" }}>Aucun résultat pour « {query} »</div>
        )}
        {results.length === 0 && query.length < 2 && (
          <div style={{ padding: "16px 20px" }}>
            {[["✦","Tâches"],["◷","Réunions"],["◎","Cotations"],["◈","Suivi clients"]].map(([icon,label]) => (
              <span key={label} style={{ display: "inline-flex", alignItems: "center", gap: 4, marginRight: 12, fontSize: 12, color: "#888", fontFamily: "'DM Mono',monospace" }}>{icon} {label}</span>
            ))}
          </div>
        )}
        {results.length > 0 && (
          <div style={{ maxHeight: 360, overflowY: "auto" }}>
            {results.map((r, i) => (
              <div key={i} onClick={() => { onNavigate(r.view); setOpen(false); setQuery(""); }}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 16px", cursor: "pointer", borderBottom: "1px solid #F8F8F8" }}
                onMouseEnter={e => e.currentTarget.style.background="#F7F6F3"}
                onMouseLeave={e => e.currentTarget.style.background="white"}>
                <span style={{ fontSize: 16, flexShrink: 0 }}>{r.icon}</span>
                <div style={{ flex: 1, overflow: "hidden" }}>
                  <div style={{ fontSize: 13, fontFamily: "'Lora',serif", color: "#2C3E50", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.label}</div>
                  <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{r.sub}</div>
                </div>
                <span style={{ fontSize: 10, background: "#F0F0F0", color: "#888", borderRadius: 4, padding: "2px 7px", fontFamily: "'DM Mono',monospace", flexShrink: 0 }}>{r.type}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [settings, setSettings] = useState(() => loadSettings());
  const [tasks, setTasks] = useState(() => { try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : sampleTasks(settings.categories); } catch { return sampleTasks(settings.categories); } });
  const [view, setView] = useState("dashboard");
  const [fullscreen, setFullscreen] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [showTrash, setShowTrash] = useState(false);
  const [trashSelected, setTrashSelected] = useState([]);
  const getDeletedTasks = () => {
    try {
      const deleted = JSON.parse(localStorage.getItem("deletedTasks") || "[]");
      return deleted.filter(t => Date.now() - t._deletedAt < 30 * 86400000);
    } catch(e) { return []; }
  };
  const [modal, setModal] = useState(null);
  const [toasts, setToasts] = useState([]);
  const dismissedRef = useRef(new Set());
  const [undoTask, setUndoTask] = useState(null); // 2) undo
  const [activeStopwatch, setActiveStopwatch] = useState(null); // 7) global stopwatch
  const [showDailySummary, setShowDailySummary] = useState(() => { try { var k = "taskmanager_daily_summary_last"; var d = new Date().toISOString().split("T")[0]; return localStorage.getItem(k) !== d; } catch(e) { return true; } });
  const notifTimerRef = useRef(null);
  const isMobile = useIsMobile();
  const closeDailySummary = () => { try { localStorage.setItem("taskmanager_daily_summary_last", new Date().toISOString().split("T")[0]); } catch(e) {} setShowDailySummary(false); };

  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch {} }, [tasks]);

  // Auto Ma journée : tâches échues ou aujourd'hui
  useEffect(() => {
    const todayStr = new Date().toISOString().split("T")[0];
    setTasks(p => p.map(t => {
      if (!t.completed && t.dueDate && t.dueDate <= todayStr && !t.inMyDay)
        return { ...t, inMyDay: true };
      return t;
    }));
  }, []);

  // Ma journée toggle from TaskCard
  useEffect(() => {
    const handleToggleMyDay = (e) => {
      const { id } = e.detail;
      setTasks(p => p.map(t => t.id === id ? { ...t, inMyDay: !t.inMyDay } : t));
    };
    window.addEventListener("toggleMyDay", handleToggleMyDay);
    return () => window.removeEventListener("toggleMyDay", handleToggleMyDay);
  }, []);

  // Label update from inline LabelCell
  useEffect(() => {
    const handleAddLabel = (e) => {
      const { id, labels } = e.detail;
      setTasks(p => p.map(t => t.id === id ? { ...t, labels } : t));
    };
    window.addEventListener("addLabel", handleAddLabel);
    return () => window.removeEventListener("addLabel", handleAddLabel);
  }, []);

  // Silent sync: listen for remote data updates without page reload
  useEffect(() => {
    const handleRemoteUpdate = () => {
      try {
        const s = localStorage.getItem(STORAGE_KEY);
        if (s) setTasks(JSON.parse(s));
        const newSettings = loadSettings();
        setSettings(newSettings);
      } catch(e) {}
    };
    window.addEventListener('remoteDataUpdated', handleRemoteUpdate);
    return () => window.removeEventListener('remoteDataUpdated', handleRemoteUpdate);
  }, []);

  useEffect(() => {
    // Afficher bouton corbeille + écouter event
    const trashBtn = document.getElementById("fb-trash-btn");
    if (trashBtn) trashBtn.style.display = "none";
    const handleOpenTrash = () => setShowTrash(true);
    window.addEventListener("openTrash", handleOpenTrash);
    return () => window.removeEventListener("openTrash", handleOpenTrash);
  }, []);

  useEffect(() => {
    // Afficher/masquer selon l'onglet actif
    const trashBtn = document.getElementById("fb-trash-btn");
    if (trashBtn) trashBtn.style.display = view === "tasks" ? "block" : "none";
  }, [view]);

  useEffect(() => {
    // Mettre à jour badge corbeille
    const trashBtn = document.getElementById("fb-trash-btn");
    if (trashBtn) {
      const count = getDeletedTasks().length;
      trashBtn.textContent = count > 0 ? ("Corbeille (" + count + ")") : "Corbeille";
      const bg = count > 0 ? "rgba(192,57,43,0.7)" : "rgba(255,255,255,0.12)";
      trashBtn.style.background = bg;
      trashBtn._baseBg = bg;
    }
  });

  useEffect(() => {
    const check = () => {
      const now = new Date();
      const active = tasks.filter(t => !t.completed && t.reminder && t.reminder !== "none" && t.dueDate);
      const fired = active.filter(t => {
        const due = new Date(t.dueDate), diff = (due - now) / 60000;
        if (t.reminder === "same") return isToday(t.dueDate);
        if (t.reminder === "30min") return diff >= 0 && diff <= 30;
        if (t.reminder === "1h") return diff >= 0 && diff <= 60;
        if (t.reminder === "2h") return diff >= 0 && diff <= 120;
        if (t.reminder === "1d") return diff >= 0 && diff <= 1440;
        if (t.reminder === "2d") return diff >= 0 && diff <= 2880;
        return false;
      });
      const newFired = fired.filter(t => !dismissedRef.current.has(t.id));
      if (newFired.length > 0) setToasts(prev => { const ids = prev.map(x => x.id); return [...prev, ...newFired.filter(t => !ids.includes(t.id))].slice(-3); });
    };
    check(); notifTimerRef.current = setInterval(check, 60000);
    return () => clearInterval(notifTimerRef.current);
  }, [tasks]);

  const addTask = t => setTasks(p => [t, ...p]);
  const updTask = t => setTasks(p => p.map(x => x.id === t.id ? t : x));
  // 2) soft delete with undo
  const delTask = id => {
    const task = tasks.find(x => x.id === id);
    if (task) {
      try {
        const deleted = JSON.parse(localStorage.getItem("deletedTasks") || "[]");
        const purged = deleted.filter(t => Date.now() - t._deletedAt < 30 * 86400000);
        purged.push({ ...task, _deletedAt: Date.now() });
        localStorage.setItem("deletedTasks", JSON.stringify(purged));
      } catch(e) {}
    }
    setTasks(p => p.filter(x => x.id !== id));
    setUndoTask(task);
  };
  const undoDelete = () => { if (undoTask) { addTask(undoTask); setUndoTask(null); } };

  // 3) Toggle: if toggling to complete → status = done; if uncompleting → status = inprogress
  const togTask = id => setTasks(p => p.map(x => {
    if (x.id !== id) return x;
    const nowDone = !x.completed;
    return { ...x, completed: nowDone, status: nowDone ? "done" : "inprogress" };
  }));
  const saveComment = (id, comment) => setTasks(p => p.map(x => x.id === id ? { ...x, notes: comment } : x));

  // Compute next due date from recurrence object
  const nextOccurrence = (rec, fromDate) => {
    const r = parseRec(rec);
    if (!r || r.type === "none" || !fromDate) return null;
    const d = new Date(fromDate);
    const intv = r.interval || 1;
    if (r.type === "daily") { d.setDate(d.getDate() + intv); }
    else if (r.type === "weekly") {
      // find next occurrence on one of the selected weekdays
      const days = r.weekDays && r.weekDays.length > 0 ? r.weekDays : [d.getDay()];
      let attempts = 0;
      do { d.setDate(d.getDate() + 1); attempts++; } while (!days.includes(d.getDay()) && attempts < 7 * intv + 7);
    }
    else if (r.type === "monthly") {
      if (r.monthMode === "weekday") {
        d.setMonth(d.getMonth() + intv);
        // find Nth weekday in new month
        const targetDay = r.monthWeekDay ?? 1;
        const targetWeek = r.monthWeek || 1;
        const year = d.getFullYear(), month = d.getMonth();
        if (targetWeek === -1) {
          // last weekday of month
          const last = new Date(year, month + 1, 0);
          while (last.getDay() !== targetDay) last.setDate(last.getDate() - 1);
          d.setDate(last.getDate());
        } else {

            <div style={{ background: "white", borderRadius: 14, width: 560, maxHeight: "75vh", display: "flex", flexDirection: "column", boxShadow: "0 8px 40px rgba(0,0,0,0.18)" }}
              onClick={e => e.stopPropagation()}>
              <div style={{ padding: "18px 24px 14px", borderBottom: "1px solid #F0F0F0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Lora',serif", color: "#102A63" }}>🗑️ Tâches supprimées <span style={{ fontSize: 12, color: "#AAA", fontWeight: 400 }}>({deleted.length})</span></div>
                <button onClick={() => { setShowTrash(false); setTrashSelected([]); }} style={{ border: "none", background: "none", fontSize: 18, cursor: "pointer", color: "#AAA" }}>×</button>
              </div>
              {deleted.length === 0 ? (
                <div style={{ padding: 40, textAlign: "center", color: "#CCC", fontFamily: "'Lora',serif", fontSize: 13 }}>Aucune tâche supprimée dans les 30 derniers jours</div>
              ) : (
                <>
                  <div style={{ padding: "8px 24px 6px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid #F5F5F5" }}>
                    <input type="checkbox" checked={trashSelected.length === deleted.length}
                      onChange={e => setTrashSelected(e.target.checked ? deleted.map(t => t.id) : [])}
                      style={{ cursor: "pointer", accentColor: "#102A63" }} />
                    <span style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#888" }}>Tout sélectionner</span>
                  </div>
                  <div style={{ overflowY: "auto", flex: 1 }}>
                    {deleted.map(t => (
                      <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 24px", borderBottom: "1px solid #F8F8F8", background: trashSelected.includes(t.id) ? "#EEF2FF" : "white" }}>
                        <input type="checkbox" checked={trashSelected.includes(t.id)}
                          onChange={e => setTrashSelected(s => e.target.checked ? [...s, t.id] : s.filter(x => x !== t.id))}
                          style={{ cursor: "pointer", accentColor: "#102A63", flexShrink: 0 }} />
                        <div style={{ flex: 1, overflow: "hidden" }}>
                          <div style={{ fontSize: 13, fontFamily: "'Lora',serif", color: "#2C3E50", fontWeight: 600, textOverflow: "ellipsis", overflow: "hidden", whiteSpace: "nowrap" }}>{t.title}</div>
                          <div style={{ fontSize: 10, fontFamily: "'Lora',serif", color: "#AAA", marginTop: 2 }}>{t.category} · supprimée le {fmtD(t._deletedAt)}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  {trashSelected.length > 0 && (
                    <div style={{ padding: "12px 24px", borderTop: "1px solid #F0F0F0", display: "flex", alignItems: "center", gap: 10 }}>
                      <button onClick={() => {
                        const deleted = getDeletedTasks();
                        const toRestore = deleted.filter(t => trashSelected.includes(t.id));
                        toRestore.forEach(t => { const { _deletedAt, ...task } = t; addTask(task); });
                        const remaining = deleted.filter(t => !trashSelected.includes(t.id));
                        localStorage.setItem("deletedTasks", JSON.stringify(remaining));
                        setTrashSelected([]);
                        setShowTrash(false);
                      }} style={{ background: "#102A63", color: "white", border: "none", borderRadius: 8, padding: "8px 18px", fontSize: 12, fontFamily: "'Lora',serif", fontWeight: 700, cursor: "pointer" }}>
                        ↩ Restaurer {trashSelected.length} tâche{trashSelected.length > 1 ? "s" : ""}
                      </button>
                      <span style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#AAA" }}>Les tâches seront restaurées dans leur état d'origine</span>
                    </div>
                  )}
                </>
              )}
            </div>
          </div>
        );
      })()}

      {modal && <TaskModal task={modal} onSave={handleSave} onClose={() => setModal(null)} onAddTask={addTask} settings={settings} />}
      <Toast notifs={toasts} onDismiss={id => { dismissedRef.current.add(id); setToasts(p => p.filter(x => x.id !== id)); }} />
      {undoTask && <UndoBanner task={undoTask} onUndo={undoDelete} onDismiss={() => setUndoTask(null)} />}
    </div>
  );
}

    window._reactRoot = null;
    function doMount() {
      if (!window._reactRoot) window._reactRoot = ReactDOM.createRoot(document.getElementById('root'));
      window._reactRoot.render(<App />);
    }
    window._doMount = doMount;
    if (window._pendingMount) doMount();
  </script>

<script>
window.exportPaymentsCSV = function(payments) {
  try {
    var statusMap = {"pending":"En attente","approved":"Approuvé","paid":"Payé","rejected":"Rejeté","scheduled":"Planifié"};
    var prioMap = {"urgent":"Urgent","high":"Haute","normal":"Normale","low":"Basse"};
    var toExport = (payments || []).filter(function(p){ return p.status !== "paid"; });
    if (toExport.length === 0) { alert("Aucun paiement à exporter."); return; }
    var wsData = [["Priorité","Fournisseur","Compte","Date demande","Demandeur","Paiement estimé","Montant","Statut","Notes"]];
    toExport.forEach(function(p){
      var rawAmount = p.amount ? String(p.amount).replace(/[^0-9.,]/g,"").replace(",",".") : "";
      var numAmount = rawAmount ? parseFloat(rawAmount) : "";
      wsData.push([
        prioMap[p.priority||"normal"]||"",
        p.supplier||"", p.account||"",
        p.requestDate||"", p.requester||"", p.estimatedDate||"",
        numAmount,
        statusMap[p.status]||p.status||"",
        (p.notes||"").replace(/[\r\n]+/g," ")
      ]);
    });
    var ws = XLSX.utils.aoa_to_sheet(wsData);
    // Format numérique français pour la colonne Montant (colonne G = index 6)
    var fmtFR = "# ##0,00";
    for (var r = 1; r < wsData.length; r++) {
      var cellRef = XLSX.utils.encode_cell({r: r, c: 6});
      if (ws[cellRef] && typeof ws[cellRef].v === "number") {
        ws[cellRef].z = "#,##0.00";
        ws[cellRef].t = "n";
      }
    }
    // Largeurs colonnes
    ws["!cols"] = [
      {wch:10},{wch:22},{wch:10},{wch:14},{wch:12},{wch:16},{wch:14},{wch:14},{wch:40}
    ];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Paiements");
    XLSX.writeFile(wb, "paiements_" + new Date().toISOString().split("T")[0] + ".xlsx");
  } catch(e) { alert("Erreur export: " + e.message); }
};
</script>
