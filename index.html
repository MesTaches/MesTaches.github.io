        <div style={{ padding: "12px 14px" }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 8 }}>
            <button onClick={(e) => { e.stopPropagation(); onToggle(task.id); }}
              style={{ width: 20, height: 20, borderRadius: "50%", flexShrink: 0, border: `2px solid ${task.completed ? catAccent : "#CCC"}`, background: task.completed ? catAccent : "white", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "white", marginTop: 1 }}>{task.completed ? "✓" : ""}</button>
            <span style={{ fontSize: 14, fontWeight: 600, color: task.completed ? "#AAA" : "#2C3E50", textDecoration: task.completed ? "line-through" : "none", fontFamily: "'Lora',serif", flex: 1, lineHeight: 1.4 }}>{task.title}</span>
            <span style={{ fontSize: 11, color: PRIORITY_COLORS[task.priority], fontWeight: 700, flexShrink: 0 }}>{PRIORITY_ICONS[task.priority]}</span>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 6 }}>
            <span style={{ fontSize: 9, fontWeight: 700, background: statusObj.bg, color: statusObj.color, borderRadius: 4, padding: "2px 6px", fontFamily: "'DM Mono',monospace" }}>{statusObj.name}</span>
            {task.category && <span style={{ fontSize: 10, fontWeight: 700, background: catBg, color: catAccent, borderRadius: 4, padding: "2px 7px", fontFamily: "'DM Mono',monospace" }}>{task.category}</span>}
            {task.type && <span style={{ fontSize: 10, color: "#777", fontFamily: "'DM Mono',monospace", background: "#F5F5F5", borderRadius: 4, padding: "2px 7px" }}>{typeObj?.icon} {task.type}</span>}
            {task.subtasks?.length > 0 && <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace", background: "#F5F5F5", borderRadius: 4, padding: "2px 7px" }}>{doneSubs}/{task.subtasks.length}✓</span>}
            {task.inMyDay && <span style={{ fontSize: 10, color: "#E67E22", background: "#FEF9E7", borderRadius: 4, padding: "2px 7px", fontFamily: "'DM Mono',monospace" }}>☀ Ma journée</span>}
          </div>
          {(task.dueDate || task.createdAt) && (
            <div style={{ display: "flex", gap: 12 }}>
              {task.createdAt && <span style={{ fontSize: 10, color: "#BDC3C7", fontFamily: "'DM Mono',monospace" }}>+ {fmtDate(task.createdAt.split("T")[0])}</span>}
              {task.dueDate && <span style={{ fontSize: 10, color: dc[ds], fontFamily: "'DM Mono',monospace", fontWeight: 600 }}>{ds === "overdue" ? "⚠" : ds === "today" ? "●" : "○"} {fmtDate(task.dueDate)}</span>}
            </div>
          )}
          {hasComment && <div style={{ marginTop: 6, fontSize: 11, color: "#888", fontFamily: "'Lora',serif", fontStyle: "italic", borderTop: "1px solid #F5F5F5", paddingTop: 6 }} dangerouslySetInnerHTML={{ __html: "💬 " + task.notes }} />}
        </div>
        <div style={{ borderTop: "1px solid #F5F5F5", display: "flex" }}>
          <button onClick={(e) => { e.stopPropagation(); setShowComment(true); }} style={{ flex: 1, border: "none", background: "none", padding: "8px 0", fontSize: 11, color: hasComment ? "#102A63" : "#AAA", cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>💬 Commenter</button>
          <button onClick={(e) => { e.stopPropagation(); onDelete(task.id); }} style={{ flex: 1, border: "none", borderLeft: "1px solid #F5F5F5", background: "none", padding: "8px 0", fontSize: 11, color: "#E8A0A0", cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>× Supprimer</button>
        </div>
      </div>
      {showComment && <CommentPopover task={task} catBg={catBg} catAccent={catAccent} onSave={(txt) => onSaveComment(task.id, txt)} onClose={() => setShowComment(false)} />}
    </>
  );
}

/* ─── DASHBOARD ─── */
function Dashboard({ tasks, onNavigate, settings }) {
  const isMobile = useIsMobile();
  const active  = tasks.filter(t => !t.completed);
  const overdue = active.filter(t => isOverdue(t.dueDate));
  const todayT  = active.filter(t => isToday(t.dueDate));
  const done    = tasks.filter(t => t.completed);
  const total   = tasks.length || 1;
  const byCat   = settings.categories.map(c => ({ name: c.name, total: tasks.filter(t => t.category === c.name).length, done: tasks.filter(t => t.category === c.name && t.completed).length, color: c.accent }));
  const byType  = settings.types.map(tp => ({ name: tp.name, icon: tp.icon, count: active.filter(t => t.type === tp.name).length }));
  const pct = n => Math.round((n / total) * 100);

  const StatCard = ({ label, value, pctVal, color, onClick }) => (
    <div onClick={onClick} style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "18px 20px", border: "1px solid #ECEAE5", cursor: onClick ? "pointer" : "default", transition: "transform 0.15s,box-shadow 0.15s", borderTop: `3px solid ${color}` }}
      onMouseEnter={e => { if (onClick && !isMobile) { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 6px 20px rgba(0,0,0,0.08)"; } }}
      onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6, lineHeight: 1 }}>
        <div style={{ fontSize: isMobile ? 22 : 28, fontWeight: 700, color, fontFamily: "'DM Mono',monospace" }}>{value}</div>
        <div style={{ fontSize: 12, fontWeight: 600, color, fontFamily: "'DM Mono',monospace", opacity: 0.55 }}>{pctVal}%</div>
      </div>
      <div style={{ fontSize: isMobile ? 11 : 13, fontWeight: 600, color: "#2C3E50", fontFamily: "'Lora',serif", marginTop: 5 }}>{label}</div>
    </div>
  );

  return (
    <div>
      <div style={{ marginBottom: isMobile ? 16 : 24 }}>
        <div style={{ fontSize: isMobile ? 18 : 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 4 }}>Tableau de bord</div>
        <div style={{ fontSize: 12, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>{new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2,1fr)" : "repeat(4,1fr)", gap: isMobile ? 8 : 12, marginBottom: isMobile ? 16 : 24 }}>
        <StatCard label="Tâches actives"  value={active.length}  pctVal={pct(active.length)}  color="#2C3E50" onClick={() => onNavigate("tasks")} />
        <StatCard label="En retard"        value={overdue.length} pctVal={pct(overdue.length)} color="#C0392B" onClick={() => onNavigate("tasks")} />
        <StatCard label="Aujourd'hui"      value={todayT.length}  pctVal={pct(todayT.length)}  color="#E67E22" onClick={() => onNavigate("calendar")} />
        <StatCard label="Complétées"       value={done.length}    pctVal={pct(done.length)}    color="#27AE60" />
      </div>
      <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5", marginBottom: isMobile ? 12 : 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>Avancement global</span>
          <span style={{ fontSize: 20, fontWeight: 700, fontFamily: "'DM Mono',monospace", color: "#27AE60" }}>{Math.round((done.length / total) * 100)}%</span>
        </div>
        <div style={{ height: 10, background: "#F0F0F0", borderRadius: 10, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${(done.length / total) * 100}%`, background: "linear-gradient(90deg,#27AE60,#2ECC71)", borderRadius: 10, transition: "width 0.5s" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#AAA", fontFamily: "'DM Mono',monospace", marginTop: 8 }}>
          <span>{done.length} complétées</span><span>{active.length} restantes</span>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: isMobile ? 12 : 16, marginBottom: isMobile ? 12 : 20 }}>
        <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5" }}>
          <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 14 }}>Par catégorie</div>
          {byCat.map(c => (
            <div key={c.name} style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>{c.name}</span>
                <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{c.done}/{c.total}</span>
              </div>
              <div style={{ height: 6, background: "#F0F0F0", borderRadius: 6, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${c.total ? (c.done / c.total) * 100 : 0}%`, background: c.color, borderRadius: 6, transition: "width 0.5s" }} />
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: isMobile ? 12 : 16 }}>
          <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5" }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 12 }}>Par type</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {byType.map(t => (
                <div key={t.name} style={{ flex: 1, minWidth: 55, textAlign: "center", background: "#F8F8F6", borderRadius: 10, padding: "10px 6px" }}>
                  <div style={{ fontSize: 16, marginBottom: 2 }}>{t.icon}</div>
                  <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'DM Mono',monospace", color: "#2C3E50" }}>{t.count}</div>
                  <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#AAA", marginTop: 1 }}>{t.name}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5", flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 10 }}>Priorités hautes</div>
            {active.filter(t => t.priority === "haute").slice(0, 3).map(t => {
              const co = settings.categories.find(c => c.name === t.category);
              return (
                <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid #F5F5F5" }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: co?.accent || "#888", flexShrink: 0 }} />
                  <span style={{ fontSize: 12, fontFamily: "'Lora',serif", color: "#444", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</span>
                  {t.dueDate && <span style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: isOverdue(t.dueDate) ? "#C0392B" : "#AAA", flexShrink: 0 }}>{fmtDate(t.dueDate)}</span>}
                </div>
              );
            })}
            {!active.filter(t => t.priority === "haute").length && <div style={{ fontSize: 12, color: "#CCC", fontFamily: "'DM Mono',monospace" }}>Aucune tâche haute priorité</div>}
          </div>
        </div>
      </div>
      {(todayT.length > 0 || overdue.length > 0) && (
        <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5" }}>
          <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 12 }}>⚡ À traiter maintenant</div>
          {[...overdue, ...todayT].slice(0, 5).map(t => {
            const co = settings.categories.find(c => c.name === t.category);
            return (
              <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #F5F5F5" }}>
                <span style={{ fontSize: 10, fontWeight: 700, background: isOverdue(t.dueDate) ? co?.bg : "#FEF9E7", color: isOverdue(t.dueDate) ? co?.accent : "#E67E22", borderRadius: 4, padding: "2px 7px", fontFamily: "'DM Mono',monospace", flexShrink: 0 }}>{t.category}</span>
                <span style={{ fontSize: 13, fontFamily: "'Lora',serif", color: "#333", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</span>
                <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: isOverdue(t.dueDate) ? "#C0392B" : "#E67E22", flexShrink: 0 }}>{isOverdue(t.dueDate) ? "⚠" : "●"}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── 9) MY DAY VIEW ─── */
function MyDayView({ tasks, onEdit, onToggle, onSaveComment, settings }) {
  const todayTasks = tasks.filter(t => !t.completed && (isToday(t.dueDate) || t.inMyDay));
  const isMobile = useIsMobile();
  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 4 }}>☀ Ma journée</div>
        <div style={{ fontSize: 12, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>{new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" })} — {todayTasks.length} tâche{todayTasks.length !== 1 ? "s" : ""}</div>
      </div>
      {todayTasks.length === 0 ? (
        <div style={{ textAlign: "center", padding: "60px 0", color: "#CCC" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>☀</div>
          <div style={{ fontFamily: "'Lora',serif", fontSize: 15, color: "#AAA" }}>Aucune tâche pour aujourd'hui</div>
          <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 11, marginTop: 6 }}>Ajoutez des tâches à "Ma journée" depuis leur détail</div>
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fill,minmax(280px,1fr))", gap: 12 }}>
          {todayTasks.map(t => {
            const catObj = settings.categories.find(c => c.name === t.category);
            const statusObj = settings.statuses.find(s => s.id === t.status) || settings.statuses[0];
            const isOv = isOverdue(t.dueDate);
            return (
              <div key={t.id} onClick={() => onEdit(t)} style={{ background: "white", borderRadius: 12, border: `1px solid ${isOv ? "#FEE2E2" : "#ECEAE5"}`, borderTop: `3px solid ${catObj?.accent || "#102A63"}`, padding: "14px 16px", cursor: "pointer", transition: "box-shadow 0.15s" }}
                onMouseEnter={e => e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.08)"}
                onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 8 }}>
                  <button onClick={e => { e.stopPropagation(); onToggle(t.id); }}
                    style={{ width: 18, height: 18, borderRadius: "50%", flexShrink: 0, border: `2px solid ${catObj?.accent || "#CCC"}`, background: "white", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "white", marginTop: 2 }}>
                  </button>
                  <span style={{ fontFamily: "'Lora',serif", fontSize: 14, fontWeight: 600, color: "#2C3E50", flex: 1, lineHeight: 1.4 }}>{t.title}</span>
                  <span style={{ fontSize: 10, color: PRIORITY_COLORS[t.priority], fontWeight: 700 }}>{PRIORITY_ICONS[t.priority]}</span>
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 6 }}>
                  <span style={{ fontSize: 9, fontWeight: 700, background: statusObj.bg, color: statusObj.color, borderRadius: 4, padding: "1px 6px", fontFamily: "'DM Mono',monospace" }}>{statusObj.name}</span>
                  {t.category && <span style={{ fontSize: 9, fontWeight: 700, background: catObj?.bg || "#F0F0F0", color: catObj?.accent || "#888", borderRadius: 4, padding: "1px 6px", fontFamily: "'DM Mono',monospace" }}>{t.category}</span>}
                </div>
                {t.dueDate && <div style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: isOv ? "#C0392B" : isToday(t.dueDate) ? "#E67E22" : "#95A5A6" }}>{isOv ? "⚠ En retard" : "● Aujourd'hui"} — {fmtDate(t.dueDate)}</div>}
                {t.subtasks?.length > 0 && (
                  <div style={{ marginTop: 8, borderTop: "1px solid #F5F5F5", paddingTop: 8 }}>
                    {t.subtasks.slice(0, 3).map(s => (
                      <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                        <div style={{ width: 10, height: 10, borderRadius: "50%", border: `1.5px solid ${s.completed ? "#27AE60" : "#CCC"}`, background: s.completed ? "#27AE60" : "white", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 6, color: "white" }}>{s.completed ? "✓" : ""}</div>
                        <span style={{ fontSize: 11, fontFamily: "'Lora',serif", color: s.completed ? "#AAA" : "#555", textDecoration: s.completed ? "line-through" : "none" }}>{s.title}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── CALENDAR VIEW ─── */
function CalendarView({ tasks, onEdit, onAdd, settings }) {
  const [curDate, setCurDate] = useState(new Date());
  const year = curDate.getFullYear(), month = curDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startPad = (firstDay + 6) % 7;
  const cells = [];
  for (let i = 0; i < startPad; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  const tasksByDay = {};
  tasks.forEach(t => {
    if (!t.dueDate) return;
    const td = new Date(t.dueDate);
    if (td.getFullYear() === year && td.getMonth() === month) {
      const k = td.getDate(); if (!tasksByDay[k]) tasksByDay[k] = []; tasksByDay[k].push(t);
    }
  });
  const [selectedDay, setSelectedDay] = useState(null);
  const todayDate = new Date();
  const DAYS = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
  const MONTHS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>Calendrier</div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => setCurDate(new Date(year, month - 1, 1))} style={{ ...S.btn("#F0F0F0", "#555"), padding: "6px 12px" }}>‹</button>
          <span style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", minWidth: 160, textAlign: "center" }}>{MONTHS[month]} {year}</span>
          <button onClick={() => setCurDate(new Date(year, month + 1, 1))} style={{ ...S.btn("#F0F0F0", "#555"), padding: "6px 12px" }}>›</button>
          <button onClick={() => setCurDate(new Date())} style={{ ...S.btn("#102A63"), padding: "6px 14px", fontSize: 11 }}>Aujourd'hui</button>
        </div>
      </div>
      <div style={{ background: "white", borderRadius: 14, border: "1px solid #ECEAE5", overflow: "hidden" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", background: "#F8F7F4" }}>
          {DAYS.map(d => <div key={d} style={{ padding: "10px 0", textAlign: "center", fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.06em" }}>{d}</div>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)" }}>
          {cells.map((d, i) => {
            if (!d) return <div key={`e${i}`} style={{ minHeight: 90, borderRight: "1px solid #F0F0F0", borderBottom: "1px solid #F0F0F0", background: "#FAFAFA" }} />;
            const isCurrentDay = todayDate.getDate() === d && todayDate.getMonth() === month && todayDate.getFullYear() === year;
            const dayTasks = tasksByDay[d] || [];
            const hasOverdue = dayTasks.some(t => !t.completed && isOverdue(t.dueDate));
            return (
              <div key={d} onClick={() => setSelectedDay(selectedDay === d ? null : d)}
                style={{ minHeight: 90, borderRight: "1px solid #F0F0F0", borderBottom: "1px solid #F0F0F0", padding: "8px 6px", cursor: "pointer", background: selectedDay === d ? "#F0F5FF" : isCurrentDay ? "#FFFBF0" : "white", transition: "background 0.15s" }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ fontSize: 13, fontWeight: isCurrentDay ? 700 : 400, fontFamily: "'DM Mono',monospace", color: isCurrentDay ? "#E67E22" : "#555", background: isCurrentDay ? "#FEF3E2" : undefined, borderRadius: isCurrentDay ? "50%" : undefined, width: isCurrentDay ? 24 : undefined, height: isCurrentDay ? 24 : undefined, display: "flex", alignItems: "center", justifyContent: "center" }}>{d}</span>
                  {hasOverdue && <span style={{ fontSize: 9, color: "#C0392B" }}>⚠</span>}
                </div>
                {dayTasks.slice(0, 3).map(t => {
                  const co = settings.categories.find(c => c.name === t.category);
                  return (
                    <div key={t.id} onClick={e => { e.stopPropagation(); onEdit(t); }}
                      style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", background: co?.bg || "#F0F0F0", color: co?.accent || "#888", borderRadius: 4, padding: "2px 5px", marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: t.completed ? "line-through" : "none", opacity: t.completed ? 0.6 : 1 }}>
                      {t.title}
                    </div>
                  );
                })}
                {dayTasks.length > 3 && <div style={{ fontSize: 9, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>+{dayTasks.length - 3} autres</div>}
              </div>
            );
          })}
        </div>
      </div>
      {selectedDay && tasksByDay[selectedDay] && (
        <div style={{ marginTop: 16, background: "white", borderRadius: 14, padding: "20px 24px", border: "1px solid #ECEAE5" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>{selectedDay} {MONTHS[month]} {year}</div>
            <button onClick={() => onAdd(`${year}-${String(month + 1).padStart(2, "0")}-${String(selectedDay).padStart(2, "0")}`)} style={{ ...S.btn("#102A63"), fontSize: 11, padding: "6px 12px" }}>+ Ajouter</button>
          </div>
          {tasksByDay[selectedDay].map(t => {
            const co = settings.categories.find(c => c.name === t.category);
            return (
              <div key={t.id} onClick={() => onEdit(t)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #F5F5F5", cursor: "pointer" }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: co?.accent || "#888", flexShrink: 0, display: "block" }} />
                <span style={{ fontSize: 13, fontFamily: "'Lora',serif", color: t.completed ? "#AAA" : "#333", textDecoration: t.completed ? "line-through" : "none", flex: 1 }}>{t.title}</span>
                <span style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", background: co?.bg || "#F0F0F0", color: co?.accent || "#888", borderRadius: 4, padding: "2px 6px" }}>{t.category}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── NOTIFICATIONS VIEW ─── */
const REMINDER_LABELS = { none: "Aucun", same: "Le jour même", "30min": "30 min avant", "1h": "1h avant", "2h": "2h avant", "1d": "La veille", "2d": "2 jours avant" };
function NotificationsView({ tasks, onUpdate, settings }) {
  const withReminder = tasks.filter(t => !t.completed && t.reminder && t.reminder !== "none" && t.dueDate);
  const triggered = withReminder.filter(t => {
    const diff = (new Date(t.dueDate) - new Date()) / 864e5;
    if (t.reminder === "same") return isToday(t.dueDate);
    if (t.reminder === "30min" || t.reminder === "1h" || t.reminder === "2h") return isToday(t.dueDate) || isOverdue(t.dueDate);
    if (t.reminder === "1d") return diff <= 1;
    if (t.reminder === "2d") return diff <= 2;
    return false;
  });
  const upcoming = withReminder.filter(t => !triggered.includes(t));
  return (
    <div>
      <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 4 }}>Notifications & Rappels</div>
      <div style={{ fontSize: 12, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 24 }}>{withReminder.length} tâche(s) avec rappel configuré</div>
      {triggered.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#E67E22", letterSpacing: "0.08em", fontFamily: "'DM Mono',monospace", marginBottom: 10 }}>🔔 RAPPELS ACTIFS ({triggered.length})</div>
          {triggered.map(t => {
            const co = settings.categories.find(c => c.name === t.category);
            return (
              <div key={t.id} style={{ background: "white", borderRadius: 12, border: "1px solid #E8E8E8", borderLeft: `4px solid ${co?.accent || "#888"}`, padding: "14px 18px", marginBottom: 8, display: "flex", gap: 12, alignItems: "center" }}>
                <span style={{ fontSize: 22 }}>🔔</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 3 }}>{t.title}</div>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", background: co?.bg || "#F0F0F0", color: co?.accent || "#888", borderRadius: 4, padding: "2px 7px" }}>{t.category}</span>
                    <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: isOverdue(t.dueDate) ? "#C0392B" : "#E67E22" }}>{isOverdue(t.dueDate) ? "⚠ En retard" : "● Aujourd'hui"} — {fmtDate(t.dueDate)}</span>
                  </div>
                </div>
                <button onClick={() => onUpdate({ ...t, completed: true, status: "done" })} style={{ ...S.btn("#27AE60"), fontSize: 11, padding: "6px 12px", flexShrink: 0 }}>Marquer fait</button>
              </div>
            );
          })}
        </div>
      )}
      <div>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#AAA", letterSpacing: "0.08em", fontFamily: "'DM Mono',monospace", marginBottom: 10 }}>PROCHAINS RAPPELS ({upcoming.length})</div>
        {upcoming.length === 0 && triggered.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 0", color: "#CCC" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🔕</div>
            <div style={{ fontFamily: "'Lora',serif", fontSize: 14 }}>Aucun rappel configuré</div>
          </div>
        )}
        {upcoming.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).map(t => {
          const co = settings.categories.find(c => c.name === t.category);
          const diff = Math.ceil((new Date(t.dueDate) - new Date()) / 864e5);
          return (
            <div key={t.id} style={{ background: "white", borderRadius: 12, border: "1px solid #ECEAE5", padding: "12px 16px", marginBottom: 6, display: "flex", gap: 10, alignItems: "center" }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: co?.bg || "#F0F0F0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>🔔</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50" }}>{t.title}</div>
                <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#AAA", marginTop: 2 }}>{fmtDate(t.dueDate)} · dans {diff}j</div>
              </div>
              <select value={t.reminder} onChange={e => onUpdate({ ...t, reminder: e.target.value })}
                style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", border: "1px solid #E0E0E0", borderRadius: 6, padding: "4px 8px", background: "white", cursor: "pointer", color: "#555" }}>
                <option value="none">Désactiver</option><option value="same">Le jour même</option>
                <option value="30min">30 min avant</option><option value="1h">1h avant</option>
                <option value="2h">2h avant</option><option value="1d">La veille</option><option value="2d">2 jours avant</option>
              </select>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── MEETINGS VIEW ─── */
function MeetingsView({ onAddTask }) {
  const [meetings, setMeetings] = useState(() => { try { const s = localStorage.getItem(MEETING_STORAGE); return s ? JSON.parse(s) : []; } catch { return []; } });
  const [selected, setSelected] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [newM, setNewM] = useState(null);
  const [recap, setRecap] = useState(null);
  const [loadingRecap, setLoadingRecap] = useState(false);
  useEffect(() => { try { localStorage.setItem(MEETING_STORAGE, JSON.stringify(meetings)); } catch {} }, [meetings]);
  const saveMeeting = m => { const exists = meetings.find(x => x.id === m.id); if (exists) setMeetings(p => p.map(x => x.id === m.id ? m : x)); else setMeetings(p => [m, ...p]); setSelected(m); };
  const delMeeting = id => { setMeetings(p => p.filter(x => x.id !== id)); if (selected?.id === id) setSelected(null); };
  const generateRecap = async m => {
    setLoadingRecap(true); setRecap(null);
    if (!settings ) {
      setResult("⚠️ Clé API manquante — configurez-la dans Paramètres ⚙");
      setLoading(false);
      return;
    }
    try {
      const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${(settings && settings.groqKey) || ""}` }, body: JSON.stringify({ model: "llama-3.3-70b-versatile", max_tokens: 1000, messages: [{ role: "user", content: `Tu es un assistant professionnel. Génère un compte-rendu structuré en français.\n\nRéunion : ${m.title}\nDate : ${m.date}${m.time ? " à " + m.time : ""}\nParticipants : ${m.participants || "Non renseignés"}\nOrdre du jour : ${m.agenda || "Non renseigné"}\nNotes :\n${m.notes || "Aucune note"}\n\nGénère un compte-rendu avec :\n1. Résumé (3-4 phrases)\n2. Points clés discutés\n3. Décisions prises\n4. Actions à mener (avec responsable si mentionné)\n5. Prochaines étapes\n\nSois concis et professionnel.` }] }) });
      const data = await resp.json();
      setRecap(data.choices?.[0]?.message?.content || "Erreur de génération.");
    } catch { setRecap("Erreur de connexion."); }
    setLoadingRecap(false);
  };
  const upcoming = meetings.filter(m => m.date >= today()).sort((a, b) => a.date.localeCompare(b.date));
  const past = meetings.filter(m => m.date < today()).sort((a, b) => b.date.localeCompare(a.date));
  const [tab, setTab] = useState("prep");
  const Tab = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{ border: "none", background: "none", padding: "8px 16px", fontSize: 12, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: tab === id ? "#102A63" : "#888", borderBottom: `2px solid ${tab === id ? "#102A63" : "transparent"}`, fontWeight: tab === id ? 700 : 400 }}>{label}</button>
  );
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>Réunions</div>
        <button onClick={() => { setNewM({ id: uid(), title: "", date: today(), time: "", participants: "", agenda: "", notes: "", docs: "" }); setShowNew(true); setSelected(null); }} style={{ ...S.btn("#102A63"), padding: "7px 16px", fontSize: 12 }}>+ Nouvelle réunion</button>
      </div>
      <div style={{ background: "#EEF2FF", borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 11, color: "#4F46E5", fontFamily: "'DM Mono',monospace", lineHeight: 1.6 }}>
        💡 <strong>Import Outlook :</strong> Exportez votre réunion depuis Outlook (Fichier → Enregistrer sous → .ics) puis renseignez manuellement. Une connexion directe Microsoft 365 nécessiterait une intégration OAuth.
      </div>
      <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
        <div style={{ width: 240, flexShrink: 0 }}>
          {upcoming.length > 0 && <><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.08em", marginBottom: 6 }}>À VENIR</div>
            {upcoming.map(m => <div key={m.id} onClick={() => { setSelected(m); setShowNew(false); setRecap(null); }} style={{ background: selected?.id === m.id ? "#EEF2FF" : "white", border: `1px solid ${selected?.id === m.id ? "#C7D2FE" : "#ECEAE5"}`, borderRadius: 10, padding: "10px 12px", marginBottom: 6, cursor: "pointer" }}>
              <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.title || "Sans titre"}</div>
              <div style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{fmtDate(m.date)}{m.time ? " · " + m.time : ""}</div>
            </div>)}</>}
          {past.length > 0 && <><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.08em", marginTop: 12, marginBottom: 6 }}>PASSÉES</div>
            {past.map(m => <div key={m.id} onClick={() => { setSelected(m); setShowNew(false); setRecap(null); }} style={{ background: selected?.id === m.id ? "#EEF2FF" : "white", border: `1px solid ${selected?.id === m.id ? "#C7D2FE" : "#ECEAE5"}`, borderRadius: 10, padding: "10px 12px", marginBottom: 6, cursor: "pointer", opacity: 0.65 }}>
              <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.title || "Sans titre"}</div>
              <div style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{fmtDate(m.date)}</div>
            </div>)}</>}
          {meetings.length === 0 && !showNew && <div style={{ textAlign: "center", padding: "30px 0", color: "#CCC" }}><div style={{ fontSize: 28, marginBottom: 8 }}>◷</div><div style={{ fontFamily: "'Lora',serif", fontSize: 13 }}>Aucune réunion</div></div>}
        </div>
        <div style={{ flex: 1, minWidth: 300 }}>
          {showNew && newM && (

              <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 14 }}>Nouvelle réunion</div>
              <input value={newM.title} onChange={e => setNewM({ ...newM, title: e.target.value })} placeholder="Titre…" style={{ ...S.input, fontSize: 14, marginBottom: 10 }} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                <div><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 4 }}>DATE</div><input type="date" value={newM.date} onChange={e => setNewM({ ...newM, date: e.target.value })} style={{ ...S.input, cursor: "pointer" }} /></div>
                <div><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 4 }}>HEURE</div><input type="time" value={newM.time} onChange={e => setNewM({ ...newM, time: e.target.value })} style={{ ...S.input, cursor: "pointer" }} /></div>

          {selected && !showNew && (
            <div style={{ background: "white", borderRadius: 14, border: "1px solid #ECEAE5", overflow: "hidden" }}>
              <div style={{ padding: "16px 20px", borderBottom: "1px solid #F0F0F0", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1, marginRight: 8 }}>
                  <input value={selected.title} onChange={e => { const m = { ...selected, title: e.target.value }; setSelected(m); saveMeeting(m); }} style={{ border: "none", outline: "none", fontSize: 16, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", background: "transparent", width: "100%", marginBottom: 4 }} />
                  <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{fmtDate(selected.date)}{selected.time ? " · " + selected.time : ""}{selected.participants ? " · " + selected.participants : ""}</div>
                </div>
                <button onClick={() => delMeeting(selected.id)} style={{ border: "none", background: "none", cursor: "pointer", color: "#E8A0A0", fontSize: 18 }}>×</button>
              </div>
              <div style={{ borderBottom: "1px solid #F0F0F0", display: "flex", paddingLeft: 8 }}>
                <Tab id="prep" label="📋 Préparation" /><Tab id="notes" label="✏️ Notes" /><Tab id="recap" label="📄 Récap IA" />
              </div>
              <div style={{ padding: "16px 20px", minHeight: 300 }}>
                {tab === "prep" && <>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>ORDRE DU JOUR</div>
                  <textarea value={selected.agenda || ""} onChange={e => { const m = { ...selected, agenda: e.target.value }; setSelected(m); saveMeeting(m); }} rows={5} placeholder="Points à aborder…" style={{ ...S.input, resize: "vertical", marginBottom: 12 }} />
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>PARTICIPANTS</div>
                  <input value={selected.participants || ""} onChange={e => { const m = { ...selected, participants: e.target.value }; setSelected(m); saveMeeting(m); }} placeholder="Participants…" style={{ ...S.input, marginBottom: 12 }} />
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>DOCUMENTS / LIENS</div>
                  <textarea value={selected.docs || ""} onChange={e => { const m = { ...selected, docs: e.target.value }; setSelected(m); saveMeeting(m); }} rows={2} placeholder="Fichiers, liens…" style={{ ...S.input, resize: "vertical" }} />
                </>}
                {tab === "notes" && <>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>NOTES EN SÉANCE</div>
                  <textarea value={selected.notes || ""} onChange={e => { const m = { ...selected, notes: e.target.value }; setSelected(m); saveMeeting(m); }} rows={12} placeholder={"Prenez vos notes ici…\n\nAstuce : utilisez '-' pour les décisions et '→' pour les actions."} style={{ ...S.input, resize: "vertical", lineHeight: 1.7, fontSize: 13 }} />

                </>}
              </div>
            </div>
          )}
          {!selected && !showNew && <div style={{ textAlign: "center", padding: "60px 0", color: "#CCC" }}><div style={{ fontSize: 40, marginBottom: 12 }}>◷</div><div style={{ fontFamily: "'Lora',serif", fontSize: 15, color: "#AAA" }}>Sélectionnez ou créez une réunion</div></div>}
        </div>
      </div>
    </div>
  );
}

/* ─── 7) CATEGORY TASKS VIEW ─── */
const CAT_ORDER_KEY = "taskmanager_catorder_v1";

function CategoryTasksView({ tasks, onDelete, onToggle, onEdit, onAdd, onSaveComment, settings }) {
  const isMobile = useIsMobile();
  const [filterStatus, setFilterStatus] = useState("Actives");
  const [search, setSearch] = useState("");
  const [selectedTypes, setSelectedTypes] = useState([]); // empty = all
  const [selectedCats, setSelectedCats] = useState([]);  // filter by category
  const [colWidths, setColWidths] = useState(() => { try { const s = localStorage.getItem(COL_WIDTHS_KEY); return s ? { ...DEFAULT_COL_WIDTHS, ...JSON.parse(s) } : DEFAULT_COL_WIDTHS; } catch { return DEFAULT_COL_WIDTHS; } });

  // Drag-to-reorder type blocks
  const TYPE_ORDER_KEY = "taskmanager-typeorder-v1";
  const DEFAULT_TYPE_ORDER = ["task", "quick", "report", "meeting", "analyse"];
  const [typeOrder, setTypeOrder] = useState(() => {
    try { const s = localStorage.getItem(TYPE_ORDER_KEY); return s ? JSON.parse(s) : DEFAULT_TYPE_ORDER; } catch { return DEFAULT_TYPE_ORDER; }
  });
  const dragSrc = useRef(null);

  // Ordered types (respects user drag order + adds new types)
  const orderedTypes = [
    ...typeOrder.map(id => settings.types.find(t => t.id === id)).filter(Boolean),
    ...settings.types.filter(t => !typeOrder.includes(t.id)),
  ];

  const saveTypeOrder = (order) => { setTypeOrder(order); try { localStorage.setItem(TYPE_ORDER_KEY, JSON.stringify(order)); } catch {} };

  const toggleType = id => setSelectedTypes(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const showTypes = selectedTypes.length === 0 ? orderedTypes : orderedTypes.filter(t => selectedTypes.includes(t.id));
  const toggleCat = id => setSelectedCats(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const [typeSort, setTypeSort] = useState({ col: null, dir: "asc" });

  const baseFilter = t => {
    if (t.status === "blocked" && filterStatus !== "Toutes") return false;
    if (filterStatus === "Actives" && t.completed) return false;
    if (filterStatus === "Complétées" && !t.completed) return false;
    if (search && !t.title.toLowerCase().includes(search.toLowerCase())) return false;
    if (selectedCats.length > 0 && !selectedCats.includes(t.category)) return false;
    return true;
  };

  const FBtn = ({ label, active, onClick, color }) => (
    <button onClick={onClick} style={{ border: `1px solid ${active ? color || "#102A63" : "#E0E0E0"}`, background: active ? color || "#102A63" : "white", color: active ? "white" : "#888", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", transition: "all 0.15s", whiteSpace: "nowrap" }}>{label}</button>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column" }}>
      {/* Toolbar */}
      <div style={{ background: "white", borderBottom: "1px solid #ECEAE5", padding: "7px 12px", display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", flexShrink: 0 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Rechercher…" className="search-input-small" style={{ ...S.input, width: 140, padding: "4px 8px", fontSize: 10 }} />
        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
        {["Actives", "Complétées", "Toutes"].map(o => <FBtn key={o} label={o} active={filterStatus === o} onClick={() => setFilterStatus(o)} />)}
        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
        <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>FILTRER :</span>
        {orderedTypes.map(tp => (
          <button key={tp.id} onClick={() => toggleType(tp.id)}

        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />

        ))}
        {selectedCats.length > 0 && <button onClick={() => setSelectedCats([])} style={{ ...S.ghost, padding: "2px 7px", fontSize: 9 }}>× Tout</button>}
        <div style={{ flex: 1 }} />
        <button onClick={() => onAdd()} style={{ ...S.btn("#102A63"), padding: "4px 12px", fontSize: 11 }}>+ Nouvelle</button>
      </div>

      {/* Type blocks */}
      <div style={{ padding: "12px 100px", display: "flex", flexDirection: "column", gap: 12 }}>
        {showTypes.map(tp => {
          const TYPE_COLORS = { task: { bg: "#EEF2FF", accent: "#4F46E5" }, quick: { bg: "#FEF9C3", accent: "#A16207" }, report: { bg: "#E8F8F5", accent: "#27AE60" }, meeting: { bg: "#FDEDEC", accent: "#C0392B" }, analyse: { bg: "#F4ECF7", accent: "#8E44AD" } };
          const tc = TYPE_COLORS[tp.id] || { bg: "#F5F5F5", accent: "#888888" };
          const typeTasks = tasks.filter(t => t.type === tp.name && baseFilter(t));
          return (
            <div key={tp.id}
              draggable
              onDragStart={() => { dragSrc.current = tp.id; }}
              onDragOver={e => e.preventDefault()}
              onDrop={() => {
                if (!dragSrc.current || dragSrc.current === tp.id) return;
                const order = orderedTypes.map(t => t.id);
                const from = order.indexOf(dragSrc.current);
                const to   = order.indexOf(tp.id);
                const next = [...order];
                next.splice(from, 1);
                next.splice(to, 0, dragSrc.current);
                saveTypeOrder(next);
                dragSrc.current = null;
              }}
              style={{ background: "white", borderRadius: 12, border: `1px solid ${tc.bg}`, borderLeft: `4px solid ${tc.accent}`, overflow: "hidden", cursor: "grab" }}>

              </div>

                <div style={{ padding: "12px 16px", fontSize: 11, color: "#CCC", fontFamily: "'Lora',serif", fontStyle: "italic" }}>Aucune tâche de ce type</div>
              ) : isMobile ? (
                <div style={{ padding: "8px" }}>
                  {typeTasks.map(t => <MobileTaskCard key={t.id} task={t} onToggle={onToggle} onEdit={onEdit} onDelete={onDelete} onSaveComment={onSaveComment} settings={settings} />)}
                </div>
              ) : (
                <div>
                  {/* mini header row */}
                  <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "3px 12px 2px", background: "#FAFAF8", borderBottom: "1px solid #F0F0F0", userSelect: "none" }}>
                    <div style={{ width: 14, flexShrink: 0, marginLeft: 5 }} />
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 16 }}>#</span>
                    <span style={{ fontSize: 8, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", minWidth: 12 }}>P</span>
                    {[["TÂCHE","title",colWidths.title||220],["STATUT","status",colWidths.status||72],["CATÉGORIE","category",colWidths.category||90]].map(([lbl,col,w]) => (
                      <span key={col} onClick={() => { if(typeSort.col===col){setTypeSort(s=>({...s,dir:s.dir==="asc"?"desc":"asc"}))} else {setTypeSort({col,dir:"asc"})} }}
                        style={{ fontSize: 8, fontWeight: 700, color: typeSort.col===col ? "#102A63" : "#AAA", fontFamily: "'DM Mono',monospace", width: w, flexShrink: 0, cursor: "pointer", display: "flex", alignItems: "center", gap: 2 }}>
                        {lbl}{typeSort.col===col && <span>{typeSort.dir==="asc"?"▲":"▼"}</span>}
                      </span>
                    ))}
                    <div style={{ flex: 1 }} />
                    {[["CRÉATION","createdAt",colWidths.created||82],["ÉCHÉANCE","dueDate",colWidths.due||82]].map(([lbl,col,w]) => (
                      <span key={col} onClick={() => { if(typeSort.col===col){setTypeSort(s=>({...s,dir:s.dir==="asc"?"desc":"asc"}))} else {setTypeSort({col,dir:"asc"})} }}
                        style={{ fontSize: 8, fontWeight: 700, color: typeSort.col===col ? "#102A63" : "#AAA", fontFamily: "'DM Mono',monospace", width: w, flexShrink: 0, cursor: "pointer", textAlign: "right", display: "inline-flex", alignItems: "center", justifyContent: "flex-end", gap: 2 }}>
                        {lbl}{typeSort.col===col && <span>{typeSort.dir==="asc"?"▲":"▼"}</span>}
                      </span>
                    ))}
                    <span style={{ width: 16, flexShrink: 0 }} />
                    <span style={{ width: 36, flexShrink: 0 }} />
                  </div>
                  <div style={{ padding: "3px 0 4px" }}>
                    {(typeSort.col ? [...typeTasks].sort((a,b) => { let va=a[typeSort.col]||""; let vb=b[typeSort.col]||""; const cmp=va.toString().localeCompare(vb.toString(),"fr",{sensitivity:"base"}); return typeSort.dir==="asc"?cmp:-cmp; }) : [...typeTasks].sort((a,b) => { if(a.completed!==b.completed)return a.completed?1:-1; const da=a.dueDate||"9999-99-99",db=b.dueDate||"9999-99-99"; if(da!==db)return da<db?-1:1; return ({urgente:0,haute:1,normale:2,basse:3}[a.priority]??2)-({urgente:0,haute:1,normale:2,basse:3}[b.priority]??2); })).map((t, i) => <TaskCard key={t.id} task={t} num={i + 1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} colWidths={colWidths} settings={settings} />)}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* Hint bas de page */}
      <div style={{ textAlign: "center", padding: "8px 0 12px", fontSize: 9, color: "#CCC", fontFamily: "'DM Mono',monospace" }}>⠿ Glissez les blocs pour réordonner</div>
    </div>
  );
}

            <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", marginTop:10,
                            fontSize:11, fontFamily:"'Lora',serif", color:"#555", userSelect:"none" }}>
              <input type="checkbox" checked={s.showAiDebug||false}
                     onChange={e=>setS({...s, showAiDebug:e.target.checked})}
                     style={{ accentColor:"#102A63", cursor:"pointer", width:14, height:14 }} />
              Afficher le statut de l'assistant IA (mode debug)
            </label>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
            <button onClick={() => setS(JSON.parse(JSON.stringify(DEFAULT_SETTINGS)))} style={{ ...S.btn("#F0F0F0", "#666") }}>Réinitialiser</button>
            <button onClick={() => { onSave(s); }} style={{ ...S.btn("#102A63") }}>✓ Enregistrer</button>
          </div>
        </div>

        {/* ── Maintenance ── */}
        <div style={{ marginTop: 20, padding: "16px 20px", background: "#FFF8F8", borderRadius: 12, border: "1px solid #FEE2E2" }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#B91C1C", fontFamily: "'DM Mono',monospace", letterSpacing: "0.06em", marginBottom: 10 }}>🛠️ MAINTENANCE</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            <button onClick={() => {
              if (window.confirm("Vider le cache de l'application et recharger ?")) {
                if ('caches' in window) {
                  caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => window.location.reload(true));
                } else {
                  window.location.reload(true);
                }
              }
            }} style={{ ...S.btn("#B91C1C"), padding: "7px 16px", fontSize: 11 }}>
              🔄 Vider le cache et recharger
            </button>
            <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>
              Utile si l'application ne se met pas à jour après une modification du code
            </span>
          </div>
        </div>

      </div>
    </div>
  );
}

/* ── ReportTaskRow ── */
function ReportTaskRow({ task, onUpdate, onDelete, depth, onAddSubtask }) {
  const [expanded, setExpanded]         = React.useState(false);
  const [showCommentModal, setShowCommentModal] = React.useState(false);

  const prio = TASK_PRIORITIES_R.find(p => p.id === (task.priority || "normale")) || TASK_PRIORITIES_R[2];
  const st   = TASK_STATUSES_R.find(s => s.id === (task.status || "todo")) || TASK_STATUSES_R[0];
  const isIndented = depth > 0;

  const toggle = () => {
    const done = !task.done;
    onUpdate({ ...task, done, endDate: done ? today() : "" });
  };

  return (
    <React.Fragment>
      <div style={{ display: "grid", gridTemplateColumns: "20px 16px 56px 1fr 28px 3fr 72px 160px 88px 88px 32px 32px", gap: 0,
        padding: isIndented ? "5px 8px 5px 32px" : "5px 8px",
        borderBottom: "1px solid #F5F5F5", alignItems: "center",
        background: isIndented ? "#FAFBFF" : "white" }}>

        {/* ⊕/⊖ Toggle sous-tâches */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
          {depth === 0 && (task.subtasks||[]).length > 0 && (
            <button onClick={() => setExpanded(e => !e)}
              title={expanded ? "Masquer les sous-tâches" : "Afficher les sous-tâches"}
              style={{ border: "none", background: "none", cursor: "pointer",
                color: expanded ? "#102A63" : "#AAA", fontSize: 14, padding: 0, lineHeight: 1,
                fontWeight: 700 }}
              onMouseEnter={e => e.currentTarget.style.color = "#102A63"}
              onMouseLeave={e => e.currentTarget.style.color = expanded ? "#102A63" : "#AAA"}>
              {expanded ? "⊖" : "⊕"}
            </button>
          )}
          {depth === 0 && (task.subtasks||[]).length === 0 && (
            <span style={{ width: 14 }} />
          )}
        </div>

        {/* Checkbox */}
        <button onClick={toggle}
          style={{ width: 14, height: 14, borderRadius: "50%", border: `2px solid ${task.done ? "#27AE60" : "#BDC3C7"}`,
            background: task.done ? "#27AE60" : "white", cursor: "pointer", flexShrink: 0,
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: "white", padding: 0 }}>
          {task.done ? "✓" : ""}
        </button>

        {/* Priorité */}
        <div style={{ fontSize: 10, fontWeight: 700, color: prio.color, fontFamily: "'Lora',serif", whiteSpace: "nowrap" }}>{prio.icon}</div>

        {/* Libellé + description */}
        <div style={{ overflow: "hidden", display: "flex", alignItems: "center", gap: 4 }}>
          {(task.subtasks||[]).length > 0 && (
            <span onClick={() => setExpanded(e => !e)}
              style={{ fontSize: 12, color: "#888", cursor: "pointer", userSelect: "none",
                fontWeight: 700, flexShrink: 0, lineHeight: 1, width: 14, textAlign: "center" }}>
              {expanded ? "−" : "+"}
            </span>
          )}
          {(task.subtasks||[]).length === 0 && !isIndented && (
            <span style={{ width: 14, flexShrink: 0 }} />
          )}
          <div style={{ flex: 1, overflow: "hidden" }}>
            <div contentEditable suppressContentEditableWarning
              onBlur={e => onUpdate({ ...task, label: e.currentTarget.textContent })}
              onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); } }}
              style={{ fontSize: 10, fontFamily: "'Lora',serif", color: task.done ? "#AAA" : "#2C3E50",
                textDecoration: task.done ? "line-through" : "none",
                fontStyle: isIndented ? "italic" : "normal",
                outline: "none", minWidth: 60, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
              {task.label || ""}
            </div>
          </div>
        </div>
        {/* +st bouton */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
          {depth === 0 && onAddSubtask && (
            <button onClick={() => { onAddSubtask(task.id); setExpanded(true); }}
              title="Ajouter une sous-tâche"
              style={{ border: "none", background: "none", cursor: "pointer", color: "#CCC",
                fontSize: 30, padding: 0, lineHeight: 1, fontWeight: 300 }}
              onMouseEnter={e => e.currentTarget.style.color = "#102A63"}
              onMouseLeave={e => e.currentTarget.style.color = "#CCC"}>+<sup style={{fontSize:10,fontWeight:700}}>st</sup></button>
          )}
        </div>

        {/* Description */}
        <div style={{ overflow: "hidden", paddingRight: 4 }}>
          <input value={task.description || ""} onChange={e => onUpdate({ ...task, description: e.target.value })}
            placeholder="Description…"
            className="report-field"
            style={{ width: "100%", border: "none", background: "transparent", fontSize: 10,
              fontFamily: "'Lora',serif", outline: "none", color: "#888",
              whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
              fontStyle: isIndented ? "italic" : "normal" }} />
        </div>

        {/* Type */}
        <div>
          <select className="report-field" value={task.taskType || ""}
            onChange={e => onUpdate({ ...task, taskType: e.target.value })}
            style={{ fontSize: 10, border: "none", borderRadius: 20, padding: "2px 5px",
              fontFamily: "'Lora',serif", cursor: "pointer", outline: "none", maxWidth: 68,
              background: TASK_TYPES_R.find(t => t.id === (task.taskType||""))?.bg || "#F5F5F5",
              color: TASK_TYPES_R.find(t => t.id === (task.taskType||""))?.color || "#AAA" }}>
            <option value="">—</option>
            {TASK_TYPES_R.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
        </div>

        {/* Date création */}
        <div style={{ fontSize: 10, color: "#AAA", fontFamily: "'Lora',serif", textAlign: "center" }}>
          {task.createdAt ? task.createdAt.split("-").reverse().join("/") : "—"}
        </div>

        {/* Statut */}
        <div>
          <select className="report-field" value={task.status || "todo"} onChange={e => onUpdate({ ...task, status: e.target.value })}
            style={{ fontSize: 10, border: "none", background: st.bg, color: st.color, borderRadius: 20,
              padding: "2px 6px", fontFamily: "'Lora',serif", fontWeight: 700, cursor: "pointer", outline: "none", maxWidth: 84 }}>
            {TASK_STATUSES_R.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>

        {/* Date de fin */}
        <div style={{ fontSize: 10, fontFamily: "'Lora',serif", color: "#555", textAlign: "center" }}>
          <input className="report-field" type="date" value={task.endDate || ""}
            onChange={e => onUpdate({ ...task, endDate: e.target.value })}
            onClick={e => { try { e.currentTarget.showPicker(); } catch(_) {} }}
            style={{ fontSize: 10, border: "none", background: "transparent", color: task.endDate ? "#27AE60" : "#AAA",
              fontFamily: "'Lora',serif", cursor: "pointer", outline: "none", width: 80 }} />
        </div>

        {/* Commentaire toggle */}
        <button onClick={() => setShowCommentModal(function(m){ return !m; })} title="Commentaire"
          style={{ border: "none", background: "none", cursor: "pointer", fontSize: 14,
            opacity: task.comment ? 1 : 0.3, padding: 0 }}
          onMouseEnter={e => e.currentTarget.style.opacity = "1"}
          onMouseLeave={e => e.currentTarget.style.opacity = task.comment ? "1" : "0.3"}>
          💬
        </button>

        {/* Supprimer */}
        <button onClick={() => onDelete(task.id)}
          style={{ border: "none", background: "none", cursor: "pointer", color: "#DDD", fontSize: 15, padding: 0 }}
          onMouseEnter={e => e.currentTarget.style.color = "#E74C3C"}
          onMouseLeave={e => e.currentTarget.style.color = "#DDD"}>×</button>
      </div>

      

      {/* Sous-tâches */}
      {expanded && (task.subtasks || []).map(sub => (
        <ReportTaskRow key={sub.id} task={sub} depth={depth + 1}
          onUpdate={updSub => onUpdate({ ...task, subtasks: task.subtasks.map(s => s.id === updSub.id ? updSub : s) })}
          onDelete={subId => onUpdate({ ...task, subtasks: task.subtasks.filter(s => s.id !== subId) })} />
      ))}
      {showCommentModal && React.createElement("div", {
          style: {position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",
            zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",padding:16},
          onMouseDown: function(e){ if(e.target===e.currentTarget) setShowCommentModal(false); }
        },
        React.createElement("div", {
          style:{background:"white",borderRadius:14,width:"100%",maxWidth:520,
            boxShadow:"0 20px 60px rgba(0,0,0,0.2)",borderTop:"4px solid #102A63"}
        },
          React.createElement("div", {
            style:{padding:"14px 18px",borderBottom:"1px solid #F0F0F0",
              display:"flex",justifyContent:"space-between",alignItems:"center"}
          },
            React.createElement("div", {
              style:{fontSize:13,fontWeight:700,fontFamily:"'Lora',serif",color:"#2C3E50"}
            }, "💬 " + (task.label || "Commentaire")),
            React.createElement("button", {
              onClick: function(){ setShowCommentModal(false); },
              style:{border:"none",background:"none",fontSize:20,cursor:"pointer",color:"#BDC3C7"}
            }, "×")
          ),
          React.createElement("div", {style:{padding:"16px 18px"}},
            React.createElement(RichTextArea, {
              value: task.comment || "",
              onChange: function(v){ onUpdate(Object.assign({}, task, {comment:v})); },
              placeholder: "Commentaire…",
              rows: 5
            })
          ),
          React.createElement("div", {
            style:{padding:"10px 18px",borderTop:"1px solid #F0F0F0",display:"flex",justifyContent:"flex-end"}
          },
            React.createElement("button", {
              onClick: function(){ setShowCommentModal(false); },
              style:{background:"#102A63",color:"white",border:"none",borderRadius:8,
                padding:"7px 18px",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif"}
            }, "✓ Fermer")
          )
        )
      )}
    </React.Fragment>
  );
}

/* ── ReportModal ── */
function ReportModal({ report, onSave, onClose }) {
  const empty = {
    id: uid(), name: "", type: "", status: "project",
    description: "", createdAt: today(), publishedAt: "",
    tasks: [], notes: ""
  };
  const [d, setD] = React.useState(report ? { ...empty, ...report } : empty);

  const [undoTask, setUndoTask] = React.useState(null);

  const handleDeleteTask = (id) => {
    const task = (d.tasks || []).find(t => t.id === id);
    setD(prev => ({ ...prev, tasks: (prev.tasks||[]).filter(t => t.id !== id) }));
    if (task) {
      setUndoTask(task);
      setTimeout(() => setUndoTask(null), 10000);
    }
  };
  const undoDelete = () => {
    if (undoTask) {
      setD(prev => ({ ...prev, tasks: [...(prev.tasks||[]), undoTask] }));
      setUndoTask(null);
    }
  };

  const addTask = () => setD(prev => ({
    ...prev, tasks: [...(prev.tasks || []), {
      id: uid(), label: "", description: "", taskType: "", priority: "normale",
      status: "todo", done: false, createdAt: today(), endDate: "", comment: "", subtasks: []
    }]
  }));

  const addSubtask = (taskId) => setD(prev => ({
    ...prev, tasks: (prev.tasks || []).map(t => t.id === taskId ? {
      ...t, subtasks: [...(t.subtasks || []), {
        id: uid(), label: "", description: "", taskType: "", priority: "normale",
        status: "todo", done: false, createdAt: today(), endDate: "", comment: "", subtasks: []
      }]
    } : t)
  }));

  const updateTask = (updated) => setD(prev => ({
    ...prev, tasks: (prev.tasks || []).map(t => t.id === updated.id ? updated : t)
  }));
  const deleteTask = (id) => setD(prev => ({ ...prev, tasks: (prev.tasks || []).filter(t => t.id !== id) }));

/* ── ReportCard ── */
function ReportCard({ report, onClick }) {
  const typeObj   = REPORT_TYPES.find(t => t.id === report.type) || REPORT_TYPES[0];
  const statusObj = REPORT_STATUSES.find(s => s.id === report.status) || REPORT_STATUSES[0];
  const tasks     = report.tasks || [];
  const done      = tasks.filter(t => t.done).length;
  const pct       = tasks.length > 0 ? Math.round(done / tasks.length * 100) : 0;

  return (
    <div onClick={() => onClick(report)}
      style={{ background: "white", borderRadius: 14, border: "1px solid #ECEAE5", padding: "14px 16px",
        cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.04)", transition: "all 0.15s" }}
      onMouseEnter={e => { e.currentTarget.style.boxShadow = "0 6px 20px rgba(0,0,0,0.10)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
      onMouseLeave={e => { e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.04)"; e.currentTarget.style.transform = "none"; }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", flex: 1, marginRight: 8 }}>{report.name || "Sans titre"}</div>
        <div style={{ display: "flex", gap: 5, flexShrink: 0 }}>
          <span style={{ fontSize: 9, fontWeight: 700, background: typeObj.bg, color: typeObj.color, borderRadius: 20, padding: "2px 8px", fontFamily: "'DM Mono',monospace" }}>{typeObj.label}</span>
          <span style={{ fontSize: 9, fontWeight: 700, background: statusObj.bg, color: statusObj.color, borderRadius: 20, padding: "2px 8px", fontFamily: "'DM Mono',monospace" }}>{statusObj.label}</span>
        </div>
      </div>
      {report.description && <div style={{ fontSize: 11, color: "#888", fontFamily: "'Lora',serif", marginBottom: 8, lineHeight: 1.5 }}>{report.description}</div>}
      {tasks.length > 0 && (
        <div style={{ marginBottom: 4 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
            <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>AVANCEMENT TÂCHES</span>
            <span style={{ fontSize: 9, fontWeight: 700, color: "#102A63", fontFamily: "'DM Mono',monospace" }}>{done}/{tasks.length} — {pct}%</span>
          </div>
          <div style={{ height: 4, background: "#F0F0F0", borderRadius: 10, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: pct === 100 ? "#27AE60" : pct > 60 ? "#2980B9" : pct > 30 ? "#E67E22" : "#C0392B", borderRadius: 10, transition: "width 0.4s" }} />
          </div>
        </div>
      )}
      <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
        {report.createdAt && <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>📅 Créé {report.createdAt.split("-").reverse().join("/")}</span>}
        {report.publishedAt && <span style={{ fontSize: 9, color: "#27AE60", fontFamily: "'DM Mono',monospace" }}>✅ Publié {report.publishedAt.split("-").reverse().join("/")}</span>}
      </div>
    </div>
  );
}

function fmtEuro(n) {
  if (n === "" || n === null || n === undefined) return "—";
  const num = typeof n === "string" ? parseFloat(n.replace(/\s/g,"").replace(",", ".")) : n;
  if (isNaN(num)) return "—";
  return new Intl.NumberFormat("fr-FR", { style: "currency", currency: "EUR", minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
}
function fmtAmountInput(v) {
  if (v === "" || v === null || v === undefined) return "";
  const num = parseFloat(String(v).replace(/\s/g,"").replace(",","."));
  if (isNaN(num)) return String(v);
  return new Intl.NumberFormat("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
}
function loadPayments() { try { const s = localStorage.getItem(PAYMENTS_KEY); return s ? JSON.parse(s) : []; } catch { return []; } }
function savePayments(p) { try { localStorage.setItem(PAYMENTS_KEY, JSON.stringify(p)); } catch {} }
