  const startResize = (col, e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = colWidths[col];
    const onMove = (ev) => setColWidths(w => ({ ...w, [col]: Math.max(40, startW + ev.clientX - startX) }));
    const onUp = () => { document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };

  const savePayment = (p) => {
    setPayments(prev => {
      const exists = prev.find(x => x.id === p.id);
      const next = exists ? prev.map(x => x.id === p.id ? p : x) : [...prev, p];
      savePayments(next); return next;
    });
  };
  const delPayment = (id) => { setPayments(p => { const n = p.filter(x => x.id !== id); savePayments(n); return n; }); };
  const saveNote = (id, notes) => {
    setPayments(prev => { const next = prev.map(x => x.id === id ? { ...x, notes } : x); savePayments(next); return next; });
  };

  const handleSort = (field) => {
    if (sortField === field) setSortAsc(a => !a);
    else { setSortField(field); setSortAsc(true); }
  };

  const today_str = today();
  const getUrgency = (p) => {
    if (!p.estimatedDate || p.status === "paid") return null;
    if (p.estimatedDate < today_str) return "overdue";
    const diff = (new Date(p.estimatedDate) - new Date()) / 86400000;
    if (diff <= 3) return "urgent";
    if (diff <= 7) return "soon";
    return null;
  };

  const filtered = payments
    .filter(p => filterStatus === "all" || (filterStatus === "unpaid" ? p.status !== "paid" : p.status === filterStatus))
    .sort((a, b) => {
      let va = a[sortField] || "", vb = b[sortField] || "";
      if (sortField === "amount") { va = parseFloat(String(a.amount).replace(/\s/g,"").replace(",","."))||0; vb = parseFloat(String(b.amount).replace(/\s/g,"").replace(",","."))||0; }
      const cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return sortAsc ? cmp : -cmp;
    });

  const pending = payments.filter(p => p.status !== "paid" && p.status !== "rejected");
  const totalPending = pending.reduce((s, p) => s + (parseFloat(String(p.amount).replace(/\s/g,"").replace(",",".")) || 0), 0);

  const byDate = {};
  pending.forEach(p => {
    const k = p.estimatedDate || "Sans date";
    if (!byDate[k]) byDate[k] = { total: 0, count: 0, items: [] };
    byDate[k].total += parseFloat(String(p.amount).replace(/\s/g,"").replace(",",".")) || 0;
    byDate[k].count++;
    byDate[k].items.push(p.supplier);
  });
  const sortedDates = Object.keys(byDate).sort((a, b) => a === "Sans date" ? 1 : b === "Sans date" ? -1 : a < b ? -1 : 1);

  const colDef = [
    { id: "priority",      label: "PRIO." },
    { id: "supplier",      label: "FOURNISSEUR" },
    { id: "account",       label: "COMPTE" },
    { id: "requestDate",   label: "DATE DEM." },
    { id: "requester",     label: "DEMANDEUR" },
    { id: "estimatedDate", label: "PAIEMENT EST." },
    { id: "amount",        label: "MONTANT" },
    { id: "status",        label: "STATUT" },
  ];

  const gridTemplate = "32px " + colDef.map(c => colWidths[c.id] + "px").join(" ") + " 36px";

  const HeaderCell = ({ col }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 2, position: "relative", userSelect: "none", justifyContent: col.alignRight ? "flex-end" : "flex-start" }}>
      <span onClick={() => handleSort(col.id)} style={{ fontSize: 9, fontWeight: 700, color: "white", fontFamily: "'Lora',serif", cursor: "pointer", whiteSpace: "nowrap" }}>
        {col.label}{sortField === col.id ? (sortAsc ? " ▲" : " ▼") : ""}
      </span>
      <div onMouseDown={(e) => startResize(col.id, e)}
        style={{ position: "absolute", right: -4, top: 0, bottom: 0, width: 8, cursor: "col-resize", zIndex: 1 }} />
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {/* ── Header ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>Paiements fournisseurs</div>
          <div style={{ fontSize: 11, color: "#AAA", fontFamily: "'Lora',serif", marginTop: 2 }}>{pending.length} en attente · Total : {fmtEuro(totalPending)}</div>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => window.exportPaymentsCSV(payments)} style={{ ...S.btn("#27AE60"), padding: "8px 16px", fontSize: 12 }}>Export</button>
          <button onClick={() => setModal({})} style={{ ...S.btn("#102A63"), padding: "8px 18px", fontSize: 12 }}>+ Nouveau paiement</button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 280px", gap: 16, alignItems: "start" }}>
        {/* ── Tableau principal ── */}
        <div style={{ background: "white", borderRadius: 16, border: "1px solid #ECEAE5", overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
          {/* Filtres */}
          <div style={{ padding: "8px 12px", borderBottom: "1px solid #F0F0F0", display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'Lora',serif", marginRight: 3 }}>FILTRER :</span>
            {[{ id: "all", label: "Tous" }, { id: "unpaid", label: "Non payés", bg: "#FEF3C7", color: "#92400E" }, ...PAYMENT_STATUSES].map(s => (
              <button key={s.id} onClick={() => setFilterStatus(s.id)}
                style={{ border: `1px solid ${filterStatus === s.id ? "#102A63" : "#E0E0E0"}`, background: filterStatus === s.id ? "#102A63" : "white", color: filterStatus === s.id ? "white" : "#888", borderRadius: 5, padding: "2px 7px", fontSize: 9, cursor: "pointer", fontFamily: "'Lora',serif" }}>
                {s.icon ? `${s.icon} ` : ""}{s.label}
              </button>
            ))}
          </div>

          {/* Barre action en masse */}
          {selectedIds.length > 0 && (
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 14px", background: "#EEF2FF", borderRadius: 8, marginBottom: 8, border: "1px solid #C7D2FE" }}>
              <span style={{ fontSize: 12, fontFamily: "'Lora',serif", color: "#102A63", fontWeight: 700 }}>
                {selectedIds.length} sélectionné{selectedIds.length > 1 ? "s" : ""}
              </span>
              <span style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#555" }}>Changer le statut :</span>
              {PAYMENT_STATUSES.map(s => (
                <button key={s.id} onClick={() => {
                  setPayments(p => { const updated = p.map(pay => selectedIds.includes(pay.id) ? { ...pay, status: s.id } : pay); savePayments(updated); return updated; });
                  setSelectedIds([]);
                }}
                  style={{ fontSize: 11, fontWeight: 700, background: s.bg, color: s.color, border: "none", borderRadius: 20, padding: "3px 12px", cursor: "pointer", fontFamily: "'Lora',serif" }}>
                  {s.label}
                </button>
              ))}
              <button onClick={() => setSelectedIds([])}
                style={{ marginLeft: "auto", fontSize: 11, background: "none", border: "1px solid #CCC", borderRadius: 6, padding: "3px 10px", cursor: "pointer", fontFamily: "'Lora',serif", color: "#888" }}>
                Annuler
              </button>
            </div>
          )}

          <div style={{ overflowX: "auto" }}>
            {/* En-têtes */}
            <div style={{ display: "grid", gridTemplateColumns: gridTemplate, padding: "3px 10px", background: "#102A63", borderBottom: "1px solid #102A63", minWidth: "fit-content" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
                <input type="checkbox"
                  checked={filtered.length > 0 && filtered.every(p => selectedIds.includes(p.id))}
                  onChange={e => setSelectedIds(e.target.checked ? filtered.map(p => p.id) : [])}
                  style={{ cursor: "pointer", accentColor: "white" }} />
              </div>
              {colDef.map(col => <HeaderCell key={col.id} col={col} />)}
              <div />
            </div>

            {/* Lignes */}
            {filtered.length === 0 ? (
              <div style={{ padding: "28px", textAlign: "center", color: "#CCC", fontSize: 11, fontFamily: "'Lora',serif" }}>Aucun paiement</div>
            ) : filtered.map((p, i) => {
              const st   = PAYMENT_STATUSES.find(s => s.id === p.status) || PAYMENT_STATUSES[0];
              const prio = PAYMENT_PRIORITIES.find(pr => pr.id === (p.priority || "normal")) || PAYMENT_PRIORITIES[2];
              const urg  = getUrgency(p);
              return (
                <div key={p.id}
                  style={{ display: "grid", gridTemplateColumns: gridTemplate, padding: "3px 10px", borderBottom: "1px solid #F5F5F5",
                    background: selectedIds.includes(p.id) ? "#EEF2FF" : i % 2 === 0 ? "white" : "#FAFAFA", minWidth: "fit-content", alignItems: "center", cursor: "pointer" }}
                  onClick={(e) => { if(!e.target.closest('input[type="checkbox"]')) setModal(p); }}>
                  {/* Checkbox sélection */}
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }} onClick={e => e.stopPropagation()}>
                    <input type="checkbox" checked={selectedIds.includes(p.id)}
                      onChange={e => setSelectedIds(s => e.target.checked ? [...s, p.id] : s.filter(id => id !== p.id))}
                      style={{ cursor: "pointer", accentColor: "#102A63" }} />
                  </div>
                  {/* Priorité */}
                  <div style={{ fontSize: 10, fontWeight: 700, color: prio.color, fontFamily: "'Lora',serif", whiteSpace: "nowrap" }}>{prio.icon}</div>
                  {/* Fournisseur */}
                  <div style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#2C3E50", fontWeight: 600, display: "flex", alignItems: "center", gap: 4, overflow: "hidden" }}>
                    {urg === "overdue" && <span style={{ flexShrink: 0 }}>🚨</span>}
                    {urg === "urgent"  && <span style={{ flexShrink: 0 }}>⚠️</span>}
                    {p.isClientSupplier && <span title="Client/Fournisseur" style={{ fontSize: 9, background: "#EEF2FF", color: "#4F46E5", borderRadius: 3, padding: "0 4px", flexShrink: 0 }}>C/F</span>}
                    <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.supplier}</span>
                  </div>
                  {/* Compte */}
                  <div style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#555" }}>{p.account || "—"}</div>
                  <div style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#888" }}>{p.requestDate ? p.requestDate.split("-").reverse().join("/") : "—"}</div>
                  <div style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#555" }}>{p.requester || "—"}</div>
                  <div style={{ fontSize: 11, fontFamily: "'Lora',serif", color: urg ? "#C0392B" : "#555", fontWeight: urg ? 700 : 400 }}>
                    {p.estimatedDate ? p.estimatedDate.split("-").reverse().join("/") : "—"}
                  </div>
                  <div style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#2C3E50", fontWeight: 600, textAlign: "right", paddingRight: 8 }}>{fmtEuro(p.amount)}</div>
                  <div><span style={{ fontSize: 9, fontWeight: 700, background: st.bg, color: st.color, borderRadius: 20, padding: "2px 6px", fontFamily: "'Lora',serif", whiteSpace: "nowrap" }}>{st.icon} {st.label}</span></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                    <button onClick={(e) => { e.stopPropagation(); setNoteModal(p); }}
                      title={p.notes ? "Voir/modifier la note" : "Ajouter une note"}
                      style={{ border: "none", background: "none", cursor: "pointer", fontSize: 12, opacity: p.notes ? 1 : 0.3, padding: 0 }}
                      onMouseEnter={e => e.currentTarget.style.opacity = "1"}
                      onMouseLeave={e => e.currentTarget.style.opacity = p.notes ? "1" : "0.3"}>📝</button>
                    <button onClick={(e) => { e.stopPropagation(); delPayment(p.id); }}
                      style={{ border: "none", background: "none", cursor: "pointer", color: "#DDD", fontSize: 13, padding: 0 }}
                      onMouseEnter={e => e.currentTarget.style.color = "#E74C3C"}
                      onMouseLeave={e => e.currentTarget.style.color = "#DDD"}>×</button>
                  </div>
                </div>
              );
            })}
          </div>

          {filtered.length > 0 && (
            <div style={{ padding: "6px 10px", background: "#F8F9FB", borderTop: "2px solid #ECEAE5", overflowX: "auto" }}>
              <div style={{ display: "grid", gridTemplateColumns: gridTemplate, minWidth: "fit-content" }}>
                <div /><div /><div /><div /><div /><div />
                <div style={{ fontSize: 9, fontWeight: 700, color: "#AAA", fontFamily: "\'Lora\',serif", display: "flex", alignItems: "center" }}>TOTAL AFFICHÉ</div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#102A63", fontFamily: "\'Lora\',serif", textAlign: "right", paddingRight: 8 }}>
                  {fmtEuro(filtered.reduce((s, p) => s + (parseFloat(String(p.amount).replace(/\\s/g,"").replace(",",".")) || 0), 0))}
                </div>
                <div /><div />
              </div>
            </div>
          )}
        </div>

        {/* ── Synthèse latérale ── */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ background: "linear-gradient(135deg, #102A63 0%, #1a3d8f 100%)", borderRadius: 16, padding: "16px", color: "white", boxShadow: "0 4px 16px rgba(16,42,99,0.3)" }}>
            <div style={{ fontSize: 10, fontFamily: "'Lora',serif", opacity: 0.7, marginBottom: 4 }}>TOTAL EN ATTENTE</div>
            <div style={{ fontSize: 24, fontWeight: 700, fontFamily: "'Lora',serif" }}>{fmtEuro(totalPending)}</div>
            <div style={{ fontSize: 9, fontFamily: "'Lora',serif", opacity: 0.6, marginTop: 4 }}>{pending.length} paiement{pending.length > 1 ? "s" : ""} · {payments.filter(p => p.status === "paid").length} payé{payments.filter(p => p.status === "paid").length > 1 ? "s" : ""}</div>
          </div>
          <div style={{ background: "white", borderRadius: 14, border: "1px solid #ECEAE5", padding: "12px", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
            <div style={{ fontSize: 10, fontWeight: 700, fontFamily: "'Lora',serif", color: "#AAA", marginBottom: 10, letterSpacing: "0.06em" }}>PAR DATE ESTIMÉE</div>
            {sortedDates.length === 0 ? (
              <div style={{ fontSize: 10, color: "#CCC", fontFamily: "'Lora',serif", textAlign: "center", padding: "10px 0" }}>Aucun paiement en attente</div>
            ) : sortedDates.map(date => {
              const grp = byDate[date];
              const isPast = date !== "Sans date" && date < today_str;
              const isSoon = date !== "Sans date" && !isPast && (new Date(date) - new Date()) / 86400000 <= 7;
              return (
                <div key={date} style={{ marginBottom: 8, padding: "8px 10px", background: "#F8F9FB", borderRadius: 8, borderLeft: `3px solid ${isPast ? "#E74C3C" : isSoon ? "#E67E22" : "#102A63"}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: isPast ? "#C0392B" : isSoon ? "#E67E22" : "#2C3E50", fontFamily: "'Lora',serif" }}>
                      {isPast ? "🚨 " : isSoon ? "⚠️ " : "📅 "}{date === "Sans date" ? "Sans date" : date.split("-").reverse().join("/")}
                    </div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif" }}>{fmtEuro(grp.total)}</div>
                  </div>
                  <div style={{ fontSize: 9, color: "#888", fontFamily: "'Lora',serif", marginTop: 2 }}>{grp.count} paiement{grp.count > 1 ? "s" : ""} · {grp.items.slice(0,2).join(", ")}{grp.items.length > 2 ? "…" : ""}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Modals */}
      {modal !== null && (
        <PaymentModal payment={Object.keys(modal).length > 0 ? modal : null} onSave={savePayment} onClose={() => setModal(null)} settings={settings} />
      )}
      {noteModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 3000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, backdropFilter: "blur(4px)" }}
          onMouseDown={(e) => { if (e.target === e.currentTarget) e.currentTarget._mdOutside = true; }}
          onMouseUp={(e) => { if (e.target === e.currentTarget && e.currentTarget._mdOutside) { e.currentTarget._mdOutside = false; setNoteModal(null); } }}>
          <div style={{ background: "white", borderRadius: 14, width: "100%", maxWidth: 480, boxShadow: "0 20px 60px rgba(0,0,0,0.2)", borderTop: "4px solid #102A63" }}>
            <div style={{ padding: "13px 16px", borderBottom: "1px solid #F0F0F0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>📝 Note — {noteModal.supplier}</div>
              <button onClick={() => setNoteModal(null)} style={{ border: "none", background: "none", fontSize: 20, cursor: "pointer", color: "#BDC3C7" }}>×</button>
            </div>
            <div style={{ padding: "13px 16px" }}>
              <RichTextArea value={noteModal.notes || ""} onChange={v => setNoteModal({ ...noteModal, notes: v })} placeholder="Saisir une note…" rows={5} />
            </div>
            <div style={{ padding: "10px 16px", borderTop: "1px solid #F0F0F0", display: "flex", justifyContent: "flex-end", gap: 8 }}>
              <button onClick={() => setNoteModal(null)} style={{ ...S.btn("#F0F0F0", "#666"), padding: "6px 12px", fontSize: 10 }}>Annuler</button>
              <button onClick={() => { saveNote(noteModal.id, noteModal.notes); setNoteModal(null); }} style={{ ...S.btn("#102A63"), padding: "6px 12px", fontSize: 10 }}>✓ Enregistrer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── TASKS VIEW ─── */
const DEFAULT_COL_WIDTHS = { title: 220, status: 72, category: 90, type: 72, created: 82, due: 82 };

function TasksView({ tasks, onDelete, onToggle, onEdit, onAdd, onSaveComment, onPin, fullscreen, onToggleFullscreen, settings }) {
  const isMobile = useIsMobile();
  const [filterCat,    setFilterCat]    = useState("Toutes");
  const [filterType,   setFilterType]   = useState("Tous");
  const [filterStatus, setFilterStatus] = useState("Actives");
  const [search,       setSearch]       = useState("");
  const [filterLabel,  setFilterLabel]  = useState("Toutes");
  const [grouped,      setGrouped]      = useState(false);
  const [aiText,       setAiText]       = useState("");
  const [aiLoading,    setAiLoading]    = useState(false);
  const aiInputRef = React.useRef(null);
  const [aiDebug, setAiDebug] = useState("");
  const [sortCol,      setSortCol]      = useState(null);
  const [sortDir,      setSortDir]      = useState("asc");
  const [colWidths, setColWidths] = useState(() => { try { const s = localStorage.getItem(COL_WIDTHS_KEY); return s ? { ...DEFAULT_COL_WIDTHS, ...JSON.parse(s) } : DEFAULT_COL_WIDTHS; } catch { return DEFAULT_COL_WIDTHS; } });

  const startResize = (col, e) => {
    e.preventDefault();
    const startX = e.clientX, startW = colWidths[col];
    const onMove = ev => { const nw = Math.max(40, startW + ev.clientX - startX); setColWidths(p => { const n = { ...p, [col]: nw }; try { localStorage.setItem(COL_WIDTHS_KEY, JSON.stringify(n)); } catch {} return n; }); };
    const onUp = () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
    window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
  };

  // 2) Blocked tasks: hidden when filterStatus="Actives", visible when filterStatus="Toutes"
  const displayList = tasks.filter(t => {
    // Hide blocked unless "Toutes" is selected
    if (t.status === "blocked" && filterStatus !== "Toutes") return false;
    if (filterCat !== "Toutes" && t.category !== filterCat) return false;
    if (filterType !== "Tous" && t.type !== filterType) return false;
    if (filterStatus === "Actives" && t.completed) return false;
    if (filterStatus === "Complétées" && !t.completed) return false;
    if (search && !t.title.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterLabel !== "Toutes" && !(t.labels||[]).includes(filterLabel)) return false;
    return true;
  });
  const blockedCount = tasks.filter(t => t.status === "blocked" && !t.completed).length;

  const handleSort = col => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("asc"); }
  };

  const PRIO_RANK = { urgente: 0, haute: 1, normale: 2, basse: 3 };
  const defaultSort = (a, b) => {
    // 1) Complétées en bas
    if (a.completed !== b.completed) return a.completed ? 1 : -1;
    // 2) Par échéance croissante (sans date à la fin)
    const da = a.dueDate || "9999-99-99", db = b.dueDate || "9999-99-99";
    if (da !== db) return da < db ? -1 : 1;
    // 3) Par priorité haute → normale → basse
    return (PRIO_RANK[a.priority] ?? 1) - (PRIO_RANK[b.priority] ?? 1);
  };
  const sortedList = (() => {
    const base = sortCol ? [...displayList].sort((a, b) => {

    let va = a[sortCol] || ""; let vb = b[sortCol] || "";
    if (sortCol === "dueDate" || sortCol === "createdAt") { va = va || "9999"; vb = vb || "9999"; }
    const cmp = va.toString().localeCompare(vb.toString(), "fr", { sensitivity: "base" });
    return sortDir === "asc" ? cmp : -cmp;
  }) : [...displayList].sort(defaultSort);
    return base.sort((a, b) => (!!b.pinned - !!a.pinned));
  })();

  const groups = {};
  settings.categories.forEach(c => { const r = sortedList.filter(t => t.category === c.name); if (r.length) groups[c.name] = r; });

  const FBtn = ({ label, active, onClick, color }) => (
    <button onClick={onClick} style={{ border: `1px solid ${active ? color || "#102A63" : "#E0E0E0"}`, background: active ? color || "#102A63" : "white", color: active ? "white" : "#888", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", transition: "all 0.15s", whiteSpace: "nowrap" }}>{label}</button>
  );
  const ResizeHandle = ({ col }) => (
    <span onMouseDown={e => startResize(col, e)} style={{ display: "inline-block", width: 6, cursor: "col-resize", userSelect: "none", flexShrink: 0, marginLeft: 2, alignSelf: "stretch", borderRight: "2px solid transparent", transition: "border-color 0.15s" }}
      onMouseEnter={e => e.currentTarget.style.borderColor = "#BDC3C7"} onMouseLeave={e => e.currentTarget.style.borderColor = "transparent"} />
  );
  const ColHeader = ({ label, col, extra }) => (
    <div style={{ display: "flex", alignItems: "center", flexShrink: 0, width: col ? colWidths[col] : undefined, cursor: col ? "pointer" : "default", userSelect: "none", ...extra }}
      onClick={() => col && handleSort(col)}>
      <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif", letterSpacing: "0.06em", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{label}</span>
      {col && sortCol === col && <span style={{ fontSize: 9, color: "white", marginLeft: 2 }}>{sortDir === "asc" ? "▲" : "▼"}</span>}
      {col && <ResizeHandle col={col} />}
    </div>
  );

  const parseWithAI = async () => {
    const userText = (aiInputRef.current ? aiInputRef.current.value : "").trim();
    setAiDebug("⏳ Fonction appelée. Texte: [" + userText + "] | Clé: " + !!(settings && settings.groqKey));
    if (!userText) { setAiDebug("⚠️ Champ vide"); return; }
    if (!settings || !settings.groqKey) { setAiDebug("⚠️ Clé API manquante"); return; }
    setAiLoading(true);
    setAiDebug("📡 Appel Groq en cours...");
    const todayStr = new Date().toLocaleDateString("fr-FR",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    const prompt = "Aujourd'hui c'est " + todayStr + ". Extrais les informations de ce texte et reponds UNIQUEMENT avec un objet JSON (sans markdown, sans backticks) avec ces cles: title, priority (urgente/haute/normale/basse), dueDate (ISO 8601 ou null), notes. Texte: " + JSON.stringify(userText);
    try {
      const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${settings.groqKey}` },
        body: JSON.stringify({ model: "llama-3.3-70b-versatile", max_tokens: 400, temperature: 0.1,
          messages: [
            { role: "system", content: "Reponds uniquement avec du JSON valide, sans markdown." },
            { role: "user", content: prompt }
          ] }),
      });
      setAiDebug("📨 HTTP " + resp.status);
      if (!resp.ok) { const err = await resp.json().catch(()=>({})); setAiDebug("❌ Erreur API " + resp.status + " : " + (err?.error?.message||"")); setAiLoading(false); return; }
      const data = await resp.json();
      const raw = data.choices?.[0]?.message?.content?.trim() || "";
      setAiDebug("✅ Groq OK : " + raw.substring(0,120));
      let parsed = {};
      try { parsed = JSON.parse(raw.replace(/^```[a-z]*/i,"").replace(/```/g,"").trim()); } catch(e) { setAiDebug("⚠️ JSON.parse échoué sur: " + raw.substring(0,80)); }
      if (aiInputRef.current) aiInputRef.current.value = "";
      setAiText("");
      onAdd({ title: parsed.title || userText, priority: parsed.priority || "normale", dueDate: parsed.dueDate || null, notes: parsed.notes || "" });
    } catch(e) { setAiDebug("❌ Fetch error: " + e.message); }
    setAiLoading(false);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: fullscreen ? "calc(100vh - 56px)" : "auto" }}>
      {/* Toolbar */}
      <div style={{ background: "white", borderBottom: "1px solid #ECEAE5", padding: isMobile ? "8px 10px" : "7px 12px", display: "flex", gap: isMobile ? 6 : 8, flexWrap: "wrap", alignItems: "center", flexShrink: 0 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Rechercher…" className="search-input-small" style={{ ...S.input, width: isMobile ? 110 : 140, padding: "4px 8px", fontSize: 10 }} />
        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
        {["Actives", "Complétées", "Toutes"].map(o => <FBtn key={o} label={isMobile ? o.slice(0, 4) : o} active={filterStatus === o} onClick={() => setFilterStatus(o)} />)}
        {!isMobile && <>
          <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
          {["Tous", ...settings.types.map(t => t.name)].map(o => <FBtn key={o} label={o} active={filterType === o} onClick={() => setFilterType(o)} />)}
          <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />
          {["Toutes", ...settings.categories.map(c => c.name)].map(c => { const co = settings.categories.find(x => x.name === c); return <FBtn key={c} label={c} active={filterCat === c} onClick={() => setFilterCat(c)} color={co?.accent} />; })}
        </>}
          {!isMobile && (
            <div style={{ width: "100%", display: "flex", alignItems: "center", gap: 6, paddingTop: 4, flexWrap: "nowrap" }}>
              {(settings.labels||[]).length > 0 && <>
                <div style={{ width: 1, height: 16, background: "#E8E8E8", flexShrink: 0 }} />
                <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'DM Mono',monospace", flexShrink: 0 }}>🏷</span>
                {["Toutes", ...(settings.labels||[]).map(l => l.name)].map(lbl => {
                  const lObj = (settings.labels||[]).find(l => l.name === lbl);
                  return <FBtn key={lbl} label={lbl} active={filterLabel === lbl} onClick={() => setFilterLabel(lbl)} color={lObj?.color} />;
                })}
              </>}
              <div style={{ flex: 1 }} />
              <button onClick={() => { setColWidths(DEFAULT_COL_WIDTHS); localStorage.removeItem(COL_WIDTHS_KEY); }} title="Réinitialiser colonnes" style={{ border: "1px solid #E0E0E0", background: "white", color: "#AAA", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>↺</button>
              <button onClick={() => setGrouped(!grouped)} style={{ border: `1px solid ${grouped ? "#2C3E50" : "#E0E0E0"}`, background: grouped ? "#102A63" : "white", color: grouped ? "white" : "#888", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", whiteSpace: "nowrap" }}>{grouped ? "☰ Groupé" : "≡ À plat"}</button>
              <button onClick={() => onAdd()} style={{ ...S.btn("#102A63"), padding: "4px 12px", fontSize: 11, whiteSpace: "nowrap" }}>+ Nouvelle tâche</button>
            </div>
          )}
        {isMobile && <button onClick={() => onAdd()} style={{ ...S.btn("#102A63"), padding: "6px 12px", fontSize: 11 }}>+ Ajouter</button>}
      </div>


      {isMobile && (
        <div style={{ background: "white", borderBottom: "1px solid #ECEAE5", padding: "6px 10px", display: "flex", gap: 6, overflowX: "auto", flexShrink: 0 }}>
          {["Toutes", ...settings.categories.map(c => c.name)].map(c => { const co = settings.categories.find(x => x.name === c); return <FBtn key={c} label={c} active={filterCat === c} onClick={() => setFilterCat(c)} color={co?.accent} />; })}
        </div>
      )}

      {/* ── AI Natural Input ── */}
      {!isMobile && (
        <div style={{ background:"#F0F3FA", borderBottom:"1px solid #DDE3F0", padding:"5px 16px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, background:"white",
                        border:"1.5px solid #D0D8F0", borderRadius:8, padding:"4px 12px",
                        boxShadow:"0 2px 8px rgba(16,42,99,0.06)" }}>
            <span style={{ fontSize:16, flexShrink:0, opacity:0.7 }}>✦</span>
            <input
              defaultValue=""
              ref={aiInputRef}
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); parseWithAI(); }}}
              placeholder="Décrivez une tâche en langage naturel… ex : Préparer le bilan trimestriel pour vendredi à 9h"
              style={{ flex:1, border:"none", outline:"none", fontSize:11, fontFamily:"'Lora',serif",
                       color:"#2C3E50", background:"transparent", lineHeight:1.5 }}
            />
            {aiLoading
              ? <div style={{ width:22, height:22, border:"2.5px solid #D0D8F0",
                              borderTop:"2.5px solid #102A63", borderRadius:"50%",
                              animation:"spin 0.7s linear infinite", flexShrink:0 }} />
              : <button onClick={parseWithAI}
                  style={{ background:"#102A63", color:"white",
                           border:"none", borderRadius:8, padding:"6px 16px",
                           fontSize:10, fontFamily:"'Lora',serif", fontWeight:400,
                           letterSpacing:"0.02em", cursor:"pointer",
                           flexShrink:0, transition:"all 0.2s" }}>
                  CRÉER ↵
                </button>
            }
          </div>

          {aiDebug && settings.showAiDebug && <div style={{ marginTop:4, padding:"4px 8px", borderRadius:6, background: aiDebug.startsWith("✅")?"#D1FAE5": aiDebug.startsWith("❌")||aiDebug.startsWith("⚠️")?"#FEE2E2":"#EEF2FF", fontSize:10, fontFamily:"'DM Mono',monospace", color: aiDebug.startsWith("✅")?"#065F46": aiDebug.startsWith("❌")||aiDebug.startsWith("⚠️")?"#B91C1C":"#3730A3" }}>{aiDebug}</div>}
        </div>
      )}

      {/* Column headers */}
      {!isMobile && (
        <div style={{ display: "flex", alignItems: "center", gap: 7, paddingLeft: 40, paddingRight: 16, borderBottom: "1px solid #0A1F50", background: "#102A63", flexShrink: 0, userSelect: "none", height: 25 }}>
          <div style={{ width: 14, flexShrink: 0 }} />
          <span style={{ flexShrink: 0, minWidth: 20 }}></span><span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif", minWidth: 16 }}>#</span>
          <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif", minWidth: 12 }}>P</span>
          <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif", width: 16, flexShrink: 0, textAlign: "center" }}>☀</span>
          <ColHeader label="TÂCHE" col="title" />
          <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif", minWidth: 28 }}>ST</span>
          <ColHeader label="STATUT" col="status" />
          <ColHeader label="CATÉGORIE" col="category" />
          <ColHeader label="TYPE" col="type" />
          <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif", letterSpacing: "0.06em", minWidth: 60 }}>ÉTIQUETTES</span>
          <div style={{ flex: 1 }} />
          <ColHeader label="CRÉATION" col="created" extra={{ textAlign: "right" }} />
          <span style={{ width: 16, flexShrink: 0 }} />
          <ColHeader label="ÉCHÉANCE" col="due" extra={{ textAlign: "right" }} />
          <span style={{ width: 36, flexShrink: 0 }} />
        </div>
      )}

      {/* List */}
      <div style={{ flex: 1, overflowY: "auto", padding: isMobile ? "8px 10px" : "4px 16px 8px" }}>
        {displayList.length === 0 ? (
          <div style={{ textAlign: "center", padding: "40px 0", color: "#CCC" }}>
            <div style={{ fontSize: 30, marginBottom: 8 }}>✓</div>
            <div style={{ fontFamily: "'Lora',serif", fontSize: 14 }}>Aucune tâche trouvée</div>
          </div>
        ) : isMobile ? (
          displayList.map(t => <MobileTaskCard key={t.id} task={t} onToggle={onToggle} onEdit={onEdit} onDelete={onDelete} onSaveComment={onSaveComment} settings={settings} />)
        ) : !grouped || filterCat !== "Toutes" ? (
          (() => {
            if (sortCol) return sortedList.map((t, i) => <TaskCard key={t.id} task={t} num={i + 1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} onPin={onPin} colWidths={colWidths} settings={settings} />);
            const todayStr = today();
            const in7 = new Date(); in7.setDate(in7.getDate() + 7);
            const in7Str = in7.toISOString().split("T")[0];
            const grpPinned = sortedList.filter(t => t.pinned && !t.completed);
            const grpToday = sortedList.filter(t => !t.pinned && !t.completed && t.dueDate && t.dueDate <= todayStr);
            const grp7     = sortedList.filter(t => !t.pinned && !t.completed && t.dueDate && t.dueDate > todayStr && t.dueDate <= in7Str);
            const grpRest  = sortedList.filter(t => !t.pinned && (t.completed || !t.dueDate || t.dueDate > in7Str));
            const Spacer   = () => <div style={{ height: 14 }} />;
            const result   = [];
            grpPinned.forEach((t, i) => result.push(<TaskCard key={t.id} task={t} num={i+1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} onPin={onPin} colWidths={colWidths} settings={settings} />));
            if (grpPinned.length > 0) result.push(<Spacer key="sp-pin" />);
            grpToday.forEach((t, i) => result.push(<TaskCard key={t.id} task={t} num={i+1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} onPin={onPin} colWidths={colWidths} settings={settings} />));
            if (grpToday.length > 0 && (grp7.length > 0 || grpRest.length > 0)) result.push(<Spacer key="s1" />);
            grp7.forEach((t, i) => result.push(<TaskCard key={t.id} task={t} num={grpToday.length+i+1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} onPin={onPin} colWidths={colWidths} settings={settings} />));
            if (grp7.length > 0 && grpRest.length > 0) result.push(<Spacer key="s2" />);
            grpRest.forEach((t, i) => result.push(<TaskCard key={t.id} task={t} num={grpToday.length+grp7.length+i+1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} onPin={onPin} colWidths={colWidths} settings={settings} />));
            return result;
          })()
        ) : (
          Object.entries(groups).map(([cat, catTasks]) => {
            const co = settings.categories.find(c => c.name === cat);
            return (
              <div key={cat} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3, marginTop: 4 }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: co?.accent || "#999" }} />
                  <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", color: "#BBB", fontFamily: "'DM Mono',monospace" }}>{cat.toUpperCase()} — {catTasks.length}</span>
                  <div style={{ flex: 1, height: 1, background: "#F0F0F0" }} />
                </div>
                {catTasks.map((t, i) => <TaskCard key={t.id} task={t} num={i + 1} onDelete={onDelete} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} onPin={onPin} colWidths={colWidths} settings={settings} />)}
              </div>
            );
          })
        )}
      </div>
      {/* Stats footer */}
      <div style={{ borderTop: "1px solid #F0F0F0", background: "white", flexShrink: 0, display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center", padding: "5px 16px" }}>
        {(() => {
          const total    = tasks.length;
          const pct      = n => total > 0 ? Math.round((n / total) * 100) : 0;
          const created  = total;
          const active   = tasks.filter(t => !t.completed && t.status !== "cancelled").length;
          const done     = tasks.filter(t => t.completed || t.status === "done").length;
          const cancelled= tasks.filter(t => t.status === "cancelled").length;
          const blocked  = tasks.filter(t => t.status === "blocked").length;
          const overdue  = tasks.filter(t => !t.completed && isOverdue(t.dueDate)).length;
          const stats = [
            { label: "Créées",    val: created,   pct: 100,         color: "#2C3E50" },
            { label: "Actives",   val: active,    pct: pct(active),    color: "#2980B9" },
            { label: "Terminées", val: done,      pct: pct(done),      color: "#27AE60" },
            { label: "Annulées",  val: cancelled, pct: pct(cancelled), color: "#92400E" },
            { label: "Bloquées",  val: blocked,   pct: pct(blocked),   color: "#B91C1C" },
            { label: "En retard", val: overdue,   pct: pct(overdue),   color: "#E67E22" },
          ];
          return stats.map(s => (
            <span key={s.label} style={{ fontSize: 9, fontFamily: "'Lora',serif", color: s.val > 0 ? s.color : "#CCC", whiteSpace: "nowrap" }}>
              <span style={{ fontWeight: 700 }}>{s.label}</span> {s.val} <span style={{ opacity: 0.6 }}>({s.pct}%)</span>
            </span>
          ));
        })()}
        <span style={{ flex: 1, textAlign: "right", fontSize: 9, color: "#CCC", fontFamily: "'DM Mono',monospace" }}>{displayList.length} affiché{displayList.length !== 1 ? "s" : ""}</span>
      </div>
    </div>
  );
}

const SUIVI_CLIENT_KEY = "taskmanager_suiviclient_v1";

function saveSuiviClients(d) { try { localStorage.setItem(SUIVI_CLIENT_KEY, JSON.stringify(d)); } catch {} }
const SUIVI_NOTES_KEY = "taskmanager_suiviclient_notes_v1";

function saveSuiviNotes(d) { try { localStorage.setItem(SUIVI_NOTES_KEY, JSON.stringify(d)); } catch {} }


function SuiviClientModal({ item, onSave, onClose, suiviTypes }) {
  const today0 = new Date().toISOString().split("T")[0];
  const [d, setD] = React.useState({ clientName:"", clientCode:"", description:"", followupDate:today0, reminderDate:"", suiviType:"", closed:false, ...item });
  const set = (k,v) => setD(p=>({...p,[k]:v}));
  const uidP = () => Math.random().toString(36).substr(2,9);

  const updPmt   = (id,k,v) => setD(p=>({...p,paiements:(p.paiements||[]).map(r=>r.id===id?{...r,[k]:v}:r)}));
  const delPmt   = (id) => setD(p=>({...p,paiements:(p.paiements||[]).filter(r=>r.id!==id)}));
  const fmtTotal = (pmts) => { const t=(pmts||[]).reduce((a,r)=>a+(parseFloat(r.montant)||0),0); return t>0?t.toLocaleString("fr-FR",{minimumFractionDigits:0})+" €":"—"; };
  const inp = { border:"1px solid #E8E8E8", borderRadius:8, padding:"6px 10px", fontSize:12, outline:"none", width:"100%", boxSizing:"border-box", fontFamily:"'Lora',serif", color:"#2C3E50", background:"#FAFAFA" };
  const lbl = (t) => <div style={{ fontSize:10, fontFamily:"'Lora',serif", color:"#102A63", marginBottom:4, fontWeight:700, letterSpacing:"0.06em" }}>{t}</div>;
  const ss=[{id:"todo",name:"À faire",color:"#888",bg:"#F0F0F0"},{id:"inprogress",name:"En cours",color:"#1D4ED8",bg:"#DBEAFE"},{id:"waiting",name:"En attente",color:"#A16207",bg:"#FEF9C3"},{id:"blocked",name:"Bloqué",color:"#B91C1C",bg:"#FEE2E2"},{id:"done",name:"Fait",color:"#065F46",bg:"#D1FAE5"},{id:"cancelled",name:"Annulé",color:"#92400E",bg:"#F5E6DC"}];
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}
      onMouseDown={e=>{if(e.target===e.currentTarget)e.currentTarget._md=true;}}
      onMouseUp={e=>{if(e.target===e.currentTarget&&e.currentTarget._md){e.currentTarget._md=false;onClose();}}}>
      <div style={{ background:"white", borderRadius:16, width:540, boxShadow:"0 24px 64px rgba(0,0,0,0.18)", borderTop:"4px solid #102A63" }}>
        <div style={{ padding:"16px 22px 12px", borderBottom:"1px solid #F0F0F0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:700, color:"#102A63", letterSpacing:"0.06em" }}>{d.id?"MODIFIER LE CLIENT":"NOUVEAU CLIENT"}</span>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            {d.id && <button onMouseDown={(e) => { e.preventDefault(); exportSingleSuiviPDF(d, window._suiviNotes||[], suiviTypes); }} title="Exporter en PDF"
              style={{ border:"1px solid #E0E0E0", background:"white", borderRadius:8, padding:"3px 8px", fontSize:14, cursor:"pointer", color:"#102A63" }}>🖨</button>}
            <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#999" }}>×</button>
          </div>
        </div>
        <div style={{ padding:"18px 22px", display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", gap:12 }}>
            <div style={{ flex:2 }}>{lbl("NOM CLIENT")}<input value={d.clientName} onChange={e=>set("clientName",e.target.value)} style={inp} placeholder="Nom du client" autoFocus /></div>
            <div style={{ flex:1 }}>{lbl("CODE CLIENT")}<input value={d.clientCode} onChange={e=>set("clientCode",e.target.value)} style={inp} placeholder="Ex: ACM-001" /></div>
          </div>
          <div>{lbl("DESCRIPTION")}<input value={d.description} onChange={e=>set("description",e.target.value)} style={inp} placeholder="Courte description" /></div>
          <div style={{ display:"flex", gap:12 }}>
            <div style={{ flex:1 }}>
              {lbl("TYPE DE SUIVI")}
              <select value={d.suiviType||""} onChange={e=>set("suiviType",e.target.value)} style={{...inp, cursor:"pointer"}}>
                <option value="">— Aucun —</option>
                {(suiviTypes||[]).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
            </div>
            <div style={{ flex:1 }}>{lbl("DATE DE SUIVI")}<input type="date" value={d.followupDate||""} onChange={e=>set("followupDate",e.target.value)} style={inp} /></div>
            <div style={{ flex:1 }}>{lbl("DATE DE RAPPEL")}<input type="date" value={d.reminderDate||""} onChange={e=>set("reminderDate",e.target.value)} style={inp} /></div>

          <div style={{ display:"flex", alignItems:"center", gap:8, paddingTop:4 }}>
            <input type="checkbox" id="sc-closed" checked={!!d.closed} onChange={e=>set("closed",e.target.checked)} style={{ width:15, height:15, cursor:"pointer" }} />

          </div>
          {/* Notes */}
          <div style={{ borderTop:"1px solid #F0F0F0", paddingTop:14 }}>
            <div style={{ fontSize:10,fontWeight:700,color:"#102A63",fontFamily:"'Lora',serif",marginBottom:7,letterSpacing:"0.06em" }}>NOTES</div>
            <RichTextArea value={d.notes||""} onChange={v=>set("notes",v)} placeholder="Notes sur ce suivi client…" rows={3} />
          </div>
          {/* Sous-tâches */}
          {(()=>{
            const subtasks=d.subtasks||[];
            const done=subtasks.filter(s=>s.completed).length;
            const updSubs=subs=>set("subtasks",subs);
            const addSub=()=>updSubs([...subtasks,{id:String(Date.now()),text:"",status:"todo",completed:false}]);
            const updSub=s=>updSubs(subtasks.map(x=>x.id===s.id?s:x));
            const delSub=id=>updSubs(subtasks.filter(x=>x.id!==id));
            return (
              <div style={{ borderTop:"1px solid #F0F0F0", paddingTop:14 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
                  <div style={{ fontSize:10,fontWeight:700,color:"#102A63",fontFamily:"'Lora',serif",letterSpacing:"0.06em" }}>SOUS-TÂCHES</div>
                  {subtasks.length>0&&<span style={{ fontSize:10,color:"#27AE60",fontFamily:"'Lora',serif",fontWeight:600 }}>{done}/{subtasks.length}</span>}
                </div>
                {subtasks.map(sub=>{const st=ss.find(x=>x.id===sub.status)||ss[0];return(
                  <div key={sub.id} style={{ display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid #F5F5F5" }}>
                    <button onClick={()=>updSub({...sub,completed:!sub.completed,status:sub.completed?"todo":"done"})} style={{ width:16,height:16,borderRadius:"50%",flexShrink:0,border:"2px solid "+(sub.completed?"#27AE60":"#CCC"),background:sub.completed?"#27AE60":"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"white" }}>{sub.completed?"✓":""}</button>
                    <input value={sub.text} onChange={e=>updSub({...sub,text:e.target.value})} placeholder="Sous-tâche…" style={{ flex:1,border:"none",outline:"none",fontSize:12,fontFamily:"'Lora',serif",color:sub.completed?"#AAA":"#2C3E50",textDecoration:sub.completed?"line-through":"none",background:"transparent" }} />
                    <SubStatusSelect value={sub.status} onChange={v=>updSub({...sub,status:v,completed:v==="done"})} />
                    <button onClick={()=>delSub(sub.id)} style={{ border:"none",background:"none",color:"#E8A0A0",cursor:"pointer",fontSize:14,padding:"0 2px",flexShrink:0 }}>×</button>
                  </div>
                );})}
                <button onClick={addSub} style={{ marginTop:8,background:"none",border:"none",padding:"4px 0",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif",color:"#BBBBBB",display:"flex",alignItems:"center",gap:5 }}><span style={{ fontSize:16,lineHeight:1 }}>+</span> Ajouter une sous-tâche</button>
              </div>
            );
          })()}
        </div>
        <div style={{ padding:"10px 22px 18px", display:"flex", justifyContent:"flex-end", gap:8 }}>
          <button onClick={onClose} style={{ ...S.btn("#F0F0F0","#666"), fontSize:11, padding:"7px 14px" }}>Annuler</button>
          <button onClick={()=>{ if(!d.clientName.trim()) return; onSave(d); }} style={{ ...S.btn("#102A63"), fontSize:11, padding:"7px 14px" }}>✓ Enregistrer</button>
        </div>
        <div style={{ padding:"0 22px 16px" }}>
          <AttachmentZone attachments={d.attachments} onChange={v => setD({ ...d, attachments: v })} />
        </div>
      </div>
    </div>
  );
}

function SuiviClientView({ settings }) {
  const suiviTypes = settings?.suiviTypes || [
    { id:"retard", name:"Retard", color:"#C0392B", bg:"#FDEDEC" },
    { id:"risque", name:"Risque", color:"#E67E22", bg:"#FEF9C3" },
    { id:"litige", name:"Litige", color:"#2980B9", bg:"#EBF5FB" },
    { id:"cotation", name:"Cotation", color:"#27AE60", bg:"#E8F8F5" },
  ];
  const [clients, setClients] = React.useState(()=>loadSuiviClients());
  const [notes, setNotes] = React.useState(()=>loadSuiviNotes());
  const [selected, setSelected] = React.useState(null);
  React.useEffect(() => { window._suiviClients = clients; window._suiviNotes = notes; }, [clients, notes]);
  const [search, setSearch] = React.useState("");
  const [modal, setModal] = React.useState(null);
  const [filterStatus, setFilterStatus] = React.useState("Actifs");
  const [filterType, setFilterType] = React.useState("Tous");
  const [sortCol, setSortCol] = React.useState(null);
  const [suiviDupAlert, setSuiviDupAlert] = React.useState(null);
  const [sortDir, setSortDir] = React.useState("asc");
  const [colWidths, setColWidths] = React.useState(()=>{ try { return JSON.parse(localStorage.getItem("taskmanager_suivi_colwidths_v1")) || { clientName:220, clientCode:90, description:220, suiviType:110, followupDate:95, reminderDate:95, actions:52 }; } catch { return { clientName:220, clientCode:90, description:220, suiviType:110, followupDate:95, reminderDate:95, actions:52 }; } });
  const [deletedClient, setDeletedClient] = React.useState(null);
  const [deleteTimer, setDeleteTimer] = React.useState(null);
  const [quickOpen, setQuickOpen] = React.useState(false);
  const saveWidths = (w) => { setColWidths(w); try { localStorage.setItem("taskmanager_suivi_colwidths_v1", JSON.stringify(w)); } catch {} };
  const today = new Date().toISOString().split("T")[0];
  const emitReminderSync = (items) => { try { window.dispatchEvent(new CustomEvent("suiviReminderUpdated", { detail: items.filter(x => x.reminderDate) })); } catch {} };

  const saveClients = (list) => { setClients(list); saveSuiviClients(list); emitReminderSync(list); };
  const handleSave = (d) => {
    if (d.clientCode && d.clientCode.trim()) {
      const dup = clients.find(c => c.id !== d.id && c.clientCode && c.clientCode.trim().toLowerCase() === d.clientCode.trim().toLowerCase());
      if (dup) { setSuiviDupAlert({ code: d.clientCode, existingId: dup.id, pendingSave: d }); return; }
    }
    let newClient;
    const list = d.id ? clients.map(c=>c.id===d.id?{...d,isDuplicate:false}:c) : (newClient={...d,id:Date.now().toString(),isDuplicate:false}, [...clients, newClient]);
    saveClients(list); setModal(null); if(newClient) setSelected(newClient);
  };
  const confirmSuiviDupSave = () => {
    const d = suiviDupAlert.pendingSave;
    let newClient;
    const list = d.id ? clients.map(c=>c.id===d.id?{...d,isDuplicate:true}:c) : (newClient={...d,id:Date.now().toString(),isDuplicate:true}, [...clients, newClient]);
    saveClients(list); setModal(null); setSuiviDupAlert(null); if(newClient) setSelected(newClient);
  };
  const handleDelete = (id) => { const found = clients.find(c=>c.id===id); if(!found) return; const next = clients.filter(c=>c.id!==id); saveClients(next); if(selected?.id===id) setSelected(null); setDeletedClient(found); if(deleteTimer) clearTimeout(deleteTimer); setDeleteTimer(setTimeout(()=>setDeletedClient(null), 10000)); };
  const undoDelete = () => { if(!deletedClient) return; const next = [...clients, deletedClient].sort((a,b)=>Number(a.id)-Number(b.id)); saveClients(next); setDeletedClient(null); };
  const saveNote = (id, html) => { const n={...notes,[id]:html}; setNotes(n); saveSuiviNotes(n); };
  const handleSort = (col) => { if(sortCol===col) setSortDir(d=>d==="asc"?"desc":"asc"); else { setSortCol(col); setSortDir("asc"); } };
  const si = (col) => sortCol===col ? (sortDir==="asc"?" ▲":" ▼") : "";
  const FBtn = ({label,active,onClick,color}) => <button onClick={onClick} style={{ border:`1px solid ${active?(color||"#102A63"):"#E0E0E0"}`, background:active?(color||"#102A63"):"white", color:active?"white":"#666", borderRadius:20, padding:"3px 12px", cursor:"pointer", fontFamily:"'Lora',serif", fontSize:10, fontWeight:active?700:400, flexShrink:0 }}>{label}</button>;
  const filtered = clients.filter(c=>{
    if(filterStatus==="Actifs" && c.closed) return false;
    if(filterStatus==="Clôturés" && !c.closed) return false;
    if(filterType!=="Tous"){
      const t=suiviTypes.find(t=>t.name===filterType);
      if(!t || c.suiviType!==t.id) return false;
    }
    if(search && ![c.clientName,c.clientCode,c.description].some(v=>(v||"").toLowerCase().includes(search.toLowerCase()))) return false;
    return true;
  }).sort((a,b)=>{ if(!sortCol) return 0; const va=(a[sortCol]||"").toLowerCase(), vb=(b[sortCol]||"").toLowerCase(); return (sortDir==="asc"?1:-1)*va.localeCompare(vb,"fr",{sensitivity:"base"}); });
  const HeaderCell = ({col,label}) => {
    const w = colWidths[col] || 100;
    const startResize = (e) => {
      e.preventDefault();
      e.stopPropagation();
      const sx = e.clientX, sw = w;
      const mm = ev => saveWidths({ ...colWidths, [col]: Math.max(55, sw + ev.clientX - sx) });
      const mu = () => { document.removeEventListener("mousemove", mm); document.removeEventListener("mouseup", mu); };
      document.addEventListener("mousemove", mm); document.addEventListener("mouseup", mu);
    };
    return <div onClick={()=>handleSort(col)} style={{ position:"relative", width:w, minWidth:w, maxWidth:w, padding:"0 6px", fontSize:9, fontWeight:700, color:"white", fontFamily:"'Lora',serif", cursor:"pointer", userSelect:"none", display:"flex", alignItems:"center", gap:3, whiteSpace:"nowrap", boxSizing:"border-box" }}>{label}{si(col)}<span onMouseDown={startResize} style={{ position:"absolute", right:0, top:0, bottom:0, width:6, cursor:"col-resize", userSelect:"none" }} /></div>;
  };


  const QuickCapture = () => quickOpen ? <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", zIndex:5000, display:"flex", alignItems:"center", justifyContent:"center" }} onMouseDown={e=>{ if(e.target===e.currentTarget) setQuickOpen(false); }}>
    <div style={{ background:"white", borderRadius:16, width:520, maxWidth:"92vw", boxShadow:"0 24px 64px rgba(0,0,0,0.18)", borderTop:"4px solid #102A63" }}>
      <div style={{ padding:"16px 20px 12px", borderBottom:"1px solid #F0F0F0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:700, color:"#102A63", letterSpacing:"0.06em" }}>CAPTURE RAPIDE</span>
        <button onClick={()=>setQuickOpen(false)} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#999" }}>×</button>
      </div>
      <div style={{ padding:20, display:"flex", flexDirection:"column", gap:12 }}>
        <div style={{ display:"flex", gap:12 }}>
          <input id="qc-name" placeholder="Nom du client" style={{ ...S.input, flex:2 }} />
          <input id="qc-code" placeholder="Code" style={{ ...S.input, flex:1 }} />
        </div>
        <div style={{ display:"flex", gap:12 }}>
          <input id="qc-desc" placeholder="Description rapide" style={{ ...S.input, flex:2 }} />
          <input id="qc-date" type="date" defaultValue={today} style={{ ...S.input, flex:1 }} />
        </div>
        <div style={{ display:"flex", gap:12 }}>
          <select id="qc-type" style={{ ...S.input, flex:1 }}>
            <option value="">Type</option>
            {(suiviTypes||[]).map(t=> <option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
          <input id="qc-reminder" type="date" placeholder="Rappel" style={{ ...S.input, flex:1 }} />
        </div>
      </div>
      <div style={{ padding:"0 20px 18px", display:"flex", justifyContent:"flex-end", gap:8 }}>
        <button onClick={()=>setQuickOpen(false)} style={{ ...S.btn("#F0F0F0","#666"), fontSize:10, padding:"7px 14px" }}>Annuler</button>
        <button onClick={()=>{ const name=document.getElementById('qc-name').value.trim(); if(!name) return; const d={ id:Date.now().toString(), clientName:name, clientCode:document.getElementById('qc-code').value.trim(), description:document.getElementById('qc-desc').value.trim(), followupDate:document.getElementById('qc-date').value || today, reminderDate:document.getElementById('qc-reminder').value || '', suiviType:document.getElementById('qc-type').value || '', closed:false }; handleSave(d); setQuickOpen(false); }} style={{ ...S.btn("#102A63"), fontSize:10, padding:"7px 14px" }}>Enregistrer</button>
      </div>
    </div>
  </div> : null;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 56px)", position:"relative" }}>

      <div style={{ background:"white", borderBottom:"1px solid #ECEAE5", padding:"8px 16px", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", flexShrink:0, width:"100%", boxSizing:"border-box" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher un client…" style={{ ...S.input, width:140, minWidth:140, maxWidth:140, fontSize:10, padding:"6px 12px", boxSizing:"border-box", flexShrink:0 }} />
        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", flex:1 }}>
          {["Actifs","Clôturés","Tous"].map(o=><FBtn key={o} label={o} active={filterStatus===o} onClick={()=>setFilterStatus(o)} />)}
          <div style={{ width:1, height:20, background:"#E8E8E8", margin:"0 4px" }} />
          {["Tous",...suiviTypes.map(t=>t.name)].map(o=>{ const st=suiviTypes.find(t=>t.name===o); return <FBtn key={o} label={o} active={filterType===o} onClick={()=>setFilterType(o)} color={st?.color} />; })}
          <div style={{ flex:1 }} />
          <button onClick={()=>setModal({})} style={{ ...S.btn("#102A63"), padding:"5px 14px", fontSize:10 }}>+ Nouveau suivi</button>
        </div>
      </div>
      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
        <QuickCapture />
        <div style={{ width:"52.8%", minWidth:396, display:"flex", flexDirection:"column", borderRight:"1px solid #ECEAE5", background:"white" }}>
          <div style={{ display:"grid", gridTemplateColumns:`34px ${Math.max(70,colWidths.clientName)}px ${Math.max(60,colWidths.clientCode)}px ${Math.max(120,colWidths.description)}px ${Math.max(70,colWidths.suiviType)}px ${Math.max(70,colWidths.followupDate)}px ${Math.max(70,colWidths.reminderDate)}px ${Math.max(40,colWidths.actions)}px`, alignItems:"center", padding:"6px 12px", background:"#102A63", gap:0, flexShrink:0, minWidth:"max-content" }}>
            <div></div>
            <HeaderCell col="clientName" label="NOM CLIENT" />
            <HeaderCell col="clientCode" label="CODE" />
            <HeaderCell col="description" label="DESCRIPTION" />
            <HeaderCell col="suiviType" label="TYPE" />
            <HeaderCell col="followupDate" label="SUIVI" />
            <HeaderCell col="reminderDate" label="RAPPEL" />
            <div style={{ width:colWidths.actions }} />
          </div>
          <div style={{ flex:1, overflowY:"auto" }}>
            {filtered.length===0 ? <div style={{ textAlign:"center", padding:"40px 0", color:"#CCC", fontFamily:"'Lora',serif", fontSize:13 }}>{clients.length===0 ? "Aucun client — cliquez sur « + Nouveau client »" : "Aucun résultat"}</div> : filtered.map((c,i)=>{
              const active=selected?.id===c.id;
              const st=suiviTypes.find(t=>t.id===c.suiviType);
              const pastReminder=c.reminderDate && c.reminderDate<today;
              return <div key={c.id} onClick={()=>setSelected(c)} style={{ display:"grid", gridTemplateColumns:`34px ${Math.max(70,colWidths.clientName)}px ${Math.max(60,colWidths.clientCode)}px ${Math.max(120,colWidths.description)}px ${Math.max(70,colWidths.suiviType)}px ${Math.max(70,colWidths.followupDate)}px ${Math.max(70,colWidths.reminderDate)}px ${Math.max(40,colWidths.actions)}px`, alignItems:"center", padding:"8px 12px", borderBottom:"1px solid #F5F5F5", background:active?"#EEF4FF":i%2===0?"white":"#FAFAFA", cursor:"pointer", borderLeft:active?"3px solid #102A63":"3px solid transparent", opacity:c.closed?0.55:1, transition:"background 0.12s", minWidth:"max-content" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <button onClick={e=>{e.stopPropagation(); const next=clients.map(x=>x.id===c.id?{...x, closed:!x.closed}:x); saveClients(next); if(selected?.id===c.id) setSelected({...c, closed:!c.closed}); }} style={{ width:14, height:14, borderRadius:"50%", border:`2px solid ${c.closed ? "#27AE60" : "#BDC3C7"}`, background:c.closed ? "#27AE60" : "white", cursor:"pointer", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, color:"white", padding:0, lineHeight:1 }}>✓</button>
                </div>
                <div style={{ fontSize:10, fontWeight:600, color:"#2C3E50", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", paddingRight:6, boxSizing:"border-box" }}>{c.clientName||"—"}</div>
                <div style={{ fontFamily:"'DM Mono',monospace", color:"#6B7280", fontSize:10, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", paddingRight:6, boxSizing:"border-box" }}>{c.clientCode||"—"}</div>

                <div style={{ display:"flex", gap:3, justifyContent:"flex-end", flexShrink:0 }}>
                  <button onClick={e=>{e.stopPropagation();setModal(c);}} title="Modifier" style={{ background:"none", border:"none", cursor:"pointer", fontSize:12, opacity:0.5, color:"#102A63" }}>✎</button>
                  <button onClick={e=>{e.stopPropagation();handleDelete(c.id);}} title="Supprimer" style={{ background:"none", border:"none", cursor:"pointer", fontSize:12, color:"#E74C3C", opacity:0.5 }}>×</button>
                </div>
              </div>
            })}

          <div style={{ padding:"5px 12px", borderTop:"1px solid #F0F0F0", background:"#F8F9FB", fontSize:10, fontFamily:"'DM Mono',monospace", color:"#AAA" }}>{filtered.length} client{filtered.length!==1?"s":""}</div>
        </div>
        <div style={{ flex:1, display:"flex", flexDirection:"column", background:"#F7F8FC" }}>
          {selected ? <>
            <div style={{ padding:"12px 20px", borderBottom:"1px solid #ECEAE5", background:"white", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontSize:13, fontWeight:700, fontFamily:"'Lora',serif", color:"#102A63", display:"flex", alignItems:"center", gap:8 }}>{selected.clientName}{selected.closed && <span style={{ fontSize:10, background:"#F0F0F0", color:"#888", borderRadius:4, padding:"2px 7px", fontFamily:"'DM Mono',monospace" }}>Clôturé</span>}</div>
<div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:"#AAA", marginTop:2 }}>{selected.clientCode}{selected.followupDate ? ` · Suivi : ${selected.followupDate.split("-").reverse().join("/")}` : ""}{selected.reminderDate ? ` · Rappel : ${selected.reminderDate.split("-").reverse().join("/")}` : ""}</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}><div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:"#27AE60", opacity:0.8 }}>✓ Auto-sauvegarde</div><button onClick={()=>{ const subject = encodeURIComponent(`Suivi client - ${selected.clientName}`); const body = encodeURIComponent((notes[selected.id]||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim()); window.location.href = `mailto:?subject=${subject}&body=${body}`; }} style={{ border:"1px solid #E0E0E0", background:"white", color:"#102A63", borderRadius:20, padding:"4px 10px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:10 }}>✉ Envoyer par mail</button></div>
            </div>
            <div style={{ flex:1, padding:16, overflow:"auto" }}>

                value={notes[selected.id]||(selected.notes||"")}
                onChange={v=>saveNote(selected.id, v)}
                placeholder="Saisir vos notes de suivi… (mise en forme disponible)"
                rows={12} showAi={!!(settings?.groqKey)} groqKey={settings?.groqKey||""} />
              {/* Sous-tâches */}
              {(() => {
                const ss=[{id:"todo",name:"À faire",color:"#888",bg:"#F0F0F0"},{id:"inprogress",name:"En cours",color:"#1D4ED8",bg:"#DBEAFE"},{id:"waiting",name:"En attente",color:"#A16207",bg:"#FEF9C3"},{id:"blocked",name:"Bloqué",color:"#B91C1C",bg:"#FEE2E2"},{id:"done",name:"Fait",color:"#065F46",bg:"#D1FAE5"},{id:"cancelled",name:"Annulé",color:"#92400E",bg:"#F5E6DC"}];
                const subtasks = selected.subtasks||[];
                const done = subtasks.filter(s=>s.completed).length;
                const saveClient = (updated) => { const list = clients.map(c=>c.id===updated.id?updated:c); saveClients(list); setSelected(updated); };
                const updSubs = subs => saveClient({...selected, subtasks:subs});
                const addSub  = () => updSubs([...subtasks,{id:String(Date.now()),text:"",status:"todo",completed:false}]);
                const updSub  = s  => updSubs(subtasks.map(x=>x.id===s.id?s:x));
                const delSub  = id => updSubs(subtasks.filter(x=>x.id!==id));

                    </div>

                          <button onClick={()=>delSub(sub.id)} style={{ border:"none",background:"none",color:"#E8A0A0",cursor:"pointer",fontSize:14,padding:"0 2px",flexShrink:0 }}>×</button>
                        </div>
                      );
                    })}
                    <button onClick={addSub} style={{ marginTop:8,background:"none",border:"none",padding:"4px 0",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif",color:"#BBBBBB",display:"flex",alignItems:"center",gap:5 }}>
                      <span style={{ fontSize:16,lineHeight:1 }}>+</span> Ajouter une sous-tâche
                    </button>
                  </div>
                );
              })()}
              {/* Pièces jointes */}

/* ─── TASKS2 (Cotation) - données indépendantes ─── */
const TASKS2_KEY          = "taskmanager_tasks2_v1";
const TASKS2_COL_KEY      = "taskmanager_tasks2_colwidths";
const TASKS2_DEFAULT_COLS = { clientName:200, clientCode:75, requestDate:85, requester:95, status:90, authorizedAmount:95, need:95, obtainedAmount:95, label:108, closeDate:85 };

const T2_STATUSES = [
  { id:"todo",       label:"À faire",    bg:"#F0F0F0", color:"#666"    },
  { id:"inprogress", label:"En cours",   bg:"#FEF9C3", color:"#B45309" },
  { id:"waiting",    label:"En attente", bg:"#DBEAFE", color:"#1D4ED8" },
  { id:"blocked",    label:"Bloqué",     bg:"#FEE2E2", color:"#DC2626" },
  { id:"refused",    label:"Refusé",     bg:"#F3F4F6", color:"#9CA3AF" },

const T2_LABELS = [

  { id:"allianz",    label:"Allianz",     bg:"#FEF3C7", color:"#92400E" },
];
const T2_PRIOS = [
  { id:"urgent", label:"⊛ P1", rank:0, color:"#C0392B" },
  { id:"high",   label:"▲ P2", rank:1, color:"#E67E22" },

  { id:"low",    label:"▼ P4", rank:3, color:"#27AE60" },
];

function loadTasks2()   { try { const s=localStorage.getItem(TASKS2_KEY);    return s?JSON.parse(s):[]; } catch { return []; } }
function saveTasks2(d)  { try { localStorage.setItem(TASKS2_KEY, JSON.stringify(d)); } catch {} }

function fmtT2Eur(v) {
  if (v===""||v===null||v===undefined) return "—";
  const n=parseFloat(String(v).replace(/[\s\u00A0]/g,"").replace(",","."));
  if (isNaN(n)) return "—";
  return n.toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0})+" €";
}

function Tasks2Modal({ item, onSave, onClose }) {

      requester:"", status:"todo", authorizedAmount:"", need:"", obtainedAmount:"",
      label:"toassign", closeDate:"", notes:"", ...item };

    return base;
  });
  const set = (k,v) => setD(p=>({...p,[k]:v}));

  const updPmt   = (id,k,v) => setD(p=>({...p,paiements:(p.paiements||[]).map(r=>r.id===id?{...r,[k]:v}:r)}));
  const delPmt   = (id) => setD(p=>({...p,paiements:(p.paiements||[]).filter(r=>r.id!==id)}));
  const fmtTotal = (pmts) => { const t=(pmts||[]).reduce((a,r)=>a+(parseFloat(r.montant)||0),0); return t>0?t.toLocaleString("fr-FR",{minimumFractionDigits:0})+" €":"—"; };
  const fmtNum = (v) => { const n=parseInt(String(v||"").replace(/[^0-9]/g,"")); return isNaN(n)?"":n.toLocaleString("fr-FR"); };

          <div style={{ display:"flex", gap:6, alignItems:"center" }}>

/* ── Tasks2View : même architecture que TasksView, colonnes cotation ── */
function Tasks2View({ fullscreen, onToggleFullscreen }) {
  const isMobile = useIsMobile();
  const [items, setItems]           = React.useState(()=>loadTasks2());
  const [modal, setModal]           = React.useState(null);
  const [search, setSearch]         = React.useState("");
  const [filterStatus, setFilterStatus] = React.useState("Tous");
  const [filterLabel,  setFilterLabel]  = React.useState("Toutes");
  const [sortCol,  setSortCol]  = React.useState(null);
  const [sortDir,  setSortDir]  = React.useState("asc");
  const [colWidths, setColWidths] = React.useState(()=>{
    try { const s=localStorage.getItem(TASKS2_COL_KEY); return s?{...TASKS2_DEFAULT_COLS,...JSON.parse(s)}:TASKS2_DEFAULT_COLS; } catch { return TASKS2_DEFAULT_COLS; }
  });

  const saveData = (list) => { setItems(list); saveTasks2(list); };
  const handleSave = (d) => {
    const list = d.id ? items.map(c=>c.id===d.id?d:c) : [...items,{...d,id:Date.now().toString()}];
    saveData(list); setModal(null);
  };
  const [deletedItem, setDeletedItem] = React.useState(null);
  const [deleteTimer, setDeleteTimer] = React.useState(null);
  const handleDelete = (id) => {
    const found = items.find(c=>c.id===id);
    if (!found) return;
    const newList = items.filter(c=>c.id!==id);
    saveData(newList);
    setDeletedItem(found);
    if (deleteTimer) clearTimeout(deleteTimer);
    setDeleteTimer(setTimeout(()=>setDeletedItem(null), 5000));
  };
  const handleUndo = () => {
    if (!deletedItem) return;
    saveData([...items, deletedItem]);
    setDeletedItem(null);
    if (deleteTimer) clearTimeout(deleteTimer);
  };

  const startResize = (col, e) => {
    e.preventDefault();
    const startX=e.clientX, startW=colWidths[col];
    const onMove = ev => {
      const nw=Math.max(40,startW+ev.clientX-startX);
      setColWidths(w=>({...w,[col]:nw}));
      localStorage.setItem(TASKS2_COL_KEY,JSON.stringify({...colWidths,[col]:nw}));
    };
    const onUp=()=>{ document.removeEventListener("mousemove",onMove); document.removeEventListener("mouseup",onUp); };
    document.addEventListener("mousemove",onMove); document.addEventListener("mouseup",onUp);
  };

  const handleSort = col => { if(sortCol===col){ setSortDir(d=>d==="asc"?"desc":"asc"); } else { setSortCol(col); setSortDir("asc"); }};
  const si = col => sortCol===col?(sortDir==="asc"?" ▲":" ▼"):"";

  const FBtn = ({label,active,onClick,color}) => (
    <button onClick={onClick} style={{ border:`1px solid ${active?color||"#102A63":"#E0E0E0"}`,
      background:active?color||"#102A63":"white", color:active?"white":"#666",
      borderRadius:20, padding:"3px 12px", cursor:"pointer",
      fontFamily:"'Lora',serif", fontSize:10, fontWeight:active?700:400, flexShrink:0 }}>{label}</button>
  );

  const ColHeader = ({label, col, right, center}) => (
    <div style={{ display:"flex", alignItems:"center", height:"100%", flexShrink:0, width:col?colWidths[col]:undefined,
      cursor:col?"pointer":"default", userSelect:"none", justifyContent:right?"flex-end":center?"center":"flex-start",
      position:"relative" }} onClick={()=>col&&handleSort(col)}>
      <span style={{ fontSize:10, fontWeight:700, color:"white",
        fontFamily:"'Lora',serif", whiteSpace:"nowrap" }}>{label}{si(col)}</span>
      {col && <div onMouseDown={e=>startResize(col,e)}
        style={{ position:"absolute", right:-4, top:0, bottom:0, width:8, cursor:"col-resize", zIndex:5 }} />}
    </div>
  );

  const displayed = items
    .filter(c => filterStatus==="Tous" || (filterStatus==="En cours" ? !["done","refused"].includes(c.status) : T2_STATUSES.find(s=>s.label===filterStatus)?.id===c.status))
    .filter(c => filterLabel==="Toutes" || T2_LABELS.find(l=>l.label===filterLabel)?.id===c.label)
    .filter(c => !search || [c.clientName,c.clientCode,c.requester].some(v=>(v||"").toLowerCase().includes(search.toLowerCase())))
    .sort((a,b) => {
      if (!sortCol) {
        return (T2_PRIOS.find(p=>p.id===a.priority)?.rank??2)-(T2_PRIOS.find(p=>p.id===b.priority)?.rank??2);
      }
      let va=a[sortCol]||"", vb=b[sortCol]||"";
      if(["authorizedAmount","need","obtainedAmount"].includes(sortCol)){
        va=parseFloat(String(va).replace(",","."))||0; vb=parseFloat(String(vb).replace(",","."))||0;
      }
      const cmp=va.toString().localeCompare(vb.toString(),"fr",{sensitivity:"base"});
      return sortDir==="asc"?cmp:-cmp;
    });

  const totAuth = displayed.reduce((s,c)=>s+(parseFloat(String(c.authorizedAmount||0).replace(",","."))||0),0);
  const totNeed = displayed.reduce((s,c)=>s+(parseFloat(String(c.need||0).replace(",","."))||0),0);
  const totObt  = displayed.reduce((s,c)=>s+(parseFloat(String(c.obtainedAmount||0).replace(",","."))||0),0);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:fullscreen?"calc(100vh - 56px)":"auto" }}>

      {/* ── Toolbar identique TasksView ── */}
      <div style={{ background:"white", borderBottom:"1px solid #ECEAE5", padding:isMobile?"8px 10px":"7px 12px",
        display:"flex", gap:isMobile?6:8, flexWrap:"wrap", alignItems:"center", flexShrink:0 }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher…"
          className="search-input-small" style={{ ...S.input, width:isMobile?110:140, padding:"4px 8px", fontSize:10 }} />
        <div style={{ width:1, height:20, background:"#E8E8E8", flexShrink:0 }} />
        {["Tous","En cours","À faire","En attente","Bloqué","Refusé","Fait"].map(o=>(
          <FBtn key={o} label={o} active={filterStatus===o} onClick={()=>setFilterStatus(o)} />
        ))}
        {!isMobile && <>
          <div style={{ width:1, height:20, background:"#E8E8E8", flexShrink:0 }} />
          {["Toutes",...T2_LABELS.map(l=>l.label)].map(o=>{
            const lb=T2_LABELS.find(l=>l.label===o);
            return <FBtn key={o} label={o} active={filterLabel===o} onClick={()=>setFilterLabel(o)} color={lb?.color} />;
          })}
        </>}
        <div style={{ flex:1 }} />
        {!isMobile && <>
          <button onClick={()=>{setColWidths(TASKS2_DEFAULT_COLS);localStorage.removeItem(TASKS2_COL_KEY);}}
            title="Réinitialiser colonnes"
            style={{ border:"1px solid #E0E0E0", background:"white", color:"#AAA", borderRadius:5,
              padding:"3px 9px", fontSize:10, cursor:"pointer", fontFamily:"'DM Mono',monospace" }}>↺</button>
          
        </>}
        <button onClick={()=>setModal({})} style={{ ...S.btn("#102A63"), padding:"5px 14px", fontSize:11 }}>+ Nouvelle</button>
      </div>

      {/* ── Sous-titre ── */}
      <div style={{ padding:"6px 48px 2px", background:"#F7F6F3", borderBottom:"1px solid #ECEAE5", display:"flex", gap:12, alignItems:"center" }}>
        <span style={{ fontSize:11, color:"#999", fontFamily:"'DM Mono',monospace" }}>
          {displayed.length} demande{displayed.length!==1?"s":""} · {items.filter(c=>!["done","refused"].includes(c.status)).length} en cours
        </span>
      </div>

      {/* ── Tableau ── */}
