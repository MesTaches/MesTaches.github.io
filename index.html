<script>
const _fbApp = firebase.initializeApp({

});
const _db = firebase.firestore();
const _auth = firebase.auth();

const SYNC_KEYS = ["taskmanager_v4", "taskmanager_settings_v1", "taskmanager_meetings_v1"];
let _uid = null;
let _debounce = {};
let _reactMounted = false;
let _remoteCheckInterval = null;
// Timestamp of the LAST time THIS device wrote to Firestore
// Remote check only reloads if Firestore ts > this value + 10s buffer
let _myLastWriteTs = 0;

const _origSetItem = Storage.prototype.setItem;
const _origGetItem = Storage.prototype.getItem;
const _origRemoveItem = Storage.prototype.removeItem;

Storage.prototype.setItem = function(key, value) {
  _origSetItem.call(this, key, value);
  if (this === window.localStorage && _uid && SYNC_KEYS.includes(key)) {
    clearTimeout(_debounce[key]);
    _debounce[key] = setTimeout(() => {
      const ts = Date.now();
      _myLastWriteTs = ts; // Record when WE wrote
      const docKey = key.replace(/[^a-zA-Z0-9_]/g, '_');
      _db.collection('users').doc(_uid).collection('ls').doc(docKey)
        .set({ value: value, ts: ts })
        .catch(e => console.error('Firestore save error:', e));
    }, 1000);
  }
};

function showScreen(id) {
  document.querySelectorAll('.fb-screen').forEach(el => el.style.display = 'none');
  const el = document.getElementById(id);
  if (el) el.style.display = 'flex';
}

function mountReact() {
  showScreen('fb-app');
  _reactMounted = true;
  if (window._doMount) window._doMount();
  else window._pendingMount = true;
}

// Check for remote changes every 10s
// Only reload if the remote timestamp is significantly newer than our last write
function startRemoteCheck(uid) {
  if (_remoteCheckInterval) clearInterval(_remoteCheckInterval);
  _remoteCheckInterval = setInterval(async () => {
    if (!_reactMounted || !_uid) return;
    try {
      const key = 'taskmanager_v4';
      const docKey = key.replace(/[^a-zA-Z0-9_]/g, '_');
      const snap = await _db.collection('users').doc(uid).collection('ls').doc(docKey).get();
      if (snap.exists && snap.data() && snap.data().ts) {
        const remoteTs = snap.data().ts;
        const now = Date.now();
        // Only reload if:
        // - remote is newer than our last write by more than 15 seconds
        // - remote is not from the future (sanity check)
        if (remoteTs > _myLastWriteTs + 15000 && remoteTs <= now + 5000) {
          const localVal = _origGetItem.call(localStorage, key);
          const remoteVal = snap.data().value;
          if (localVal !== remoteVal) {
            console.log('Remote change from another device - reloading');
            window.location.reload();
          }
        }
      }
    } catch(e) {}
  }, 10000);
}

async function loadAndMount(uid) {
  _uid = uid;
  _myLastWriteTs = Date.now(); // Treat load as a "write" to avoid immediate reload
  showScreen('fb-loading');
  try {
    for (const key of SYNC_KEYS) {
      const docKey = key.replace(/[^a-zA-Z0-9_]/g, '_');
      const snap = await _db.collection('users').doc(uid).collection('ls').doc(docKey).get();
      if (snap.exists && snap.data() && snap.data().value) {
        _origSetItem.call(localStorage, key, snap.data().value);
      }
    }
  } catch(e) { console.warn('Load error:', e); }
  startRemoteCheck(uid);
  mountReact();
}

_auth.onAuthStateChanged(user => {
  if (user) {
    loadAndMount(user.uid);
  } else {
    _uid = null;
    _reactMounted = false;
    if (_remoteCheckInterval) clearInterval(_remoteCheckInterval);
    SYNC_KEYS.forEach(k => _origRemoveItem.call(localStorage, k));
    showScreen('fb-login');
    document.getElementById('root').innerHTML = '';
  }
});

async function fbSubmit(isRegister) {
  const email = document.getElementById('fb-email').value;
  const password = document.getElementById('fb-password').value;
  const btn = document.getElementById('fb-btn');
  btn.disabled = true; btn.textContent = '⟳ Connexion…';
  document.getElementById('fb-error').style.display = 'none';
  try {
    if (isRegister) await _auth.createUserWithEmailAndPassword(email, password);
    else await _auth.signInWithEmailAndPassword(email, password);
  } catch(err) {
    const msgs = {
      'auth/user-not-found':'Aucun compte avec cet email.',
      'auth/wrong-password':'Mot de passe incorrect.',
      'auth/email-already-in-use':'Cet email est déjà utilisé.',
      'auth/weak-password':'Mot de passe trop court (6 caractères min).',
      'auth/invalid-email':'Adresse email invalide.',
      'auth/invalid-credential':'Email ou mot de passe incorrect.',
    };
    document.getElementById('fb-error').textContent = msgs[err.code] || err.message;
    document.getElementById('fb-error').style.display = 'block';
    btn.disabled = false;
    btn.textContent = isRegister ? '✦ Créer mon compte' : '→ Se connecter';
  }
}

let _fbIsRegister = false;
function toggleMode() {
  _fbIsRegister = !_fbIsRegister;
  document.getElementById('fb-btn').textContent = _fbIsRegister ? '✦ Créer mon compte' : '→ Se connecter';
  document.getElementById('fb-btn').onclick = () => fbSubmit(_fbIsRegister);
  document.getElementById('fb-toggle').textContent = _fbIsRegister ? "J'ai déjà un compte → Se connecter" : "Pas encore de compte → S'inscrire";
  document.getElementById('fb-title').textContent = _fbIsRegister ? 'CRÉER UN COMPTE' : 'CONNEXION';
}

async function fbLogout() {
  if (!window._logoutConfirm) {
    window._logoutConfirm = true;
    const btn = document.getElementById('fb-logout-btn');
    if (btn) { btn.style.background='#B91C1C'; btn.textContent='⚠ Confirmer ?'; }
    setTimeout(() => {
      window._logoutConfirm = false;
      const b = document.getElementById('fb-logout-btn');
      if (b) { b.style.background='#102A63'; b.textContent='⏻ Déconnexion'; }
    }, 3000);
  } else {
    await _auth.signOut();
  }
}

function useIsMobile() {
  const [m, setM] = useState(() => window.innerWidth < 640);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 640);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return m;
}

function loadSettings() {
  try {
    const s = localStorage.getItem(SETTINGS_KEY);
    if (!s) return DEFAULT_SETTINGS;
    const parsed = JSON.parse(s);
    return {
      categories: parsed.categories || DEFAULT_SETTINGS.categories,
      types: parsed.types || DEFAULT_SETTINGS.types,
      statuses: parsed.statuses || DEFAULT_SETTINGS.statuses,
      hiddenTabs: parsed.hiddenTabs || [],
    };
  } catch { return DEFAULT_SETTINGS; }
}
function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch {}
}

function Toast({ notifs, onDismiss }) {
  if (!notifs.length) return null;
  return (
    <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 9999, display: "flex", flexDirection: "column", gap: 8, maxWidth: 340 }}>

      ))}

function UndoBanner({ task, onUndo, onDismiss }) {
  useEffect(() => {

    return () => clearTimeout(t);
  }, [task]);
  if (!task) return null;
  return (
    <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 9998, background: "#2C3E50", color: "white", borderRadius: 12, padding: "12px 20px", boxShadow: "0 8px 24px rgba(0,0,0,0.25)", display: "flex", alignItems: "center", gap: 16, fontFamily: "'DM Mono',monospace", fontSize: 12, animation: "slideUp 0.3s ease" }}>

/* ─── 7) STOPWATCH WIDGET ─── */
function StopwatchWidget({ task, onStop, onClose }) {
  const [running, setRunning] = useState(true);
  const [elapsed, setElapsed] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    if (running) ref.current = setInterval(() => setElapsed(e => e + 1), 1000);
    else clearInterval(ref.current);
    return () => clearInterval(ref.current);
  }, [running]);
  const handleStop = () => { clearInterval(ref.current); onStop(elapsed); };
  return (
    <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 9000, background: "white", borderRadius: 14, boxShadow: "0 8px 32px rgba(0,0,0,0.18)", padding: "14px 18px", minWidth: 240, border: "2px solid #102A63" }}>

        <button onClick={onClose} style={{ border: "none", background: "none", cursor: "pointer", color: "#BDC3C7", fontSize: 16 }}>×</button>
      </div>
      <div style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 10, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{task.title}</div>
      <div style={{ fontSize: 32, fontWeight: 700, fontFamily: "'DM Mono',monospace", color: "#102A63", textAlign: "center", marginBottom: 12 }}>{fmtTime(elapsed)}</div>
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={() => setRunning(r => !r)} style={{ ...S.btn(running ? "#E67E22" : "#27AE60"), flex: 1, padding: "7px 0", fontSize: 11 }}>{running ? "⏸ Pause" : "▶ Reprendre"}</button>
        <button onClick={handleStop} style={{ ...S.btn("#C0392B"), flex: 1, padding: "7px 0", fontSize: 11 }}>⏹ Arrêter</button>
      </div>
      {task.totalTime > 0 && (
        <div style={{ marginTop: 8, fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace", textAlign: "center" }}>Temps cumulé : {fmtTime(task.totalTime)}</div>
      )}
    </div>
  );
}

/* ─── RICH TEXT AREA (4: checklist + text color) ─── */
function RichTextArea({ value, onChange, placeholder, rows = 5 }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current && ref.current.innerHTML !== (value || "")) ref.current.innerHTML = value || ""; }, []);
  const exec = (cmd, val = null) => { ref.current.focus(); document.execCommand(cmd, false, val); onChange(ref.current.innerHTML); };
  const insertChecklist = () => {
    ref.current.focus();
    document.execCommand("insertHTML", false, '<ul style="list-style:none;padding-left:0"><li><input type="checkbox"> </li></ul>');
    onChange(ref.current.innerHTML);
  };
  const ToolBtn = ({ cmd, label, title, val }) => (
    <button type="button" onMouseDown={(e) => { e.preventDefault(); exec(cmd, val); }} title={title}
      style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 4, padding: "2px 7px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#555", lineHeight: 1.5, minWidth: 24 }}>{label}</button>
  );
  return (
    <div style={{ border: "1px solid #E8E8E8", borderRadius: 8, overflow: "hidden", background: "#FAFAFA" }}>
      <div style={{ display: "flex", gap: 4, padding: "5px 8px", borderBottom: "1px solid #F0F0F0", background: "white", flexWrap: "wrap", alignItems: "center" }}>
        <ToolBtn cmd="bold"   label={<strong>G</strong>} title="Gras" />
        <ToolBtn cmd="underline" label={<u>S</u>} title="Souligner" />
        <ToolBtn cmd="italic" label={<em>I</em>} title="Italique" />
        <div style={{ width: 1, height: 16, background: "#E8E8E8", margin: "0 2px" }} />
        <ToolBtn cmd="insertUnorderedList" label="• Liste" title="Liste à puces" />
        <button type="button" onMouseDown={(e) => { e.preventDefault(); insertChecklist(); }} title="Check-list"
          style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 4, padding: "2px 7px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#555", lineHeight: 1.5 }}>☑ Check</button>
        <ToolBtn cmd="indent"  label="→" title="Retrait" />
        <ToolBtn cmd="outdent" label="←" title="Ôter retrait" />
        <div style={{ width: 1, height: 16, background: "#E8E8E8", margin: "0 2px" }} />
        {/* 4) text color */}
        {["#C0392B","#2980B9","#27AE60","#E67E22","#8E44AD","#2C3E50"].map(c => (
          <button key={c} type="button" onMouseDown={(e) => { e.preventDefault(); exec("foreColor", c); }} title={c}
            style={{ width: 16, height: 16, background: c, border: "1px solid #E0E0E0", borderRadius: 3, cursor: "pointer", padding: 0, flexShrink: 0 }} />
        ))}
        <button type="button" onMouseDown={(e) => { e.preventDefault(); exec("foreColor", "#2C3E50"); }} title="Couleur normale"
          style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 4, padding: "2px 5px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#555" }}>A</button>
      </div>
      <div ref={ref} contentEditable suppressContentEditableWarning
        onInput={(e) => onChange(e.currentTarget.innerHTML)}
        data-placeholder={placeholder}
        style={{ minHeight: rows * 22, padding: "8px 12px", fontSize: 13, fontFamily: "'Lora',serif", color: "#2C3E50", outline: "none", lineHeight: 1.7 }} />
      <style>{`[contenteditable]:empty:before{content:attr(data-placeholder);color:#BDC3C7;pointer-events:none;font-style:italic}`}</style>
    </div>
  );
}

/* ─── 10) AI ASSISTANT POPOVER ─── */
function AIAssistant({ text, onApply, onClose }) {
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState("correct");
  const run = async () => {
    setLoading(true); setResult("");
    const stripped = text ? text.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim() : "";
    const prompts = {
      correct:   `Corrige les fautes d'orthographe et de grammaire du texte suivant en conservant exactement le sens et le style. Renvoie uniquement le texte corrigé, sans commentaire ni explication :\n\n${stripped}`,
      rephrase:  `Reformule le texte suivant de façon plus claire et professionnelle. Renvoie uniquement le texte reformulé, sans commentaire ni explication :\n\n${stripped}`,
      summarize: `Résume le texte suivant en 2-3 phrases. Renvoie uniquement le résumé, sans commentaire ni explication :\n\n${stripped}`,
      bullets:   `Transforme le texte suivant en une liste à puces concise. Renvoie uniquement la liste, sans commentaire ni explication :\n\n${stripped}`,
    };
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompts[mode] }],
        }),
      });
      if (!resp.ok) { const err = await resp.json().catch(() => ({})); setResult(`Erreur API (${resp.status}) : ${err?.error?.message || "inconnue"}`); setLoading(false); return; }
      const data = await resp.json();
      setResult(data.content?.map((c) => c.text || "").join("") || "Erreur : réponse vide.");
    } catch (e) { setResult(`Erreur de connexion : ${e.message}`); }
    setLoading(false);
  };
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 4000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, backdropFilter: "blur(3px)", background: "rgba(0,0,0,0.3)" }} onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div style={{ background: "white", borderRadius: 14, width: "100%", maxWidth: 520, boxShadow: "0 20px 60px rgba(0,0,0,0.2)", overflow: "hidden", borderTop: "4px solid #102A63" }}>
        <div style={{ padding: "16px 20px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>🤖 Assistant IA</div>
            <button onClick={onClose} style={{ border: "none", background: "none", fontSize: 20, cursor: "pointer", color: "#BDC3C7" }}>×</button>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
            {[{ v: "correct", l: "✓ Corriger" }, { v: "rephrase", l: "↺ Reformuler" }, { v: "summarize", l: "◎ Résumer" }, { v: "bullets", l: "• Lister" }].map(o => (
              <button key={o.v} onClick={() => setMode(o.v)} style={{ border: `1px solid ${mode === o.v ? "#102A63" : "#E0E0E0"}`, background: mode === o.v ? "#102A63" : "white", color: mode === o.v ? "white" : "#666", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>{o.l}</button>
            ))}
          </div>
          <div style={{ background: "#F8F8F6", borderRadius: 8, padding: "10px 12px", fontSize: 12, fontFamily: "'Lora',serif", color: "#888", marginBottom: 10, maxHeight: 80, overflowY: "auto" }}>
            <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#AAA", marginBottom: 4 }}>TEXTE ORIGINAL</div>
            <div dangerouslySetInnerHTML={{ __html: text || "(vide)" }} style={{ lineHeight: 1.5 }} />
          </div>
          <button onClick={run} disabled={!text || loading} style={{ ...S.btn(text && !loading ? "#102A63" : "#CCC"), width: "100%", padding: "9px 0", fontSize: 12, marginBottom: 10 }}>
            {loading ? "⟳ Traitement en cours…" : "✨ Lancer"}
          </button>
          {result && (
            <div>
              <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#AAA", marginBottom: 4 }}>RÉSULTAT</div>
              <div style={{ background: "#F0F5FF", borderRadius: 8, padding: "10px 12px", fontSize: 13, fontFamily: "'Lora',serif", color: "#2C3E50", lineHeight: 1.6, whiteSpace: "pre-wrap", maxHeight: 160, overflowY: "auto", border: "1px solid #C7D2FE" }}>{result}</div>
            </div>
          )}
        </div>
        <div style={{ padding: "12px 20px", borderTop: "1px solid #F0F0F0", display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <button onClick={onClose} style={{ ...S.btn("#F0F0F0", "#666"), fontSize: 11, padding: "6px 12px" }}>Fermer</button>
          {result && <button onClick={() => { onApply(result); onClose(); }} style={{ ...S.btn("#27AE60"), fontSize: 11, padding: "6px 12px" }}>✓ Appliquer</button>}
        </div>
      </div>
    </div>
  );
}

/* ─── 3) RECURRENCE MODULE (Outlook-style) ─── */
// recurrence stored as object: { type, interval, weekDays, monthDay, monthWeek, monthWeekDay, endType, endCount, endDate }
// or "none" string for no recurrence

function parseRec(v) {
  if (!v || v === "none") return { type: "none" };
  if (typeof v === "string") return { type: v, interval: 1 }; // legacy
  return v;
}
function recLabel(v) {
  const r = parseRec(v);
  if (r.type === "none") return null;
  const types = { daily: "Quotidienne", weekly: "Hebdomadaire", monthly: "Mensuelle", yearly: "Annuelle" };
  const base = types[r.type] || r.type;
  const intv = r.interval > 1 ? ` (tous les ${r.interval} ${r.type === "daily" ? "jours" : r.type === "weekly" ? "semaines" : r.type === "monthly" ? "mois" : "ans"})` : "";
  return `🔄 ${base}${intv}`;
}

const WEEK_DAYS = [
  { v: 1, l: "Lun" }, { v: 2, l: "Mar" }, { v: 3, l: "Mer" },
  { v: 4, l: "Jeu" }, { v: 5, l: "Ven" }, { v: 6, l: "Sam" }, { v: 0, l: "Dim" },
];
const MONTH_WEEKS = [
  { v: 1, l: "1ère" }, { v: 2, l: "2ème" }, { v: 3, l: "3ème" }, { v: 4, l: "4ème" }, { v: -1, l: "Dernière" },
];

function RecurrenceModule({ value, dueDate, onChange }) {
  const [open, setOpen] = useState(false);
  const [r, setR] = useState(() => parseRec(value));

  // Sync external value
  useEffect(() => { setR(parseRec(value)); }, []);

  const upd = (patch) => { const next = { ...r, ...patch }; setR(next); onChange(next); };

  // Toggle weekday
  const toggleDay = (d) => {
    const days = r.weekDays || [];
    const next = days.includes(d) ? days.filter(x => x !== d) : [...days, d];
    upd({ weekDays: next });
  };

  const label = recLabel(value);

  const SelStyle = { ...S.input, padding: "5px 8px", fontSize: 12, cursor: "pointer", width: "auto" };
  const NumInput = ({ val, onCh, min = 1, max = 99 }) => (
    <input type="number" min={min} max={max} value={val || 1} onChange={e => onCh(Math.max(min, Math.min(max, parseInt(e.target.value) || 1)))}
      style={{ ...S.input, width: 56, padding: "5px 8px", fontSize: 12, textAlign: "center" }} />
  );

  return (
    <div style={{ marginBottom: 10 }}>
      <button type="button" onClick={() => setOpen(o => !o)}
        style={{ ...S.input, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", justifyContent: "space-between", background: open ? "#F0F5FF" : "#FAFAFA", borderColor: open ? "#C7D2FE" : "#E8E8E8" }}>
        <span style={{ color: label ? "#102A63" : "#999", fontSize: 13 }}>{label || "🔄 Récurrence — aucune"}</span>
        <span style={{ fontSize: 10, color: "#AAA" }}>{open ? "▲" : "▼"}</span>
      </button>

      {open && (
        <div style={{ border: "1px solid #E8E8E8", borderTop: "none", borderRadius: "0 0 8px 8px", background: "white", padding: "14px 14px 10px" }}>
          {/* Type */}
          <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
            {[{ v: "none", l: "Aucune" }, { v: "daily", l: "Journalière" }, { v: "weekly", l: "Hebdomadaire" }, { v: "monthly", l: "Mensuelle" }, { v: "yearly", l: "Annuelle" }].map(o => (
              <button key={o.v} type="button" onClick={() => upd({ type: o.v })}
                style={{ border: `1px solid ${r.type === o.v ? "#102A63" : "#E0E0E0"}`, background: r.type === o.v ? "#102A63" : "white", color: r.type === o.v ? "white" : "#666", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>{o.l}</button>
            ))}
          </div>

          {r.type !== "none" && (
            <>
              {/* Interval */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555", whiteSpace: "nowrap" }}>Répéter toutes les</span>
                <NumInput val={r.interval || 1} onCh={v => upd({ interval: v })} />
                <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>
                  {{ daily: "jour(s)", weekly: "semaine(s)", monthly: "mois", yearly: "an(s)" }[r.type]}
                </span>
              </div>

              {/* Weekly: day picker */}
              {r.type === "weekly" && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>JOURS DE LA SEMAINE</div>
                  <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                    {WEEK_DAYS.map(d => {
                      const active = (r.weekDays || []).includes(d.v);
                      return (
                        <button key={d.v} type="button" onClick={() => toggleDay(d.v)}
                          style={{ border: `1px solid ${active ? "#102A63" : "#E0E0E0"}`, background: active ? "#102A63" : "white", color: active ? "white" : "#666", borderRadius: 6, padding: "4px 8px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>{d.l}</button>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Monthly: day of month OR week position */}
              {r.type === "monthly" && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>OCCURRENCE MENSUELLE</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {/* Option 1: day N of month */}
                    <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                      <input type="radio" name="monthMode" checked={r.monthMode !== "weekday"} onChange={() => upd({ monthMode: "day" })} />
                      <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Le jour</span>
                      <NumInput val={r.monthDay || (dueDate ? new Date(dueDate).getDate() : 1)} onCh={v => upd({ monthDay: v, monthMode: "day" })} min={1} max={31} />
                      <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>du mois</span>
                    </label>
                    {/* Option 2: Nth weekday of month */}
                    <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", flexWrap: "wrap" }}>
                      <input type="radio" name="monthMode" checked={r.monthMode === "weekday"} onChange={() => upd({ monthMode: "weekday" })} />
                      <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Le</span>
                      <select value={r.monthWeek || 1} onChange={e => upd({ monthWeek: parseInt(e.target.value), monthMode: "weekday" })} style={SelStyle}>
                        {MONTH_WEEKS.map(w => <option key={w.v} value={w.v}>{w.l}</option>)}
                      </select>
                      <select value={r.monthWeekDay ?? 1} onChange={e => upd({ monthWeekDay: parseInt(e.target.value), monthMode: "weekday" })} style={SelStyle}>
                        {WEEK_DAYS.map(d => <option key={d.v} value={d.v}>{d.l}</option>)}
                      </select>
                      <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>du mois</span>
                    </label>
                  </div>
                </div>
              )}

              {/* Yearly: month + day */}
              {r.type === "yearly" && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Chaque année le</span>
                  <NumInput val={r.yearDay || (dueDate ? new Date(dueDate).getDate() : 1)} onCh={v => upd({ yearDay: v })} min={1} max={31} />
                  <select value={r.yearMonth ?? (dueDate ? new Date(dueDate).getMonth() : 0)} onChange={e => upd({ yearMonth: parseInt(e.target.value) })} style={SelStyle}>
                    {["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"].map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
              )}

              {/* End condition */}
              <div style={{ borderTop: "1px solid #F0F0F0", paddingTop: 10, marginTop: 2 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 8 }}>FIN DE RÉCURRENCE</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                    <input type="radio" name="endType" checked={!r.endType || r.endType === "never"} onChange={() => upd({ endType: "never" })} />
                    <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Jamais</span>
                  </label>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                    <input type="radio" name="endType" checked={r.endType === "count"} onChange={() => upd({ endType: "count" })} />
                    <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Après</span>
                    <NumInput val={r.endCount || 10} onCh={v => upd({ endCount: v, endType: "count" })} min={1} max={999} />
                    <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>occurrence(s)</span>
                  </label>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                    <input type="radio" name="endType" checked={r.endType === "date"} onChange={() => upd({ endType: "date" })} />
                    <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Le</span>
                    <input type="date" value={r.endDate || ""} onChange={e => upd({ endDate: e.target.value, endType: "date" })}
                      style={{ ...S.input, width: "auto", padding: "4px 8px", fontSize: 12, cursor: "pointer" }} />
                  </label>
                </div>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── TASK MODAL ─── */
function TaskModal({ task, onSave, onClose, onAddTask, settings }) {
  const isNew = !task.title;
  const [d, setD] = useState({ ...task, category: task.category || "", type: task.type || "", status: task.status || "todo", recurrence: task.recurrence || "none", totalTime: task.totalTime || 0, inMyDay: task.inMyDay || false });
  const [subDetail, setSubDetail] = useState(null);
  const [showAI, setShowAI] = useState(false);
  const [stopwatch, setStopwatch] = useState(false); // 7)

  const catObj   = settings.categories.find(c => c.name === d.category);
  const catAccent = catObj?.accent || "#102A63";

  const addSub = () => setD({ ...d, subtasks: [...d.subtasks, { id: uid(), title: "", completed: false }] });
  const updSub = (s) => setD({ ...d, subtasks: d.subtasks.map((x) => (x.id === s.id ? s : x)) });
  const delSub = (id) => setD({ ...d, subtasks: d.subtasks.filter((x) => x.id !== id) });
  const promoteSub = (sub) => {
    setD((prev) => ({ ...prev, subtasks: prev.subtasks.filter((x) => x.id !== sub.id) }));
    onAddTask({ id: uid(), title: sub.title, category: sub.category || "", type: sub.type || "", dueDate: sub.dueDate || "", priority: sub.priority || "normale", status: "todo", notes: sub.notes || "", completed: false, reminder: "none", recurrence: "none", subtasks: [], createdAt: new Date().toISOString(), totalTime: 0, inMyDay: false });
  };

  // 5) send by mail
  const sendMail = () => {
    const body = encodeURIComponent(`Tâche : ${d.title}\nCatégorie : ${d.category || "-"}\nType : ${d.type || "-"}\nPriorité : ${d.priority}\nÉchéance : ${fmtDate(d.dueDate)}\n\nNotes :\n${d.notes ? d.notes.replace(/<[^>]+>/g, "") : "-"}`);
    window.location.href = `mailto:?subject=${encodeURIComponent(d.title)}&body=${body}`;
  };

  const statusObj = settings.statuses.find(s => s.id === d.status) || settings.statuses[0];

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16, backdropFilter: "blur(4px)" }} onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div style={{ background: "white", borderRadius: 16, width: "100%", maxWidth: 580, maxHeight: "92vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.18)", borderTop: `4px solid ${catAccent}`, transition: "border-color 0.2s" }}>
        <div style={{ padding: "20px 24px 0" }}>
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <h2 style={{ margin: 0, fontSize: 18, fontFamily: "'Lora',serif", color: "#2C3E50" }}>{isNew ? "Nouvelle tâche" : "Modifier la tâche"}</h2>
            <div style={{ display: "flex", gap: 6 }}>
              {/* 9) Add to My Day */}
              <button onClick={() => setD({ ...d, inMyDay: !d.inMyDay })} title={d.inMyDay ? "Retirer de Ma journée" : "Ajouter à Ma journée"}
                style={{ border: `1px solid ${d.inMyDay ? "#E67E22" : "#E0E0E0"}`, background: d.inMyDay ? "#FEF9E7" : "white", borderRadius: 8, padding: "4px 8px", fontSize: 14, cursor: "pointer", color: d.inMyDay ? "#E67E22" : "#BDC3C7" }}>☀</button>
              {/* 7) Stopwatch */}
              {!isNew && <button onClick={() => setStopwatch(true)} title="Chronomètre"
                style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 8, padding: "4px 8px", fontSize: 14, cursor: "pointer", color: "#BDC3C7" }}>⏱</button>}
              {/* 5) Send mail */}
              <button onClick={sendMail} title="Envoyer par mail"
                style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 8, padding: "4px 10px", fontSize: 12, cursor: "pointer", color: "#BDC3C7", fontFamily: "'DM Mono',monospace" }}>@</button>
              <button onClick={onClose} style={{ border: "none", background: "none", fontSize: 22, cursor: "pointer", color: "#BDC3C7" }}>×</button>
            </div>
          </div>

          {/* Time tracked */}
          {d.totalTime > 0 && (
            <div style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: "#F0F5FF", borderRadius: 8 }}>
              <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#102A63" }}>⏱ Temps enregistré : <strong>{fmtTime(d.totalTime)}</strong></span>
            </div>
          )}

          <input value={d.title} onChange={(e) => setD({ ...d, title: e.target.value })} placeholder="Titre de la tâche…" autoFocus style={{ ...S.input, fontSize: 15, marginBottom: 12 }} />

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
            <select value={d.category} onChange={(e) => setD({ ...d, category: e.target.value })} style={{ ...S.input, cursor: "pointer", color: d.category ? "#2C3E50" : "#999" }}>
              <option value="">— Catégorie —</option>
              {settings.categories.map((c) => <option key={c.id} style={{ color: "#2C3E50" }}>{c.name}</option>)}
            </select>
            <select value={d.type} onChange={(e) => setD({ ...d, type: e.target.value })} style={{ ...S.input, cursor: "pointer", color: d.type ? "#2C3E50" : "#999" }}>
              <option value="">— Type —</option>
              {(() => { const ORD = ["task","quick","report","meeting","analyse"]; return [...settings.types].sort((a,b) => { const ia=ORD.indexOf(a.id); const ib=ORD.indexOf(b.id); return (ia<0?99:ia)-(ib<0?99:ib); }); })().map((t) => <option key={t.id} style={{ color: "#2C3E50" }}>{t.name}</option>)}
            </select>
            <select value={d.priority} onChange={(e) => setD({ ...d, priority: e.target.value })} style={{ ...S.input, cursor: "pointer" }}>
              <option value="haute">Priorité haute</option>
              <option value="normale">Priorité normale</option>
              <option value="basse">Priorité basse</option>
            </select>
            {/* 3) Status in modal */}
            <select value={d.status} onChange={(e) => { const s = e.target.value; setD({ ...d, status: s, completed: s === "done" }); }} style={{ ...S.input, cursor: "pointer", background: statusObj.bg, color: statusObj.color, fontWeight: 600 }}>
              {settings.statuses.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>

          {/* 3) Full recurrence module */}
          <RecurrenceModule value={d.recurrence} dueDate={d.dueDate} onChange={rec => setD({ ...d, recurrence: rec })} />

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 4, letterSpacing: "0.06em" }}>DATE DE CRÉATION</div>
              <input type="date" value={d.createdAt ? d.createdAt.split("T")[0] : today()} onChange={(e) => setD({ ...d, createdAt: e.target.value + "T00:00:00.000Z" })} style={{ ...S.input, cursor: "pointer" }} />
            </div>
            <div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 4, letterSpacing: "0.06em" }}>DATE D'ÉCHÉANCE</div>
              <input type="date" value={d.dueDate} onChange={(e) => setD({ ...d, dueDate: e.target.value })} style={{ ...S.input, cursor: "pointer" }} />
            </div>
          </div>

          <select value={d.reminder} onChange={(e) => setD({ ...d, reminder: e.target.value })} style={{ ...S.input, cursor: "pointer", marginBottom: 10 }}>
            <option value="none">Pas de rappel</option>
            <option value="same">Le jour même</option>
            <option value="30min">30 minutes avant</option>
            <option value="1h">1 heure avant</option>
            <option value="2h">2 heures avant</option>
            <option value="1d">La veille</option>
            <option value="2d">2 jours avant</option>
          </select>

          {/* Notes with AI button */}
          <div style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.06em" }}>NOTES</div>
              {/* 10) AI assistant trigger */}
              <button onClick={() => setShowAI(true)} style={{ border: "1px solid #C7D2FE", background: "#EEF2FF", borderRadius: 6, padding: "2px 8px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#4F46E5" }}>🤖 IA</button>
            </div>
            <RichTextArea value={d.notes} onChange={(v) => setD({ ...d, notes: v })} placeholder="Notes optionnelles…" rows={5} />
          </div>

          {/* Subtasks */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#999", letterSpacing: "0.08em", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>SOUS-TÂCHES</div>
            {d.subtasks.map((s) => <SubtaskRow key={s.id} sub={s} onChange={updSub} onDelete={() => delSub(s.id)} onOpenDetail={setSubDetail} />)}
            <button onClick={addSub} style={{ ...S.ghost, marginTop: 6 }}>+ Ajouter une sous-tâche</button>
          </div>
        </div>

        <div style={{ padding: "14px 24px", borderTop: "1px solid #F0F0F0", display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <button onClick={onClose} style={{ ...S.btn("#F0F0F0", "#666") }}>Annuler</button>
          <button onClick={() => { if (d.title.trim()) { onSave(d); onClose(); } }} style={{ ...S.btn(catAccent), opacity: d.title.trim() ? 1 : 0.5 }}>
            {isNew ? "Créer la tâche" : "Enregistrer"}
          </button>
        </div>
      </div>

      {subDetail && <SubtaskDetailModal sub={subDetail} cats={settings.categories} types={settings.types} onSave={updSub} onPromote={promoteSub} onClose={() => setSubDetail(null)} />}
      {showAI && <AIAssistant text={d.notes} onApply={(v) => setD({ ...d, notes: v })} onClose={() => setShowAI(false)} />}
      {stopwatch && <StopwatchWidget task={d} onStop={(secs) => { setD(prev => ({ ...prev, totalTime: (prev.totalTime || 0) + secs })); setStopwatch(false); }} onClose={() => setStopwatch(false)} />}
    </div>
  );
}

      <div style={{ background: "white", borderRadius: 12, width: 320, boxShadow: "0 12px 40px rgba(0,0,0,0.18)", overflow: "hidden", borderTop: `3px solid ${catAccent}` }}>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>

/* ─── TASK CARD ─── */
function TaskCard({ task, num, onDelete, onToggle, onEdit, onSaveComment, colWidths, settings }) {
  const [hovered, setHovered] = useState(false);
  const [showComment, setShowComment] = useState(false);
  const catObj  = settings.categories.find(c => c.name === task.category);
  const typeObj = settings.types.find(t => t.name === task.type);
  const catBg     = catObj?.bg      || "#F0F0F0";
  const catAccent = catObj?.accent  || "#888";
  const statusObj = settings.statuses.find(s => s.id === task.status) || settings.statuses[0];
  const doneSubs  = task.subtasks?.filter(s => s.completed).length || 0;
  const totalSubs = task.subtasks?.length || 0;
  const ds  = isOverdue(task.dueDate) && !task.completed ? "overdue" : isToday(task.dueDate) ? "today" : daysBefore(task.dueDate, 2) ? "soon" : "ok";
  const dc  = { overdue: "#C0392B", today: "#E67E22", soon: "#F39C12", ok: "#95A5A6" };
  const prioColor = PRIORITY_COLORS[task.priority] || "#DDD";
  const prioIcon  = PRIORITY_ICONS[task.priority]  || "▬";
  const hasComment = task.comment && task.comment.trim().length > 0;
  // 3) Blocked tasks are dimmed
  const isBlocked = task.status === "blocked";

  return (
    <>
      <div onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)} onClick={() => onEdit(task)}
        style={{ display: "flex", alignItems: "center", gap: 7, paddingRight: 6, borderLeft: `2px solid ${catAccent}`, marginBottom: 1, background: hovered ? "#F5F7FB" : task.completed ? "#FAFAFA" : "white", opacity: task.completed ? 0.45 : isBlocked ? 0.6 : 1, cursor: "pointer", transition: "background 0.1s", borderRadius: "0 3px 3px 0", height: 28, overflow: "hidden" }}>
        <button onClick={(e) => { e.stopPropagation(); onToggle(task.id); }}
          style={{ width: 14, height: 14, borderRadius: "50%", flexShrink: 0, border: `1.5px solid ${task.completed ? catAccent : "#CCC"}`, background: task.completed ? catAccent : "white", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 7, color: "white", transition: "all 0.15s", marginLeft: 5 }}>{task.completed ? "✓" : ""}</button>
        <span style={{ fontSize: 9, color: "#CCC", fontFamily: "'DM Mono',monospace", flexShrink: 0, minWidth: 16, textAlign: "right" }}>{num}</span>
        <span title={`Priorité ${task.priority}`} style={{ fontSize: 10, color: prioColor, flexShrink: 0, fontWeight: 700, lineHeight: 1, minWidth: 12, textAlign: "center" }}>{prioIcon}</span>
        <span style={{ fontSize: 13, fontWeight: 500, color: task.completed ? "#AAA" : "#2C3E50", textDecoration: task.completed ? "line-through" : "none", fontFamily: "'Lora',serif", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", width: colWidths.title, flexShrink: 0 }}>{task.title}</span>
        {totalSubs > 0 ? <span style={{ fontSize: 9, color: "#BBB", fontFamily: "'DM Mono',monospace", flexShrink: 0, minWidth: 28 }}>{doneSubs}/{totalSubs}✓</span> : <span style={{ minWidth: 28, flexShrink: 0 }} />}
        {/* 3) Status badge */}
        <span style={{ fontSize: 8, fontWeight: 700, background: statusObj.bg, color: statusObj.color, borderRadius: 3, padding: "1px 5px", fontFamily: "'DM Mono',monospace", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.status || 72, overflow: "hidden", textOverflow: "ellipsis" }}>{statusObj.name}</span>
        <span style={{ fontSize: 9, fontWeight: 700, background: catBg, color: catAccent, borderRadius: 3, padding: "1px 5px", fontFamily: "'DM Mono',monospace", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.category, overflow: "hidden", textOverflow: "ellipsis" }}>{task.category}</span>
        <span style={{ fontSize: 9, color: "#555", fontFamily: "'DM Mono',monospace", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.type, overflow: "hidden", textOverflow: "ellipsis" }}>{typeObj?.icon || ""} {task.type}</span>
        <div style={{ flex: 1 }} />
        {task.inMyDay && <span title="Ma journée" style={{ fontSize: 10, flexShrink: 0, opacity: 0.7 }}>☀</span>}
        {parseRec(task.recurrence).type !== "none" && <span title={recLabel(task.recurrence) || ""} style={{ fontSize: 9, flexShrink: 0, opacity: 0.5 }}>🔄</span>}
        {task.totalTime > 0 && <span title={`Temps : ${fmtTime(task.totalTime)}`} style={{ fontSize: 8, color: "#102A63", fontFamily: "'DM Mono',monospace", flexShrink: 0, opacity: 0.6 }}>⏱{fmtTime(task.totalTime)}</span>}
        {task.reminder && task.reminder !== "none" && <span style={{ fontSize: 9, flexShrink: 0, opacity: 0.4 }}>🔔</span>}
        {task.createdAt && <span style={{ fontSize: 9, color: "#BDC3C7", fontFamily: "'DM Mono',monospace", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.created, textAlign: "right" }}>+ {fmtDate(task.createdAt.split("T")[0])}</span>}
        <span style={{ width: 16, flexShrink: 0 }} />
        {task.dueDate ? <span style={{ fontSize: 9, color: dc[ds], fontFamily: "'DM Mono',monospace", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.due, textAlign: "right" }}>{ds === "overdue" ? "⚠" : ds === "today" ? "●" : "○"} {fmtDate(task.dueDate)}</span> : <span style={{ width: colWidths.due, flexShrink: 0 }} />}
        <button onClick={(e) => { e.stopPropagation(); setShowComment(true); }} title={hasComment ? task.comment : "Ajouter un commentaire"}
          style={{ border: "none", background: "none", cursor: "pointer", fontSize: 11, padding: "0 3px", flexShrink: 0, lineHeight: 1, color: hasComment ? "#102A63" : hovered ? "#BDC3C7" : "transparent", transition: "color 0.1s" }}>{hasComment ? "💬" : "＋"}</button>
        <button onClick={(e) => { e.stopPropagation(); onDelete(task.id); }}
          style={{ border: "none", background: "none", cursor: "pointer", color: hovered ? "#E8A0A0" : "transparent", fontSize: 13, padding: "0 2px", transition: "color 0.1s", flexShrink: 0, lineHeight: 1 }}>×</button>
      </div>
      {showComment && <CommentPopover task={task} catBg={catBg} catAccent={catAccent} onSave={(txt) => onSaveComment(task.id, txt)} onClose={() => setShowComment(false)} />}
    </>
  );
}

            {task.category && <span style={{ fontSize: 10, fontWeight: 700, background: catBg, color: catAccent, borderRadius: 4, padding: "2px 7px", fontFamily: "'DM Mono',monospace" }}>{task.category}</span>}
            {task.type && <span style={{ fontSize: 10, color: "#777", fontFamily: "'DM Mono',monospace", background: "#F5F5F5", borderRadius: 4, padding: "2px 7px" }}>{typeObj?.icon} {task.type}</span>}
            {task.subtasks?.length > 0 && <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace", background: "#F5F5F5", borderRadius: 4, padding: "2px 7px" }}>{doneSubs}/{task.subtasks.length}✓</span>}
            {task.inMyDay && <span style={{ fontSize: 10, color: "#E67E22", background: "#FEF9E7", borderRadius: 4, padding: "2px 7px", fontFamily: "'DM Mono',monospace" }}>☀ Ma journée</span>}
          </div>
          {(task.dueDate || task.createdAt) && (
            <div style={{ display: "flex", gap: 12 }}>
              {task.createdAt && <span style={{ fontSize: 10, color: "#BDC3C7", fontFamily: "'DM Mono',monospace" }}>+ {fmtDate(task.createdAt.split("T")[0])}</span>}
              {task.dueDate && <span style={{ fontSize: 10, color: dc[ds], fontFamily: "'DM Mono',monospace", fontWeight: 600 }}>{ds === "overdue" ? "⚠" : ds === "today" ? "●" : "○"} {fmtDate(task.dueDate)}</span>}
            </div>
          )}
          {hasComment && <div style={{ marginTop: 6, fontSize: 11, color: "#888", fontFamily: "'Lora',serif", fontStyle: "italic", borderTop: "1px solid #F5F5F5", paddingTop: 6 }}>💬 {task.comment}</div>}
        </div>
        <div style={{ borderTop: "1px solid #F5F5F5", display: "flex" }}>
          <button onClick={(e) => { e.stopPropagation(); setShowComment(true); }} style={{ flex: 1, border: "none", background: "none", padding: "8px 0", fontSize: 11, color: hasComment ? "#102A63" : "#AAA", cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>💬 Commenter</button>
          <button onClick={(e) => { e.stopPropagation(); onDelete(task.id); }} style={{ flex: 1, border: "none", borderLeft: "1px solid #F5F5F5", background: "none", padding: "8px 0", fontSize: 11, color: "#E8A0A0", cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>× Supprimer</button>
        </div>
      </div>
      {showComment && <CommentPopover task={task} catBg={catBg} catAccent={catAccent} onSave={(txt) => onSaveComment(task.id, txt)} onClose={() => setShowComment(false)} />}
    </>
  );
}

/* ─── DASHBOARD ─── */
function Dashboard({ tasks, onNavigate, settings }) {
  const isMobile = useIsMobile();
  const active  = tasks.filter(t => !t.completed);
  const overdue = active.filter(t => isOverdue(t.dueDate));
  const todayT  = active.filter(t => isToday(t.dueDate));
  const done    = tasks.filter(t => t.completed);
  const total   = tasks.length || 1;
  const byCat   = settings.categories.map(c => ({ name: c.name, total: tasks.filter(t => t.category === c.name).length, done: tasks.filter(t => t.category === c.name && t.completed).length, color: c.accent }));
  const byType  = settings.types.map(tp => ({ name: tp.name, icon: tp.icon, count: active.filter(t => t.type === tp.name).length }));
  const pct = n => Math.round((n / total) * 100);

  const StatCard = ({ label, value, pctVal, color, onClick }) => (
    <div onClick={onClick} style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "18px 20px", border: "1px solid #ECEAE5", cursor: onClick ? "pointer" : "default", transition: "transform 0.15s,box-shadow 0.15s", borderTop: `3px solid ${color}` }}
      onMouseEnter={e => { if (onClick && !isMobile) { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 6px 20px rgba(0,0,0,0.08)"; } }}
      onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6, lineHeight: 1 }}>
        <div style={{ fontSize: isMobile ? 22 : 28, fontWeight: 700, color, fontFamily: "'DM Mono',monospace" }}>{value}</div>
        <div style={{ fontSize: 12, fontWeight: 600, color, fontFamily: "'DM Mono',monospace", opacity: 0.55 }}>{pctVal}%</div>
      </div>
      <div style={{ fontSize: isMobile ? 11 : 13, fontWeight: 600, color: "#2C3E50", fontFamily: "'Lora',serif", marginTop: 5 }}>{label}</div>
    </div>
  );

  return (
    <div>
      <div style={{ marginBottom: isMobile ? 16 : 24 }}>
        <div style={{ fontSize: isMobile ? 18 : 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 4 }}>Tableau de bord</div>
        <div style={{ fontSize: 12, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>{new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2,1fr)" : "repeat(4,1fr)", gap: isMobile ? 8 : 12, marginBottom: isMobile ? 16 : 24 }}>
        <StatCard label="Tâches actives"  value={active.length}  pctVal={pct(active.length)}  color="#2C3E50" onClick={() => onNavigate("tasks")} />
        <StatCard label="En retard"        value={overdue.length} pctVal={pct(overdue.length)} color="#C0392B" onClick={() => onNavigate("tasks")} />
        <StatCard label="Aujourd'hui"      value={todayT.length}  pctVal={pct(todayT.length)}  color="#E67E22" onClick={() => onNavigate("calendar")} />
        <StatCard label="Complétées"       value={done.length}    pctVal={pct(done.length)}    color="#27AE60" />
      </div>
      <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5", marginBottom: isMobile ? 12 : 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>Avancement global</span>
          <span style={{ fontSize: 20, fontWeight: 700, fontFamily: "'DM Mono',monospace", color: "#27AE60" }}>{Math.round((done.length / total) * 100)}%</span>
        </div>
        <div style={{ height: 10, background: "#F0F0F0", borderRadius: 10, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${(done.length / total) * 100}%`, background: "linear-gradient(90deg,#27AE60,#2ECC71)", borderRadius: 10, transition: "width 0.5s" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#AAA", fontFamily: "'DM Mono',monospace", marginTop: 8 }}>
          <span>{done.length} complétées</span><span>{active.length} restantes</span>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: isMobile ? 12 : 16, marginBottom: isMobile ? 12 : 20 }}>
        <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5" }}>
          <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 14 }}>Par catégorie</div>
          {byCat.map(c => (
            <div key={c.name} style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>{c.name}</span>
                <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{c.done}/{c.total}</span>
              </div>
              <div style={{ height: 6, background: "#F0F0F0", borderRadius: 6, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${c.total ? (c.done / c.total) * 100 : 0}%`, background: c.color, borderRadius: 6, transition: "width 0.5s" }} />
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: isMobile ? 12 : 16 }}>
          <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5" }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 12 }}>Par type</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>

                  <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#AAA", marginTop: 1 }}>{t.name}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5", flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 10 }}>Priorités hautes</div>
            {active.filter(t => t.priority === "haute").slice(0, 3).map(t => {
              const co = settings.categories.find(c => c.name === t.category);
              return (
                <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid #F5F5F5" }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: co?.accent || "#888", flexShrink: 0 }} />
                  <span style={{ fontSize: 12, fontFamily: "'Lora',serif", color: "#444", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</span>
                  {t.dueDate && <span style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: isOverdue(t.dueDate) ? "#C0392B" : "#AAA", flexShrink: 0 }}>{fmtDate(t.dueDate)}</span>}
                </div>
              );
            })}
            {!active.filter(t => t.priority === "haute").length && <div style={{ fontSize: 12, color: "#CCC", fontFamily: "'DM Mono',monospace" }}>Aucune tâche haute priorité</div>}
          </div>
        </div>
      </div>
      {(todayT.length > 0 || overdue.length > 0) && (
        <div style={{ background: "white", borderRadius: 14, padding: isMobile ? "14px 16px" : "20px 24px", border: "1px solid #ECEAE5" }}>
          <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 12 }}>⚡ À traiter maintenant</div>
          {[...overdue, ...todayT].slice(0, 5).map(t => {
            const co = settings.categories.find(c => c.name === t.category);
            return (
              <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #F5F5F5" }}>
                <span style={{ fontSize: 10, fontWeight: 700, background: isOverdue(t.dueDate) ? co?.bg : "#FEF9E7", color: isOverdue(t.dueDate) ? co?.accent : "#E67E22", borderRadius: 4, padding: "2px 7px", fontFamily: "'DM Mono',monospace", flexShrink: 0 }}>{t.category}</span>
                <span style={{ fontSize: 13, fontFamily: "'Lora',serif", color: "#333", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</span>
                <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: isOverdue(t.dueDate) ? "#C0392B" : "#E67E22", flexShrink: 0 }}>{isOverdue(t.dueDate) ? "⚠" : "●"}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── CALENDAR VIEW ─── */
function CalendarView({ tasks, onEdit, onAdd, settings }) {
  const [curDate, setCurDate] = useState(new Date());
  const year = curDate.getFullYear(), month = curDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startPad = (firstDay + 6) % 7;
  const cells = [];
  for (let i = 0; i < startPad; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  const tasksByDay = {};
  tasks.forEach(t => {
    if (!t.dueDate) return;
    const td = new Date(t.dueDate);
    if (td.getFullYear() === year && td.getMonth() === month) {
      const k = td.getDate(); if (!tasksByDay[k]) tasksByDay[k] = []; tasksByDay[k].push(t);
    }
  });
  const [selectedDay, setSelectedDay] = useState(null);
  const todayDate = new Date();
  const DAYS = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
  const MONTHS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>Calendrier</div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => setCurDate(new Date(year, month - 1, 1))} style={{ ...S.btn("#F0F0F0", "#555"), padding: "6px 12px" }}>‹</button>
          <span style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", minWidth: 160, textAlign: "center" }}>{MONTHS[month]} {year}</span>
          <button onClick={() => setCurDate(new Date(year, month + 1, 1))} style={{ ...S.btn("#F0F0F0", "#555"), padding: "6px 12px" }}>›</button>
          <button onClick={() => setCurDate(new Date())} style={{ ...S.btn("#102A63"), padding: "6px 14px", fontSize: 11 }}>Aujourd'hui</button>
        </div>
      </div>
      <div style={{ background: "white", borderRadius: 14, border: "1px solid #ECEAE5", overflow: "hidden" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", background: "#F8F7F4" }}>
          {DAYS.map(d => <div key={d} style={{ padding: "10px 0", textAlign: "center", fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.06em" }}>{d}</div>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)" }}>
          {cells.map((d, i) => {
            if (!d) return <div key={`e${i}`} style={{ minHeight: 90, borderRight: "1px solid #F0F0F0", borderBottom: "1px solid #F0F0F0", background: "#FAFAFA" }} />;
            const isCurrentDay = todayDate.getDate() === d && todayDate.getMonth() === month && todayDate.getFullYear() === year;
            const dayTasks = tasksByDay[d] || [];
            const hasOverdue = dayTasks.some(t => !t.completed && isOverdue(t.dueDate));
            return (
              <div key={d} onClick={() => setSelectedDay(selectedDay === d ? null : d)}
                style={{ minHeight: 90, borderRight: "1px solid #F0F0F0", borderBottom: "1px solid #F0F0F0", padding: "8px 6px", cursor: "pointer", background: selectedDay === d ? "#F0F5FF" : isCurrentDay ? "#FFFBF0" : "white", transition: "background 0.15s" }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ fontSize: 13, fontWeight: isCurrentDay ? 700 : 400, fontFamily: "'DM Mono',monospace", color: isCurrentDay ? "#E67E22" : "#555", background: isCurrentDay ? "#FEF3E2" : undefined, borderRadius: isCurrentDay ? "50%" : undefined, width: isCurrentDay ? 24 : undefined, height: isCurrentDay ? 24 : undefined, display: "flex", alignItems: "center", justifyContent: "center" }}>{d}</span>
                  {hasOverdue && <span style={{ fontSize: 9, color: "#C0392B" }}>⚠</span>}
                </div>
                {dayTasks.slice(0, 3).map(t => {
                  const co = settings.categories.find(c => c.name === t.category);
                  return (
                    <div key={t.id} onClick={e => { e.stopPropagation(); onEdit(t); }}
                      style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", background: co?.bg || "#F0F0F0", color: co?.accent || "#888", borderRadius: 4, padding: "2px 5px", marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: t.completed ? "line-through" : "none", opacity: t.completed ? 0.6 : 1 }}>
                      {t.title}
                    </div>
                  );
                })}
                {dayTasks.length > 3 && <div style={{ fontSize: 9, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>+{dayTasks.length - 3} autres</div>}
              </div>
            );
          })}
        </div>
      </div>
      {selectedDay && tasksByDay[selectedDay] && (
        <div style={{ marginTop: 16, background: "white", borderRadius: 14, padding: "20px 24px", border: "1px solid #ECEAE5" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>{selectedDay} {MONTHS[month]} {year}</div>
            <button onClick={() => onAdd(`${year}-${String(month + 1).padStart(2, "0")}-${String(selectedDay).padStart(2, "0")}`)} style={{ ...S.btn("#102A63"), fontSize: 11, padding: "6px 12px" }}>+ Ajouter</button>
          </div>
          {tasksByDay[selectedDay].map(t => {
            const co = settings.categories.find(c => c.name === t.category);
            return (
              <div key={t.id} onClick={() => onEdit(t)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #F5F5F5", cursor: "pointer" }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: co?.accent || "#888", flexShrink: 0, display: "block" }} />
                <span style={{ fontSize: 13, fontFamily: "'Lora',serif", color: t.completed ? "#AAA" : "#333", textDecoration: t.completed ? "line-through" : "none", flex: 1 }}>{t.title}</span>
                <span style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", background: co?.bg || "#F0F0F0", color: co?.accent || "#888", borderRadius: 4, padding: "2px 6px" }}>{t.category}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── NOTIFICATIONS VIEW ─── */
const REMINDER_LABELS = { none: "Aucun", same: "Le jour même", "30min": "30 min avant", "1h": "1h avant", "2h": "2h avant", "1d": "La veille", "2d": "2 jours avant" };
function NotificationsView({ tasks, onUpdate, settings }) {
  const withReminder = tasks.filter(t => !t.completed && t.reminder && t.reminder !== "none" && t.dueDate);
  const triggered = withReminder.filter(t => {
    const diff = (new Date(t.dueDate) - new Date()) / 864e5;
    if (t.reminder === "same") return isToday(t.dueDate);
    if (t.reminder === "30min" || t.reminder === "1h" || t.reminder === "2h") return isToday(t.dueDate) || isOverdue(t.dueDate);
    if (t.reminder === "1d") return diff <= 1;
    if (t.reminder === "2d") return diff <= 2;
    return false;
  });
  const upcoming = withReminder.filter(t => !triggered.includes(t));
  return (
    <div>
      <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 4 }}>Notifications & Rappels</div>
      <div style={{ fontSize: 12, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 24 }}>{withReminder.length} tâche(s) avec rappel configuré</div>
      {triggered.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#E67E22", letterSpacing: "0.08em", fontFamily: "'DM Mono',monospace", marginBottom: 10 }}>🔔 RAPPELS ACTIFS ({triggered.length})</div>
          {triggered.map(t => {
            const co = settings.categories.find(c => c.name === t.category);
            return (
              <div key={t.id} style={{ background: "white", borderRadius: 12, border: "1px solid #E8E8E8", borderLeft: `4px solid ${co?.accent || "#888"}`, padding: "14px 18px", marginBottom: 8, display: "flex", gap: 12, alignItems: "center" }}>
                <span style={{ fontSize: 22 }}>🔔</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 3 }}>{t.title}</div>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", background: co?.bg || "#F0F0F0", color: co?.accent || "#888", borderRadius: 4, padding: "2px 7px" }}>{t.category}</span>
                    <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: isOverdue(t.dueDate) ? "#C0392B" : "#E67E22" }}>{isOverdue(t.dueDate) ? "⚠ En retard" : "● Aujourd'hui"} — {fmtDate(t.dueDate)}</span>
                  </div>
                </div>
                <button onClick={() => onUpdate({ ...t, completed: true, status: "done" })} style={{ ...S.btn("#27AE60"), fontSize: 11, padding: "6px 12px", flexShrink: 0 }}>Marquer fait</button>
              </div>
            );
          })}
        </div>
      )}
      <div>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#AAA", letterSpacing: "0.08em", fontFamily: "'DM Mono',monospace", marginBottom: 10 }}>PROCHAINS RAPPELS ({upcoming.length})</div>
        {upcoming.length === 0 && triggered.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 0", color: "#CCC" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🔕</div>
            <div style={{ fontFamily: "'Lora',serif", fontSize: 14 }}>Aucun rappel configuré</div>
          </div>
        )}
        {upcoming.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).map(t => {
          const co = settings.categories.find(c => c.name === t.category);
          const diff = Math.ceil((new Date(t.dueDate) - new Date()) / 864e5);
          return (
            <div key={t.id} style={{ background: "white", borderRadius: 12, border: "1px solid #ECEAE5", padding: "12px 16px", marginBottom: 6, display: "flex", gap: 10, alignItems: "center" }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: co?.bg || "#F0F0F0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>🔔</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50" }}>{t.title}</div>
                <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#AAA", marginTop: 2 }}>{fmtDate(t.dueDate)} · dans {diff}j</div>
              </div>
              <select value={t.reminder} onChange={e => onUpdate({ ...t, reminder: e.target.value })}
                style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", border: "1px solid #E0E0E0", borderRadius: 6, padding: "4px 8px", background: "white", cursor: "pointer", color: "#555" }}>
                <option value="none">Désactiver</option><option value="same">Le jour même</option>
                <option value="30min">30 min avant</option><option value="1h">1h avant</option>
                <option value="2h">2h avant</option><option value="1d">La veille</option><option value="2d">2 jours avant</option>
              </select>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── MEETINGS VIEW ─── */
function MeetingsView({ onAddTask }) {

  const [newM, setNewM] = useState(null);

  const [loadingRecap, setLoadingRecap] = useState(false);
  useEffect(() => { try { localStorage.setItem(MEETING_STORAGE, JSON.stringify(meetings)); } catch {} }, [meetings]);
  const saveMeeting = m => { const exists = meetings.find(x => x.id === m.id); if (exists) setMeetings(p => p.map(x => x.id === m.id ? m : x)); else setMeetings(p => [m, ...p]); setSelected(m); };
  const delMeeting = id => { setMeetings(p => p.filter(x => x.id !== id)); if (selected?.id === id) setSelected(null); };
  const generateRecap = async m => {
    setLoadingRecap(true); setRecap(null);
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" }, body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 1000, messages: [{ role: "user", content: `Tu es un assistant professionnel. Génère un compte-rendu structuré en français.\n\nRéunion : ${m.title}\nDate : ${m.date}${m.time ? " à " + m.time : ""}\nParticipants : ${m.participants || "Non renseignés"}\nOrdre du jour : ${m.agenda || "Non renseigné"}\nNotes :\n${m.notes || "Aucune note"}\n\nGénère un compte-rendu avec :\n1. Résumé (3-4 phrases)\n2. Points clés discutés\n3. Décisions prises\n4. Actions à mener (avec responsable si mentionné)\n5. Prochaines étapes\n\nSois concis et professionnel.` }] }) });
      const data = await resp.json();
      setRecap(data.content?.map(c => c.text || "").join("") || "Erreur de génération.");
    } catch { setRecap("Erreur de connexion."); }
    setLoadingRecap(false);
  };

  );

    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>Réunions</div>
        <button onClick={() => { setNewM({ id: uid(), title: "", date: today(), time: "", participants: "", agenda: "", notes: "", docs: "" }); setShowNew(true); setSelected(null); }} style={{ ...S.btn("#102A63"), padding: "7px 16px", fontSize: 12 }}>+ Nouvelle réunion</button>
      </div>
      <div style={{ background: "#EEF2FF", borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 11, color: "#4F46E5", fontFamily: "'DM Mono',monospace", lineHeight: 1.6 }}>
        💡 <strong>Import Outlook :</strong> Exportez votre réunion depuis Outlook (Fichier → Enregistrer sous → .ics) puis renseignez manuellement. Une connexion directe Microsoft 365 nécessiterait une intégration OAuth.
      </div>
      <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
        <div style={{ width: 240, flexShrink: 0 }}>
          {upcoming.length > 0 && <><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.08em", marginBottom: 6 }}>À VENIR</div>
            {upcoming.map(m => <div key={m.id} onClick={() => { setSelected(m); setShowNew(false); setRecap(null); }} style={{ background: selected?.id === m.id ? "#EEF2FF" : "white", border: `1px solid ${selected?.id === m.id ? "#C7D2FE" : "#ECEAE5"}`, borderRadius: 10, padding: "10px 12px", marginBottom: 6, cursor: "pointer" }}>
              <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.title || "Sans titre"}</div>
              <div style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{fmtDate(m.date)}{m.time ? " · " + m.time : ""}</div>
            </div>)}</>}
          {past.length > 0 && <><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", letterSpacing: "0.08em", marginTop: 12, marginBottom: 6 }}>PASSÉES</div>
            {past.map(m => <div key={m.id} onClick={() => { setSelected(m); setShowNew(false); setRecap(null); }} style={{ background: selected?.id === m.id ? "#EEF2FF" : "white", border: `1px solid ${selected?.id === m.id ? "#C7D2FE" : "#ECEAE5"}`, borderRadius: 10, padding: "10px 12px", marginBottom: 6, cursor: "pointer", opacity: 0.65 }}>
              <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Lora',serif", color: "#2C3E50", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.title || "Sans titre"}</div>
              <div style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{fmtDate(m.date)}</div>

                <div><div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 4 }}>HEURE</div><input type="time" value={newM.time} onChange={e => setNewM({ ...newM, time: e.target.value })} style={{ ...S.input, cursor: "pointer" }} /></div>

          {selected && !showNew && (

              <div style={{ padding: "16px 20px", borderBottom: "1px solid #F0F0F0", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>

                  <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#AAA" }}>{fmtDate(selected.date)}{selected.time ? " · " + selected.time : ""}{selected.participants ? " · " + selected.participants : ""}</div>

                  <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>ORDRE DU JOUR</div>
                  <textarea value={selected.agenda || ""} onChange={e => { const m = { ...selected, agenda: e.target.value }; setSelected(m); saveMeeting(m); }} rows={5} placeholder="Points à aborder…" style={{ ...S.input, resize: "vertical", marginBottom: 12 }} />
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>PARTICIPANTS</div>

          )}
          {!selected && !showNew && <div style={{ textAlign: "center", padding: "60px 0", color: "#CCC" }}><div style={{ fontSize: 40, marginBottom: 12 }}>◷</div><div style={{ fontFamily: "'Lora',serif", fontSize: 15, color: "#AAA" }}>Sélectionnez ou créez une réunion</div></div>}
        </div>
      </div>
    </div>
  );
}

const CAT_ORDER_KEY = "taskmanager_catorder_v1";

function CategoryTasksView({ tasks, onDelete, onToggle, onEdit, onAdd, onSaveComment, settings }) {
  const isMobile = useIsMobile();
  const [filterStatus, setFilterStatus] = useState("Actives");

  // Drag-to-reorder type blocks

  const DEFAULT_TYPE_ORDER = ["task", "quick", "report", "meeting", "analyse"];

    try { const s = localStorage.getItem(TYPE_ORDER_KEY); return s ? JSON.parse(s) : DEFAULT_TYPE_ORDER; } catch { return DEFAULT_TYPE_ORDER; }
  });
  const dragSrc = useRef(null);

  // Ordered types (respects user drag order + adds new types)
  const orderedTypes = [
    ...typeOrder.map(id => settings.types.find(t => t.id === id)).filter(Boolean),
    ...settings.types.filter(t => !typeOrder.includes(t.id)),
  ];

  const saveTypeOrder = (order) => { setTypeOrder(order); try { localStorage.setItem(TYPE_ORDER_KEY, JSON.stringify(order)); } catch {} };

  const toggleType = id => setSelectedTypes(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const showTypes = selectedTypes.length === 0 ? orderedTypes : orderedTypes.filter(t => selectedTypes.includes(t.id));
  const toggleCat = id => setSelectedCats(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

  const baseFilter = t => {
    if (t.status === "blocked" && filterStatus !== "Toutes") return false;
    if (filterStatus === "Actives" && t.completed) return false;
    if (filterStatus === "Complétées" && !t.completed) return false;
    if (search && !t.title.toLowerCase().includes(search.toLowerCase())) return false;

    <div style={{ display: "flex", flexDirection: "column" }}>
      {/* Toolbar */}

        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />

        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />

        <div style={{ width: 1, height: 20, background: "#E8E8E8", flexShrink: 0 }} />

          <button key={c.id} onClick={() => toggleCat(c.id)}
            style={{ border: `1px solid ${selectedCats.includes(c.id) ? c.accent : "#E0E0E0"}`, background: selectedCats.includes(c.id) ? c.bg : "white", color: selectedCats.includes(c.id) ? c.accent : "#888", borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", fontWeight: selectedCats.includes(c.id) ? 700 : 400 }}>{c.name}</button>
