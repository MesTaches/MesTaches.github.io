  { id: "basse",   label: "Faible",      icon: "▼ P4", color: "#27AE60" },
];
const TASK_TYPES_R = [
  { id: "bug",  label: "Bug",         bg: "#FEE2E2", color: "#B91C1C" },
  { id: "ano",  label: "Anomalie",    bg: "#FEF9C3", color: "#A16207" },
  { id: "dev",  label: "Dev", bg: "#DBEAFE", color: "#1D4ED8" },
];
const TASK_STATUSES_R = [
  { id: "todo",       name: "À faire",    bg: "#F0F0F0", color: "#888888" },
  { id: "inprogress", name: "En cours",   bg: "#DBEAFE", color: "#1D4ED8" },
  { id: "waiting",    name: "En attente", bg: "#FEF9C3", color: "#A16207" },
  { id: "blocked",    name: "Bloqué",     bg: "#FEE2E2", color: "#B91C1C" },
  { id: "cancelled",  name: "Annulé",     bg: "#F5E6DC", color: "#92400E" },
  { id: "done",       name: "Fait",       bg: "#D1FAE5", color: "#065F46" },
];

function loadReports() { try { const s = localStorage.getItem(REPORTS_KEY); return s ? JSON.parse(s) : []; } catch { return []; } }
function saveReports(r) { try { localStorage.setItem(REPORTS_KEY, JSON.stringify(r)); } catch {} }

/* ── ReportTaskRow ── */
function ReportTaskRow({ task, onUpdate, onDelete, depth, onAddSubtask }) {
  const [expanded, setExpanded]         = React.useState(false);
  const [showCommentModal, setShowCommentModal] = React.useState(false);

  const prio = TASK_PRIORITIES_R.find(p => p.id === (task.priority || "normale")) || TASK_PRIORITIES_R[2];
  const st   = TASK_STATUSES_R.find(s => s.id === (task.status || "todo")) || TASK_STATUSES_R[0];
  const isIndented = depth > 0;

  const toggle = () => {
    const done = !task.done;
    onUpdate({ ...task, done, endDate: done ? today() : "" });
  };

  return (
    <React.Fragment>
      <div style={{ display: "grid", gridTemplateColumns: "20px 16px 56px 1fr 28px 3fr 72px 160px 88px 88px 32px 32px", gap: 0,
        padding: isIndented ? "5px 8px 5px 32px" : "5px 8px",
        borderBottom: "1px solid #F5F5F5", alignItems: "center",
        background: isIndented ? "#FAFBFF" : "white" }}>

        {/* ⊕/⊖ Toggle sous-tâches */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
          {depth === 0 && (task.subtasks||[]).length > 0 && (
            <button onClick={() => setExpanded(e => !e)}
              title={expanded ? "Masquer les sous-tâches" : "Afficher les sous-tâches"}
              style={{ border: "none", background: "none", cursor: "pointer",
                color: expanded ? "#102A63" : "#AAA", fontSize: 14, padding: 0, lineHeight: 1,
                fontWeight: 700 }}
              onMouseEnter={e => e.currentTarget.style.color = "#102A63"}
              onMouseLeave={e => e.currentTarget.style.color = expanded ? "#102A63" : "#AAA"}>
              {expanded ? "⊖" : "📄"}
            </button>
          )}
          {depth === 0 && (task.subtasks||[]).length === 0 && (
            <span style={{ width: 14 }} />
          )}
        </div>

        {/* Checkbox */}
        <button onClick={toggle}
          style={{ width: 14, height: 14, borderRadius: "50%", border: `2px solid ${task.done ? "#27AE60" : "#BDC3C7"}`,
            background: task.done ? "#27AE60" : "white", cursor: "pointer", flexShrink: 0,
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: "white", padding: 0 }}>
          {task.done ? "✓" : ""}
        </button>

        {/* Priorité */}
        <div style={{ fontSize: 10, fontWeight: 700, color: prio.color, fontFamily: "'Lora',serif", whiteSpace: "nowrap" }}>{prio.icon}</div>

        {/* Libellé + description */}
        <div style={{ overflow: "hidden", display: "flex", alignItems: "center", gap: 4 }}>
          {(task.subtasks||[]).length > 0 && (
            <span onClick={() => setExpanded(e => !e)}
              style={{ fontSize: 12, color: "#888", cursor: "pointer", userSelect: "none",
                fontWeight: 700, flexShrink: 0, lineHeight: 1, width: 14, textAlign: "center" }}>
              {expanded ? "−" : "+"}
            </span>
          )}
          {(task.subtasks||[]).length === 0 && !isIndented && (
            <span style={{ width: 14, flexShrink: 0 }} />
          )}
          <div style={{ flex: 1, overflow: "hidden" }}>
            <div contentEditable suppressContentEditableWarning
              onBlur={e => onUpdate({ ...task, label: e.currentTarget.textContent })}
              onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); } }}
              style={{ fontSize: 10, fontFamily: "'Lora',serif", color: task.done ? "#AAA" : "#2C3E50",
                textDecoration: task.done ? "line-through" : "none",
                fontStyle: isIndented ? "italic" : "normal",
                outline: "none", minWidth: 60, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
              {task.label || ""}
            </div>
          </div>
        </div>
        {/* +st bouton */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
          {depth === 0 && onAddSubtask && (
            <button onClick={() => { onAddSubtask(task.id); setExpanded(true); }}
              title="Ajouter une sous-tâche"
              style={{ border: "none", background: "none", cursor: "pointer", color: "#CCC",
                fontSize: 30, padding: 0, lineHeight: 1, fontWeight: 300 }}
              onMouseEnter={e => e.currentTarget.style.color = "#102A63"}
              onMouseLeave={e => e.currentTarget.style.color = "#CCC"}>+<sup style={{fontSize:10,fontWeight:700}}>st</sup></button>
          )}
        </div>

        {/* Description */}
        <div style={{ overflow: "hidden", paddingRight: 4 }}>
          <input value={task.description || ""} onChange={e => onUpdate({ ...task, description: e.target.value })}
            placeholder="Description…"
            className="report-field"
            style={{ width: "100%", border: "none", background: "transparent", fontSize: 10,
              fontFamily: "'Lora',serif", outline: "none", color: "#888",
              whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
              fontStyle: isIndented ? "italic" : "normal" }} />
        </div>

        {/* Type */}
        <div>
          <select className="report-field" value={task.taskType || ""}
            onChange={e => onUpdate({ ...task, taskType: e.target.value })}
            style={{ fontSize: 10, border: "none", borderRadius: 20, padding: "2px 5px",
              fontFamily: "'Lora',serif", cursor: "pointer", outline: "none", maxWidth: 68,
              background: TASK_TYPES_R.find(t => t.id === (task.taskType||""))?.bg || "#F5F5F5",
              color: TASK_TYPES_R.find(t => t.id === (task.taskType||""))?.color || "#AAA" }}>
            <option value="">—</option>
            {TASK_TYPES_R.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
        </div>

        {/* Date création */}
        <div style={{ fontSize: 10, color: "#AAA", fontFamily: "'Lora',serif", textAlign: "center" }}>
          {task.createdAt ? task.createdAt.split("-").reverse().join("/") : "—"}
        </div>

        {/* Statut */}
        <div>
          <select className="report-field" value={task.status || "todo"} onChange={e => onUpdate({ ...task, status: e.target.value })}
            style={{ fontSize: 10, border: "none", background: st.bg, color: st.color, borderRadius: 20,
              padding: "2px 6px", fontFamily: "'Lora',serif", fontWeight: 700, cursor: "pointer", outline: "none", maxWidth: 84 }}>
            {TASK_STATUSES_R.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>

        {/* Date de fin */}
        <div style={{ fontSize: 10, fontFamily: "'Lora',serif", color: "#555", textAlign: "center" }}>
          <input className="report-field" type="date" value={task.endDate || ""}
            onChange={e => onUpdate({ ...task, endDate: e.target.value })}
            onClick={e => { try { e.currentTarget.showPicker(); } catch(_) {} }}
            style={{ fontSize: 10, border: "none", background: "transparent", color: task.endDate ? "#27AE60" : "#AAA",
              fontFamily: "'Lora',serif", cursor: "pointer", outline: "none", width: 80 }} />
        </div>

        {/* Commentaire toggle */}
        <button onClick={() => setShowCommentModal(function(m){ return !m; })} title="Commentaire"
          style={{ border: "none", background: "none", cursor: "pointer", fontSize: 14,
            opacity: task.comment ? 1 : 0.3, padding: 0 }}
          onMouseEnter={e => e.currentTarget.style.opacity = "1"}
          onMouseLeave={e => e.currentTarget.style.opacity = task.comment ? "1" : "0.3"}>
          💬
        </button>

        {/* Supprimer */}
        <button onClick={() => onDelete(task.id)}
          style={{ border: "none", background: "none", cursor: "pointer", color: "#DDD", fontSize: 15, padding: 0 }}
          onMouseEnter={e => e.currentTarget.style.color = "#E74C3C"}
          onMouseLeave={e => e.currentTarget.style.color = "#DDD"}>×</button>
      </div>

      

      {/* Sous-tâches */}
      {expanded && (task.subtasks || []).map(sub => (
        <ReportTaskRow key={sub.id} task={sub} depth={depth + 1}
          onUpdate={updSub => onUpdate({ ...task, subtasks: task.subtasks.map(s => s.id === updSub.id ? updSub : s) })}
          onDelete={subId => onUpdate({ ...task, subtasks: task.subtasks.filter(s => s.id !== subId) })} />
      ))}
      {showCommentModal && React.createElement("div", {
          style: {position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",
            zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",padding:16},
          onMouseDown: function(e){ if(e.target===e.currentTarget) setShowCommentModal(false); }
        },
        React.createElement("div", {
          style:{background:"white",borderRadius:14,width:"100%",maxWidth:520,
            boxShadow:"0 20px 60px rgba(0,0,0,0.2)",borderTop:"4px solid #102A63"}
        },
          React.createElement("div", {
            style:{padding:"14px 18px",borderBottom:"1px solid #F0F0F0",
              display:"flex",justifyContent:"space-between",alignItems:"center"}
          },
            React.createElement("div", {
              style:{fontSize:13,fontWeight:700,fontFamily:"'Lora',serif",color:"#2C3E50"}
            }, "💬 " + (task.label || "Commentaire")),
            React.createElement("button", {
              onClick: function(){ setShowCommentModal(false); },
              style:{border:"none",background:"none",fontSize:20,cursor:"pointer",color:"#BDC3C7"}
            }, "×")
          ),
          React.createElement("div", {style:{padding:"16px 18px"}},
            React.createElement(RichTextArea, {
              value: task.comment || "",
              onChange: function(v){ onUpdate(Object.assign({}, task, {comment:v})); },
              placeholder: "Commentaire…",
              rows: 5
            })
          ),
          React.createElement("div", {
            style:{padding:"10px 18px",borderTop:"1px solid #F0F0F0",display:"flex",justifyContent:"flex-end"}
          },
            React.createElement("button", {
              onClick: function(){ setShowCommentModal(false); },
              style:{background:"#102A63",color:"white",border:"none",borderRadius:8,
                padding:"7px 18px",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif"}
            }, "✓ Fermer")
          )
        )
      )}
    </React.Fragment>
  );
}

/* ── ReportModal ── */
function ReportModal({ report, onSave, onClose }) {
  const empty = {
    id: uid(), name: "", type: "", status: "project",
    description: "", createdAt: today(), publishedAt: "",
    tasks: [], notes: ""
  };
  const [d, setD] = React.useState(report ? { ...empty, ...report } : empty);

  const [undoTask, setUndoTask] = React.useState(null);

  const handleDeleteTask = (id) => {
    const task = (d.tasks || []).find(t => t.id === id);
    setD(prev => ({ ...prev, tasks: (prev.tasks||[]).filter(t => t.id !== id) }));
    if (task) {
      setUndoTask(task);
      setTimeout(() => setUndoTask(null), 10000);
    }
  };
  const undoDelete = () => {
    if (undoTask) {
      setD(prev => ({ ...prev, tasks: [...(prev.tasks||[]), undoTask] }));
      setUndoTask(null);
    }
  };

  const addTask = () => setD(prev => ({
    ...prev, tasks: [...(prev.tasks || []), {
      id: uid(), label: "", description: "", taskType: "", priority: "normale",
      status: "todo", done: false, createdAt: today(), endDate: "", comment: "", subtasks: []
    }]
  }));

  const addSubtask = (taskId) => setD(prev => ({
    ...prev, tasks: (prev.tasks || []).map(t => t.id === taskId ? {
      ...t, subtasks: [...(t.subtasks || []), {
        id: uid(), label: "", description: "", taskType: "", priority: "normale",
        status: "todo", done: false, createdAt: today(), endDate: "", comment: "", subtasks: []
      }]
    } : t)
  }));

  const updateTask = (updated) => setD(prev => ({
    ...prev, tasks: (prev.tasks || []).map(t => t.id === updated.id ? updated : t)
  }));
  const deleteTask = (id) => setD(prev => ({ ...prev, tasks: (prev.tasks || []).filter(t => t.id !== id) }));

  const typeObj   = REPORT_TYPES.find(t => t.id === d.type) || REPORT_TYPES[0];
  const statusObj = REPORT_STATUSES.find(s => s.id === d.status) || REPORT_STATUSES[0];

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 3000,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 16, backdropFilter: "blur(4px)" }}
      onMouseDown={(e) => { if (e.target === e.currentTarget) e.currentTarget._mdOutside = true; }}
      onMouseUp={(e) => { if (e.target === e.currentTarget && e.currentTarget._mdOutside) { e.currentTarget._mdOutside = false; onClose(); } }}>
      <div style={{ background: "white", borderRadius: 16, width: "100%", maxWidth: 1230,
        maxHeight: "92vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.2)", borderTop: "4px solid #102A63" }}>

        {/* Header */}
        <div style={{ padding: "16px 22px", borderBottom: "1px solid #F0F0F0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>
            {report ? "Modifier le reporting" : "Nouveau reporting"}
          </div>
          <button onClick={onClose} style={{ border: "none", background: "none", fontSize: 22, cursor: "pointer", color: "#BDC3C7" }}>×</button>
        </div>

        <div style={{ padding: "18px 22px", display: "flex", flexDirection: "column", gap: 14 }}>

          {/* Ligne 1 : Nom */}
          <div>
            <label style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif" }}>NOM DU REPORTING</label>
            <input value={d.name} onChange={e => setD({...d, name: e.target.value})} placeholder="Ex: Reporting mensuel CA"
              className="payment-field"
              style={{ ...S.input, fontSize: 13, fontFamily: "'Lora',serif", width: "100%", marginTop: 4, fontWeight: 600 }} />
          </div>

          {/* Ligne 2 : Type + Statut */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div>
              <label style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", letterSpacing:"0.06em" }}>TYPE DE REPORTING</label>
              <div style={{ display: "flex", gap: 6, marginTop: 6, flexWrap: "wrap" }}>
                {REPORT_TYPES.map(t => (
                  <button key={t.id} type="button" onClick={() => setD({...d, type: t.id})}
                    style={{ border: `2px solid ${d.type === t.id ? t.color : "#E0E0E0"}`,
                      background: d.type === t.id ? t.bg : "white", color: d.type === t.id ? t.color : "#888",
                      borderRadius: 8, padding: "5px 14px", fontSize: 11, cursor: "pointer",
                      fontFamily: "'Lora',serif", fontWeight: d.type === t.id ? 700 : 400 }}>
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif" }}>STATUT</label>
              <div style={{ display: "flex", gap: 5, marginTop: 6, flexWrap: "wrap" }}>
                {REPORT_STATUSES.map(s => (
                  <button key={s.id} type="button" onClick={() => setD({...d, status: s.id})}
                    style={{ border: `2px solid ${d.status === s.id ? s.color : "#E0E0E0"}`,
                      background: d.status === s.id ? s.bg : "white", color: d.status === s.id ? s.color : "#888",
                      borderRadius: 8, padding: "5px 12px", fontSize: 10, cursor: "pointer",
                      fontFamily: "'Lora',serif", fontWeight: d.status === s.id ? 700 : 400 }}>
                    {s.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Ligne 3 : Description */}
          <div>
            <label style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif" }}>DESCRIPTION</label>
            <textarea value={d.description || ""} onChange={e => setD({...d, description: e.target.value})} rows={2}
              className="payment-field"
              style={{ ...S.input, fontSize: 11, width: "100%", resize: "vertical", marginTop: 4 }} />
          </div>

          {/* Ligne 4 : Dates */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div>
              <label style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif" }}>DATE DE CRÉATION</label>
              <input type="date" value={d.createdAt || ""} onChange={e => setD({...d, createdAt: e.target.value})}
                onClick={e => { try { e.currentTarget.showPicker(); } catch(_) {} }}
                className="payment-field"
                style={{ ...S.input, fontSize: 11, width: "100%", marginTop: 4 }} />
            </div>
            <div>
              <label style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif" }}>DATE DE PUBLICATION</label>
              <input type="date" value={d.publishedAt || ""} onChange={e => setD({...d, publishedAt: e.target.value})}
                onClick={e => { try { e.currentTarget.showPicker(); } catch(_) {} }}
                className="payment-field"
                style={{ ...S.input, fontSize: 11, width: "100%", marginTop: 4 }} />
            </div>
          </div>

          {/* Ligne 5 : Suivi des tâches */}
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <label style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", letterSpacing: "0.06em" }}>SUIVI DES TÂCHES</label>
              <div style={{ display: "flex", gap: 6 }}>
                {(d.tasks || []).length > 0 && (
                  <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'Lora',serif" }}>
                    {(d.tasks || []).filter(t => t.done).length}/{(d.tasks || []).length} terminées
                  </span>
                )}
                <button type="button" onClick={addTask}
                  style={{ ...S.btn("#102A63"), padding: "3px 10px", fontSize: 10 }}>+ Tâche</button>
              </div>
            </div>

            {(d.tasks || []).length === 0 ? (
              <div style={{ border: "1px dashed #E0E0E0", borderRadius: 8, padding: "16px", textAlign: "center", color: "#CCC", fontSize: 11, fontFamily: "'Lora',serif" }}>
                Aucune tâche — cliquez sur "+ Tâche" pour commencer
              </div>
            ) : (
              <div style={{ border: "1px solid #ECEAE5", borderRadius: 10, overflow: "hidden" }}>
                {/* En-têtes */}
                <div style={{ display: "grid", gridTemplateColumns: "20px 16px 56px 1fr 28px 3fr 72px 160px 88px 88px 32px 32px",
                  padding: "5px 8px", background: "#102A63", borderBottom: "1px solid #102A63" }}>
                  <div />
                  <div />
                  <div style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>PRIO.</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>LIBELLÉ</div>
                  <div />
                  <div style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>DESCRIPTION</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>TYPE</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif", textAlign: "center" }}>DATE CRÉATION</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>STATUT</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif", textAlign: "center" }}>DATE FIN</div>
                  <div /><div />
                </div>

                {/* Tâches */}
                {(d.tasks || []).map(task => (
                  <React.Fragment key={task.id}>
                    <ReportTaskRow task={task} depth={0} onUpdate={updateTask} onDelete={handleDeleteTask} onAddSubtask={addSubtask} />

                  </React.Fragment>
                ))}
              </div>
            )}
          </div>
        </div>

        {undoTask && (
          <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
            zIndex: 9999, background: "#2C3E50", color: "white", borderRadius: 12,
            padding: "12px 20px", boxShadow: "0 8px 24px rgba(0,0,0,0.25)",
            display: "flex", alignItems: "center", gap: 16,
            fontFamily: "'Lora',serif", fontSize: 12, animation: "slideUp 0.3s ease" }}>
            <span>🗑 <strong>"{(undoTask.label||"Tâche").slice(0,30)}"</strong> supprimée</span>
            <button onClick={undoDelete}
              style={{ background: "#27AE60", border: "none", borderRadius: 6, color: "white",
                padding: "5px 12px", fontSize: 11, cursor: "pointer", fontWeight: 700, fontFamily: "'Lora',serif" }}>↩ Annuler</button>
            <button onClick={() => setUndoTask(null)}
              style={{ background: "none", border: "none", color: "rgba(255,255,255,0.5)", cursor: "pointer", fontSize: 16, padding: 0 }}>×</button>
          </div>
        )}
        <div style={{ padding:"0 22px 16px" }}>
          <div style={{ borderTop:"1px solid #F0F0F0", paddingTop:14, marginBottom:14 }}>
            <div style={{ fontSize:10,fontWeight:700,color:"#102A63",fontFamily:"'Lora',serif",marginBottom:7,letterSpacing:"0.06em" }}>NOTES</div>
            <RichTextArea value={d.notes||""} onChange={v=>setD({...d,notes:v})} placeholder="Notes sur ce reporting…" rows={3} />
          </div>
          <div style={{ borderTop:"1px solid #F0F0F0", paddingTop:14, marginBottom:14 }}>
            <div style={{ fontSize:10,fontWeight:700,color:"#102A63",fontFamily:"'Lora',serif",letterSpacing:"0.06em",marginBottom:8 }}>PIÈCES JOINTES</div>
            <AttachmentZone attachments={d.attachments} onChange={v => setD({ ...d, attachments: v })} />
          </div>
          <div style={{ display:"flex", justifyContent:"flex-end", gap:8, paddingBottom:4 }}>
            <button onClick={onClose} style={{ ...S.btn("#F0F0F0", "#666"), padding: "7px 16px", fontSize: 12 }}>Annuler</button>
            <button onClick={() => { onSave(d); onClose(); }} style={{ ...S.btn("#102A63"), padding: "7px 16px", fontSize: 12 }}>✓ Enregistrer</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── ReportCard ── */
function ReportCard({ report, onClick }) {
  const typeObj   = REPORT_TYPES.find(t => t.id === report.type) || REPORT_TYPES[0];
  const statusObj = REPORT_STATUSES.find(s => s.id === report.status) || REPORT_STATUSES[0];
  const tasks     = report.tasks || [];
  const done      = tasks.filter(t => t.done).length;
  const pct       = tasks.length > 0 ? Math.round(done / tasks.length * 100) : 0;

  return (
    <div onClick={() => onClick(report)}
      style={{ background: "white", borderRadius: 14, border: "1px solid #ECEAE5", padding: "14px 16px",
        cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.04)", transition: "all 0.15s" }}
      onMouseEnter={e => { e.currentTarget.style.boxShadow = "0 6px 20px rgba(0,0,0,0.10)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
      onMouseLeave={e => { e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.04)"; e.currentTarget.style.transform = "none"; }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", flex: 1, marginRight: 8 }}>{report.name || "Sans titre"}</div>
        <div style={{ display: "flex", gap: 5, flexShrink: 0 }}>
          <span style={{ fontSize: 9, fontWeight: 700, background: typeObj.bg, color: typeObj.color, borderRadius: 20, padding: "2px 8px", fontFamily: "'Lora',serif" }}>{typeObj.label}</span>
          <span style={{ fontSize: 9, fontWeight: 700, background: statusObj.bg, color: statusObj.color, borderRadius: 20, padding: "2px 8px", fontFamily: "'Lora',serif" }}>{statusObj.label}</span>
        </div>
      </div>
      {report.description && <div style={{ fontSize: 11, color: "#888", fontFamily: "'Lora',serif", marginBottom: 8, lineHeight: 1.5 }}>{report.description}</div>}
      {tasks.length > 0 && (
        <div style={{ marginBottom: 4 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
            <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'Lora',serif" }}>AVANCEMENT TÂCHES</span>
            <span style={{ fontSize: 9, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif" }}>{done}/{tasks.length} — {pct}%</span>
          </div>
          <div style={{ height: 4, background: "#F0F0F0", borderRadius: 10, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: pct === 100 ? "#27AE60" : pct > 60 ? "#2980B9" : pct > 30 ? "#E67E22" : "#C0392B", borderRadius: 10, transition: "width 0.4s" }} />
          </div>
        </div>
      )}
      <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
        {report.createdAt && <span style={{ fontSize: 9, color: "#AAA", fontFamily: "'Lora',serif" }}>📅 Créé {report.createdAt.split("-").reverse().join("/")}</span>}
        {report.publishedAt && <span style={{ fontSize: 9, color: "#27AE60", fontFamily: "'Lora',serif" }}>✅ Publié {report.publishedAt.split("-").reverse().join("/")}</span>}
      </div>
    </div>
  );
}

/* ── ReportingView ── */
function ReportingView({ tasks, onEdit, onToggle, onSaveComment, settings }) {
  const [reports, setReports]         = React.useState(() => loadReports());
  const [reportModal, setReportModal] = React.useState(null);
  const [rtColW, setRtColW]           = React.useState({ num: 28, prio: 20, title: 220, sub: 28, status: 80, category: 100, type: 80, created: 82, due: 82 });
  const [undoReport, setUndoReport]   = React.useState(null);
  const undoRptTimerRef               = React.useRef(null);
  const [showTrashRpt, setShowTrashRpt] = React.useState(false);
  const [trashRpt, setTrashRpt]       = React.useState(() => { try { const s=localStorage.getItem("reporting_trash_v1"); return s?JSON.parse(s):[]; } catch { return []; } });
  const [showOnlyOpen, setShowOnlyOpen] = React.useState(true);

  const saveTrashRpt = t => { try { localStorage.setItem("reporting_trash_v1", JSON.stringify(t)); } catch {} };
  const thirtyDaysAgoRpt = new Date(Date.now()-30*864e5).toISOString();
  const activeTrashRpt   = trashRpt.filter(r=>r.deletedAt>thirtyDaysAgoRpt);
  const trashDaysLeftRpt = r => Math.max(0,Math.ceil((new Date(r.deletedAt).getTime()+30*864e5-Date.now())/864e5));

  const startResizeRt = (col, e) => {
    e.preventDefault();
    const startX = e.clientX, startW = rtColW[col];
    const onMove = (ev) => setRtColW(w => ({ ...w, [col]: Math.max(30, startW + ev.clientX - startX) }));
    const onUp = () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  const saveReport = (r) => {
    setReports(p => {
      const exists = p.find(x => x.id === r.id);
      const next = exists ? p.map(x => x.id === r.id ? r : x) : [...p, r];
      saveReports(next); return next;
    });
  };

  const delReport = (id) => {
    const r = reports.find(x=>x.id===id); if (!r) return;
    setReports(p=>{ const n=p.filter(x=>x.id!==id); saveReports(n); return n; });
    const trashed = { ...r, deletedAt: new Date().toISOString() };
    setTrashRpt(p=>{ const n=[...p,trashed]; saveTrashRpt(n); return n; });
    if (undoRptTimerRef.current) clearTimeout(undoRptTimerRef.current);
    setUndoReport(r);
    undoRptTimerRef.current = setTimeout(() => setUndoReport(null), 10000);
  };
  const undoDeleteRpt = () => {
    if (!undoReport) return;
    clearTimeout(undoRptTimerRef.current);
    setReports(p=>{ const n=[...p,undoReport]; saveReports(n); return n; });
    setTrashRpt(p=>{ const n=p.filter(x=>x.id!==undoReport.id); saveTrashRpt(n); return n; });
    setUndoReport(null);
  };
  const restoreFromTrashRpt = id => {
    const r=trashRpt.find(x=>x.id===id); if (!r) return;
    const { deletedAt, ...restored } = r;
    setReports(p=>{ const n=[...p,restored]; saveReports(n); return n; });
    setTrashRpt(p=>{ const n=p.filter(x=>x.id!==id); saveTrashRpt(n); return n; });
  };
  const purgeTrashRpt = id => setTrashRpt(p=>{ const n=p.filter(x=>x.id!==id); saveTrashRpt(n); return n; });

  const CLOSED_STATUSES = ["done","cancelled","clos","cloture","annulé"];
  const reportingTasks = tasks.filter(t => {
    if ((t.type || "").toLowerCase() !== "reporting") return false;
    if (showOnlyOpen) { const st=(t.status||"").toLowerCase(); if(CLOSED_STATUSES.some(s=>st.includes(s))) return false; }
    return true;
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      {/* Bloc 1 : Tâches */}
      <div style={{ background: "white", borderRadius: 16, border: "1px solid #ECEAE5", overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
        <div style={{ padding: "12px 18px", borderBottom: "1px solid #F0F0F0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>☰ Tâches Reporting <span style={{ fontSize: 11, color: "#AAA", fontWeight: 400 }}>({reportingTasks.length})</span></div>
          <button onClick={() => setShowOnlyOpen(p => !p)}
            style={{ border: `1px solid ${showOnlyOpen ? "#102A63" : "#E0E0E0"}`, background: showOnlyOpen ? "#EEF2FF" : "white", color: showOnlyOpen ? "#102A63" : "#888", borderRadius: 20, padding: "3px 12px", fontSize: 10, cursor: "pointer", fontFamily: "'Lora',serif", fontWeight: showOnlyOpen ? 700 : 400 }}>
            {showOnlyOpen ? "Non clôturées" : "Toutes"}
          </button>
        </div>
        {reportingTasks.length === 0 ? (
          <div style={{ padding: "28px", textAlign: "center", color: "#CCC", fontSize: 12, fontFamily: "'Lora',serif" }}>{showOnlyOpen ? "Aucune tâche Reporting non clôturée" : "Aucune tâche de type Reporting"}</div>
        ) : (
          <div style={{ overflowX: "hidden" }}>
            {/* En-têtes */}
            <div style={{ display: "flex", alignItems: "center", gap: 7, background: "#102A63", padding: "5px 8px 4px", minWidth: "fit-content", borderBottom: "1px solid #0A1F50" }}>
              <div style={{ width: 42, flexShrink: 0 }} />
              <div style={{ minWidth: 16, flexShrink: 0 }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>P.</span>
              </div>
              <div style={{ width: 16, flexShrink: 0 }} />
              <div style={{ width: rtColW.title, flexShrink: 0, position: "relative" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>TITRE</span>
                <div onMouseDown={e => startResizeRt("title", e)} style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 6, cursor: "col-resize", zIndex: 2 }} />
              </div>
              <div style={{ minWidth: 28, flexShrink: 0 }} />
              <div style={{ width: rtColW.status, flexShrink: 0, position: "relative" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>STATUT</span>
                <div onMouseDown={e => startResizeRt("status", e)} style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 6, cursor: "col-resize", zIndex: 2 }} />
              </div>
              <div style={{ width: rtColW.category, flexShrink: 0, position: "relative" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>CATÉGORIE</span>
                <div onMouseDown={e => startResizeRt("category", e)} style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 6, cursor: "col-resize", zIndex: 2 }} />
              </div>
              <div style={{ width: rtColW.type, flexShrink: 0, position: "relative" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>TYPE</span>
                <div onMouseDown={e => startResizeRt("type", e)} style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 6, cursor: "col-resize", zIndex: 2 }} />
              </div>
              <div style={{ width: 120, flexShrink: 0 }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>ÉTIQUETTE</span>
              </div>
              <div style={{ flex: 1 }} />
              <div style={{ width: rtColW.created, flexShrink: 0, position: "relative", textAlign: "right" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>CRÉÉE</span>
                <div onMouseDown={e => startResizeRt("created", e)} style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 6, cursor: "col-resize", zIndex: 2 }} />
              </div>
              <div style={{ width: 16, flexShrink: 0 }} />
              <div style={{ width: rtColW.due, flexShrink: 0, position: "relative", textAlign: "right" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>ÉCHÉANCE</span>
                <div onMouseDown={e => startResizeRt("due", e)} style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 6, cursor: "col-resize", zIndex: 2 }} />
              </div>
              <div style={{ width: 30, flexShrink: 0, textAlign: "center" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "white", fontFamily: "'Lora',serif" }}>NOTE</span>
              </div>
            </div>
            {/* Lignes */}
            <div style={{ maxHeight: 360, overflowY: "auto" }}>
              {reportingTasks.map((t, i) => <TaskCard key={t.id} task={t} num={i+1} onDelete={() => {}} onToggle={onToggle} onEdit={onEdit} onSaveComment={onSaveComment} colWidths={{ title: rtColW.title, status: rtColW.status, category: rtColW.category, type: rtColW.type, created: rtColW.created, due: rtColW.due }} settings={settings} />)}
            </div>
          </div>
        )}
      </div>

      {/* Bloc 2 : Reportings */}
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>
            <svg width="20" height="20" viewBox="0 0 24 24" style={{ verticalAlign:"middle", marginRight:6 }} fill="none">
              <rect x="2" y="2" width="9" height="11" rx="1.5" fill="#F2C94C"/>
              <rect x="13" y="2" width="9" height="6" rx="1.5" fill="#F2994A"/>
              <rect x="2" y="15" width="9" height="7" rx="1.5" fill="#EB5757"/>
              <rect x="13" y="10" width="9" height="12" rx="1.5" fill="#2F80ED"/>
            </svg>
            Mes Reportings
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setShowTrashRpt(p => !p)}
              style={{ border: `1px solid ${showTrashRpt ? "#E67E22" : "#E0E0E0"}`, background: showTrashRpt ? "#FEF9E7" : "white", color: showTrashRpt ? "#E67E22" : "#888", borderRadius: 8, padding: "6px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Lora',serif", display: "flex", alignItems: "center", gap: 5 }}>
              🗑 Corbeille {activeTrashRpt.length > 0 && <span style={{ background: "#E67E22", color: "white", borderRadius: 10, fontSize: 9, padding: "1px 5px" }}>{activeTrashRpt.length}</span>}
            </button>
            <button onClick={() => setReportModal({})} style={{ ...S.btn("#102A63"), padding: "7px 16px", fontSize: 11 }}>+ Nouveau reporting</button>
          </div>
        </div>
        {reports.length === 0 ? (
          <div style={{ background: "white", borderRadius: 14, border: "1px dashed #E0E0E0", padding: "40px", textAlign: "center", color: "#CCC" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📊</div>
            <div style={{ fontSize: 13, fontFamily: "'Lora',serif" }}>Aucun reporting — cliquez sur "+ Nouveau reporting" pour commencer</div>
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
            {reports.map(r => (
              <div key={r.id} style={{ position: "relative" }}>
                <ReportCard report={r} onClick={() => setReportModal(r)} />
                <button onClick={(e) => { e.stopPropagation(); delReport(r.id); }}
                  style={{ position: "absolute", top: 8, right: 8, border: "none", background: "rgba(255,255,255,0.85)",
                    borderRadius: "50%", width: 20, height: 20, cursor: "pointer", fontSize: 11, color: "#E74C3C",
                    display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.1)" }}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {showTrashRpt && (
        <div style={{ marginTop: 8 }}>
          <div style={{ fontSize: 12, color: "#AAA", fontFamily: "'Lora',serif", marginBottom: 12 }}>
            Les reportings supprimés sont conservés 30 jours, puis supprimés définitivement.
          </div>
          {activeTrashRpt.length === 0
            ? <div style={{ background: "white", borderRadius: 14, border: "1px dashed #E0E0E0", padding: "32px", textAlign: "center", color: "#CCC" }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>🗑</div>
                <div style={{ fontFamily: "'Lora',serif", fontSize: 13 }}>Corbeille vide</div>
              </div>
            : <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
                {activeTrashRpt.map(r => (
                  <div key={r.id} style={{ position: "relative", opacity: 0.75 }}>
                    <div style={{ position: "absolute", inset: 0, borderRadius: 14, border: "2px dashed #E0E0E0", zIndex: 1, pointerEvents: "none" }} />
                    <ReportCard report={r} onClick={() => {}} />
                    <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                      <button onClick={() => restoreFromTrashRpt(r.id)} style={{ ...S.btn("#27AE60"), fontSize: 10, padding: "5px 12px", flex: 1 }}>↩ Restaurer</button>
                      <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'Lora',serif", alignSelf: "center" }}>J-{trashDaysLeftRpt(r)}</span>
                      <button onClick={() => purgeTrashRpt(r.id)} style={{ ...S.btn("#E74C3C"), fontSize: 10, padding: "5px 10px" }}>✕</button>
                    </div>
                  </div>
                ))}
              </div>}
        </div>
      )}

      {undoReport && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 9998, background: "#2C3E50", color: "white", borderRadius: 12, padding: "12px 20px", boxShadow: "0 8px 24px rgba(0,0,0,0.25)", display: "flex", alignItems: "center", gap: 16, fontFamily: "'Lora',serif", fontSize: 12 }}>
          <span>🗑 <strong>"{(undoReport.name||"Reporting").slice(0,30)}"</strong> supprimé</span>
          <button onClick={undoDeleteRpt} style={{ background: "#27AE60", border: "none", borderRadius: 6, color: "white", padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Lora',serif", fontWeight: 700 }}>↩ Annuler</button>
          <button onClick={() => setUndoReport(null)} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.5)", cursor: "pointer", fontSize: 16, padding: 0 }}>×</button>
        </div>
      )}

      {reportModal !== null && (
        <ReportModal
          report={Object.keys(reportModal).length > 0 ? reportModal : null}
          onSave={saveReport}
          onClose={() => setReportModal(null)}
        />
      )}
    </div>
  );
}

const PAYMENT_STATUSES = [
  { id: "pending",   label: "En attente",  bg: "#FEF9C3", color: "#A16207", icon: "⏳" },
  { id: "approved",  label: "Validé",      bg: "#DBEAFE", color: "#1D4ED8", icon: "✓"  },
  { id: "paid",      label: "Payé",        bg: "#D1FAE5", color: "#065F46", icon: "✅" },
  { id: "rejected",  label: "Refusé",      bg: "#FEE2E2", color: "#B91C1C", icon: "✗"  },
  { id: "urgent",    label: "Urgent",      bg: "#FDEDEC", color: "#C0392B", icon: "🚨" },
];
const PAYMENT_PRIORITIES = [
  { id: "prioritaire", label: "Prioritaire", icon: "⊛ P1", color: "#C0392B" },
  { id: "urgent",      label: "Urgent",      icon: "▲ P2", color: "#E67E22" },
  { id: "normal",      label: "Normal",      icon: "▬ P3", color: "#7F8C8D" },
  { id: "faible",      label: "Faible",      icon: "▼ P4", color: "#27AE60" },
];

function fmtEuro(n) {
  if (n === "" || n === null || n === undefined) return "—";
  const num = typeof n === "string" ? parseFloat(n.replace(/\s/g,"").replace(",", ".")) : n;
  if (isNaN(num)) return "—";
  return new Intl.NumberFormat("fr-FR", { style: "currency", currency: "EUR", minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
}
function fmtAmountInput(v) {
  if (v === "" || v === null || v === undefined) return "";
  const num = parseFloat(String(v).replace(/\s/g,"").replace(",","."));
  if (isNaN(num)) return String(v);
  return new Intl.NumberFormat("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
}
function loadPayments() { try { const s = localStorage.getItem(PAYMENTS_KEY); return s ? JSON.parse(s) : []; } catch { return []; } }
function savePayments(p) { try { localStorage.setItem(PAYMENTS_KEY, JSON.stringify(p)); } catch {} }

function PaymentModal({ payment, onSave, onClose, settings }) {
  const [d, setD] = React.useState(payment || { id: uid(), supplier: "", requestDate: today(), requester: "", estimatedDate: "", amount: "", status: "pending", priority: "normal", isClientSupplier: false, notes: "" });
  const [amountDisplay, setAmountDisplay] = React.useState(payment && payment.amount ? fmtAmountInput(payment.amount) : "");

  const handleAmountChange = (e) => {
    setAmountDisplay(e.target.value);
    const numeric = e.target.value.replace(/\s/g, "").replace(",", ".");
    setD({ ...d, amount: numeric });
  };
  const handleAmountBlur = () => {
    if (d.amount) setAmountDisplay(fmtAmountInput(d.amount));
  };

  const labelStyle = { fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", letterSpacing:"0.06em" };
  const inputStyle = { ...S.input, fontSize: 10, width: "100%", marginTop: 4 };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 3000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, backdropFilter: "blur(4px)" }}
      onMouseDown={(e) => { if (e.target === e.currentTarget) e.currentTarget._mdOutside = true; }}
      onMouseUp={(e) => { if (e.target === e.currentTarget && e.currentTarget._mdOutside) { e.currentTarget._mdOutside = false; onClose(); } }}>
      <div style={{ background: "white", borderRadius: 16, width: "100%", maxWidth: 540, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.2)", borderTop: "4px solid #102A63" }}>
        <div style={{ padding: "14px 18px", borderBottom: "1px solid #F0F0F0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>{payment ? "Modifier le paiement" : "Nouveau paiement"}</div>
          <button onClick={onClose} style={{ border: "none", background: "none", fontSize: 20, cursor: "pointer", color: "#BDC3C7" }}>×</button>
        </div>
        <div style={{ padding: "14px 18px", display: "flex", flexDirection: "column", gap: 10 }}>

          {/* Ligne 1 : Fournisseur + Demandeur */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div><label style={labelStyle}>FOURNISSEUR</label><input value={d.supplier} onChange={e => setD({...d, supplier: e.target.value})} placeholder="Nom du fournisseur" className="payment-field" style={inputStyle} /></div>
            <div><label style={labelStyle}>COMPTE</label><input value={d.account||""} onChange={e => setD({...d, account: e.target.value})} placeholder="Code bénéficiaire" className="payment-field" style={inputStyle} /></div>
            <div><label style={labelStyle}>DEMANDEUR</label><input value={d.requester} onChange={e => setD({...d, requester: e.target.value})} placeholder="Nom du demandeur" className="payment-field" style={inputStyle} /></div>
          </div>

          {/* Ligne 2 : Dates */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div><label style={labelStyle}>DATE DEMANDE</label>
              <input type="date" value={d.requestDate} onChange={e => setD({...d, requestDate: e.target.value})} onClick={e => { try { e.currentTarget.showPicker(); } catch(_) {} }} className="payment-field" style={inputStyle} /></div>
            <div><label style={labelStyle}>DATE PAIEMENT ESTIMÉE</label>

/* ── Helpers financiers ── */
function taux_financier(n, pmt, pv, maxIter=100) {
  // Newton-Raphson pour RATE(n, pmt, pv)
  if (!n || !pmt || !pv) return null;
  let r = 0.01;
  for (let i=0; i<maxIter; i++) {
    const f  = pv * Math.pow(1+r, n) + pmt * ((Math.pow(1+r, n)-1)/r);
    const df = pv * n * Math.pow(1+r, n-1) + pmt * (n*r*Math.pow(1+r,n-1) - (Math.pow(1+r,n)-1)) / (r*r);
    const r2 = r - f/df;
    if (Math.abs(r2-r) < 1e-8) return r2;
    r = r2;
  }
  return r;
}
function calcCBRow(row) {
  const mht  = parseNum(row.montantHT)  || 0;
  const coeff= parseNum(row.coeff)      || 0;
  const n    = parseInt(row.nbLoyers)   || 0;
  // Valeur résiduelle : priorité au taux VR si renseigné
  const tauxVR = parseNum(row.tauxVR) || 0;
  const vr   = tauxVR > 0 ? mht * tauxVR / 100 : (parseNum(row.valeurRes) || 0);
  const fa   = parseNum(row.fraisAnn)   || 0;
  const loyerHT  = mht > 0 && coeff > 0 ? mht * coeff / 100 : (parseFloat(row.loyerHT)||0);
  const loyerTTC = loyerHT * 1.2;
  const mttc     = mht * 1.2;
  const loyerMaj = n > 0 ? loyerHT + vr/n + fa/n : loyerHT;
  const r_taux   = n>0 && loyerTTC>0 && mttc>0 ? taux_financier(n, -loyerTTC, mttc) : null;
  const taux12   = r_taux !== null ? r_taux * 12 * 100 : null;
  // TEG
  const r_teg    = (n>0 && loyerTTC>0 && mttc>0)
    ? taux_financier(n, -(loyerTTC + (fa*1.2 + vr*1.2)/n), mttc)
    : null;
  const teg12    = r_teg !== null ? r_teg * 12 * 100 : null;
  const coutTotal= n>0 ? loyerTTC*n + vr*1.2 + fa*1.2 - mttc : null;
  return { loyerHT, loyerTTC, mttc, loyerMaj, taux12, teg12, coutTotal, vr };
}

/* ── Génération d'échéancier ── */
/* Parse un nombre saisi avec , ou . comme décimale, et ignorant les espaces/apostrophes */
function parseNum(v) {
  if (v === null || v === undefined || v === "") return NaN;
  const s = String(v).replace(/\s/g,"").replace(/'/g,"").replace(/,/g,".");
  return parseFloat(s);
}

function genEcheancier(montantTTC, loyerTTC, nbLoyers, tauxMensuel) {
  if (!montantTTC || !loyerTTC || !nbLoyers) return [];
  const r = tauxMensuel || 0;
  let capital = montantTTC;
  const rows = [];
  for (let i=1; i<=nbLoyers; i++) {
    const interets = capital * r;
    const amort    = loyerTTC - interets;
    capital        = Math.max(0, capital - amort);
    rows.push({ n:i, loyer:loyerTTC, interets, amort, capitalRestant:capital });
  }
  return rows;
}

        +'<td style="padding:4px 8px;text-align:right;color:#E67E22">'+fmtN(row.interets)+'</td>'
        +'<td style="padding:4px 8px;text-align:right;color:#27AE60">'+fmtN(row.amort)+'</td>'
        +'<td style="padding:4px 8px;text-align:right;color:#C0392B">'+fmtN(row.capitalRestant)+'</td>'
        +'</tr>';
    }).join('');
    return '<div class="section" style="page-break-before:always">'
      +'<h2>Échéancier des loyers</h2>'
      +'<table>'
      +'<thead><tr>'
      +'<th style="text-align:right">N°</th><th>Date</th>'
      +'<th style="text-align:right">Loyer TTC</th>'
      +'<th style="text-align:right">Intérêts</th>'
      +'<th style="text-align:right">Amortissement</th>'
      +'<th style="text-align:right">Capital restant</th>'
      +'</tr></thead>'
      +'<tbody>'+lignesHtml+'</tbody>'
      +'<tfoot><tr style="background:#F0F0F0;font-weight:700;border-top:2px solid #ECEAE5">'
      +'<td colspan="2" style="padding:5px 8px">TOTAL</td>'
      +'<td style="padding:5px 8px;text-align:right;color:#102A63">'+fmtN(totalLoyer)+'</td>'
      +'<td style="padding:5px 8px;text-align:right;color:#E67E22">'+fmtN(totalInt)+'</td>'
      +'<td style="padding:5px 8px;text-align:right;color:#27AE60">'+fmtN(totalAmort)+'</td>'
      +'<td></td>'
      +'</tr></tfoot>'
      +'</table>'
      +'</div>';
  })()}

  ${d.notes?`<div class="notes"><strong style="font-size:10px;color:#102A63;text-transform:uppercase;letter-spacing:0.06em">Notes</strong><br/><br/>${d.notes}</div>`:""}

  <div class="footer">
    <span>${d.reference||""} — ${d.intitule||""}</span>
    <span>Crédit-bail · ${new Date().toLocaleDateString("fr-FR")}</span>
  </div>
  </body></html>`;
  const win = window.open("","_blank");
  if (win) { win.document.write(html); win.document.close(); setTimeout(()=>win.print(),500); }
}

/* ── Envoi mail du dossier CB ── */
function sendCBEmail(d) {
  const subject = encodeURIComponent(`Dossier Crédit-bail ${d.reference||""} — ${d.intitule||""}`);
  const body = encodeURIComponent(
    `Bonjour,\n\nVeuillez trouver ci-joint le détail du dossier crédit-bail suivant :\n\n` +
    `Référence : ${d.reference||"—"}\n` +
    `Intitulé  : ${d.intitule||"—"}\n` +
    `Statut    : ${(CB_KANBAN_STATUSES.find(s=>s.id===d.statut)||{name:d.statut}).name}\n` +
    `Montant HT: ${d.montantHT||"—"} €\n` +
    `Fournisseur: ${d.fournisseur||"—"}\n` +
    `Site      : ${d.site||"—"}\n\n` +
    `Pour visualiser la fiche complète avec les calculs financiers, merci d'ouvrir l'application.\n\nCordialement`
  );
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

                      style={{ ...S.btn("#27AE60"),fontSize:10,padding:"5px 10px" }}>Ajouter</button>
                  </div>
                </div>
              </div>
            )}

            {/* ── PAIEMENTS ── */}
            {tab==="paiements" && (
              <div style={{ marginTop:12 }}>
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"'Lora',serif" }}>
                    <thead>
                      <tr style={{ background:"#102A63" }}>
                        {["Montant","Effectué par","Date","Nature du paiement",""].map(h=>(
                          <th key={h} style={{ padding:"6px 10px",color:"white",fontWeight:400,textAlign:"left",fontSize:10,whiteSpace:"nowrap" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {(d.paiements||[]).length===0 && (
                        <tr><td colSpan={5} style={{ padding:"20px",textAlign:"center",color:"#CCC",fontFamily:"'Lora',serif",fontStyle:"italic" }}>Aucun paiement enregistré</td></tr>
                      )}
                      {(d.paiements||[]).map((p,i)=>(
                        <tr key={p.id} style={{ background:i%2===0?"white":"#FAFAFA",borderBottom:"1px solid #F0F0F0" }}>
                          <td style={{ padding:"5px 8px" }}>
                            <input type="number" value={p.montant} onChange={e=>updPmt(p.id,"montant",e.target.value)}
                              placeholder="0"
                              style={{ width:110,border:"1px solid #E0E0E0",borderRadius:6,padding:"3px 8px",fontSize:11,fontFamily:"'Lora',serif",textAlign:"right",outline:"none" }} />
                          </td>
                          <td style={{ padding:"5px 8px" }}>
                            <select value={p.effectuePar} onChange={e=>updPmt(p.id,"effectuePar",e.target.value)}
                              style={{ border:"1px solid #E0E0E0",borderRadius:6,padding:"3px 8px",fontSize:11,fontFamily:"'Lora',serif",background:"#FAFAFA",outline:"none",cursor:"pointer" }}>
                              <option>Banque</option>
                              <option>KP1</option>
                            </select>
                          </td>
                          <td style={{ padding:"5px 8px" }}>
                            <input type="date" value={p.date} onChange={e=>updPmt(p.id,"date",e.target.value)}
                              style={{ border:"1px solid #E0E0E0",borderRadius:6,padding:"3px 8px",fontSize:11,fontFamily:"'Lora',serif",outline:"none" }} />
                          </td>
                          <td style={{ padding:"5px 8px" }}>
                            <input value={p.nature} onChange={e=>updPmt(p.id,"nature",e.target.value)}
                              placeholder="Description…"
                              style={{ width:"100%",border:"1px solid #E0E0E0",borderRadius:6,padding:"3px 8px",fontSize:11,fontFamily:"'Lora',serif",outline:"none",minWidth:160 }} />
                          </td>
                          <td style={{ padding:"5px 8px",textAlign:"center" }}>
                            <button onClick={()=>delPmt(p.id)} style={{ border:"none",background:"none",color:"#E8A0A0",cursor:"pointer",fontSize:16 }}>×</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                    {(d.paiements||[]).length>0 && (
                      <tfoot>
                        <tr style={{ background:"#F8F9FB",borderTop:"2px solid #ECEAE5" }}>
                          <td style={{ padding:"6px 8px",fontWeight:700,fontFamily:"'Lora',serif",fontSize:11,color:"#102A63" }}>{fmtTotal(d.paiements)}</td>
                          <td colSpan={4}></td>
                        </tr>
                      </tfoot>
                    )}
                  </table>
                </div>
                <button onClick={addPmt} style={{ ...S.btn("#102A63"),fontSize:10,padding:"5px 14px",marginTop:10 }}>+ Ajouter un paiement</button>
              </div>
            )}

            {/* ── DOCUMENTS ── */}
            {tab==="documents" && (
              <div style={{ marginTop:12 }}>
                <div style={{ marginBottom:12, display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:11, fontFamily:"'Lora',serif", color:"#888" }}>Statut :</span>
                  <span style={{ fontSize:11, fontWeight:700, fontFamily:"'Lora',serif",
                    color: docsComplete?"#065F46":"#B91C1C",
                    background: docsComplete?"#D1FAE5":"#FEE2E2",
                    border: `0.5px solid ${docsComplete?"#065F46":"#B91C1C"}`,
                    borderRadius:4, padding:"2px 10px" }}>
                    {docsComplete?"✓ Complet":"⚠ Incomplet"}
                  </span>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {CB_DOC_TYPES.map(dt => {
                    const files = (d.documents||{})[dt.id]||[];
                    return (
                      <div key={dt.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"8px 12px",
                        background:"#FAFAFA", borderRadius:8, border:"1px solid #ECEAE5" }}>
                        <div style={{ fontSize:11, fontWeight:700, color:"#102A63", fontFamily:"'Lora',serif", width:140, flexShrink:0 }}>{dt.name}</div>
                        <div style={{ flex:1 }}>
                          {files.length>0
                            ? <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                                {files.map((f,i)=>(
                                  <span key={i} style={{ fontSize:10, fontFamily:"'Lora',serif", background:"#E0F7FA", color:"#0E7490",
                                    borderRadius:4, padding:"2px 8px", border:"0.5px solid #0E7490" }}>{f.name}</span>
                                ))}
                              </div>
                            : <span style={{ fontSize:11, color:"#CCC", fontFamily:"'Lora',serif", fontStyle:"italic" }}>Aucun fichier</span>}
                        </div>
                        <label style={{ cursor:"pointer" }}>
                          <input type="file" multiple style={{ display:"none" }} onChange={e=>setDoc(dt.id,e.target.files)} />
                          <span style={{ ...S.btn("#102A63"), fontSize:10, padding:"4px 10px" }}>📎 Joindre</span>
                        </label>
                        {files.length>0 && (
                          <button onClick={()=>setD(p=>({...p,documents:{...(p.documents||{}),[dt.id]:[]}}))
                          } style={{ border:"none",background:"none",color:"#E8A0A0",cursor:"pointer",fontSize:14 }}>×</button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ── ÉCHÉANCIER ── */}
            {tab==="echeancier" && (
              <div style={{ marginTop:12 }}>
                {ech.length===0
                  ? <div style={{ textAlign:"center", padding:"24px", color:"#CCC", fontFamily:"'Lora',serif", fontSize:12 }}>
                      Renseignez les données du financeur (coeff, loyers) pour générer l'échéancier automatiquement.
                    </div>
                  : (
                    <div style={{ overflowX:"auto" }}>
                      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11, fontFamily:"'Lora',serif" }}>
                        <thead>
                          <tr style={{ background:"#102A63" }}>
                            {["N°","Date échéance","Loyer","Intérêts","Amortissement","Capital restant dû"].map(h=>(
                              <th key={h} style={{ padding:"6px 10px", color:"white", fontWeight:700, textAlign:"right", fontSize:10 }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {(() => {
                            const startDate = d.dateDemarrage ? new Date(d.dateDemarrage) : new Date();
                            const jourRef   = startDate.getDate();
                            return ech.map((row,i)=>{
                              const d2 = new Date(startDate);
                              d2.setMonth(d2.getMonth() + i);
                              const maxDay = new Date(d2.getFullYear(), d2.getMonth()+1, 0).getDate();
                              d2.setDate(Math.min(jourRef, maxDay));
                              const dateStr = d2.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
                              return (
                                <tr key={i} style={{ background:i%2===0?"white":"#FAFAFA",borderBottom:"1px solid #F0F0F0" }}>
                                  <td style={{ padding:"5px 10px",textAlign:"right",color:"#888" }}>{row.n}</td>
                                  <td style={{ padding:"5px 10px",textAlign:"right" }}>{dateStr}</td>
                                  <td style={{ padding:"5px 10px",textAlign:"right",fontWeight:700,color:"#102A63" }}>{fmtE(row.loyer,2)}</td>
                                  <td style={{ padding:"5px 10px",textAlign:"right",color:"#E67E22" }}>{fmtE(row.interets,2)}</td>
                                  <td style={{ padding:"5px 10px",textAlign:"right",color:"#27AE60" }}>{fmtE(row.amort,2)}</td>
                                  <td style={{ padding:"5px 10px",textAlign:"right",color:"#C0392B" }}>{fmtE(row.capitalRestant,2)}</td>
                                </tr>
                              );
                            });
                          })()}
                        </tbody>
                        <tfoot>
                          <tr style={{ background:"#F8F9FB", borderTop:"2px solid #ECEAE5", fontWeight:700 }}>
                            <td colSpan={2} style={{ padding:"6px 10px",fontFamily:"'Lora',serif",fontSize:11 }}>TOTAL</td>
                            <td style={{ padding:"6px 10px",textAlign:"right",color:"#102A63" }}>{fmtE(ech.reduce((a,r)=>a+r.loyer,0),2)}</td>
                            <td style={{ padding:"6px 10px",textAlign:"right",color:"#E67E22" }}>{fmtE(ech.reduce((a,r)=>a+r.interets,0),2)}</td>
                            <td style={{ padding:"6px 10px",textAlign:"right",color:"#27AE60" }}>{fmtE(ech.reduce((a,r)=>a+r.amort,0),2)}</td>
                            <td></td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  )}
              </div>
            )}
          </div>
        </div>

        {/* Footer */}
        <div style={{ padding:"12px 22px",borderTop:"1px solid #F0F0F0",display:"flex",justifyContent:"flex-end",gap:8,flexShrink:0 }}>
          <button onClick={onClose} style={{ ...S.btn("#F0F0F0","#666"),fontSize:11,padding:"7px 14px" }}>Annuler</button>
          <button onClick={()=>{ onSave(d); onClose(); }} style={{ ...S.btn("#102A63"),fontSize:11,padding:"7px 14px" }}>✓ Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   CREDITBAIL VIEW
   ══════════════════════════════════════════════════ */
function CreditBailView({ tasks, onEdit, settings }) {
  const uid = () => Math.random().toString(36).substr(2,9);
  const [dossiers, setDossiers]         = useState(() => loadCBDossiers());
  const [modal, setModal]               = useState(null);
  const [dragId, setDragId]             = useState(null);
  const [dragOver, setDragOver]         = useState(null);
  const [financeursList, setFinanceursList] = useState(() => loadCBFinanceurs());
  const [showClos, setShowClos]         = useState(false);
  const [showRefus, setShowRefus]        = useState(false);
  const [search, setSearch]             = useState("");
  const [filterFinanceur, setFilterFinanceur] = useState("");

  useEffect(()=>{ saveCBDossiers(dossiers); },[dossiers]);
  useEffect(()=>{
    const saved=loadCBColNames();
    if(Object.keys(saved).length) CB_KANBAN_STATUSES.forEach(s=>{if(saved[s.id])s.name=saved[s.id];});
  },[]);

  const handleSave = d => {
    setDossiers(p => p.find(x=>x.id===d.id) ? p.map(x=>x.id===d.id?d:x) : [d,...p]);
  };
  const handleDrop = colId => {
    if (!dragId) return;
    const d = dossiers.find(x=>x.id===dragId);
    if (d && d.statut!==colId) setDossiers(p=>p.map(x=>x.id===dragId?{...x,statut:colId}:x));
    setDragId(null); setDragOver(null);
  };
  const openNew = () => setModal({ id:uid(), reference:genCBRef(dossiers), codeProjet:"", intitule:"", typeInvestissement:"", fournisseur:"", site:"", montantHT:"", tva:"20", montantFinance:"", duree:"36", periodicite:"Mensuelle", valeurResPct:"", statut:"montage", notes:"", financeurs:[], documents:{}, createdAt:new Date().toISOString() });

  // Tâches filtrées sur étiquette Crédit-bail
  const cbTasks = tasks.filter(t => (t.labels||[]).some(l => l.toLowerCase().includes("crédit-bail") || l.toLowerCase().includes("credit-bail") || l.toLowerCase().includes("creditbail")));

  // Filtrage
  const filteredDossiers = dossiers.filter(d => {
    const q = search.toLowerCase();
    const matchSearch = !q || (d.intitule||"").toLowerCase().includes(q) || (d.reference||"").toLowerCase().includes(q) || (d.fournisseur||"").toLowerCase().includes(q) || (d.codeProjet||"").toLowerCase().includes(q) || (d.site||"").toLowerCase().includes(q);
    const matchFinanceur = !filterFinanceur || (d.financeurs||[]).some(f=>f.financeur===filterFinanceur);
    return matchSearch && matchFinanceur;
  });

  // Kanban (sans clos et sans refusé)
  const activeCols = CB_KANBAN_STATUSES.filter(s=>s.id!=="clos"&&s.id!=="refuse").map(s=>({ // 5 colonnes actives
    ...s, items: filteredDossiers.filter(d=>d.statut===s.id)
  }));
  const closDossiers  = filteredDossiers.filter(d=>d.statut==="clos");
  const refusDossiers = filteredDossiers.filter(d=>d.statut==="refuse");

  const fmtE = (v,dec=0) => v ? Number(v).toLocaleString("fr-FR",{minimumFractionDigits:dec,maximumFractionDigits:dec})+" €" : "—";
  const H3_PAL = {
    montage:    {bg:"#EFF6FF",border:"#BFDBFE",nameColor:"#1E40AF",amtColor:"#3B82F6",cardBorder:"#1D4ED8"},
    negociation:{bg:"#FFFBEB",border:"#FDE68A",nameColor:"#92400E",amtColor:"#D97706",cardBorder:"#A16207"},
    accepte:    {bg:"#F0FDF4",border:"#BBF7D0",nameColor:"#065F46",amtColor:"#34D399",cardBorder:"#059669"},
    signature:  {bg:"#F5F3FF",border:"#DDD6FE",nameColor:"#4C1D95",amtColor:"#8B5CF6",cardBorder:"#6D28D9"},
    misplace:   {bg:"#ECFEFF",border:"#A5F3FC",nameColor:"#0E7490",amtColor:"#06B6D4",cardBorder:"#0E7490"},
    default:    {bg:"#F8FAFC",border:"#E2E8F0",nameColor:"#475569",amtColor:"#94A3B8",cardBorder:"#64748B"},
  };

  return (
    <div style={{ display:"flex",flexDirection:"column",background:"#F7F6F3",minHeight:"100vh" }}>
      {/* Toolbar */}
      <div style={{ background:"white",borderBottom:"1px solid #ECEAE5",padding:"8px 20px",display:"flex",alignItems:"center",gap:10,flexShrink:0,flexWrap:"wrap" }}>
        {/* Recherche — largeur = 1 colonne kanban */}
        <div style={{ position:"relative",width:"calc((100vw - 200px - 40px - 4*14px) / 5 - 20px)",minWidth:160,maxWidth:320 }}>
          <span style={{ position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#AAA",pointerEvents:"none" }}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher dossier, fournisseur, site, référence…"
            style={{ paddingLeft:30,paddingRight:8,paddingTop:6,paddingBottom:6,border:"1px solid #E0E0E0",borderRadius:8,fontSize:11,fontFamily:"'Lora',serif",outline:"none",width:"100%",boxSizing:"border-box",background:"#FAFAFA" }} />
        </div>
        {/* Filtre financeur */}
        <select value={filterFinanceur} onChange={e=>setFilterFinanceur(e.target.value)}
          style={{ border:"1px solid #E0E0E0",borderRadius:8,padding:"5px 10px",fontSize:11,fontFamily:"'Lora',serif",background:filterFinanceur?"#E0F7FA":"#FAFAFA",color:filterFinanceur?"#0E7490":"#555",cursor:"pointer",outline:"none" }}>
          <option value="">Tous les financeurs</option>
          {financeursList.map(f=><option key={f} value={f}>{f}</option>)}
        </select>
        <div style={{ flex:1 }} />
        <button onClick={openNew} style={{ ...S.btn("#102A63"),padding:"6px 16px",fontSize:11,flexShrink:0 }}>+ Nouveau dossier</button>
      </div>

      {/* Tâches Crédit-bail — hauteur fixe 5 lignes */}
      {cbTasks.length > 0 && (
        <div style={{ background:"white",borderBottom:"1px solid #ECEAE5",flexShrink:0,padding:"10px 20px" }}>
          <div style={{ fontSize:10,fontWeight:700,color:"#102A63",fontFamily:"'Lora',serif",letterSpacing:"0.06em",marginBottom:6 }}>
            TÂCHES CRÉDIT-BAIL <span style={{ fontWeight:400,color:"#AAA" }}>({cbTasks.length})</span>
          </div>
          <div style={{ maxHeight: 5*27+"px", overflowY:"auto" }}>
            {cbTasks.map((t,i) => {
              const co = settings.categories.find(c=>c.name===t.category);
              const st = settings.statuses.find(s=>s.id===t.status)||settings.statuses[0];
              return (
                <div key={t.id} onClick={()=>onEdit(t)}
                  style={{ display:"flex",alignItems:"center",gap:8,height:26,borderBottom:"1px solid #F5F5F5",cursor:"pointer",paddingLeft:4 }}
                  onMouseEnter={e=>e.currentTarget.style.background="#F8F9FB"}
                  onMouseLeave={e=>e.currentTarget.style.background="white"}>
                  <span style={{ fontSize:10,color:"#CCC",fontFamily:"'Lora',serif",minWidth:16 }}>{i+1}</span>
                  <span style={{ width:4,height:16,borderRadius:2,background:co?.accent||"#CCC",flexShrink:0 }} />
                  <span style={{ flex:1,fontSize:11,fontFamily:"'Lora',serif",color:t.completed?"#AAA":"#2C3E50",textDecoration:t.completed?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{t.title}</span>
                  <span style={{ fontSize:9,fontWeight:700,background:st.bg||"#EEE",color:st.color||"#888",borderRadius:3,padding:"1px 6px",fontFamily:"'Lora',serif",flexShrink:0 }}>{st.name}</span>
                  {t.dueDate && <span style={{ fontSize:10,color:"#AAA",fontFamily:"'Lora',serif",flexShrink:0 }}>{t.dueDate.split("-").reverse().join("/")}</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Kanban — 5 colonnes pleine largeur */}
      <div style={{ padding:"12px 20px",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,alignItems:"flex-start",minHeight:300 }}>
        {activeCols.map(col=>(
          <div key={col.id}
            onDragOver={e=>{e.preventDefault();setDragOver(col.id);}}
            onDragLeave={()=>setDragOver(null)}
            onDrop={()=>handleDrop(col.id)}
            style={{ display:"flex",flexDirection:"column",minWidth:0 }}>
            {/* En-tête H3 : fond pâle coloré par statut */}
            {(() => { const pal=H3_PAL[col.id]||H3_PAL.default; return (<>
            <div style={{ background:pal.bg,borderRadius:"10px 10px 0 0",padding:"10px 12px",
              border:`0.5px solid ${pal.border}`,borderBottom:"none",
              outline: dragOver===col.id ? `2px solid ${pal.cardBorder}` : "none",
              outlineOffset:-1, transition:"outline 0.15s" }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3 }}>
                <span style={{ fontSize:12,fontWeight:500,color:pal.nameColor,fontFamily:"'Lora',serif" }}>{col.name}</span>
                <span style={{ fontSize:10,background:"white",color:pal.nameColor,borderRadius:20,padding:"1px 9px",fontFamily:"'Lora',serif",border:`0.5px solid ${pal.border}` }}>{col.items.length}</span>
              </div>
              <div style={{ fontSize:10,color:pal.amtColor,fontFamily:"'Lora',serif" }}>
                {fmtE(col.items.reduce((a,d)=>a+(parseNum(d.montantHT)||0),0))} HT
              </div>
            </div>
            <div style={{ background:dragOver===col.id?"#F8FAFF":"#F7F7F5",
              borderRadius:"0 0 10px 10px",border:`0.5px solid ${pal.border}`,
              borderTop:"none",padding:8,display:"flex",flexDirection:"column",gap:6,minHeight:180 }}>
              {col.items.length===0
                ? <div style={{ fontSize:11,color:"#CCC",fontFamily:"'Lora',serif",fontStyle:"italic",textAlign:"center",padding:"16px 0" }}>Vide</div>
                : col.items.map(d=>(
                    <div key={d.id} draggable
                      onDragStart={()=>setDragId(d.id)}
                      onClick={()=>setModal(d)}
                      style={{ background:"white",borderRadius:8,padding:"9px 11px",
                        border:`0.5px solid #E8E8E8`,
                        borderLeft:`3px solid ${(H3_PAL[col.id]||H3_PAL.default).cardBorder}`,
                        cursor:"pointer",transition:"box-shadow 0.15s" }}
                      onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 14px rgba(0,0,0,0.1)"}
                      onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                      {/* Référence + code projet */}
                      {(d.reference||d.codeProjet) && (
                        <div style={{ fontSize:9,color:"#AAA",fontFamily:"'Lora',serif",marginBottom:3 }}>
                          {d.reference||""}{d.codeProjet?` · ${d.codeProjet}`:""}
                        </div>
                      )}
                      {/* Titre */}
                      <div style={{ fontSize:12,fontWeight:500,fontFamily:"'Lora',serif",color:"#2C3E50",marginBottom:5,lineHeight:1.3 }}>
                        {d.intitule||"Sans titre"}
                      </div>
                      {/* Fournisseur + montant */}
                      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:d.site||d.typeInvestissement?4:0 }}>
                        <span style={{ fontSize:10,color:"#888",fontFamily:"'Lora',serif" }}>{d.fournisseur||"—"}</span>
                        {parseNum(d.montantHT)>0 && <span style={{ fontSize:11,fontWeight:500,color:col.color,fontFamily:"'Lora',serif" }}>{fmtE(parseNum(d.montantHT))}</span>}
                      </div>
                      {/* Site + type */}
                      {(d.site||d.typeInvestissement) && (
                        <div style={{ display:"flex",gap:5,flexWrap:"wrap" }}>
                          {d.typeInvestissement && <span style={{ fontSize:9,background:"#E0F7FA",color:"#0E7490",borderRadius:3,padding:"1px 5px",fontFamily:"'Lora',serif" }}>{d.typeInvestissement}</span>}
                          {d.site && <span style={{ fontSize:9,background:"#F5F5F5",color:"#888",borderRadius:3,padding:"1px 5px",fontFamily:"'Lora',serif" }}>{d.site}</span>}
                        </div>
                      )}
                    </div>
                  ))}
            </div>
            </>); })()}
          </div>
        ))}
      </div>

      {/* Refusés + Clôturés — côte à côte */}
      <div style={{ flexShrink:0, padding:"0 20px 12px" }}>
        <div style={{ display:"flex", gap:10, marginBottom:8 }}>
          <button onClick={()=>setShowClos(p=>!p)}
            style={{ border:`1px solid ${showClos?"#065F46":"#D1D5DB"}`,background:showClos?"#D1FAE5":"white",
              color:showClos?"#065F46":"#6B7280",borderRadius:8,padding:"5px 14px",fontSize:11,
              cursor:"pointer",fontFamily:"'Lora',serif",fontWeight:600,display:"flex",alignItems:"center",gap:6 }}>
            <span>{showClos?"▾":"▸"}</span>
            Dossiers clôturés
            <span style={{ background:showClos?"#065F46":"#E5E7EB",color:showClos?"white":"#6B7280",borderRadius:20,padding:"0 7px",fontSize:10,fontWeight:700 }}>{closDossiers.length}</span>
          </button>
          <button onClick={()=>setShowRefus(p=>!p)}
            style={{ border:`1px solid ${showRefus?"#B91C1C":"#D1D5DB"}`,background:showRefus?"#FEE2E2":"white",
              color:showRefus?"#B91C1C":"#6B7280",borderRadius:8,padding:"5px 14px",fontSize:11,
              cursor:"pointer",fontFamily:"'Lora',serif",fontWeight:600,display:"flex",alignItems:"center",gap:6 }}>
