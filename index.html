            })}
            <button onClick={addDevSub} style={{ marginTop:8,background:"none",border:"none",padding:"4px 0",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif",color:"#BBBBBB",display:"flex",alignItems:"center",gap:5 }}><span style={{ fontSize:16,lineHeight:1 }}>+</span> Ajouter une sous-tâche</button>
          </div>
        </div>
        <div style={{ padding:"14px 24px",borderTop:"1px solid #F0F0F0",display:"flex",justifyContent:"flex-end",gap:8 }}>

          <button onClick={() => { if(d.title.trim()){ onSave(d); onClose(); } }} style={{ ...S.btn(catAccent),opacity:d.title.trim()?1:0.5 }}>

        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════

function ContentieuxDossierModal({ dossier, cSettings, onSave, onClose }) {
  const isNew = !dossier.reference && !dossier.clientName;
  const [d, setD] = useState({
    reference:"", clientName:"", montant:"", category:"", type:"",
    status:"identification", priority:"normale", labels:[],
    suiviStatus:"a_engager",   // 4) statut du suivi
    notes:"", avocat:"",
    dateOuverture: new Date().toISOString().split("T")[0],
    dateEcheance:"", dateCloture:"",   // 5) datePrescription → dateCloture
    procedureCollective:"",             // 7) type procédure collective
    dateDeclarationCreance:"",          // 7) date déclaration de créance
    subtasks:[], attachments:[],        // 2) sous-tâches  3) pièces jointes
    ...dossier,
  });

  // 1) Fermeture correcte : mousedown dans la fenêtre empêche la fermeture au mouseup en dehors
  const [mouseDownInside, setMouseDownInside] = useState(false);
  const handleOverlayMouseDown = e => { if (e.target === e.currentTarget) setMouseDownInside(false); };
  const handlePanelMouseDown   = () => setMouseDownInside(true);
  const handleOverlayMouseUp   = e => { if (e.target === e.currentTarget && !mouseDownInside) onClose(); setMouseDownInside(false); };

  const statusObj = cSettings.statuses.find(s => s.id === d.status) || cSettings.statuses[0];
  const catObj    = cSettings.categories.find(c => c.name === d.category);
  const catAccent = catObj?.accent || "#C0392B";
  const newId     = () => Math.random().toString(36).substr(2,9);

  const [showLP, setShowLP] = useState(false);
  const lpBtnRef = useRef(null), lpRef = useRef(null);
  useEffect(() => {
    if (!showLP) return;
    const h = e => { if (lpRef.current?.contains(e.target) || lpBtnRef.current?.contains(e.target)) return; setShowLP(false); };
    setTimeout(() => document.addEventListener("mousedown", h), 0);
    return () => document.removeEventListener("mousedown", h);
  }, [showLP]);

  // 3) Pièces jointes
  const fileInputRef = useRef(null);
  const handleFiles = files => {
    const newAtts = Array.from(files).map(f => ({ id: newId(), name: f.name, size: f.size, type: f.type, dataUrl: null, _file: f }));
    const readers = newAtts.map(att => new Promise(res => {
      const r = new FileReader();
      r.onload = ev => res({ ...att, dataUrl: ev.target.result });
      r.readAsDataURL(att._file);
    }));
    Promise.all(readers).then(atts => setD(p => ({ ...p, attachments: [...(p.attachments||[]), ...atts.map(a => ({ id: a.id, name: a.name, size: a.size, type: a.type, dataUrl: a.dataUrl }))] })));
  };
  const [draggingFile, setDraggingFile] = useState(false);

  // 6) Format montant
  const fmtMontantDisplay = v => {
    if (!v && v !== 0) return "";
    const n = parseFloat(String(v).replace(/\s/g,"").replace(",","."));
    if (isNaN(n)) return v;
    return n.toLocaleString("fr-FR", { minimumFractionDigits:2, maximumFractionDigits:2 });
  };
  const [montantRaw, setMontantRaw] = useState(d.montant || "");
  const [montantFocused, setMontantFocused] = useState(false);

  // Statuts sous-tâches
    // subStatuses déplacé en haut

  // Statuts suivi dossier
  const suiviStatuses = [
    { id:"a_engager",  name:"À engager"         },
    { id:"preparation",name:"En préparation"    },
    { id:"en_cours",   name:"En cours (transmis)"},
    { id:"attente",    name:"En attente"         },
    { id:"suspendu",   name:"Suspendu / Bloqué"  },
    { id:"cloture",    name:"Clôturé"            },
  ];

  const lblStyle = { fontSize:10, fontWeight:700, color:"#102A63", fontFamily:"'Lora',serif", marginBottom:4, letterSpacing:"0.06em" };
    const subStatuses = [
    { id:"todo",       name:"À faire",    color:"#888",    bg:"#F0F0F0" },
    { id:"inprogress", name:"En cours",   color:"#1D4ED8", bg:"#DBEAFE" },
    { id:"waiting",    name:"En attente", color:"#A16207", bg:"#FEF9C3" },
    { id:"blocked",    name:"Bloqué",     color:"#B91C1C", bg:"#FEE2E2" },
    { id:"done",       name:"Fait",       color:"#065F46", bg:"#D1FAE5" },
    { id:"cancelled",  name:"Annulé",     color:"#92400E", bg:"#F5E6DC" },
  ];


  return (
    <div
      style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)" }}
      onMouseDown={handleOverlayMouseDown}
      onMouseUp={handleOverlayMouseUp}>
      <div
        onMouseDown={handlePanelMouseDown}
        style={{ background:"white",borderRadius:16,width:"100%",maxWidth:640,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",borderTop:`4px solid ${catAccent}` }}>
        <div style={{ padding:"20px 24px 0" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14 }}>
            <h2 style={{ margin:0,fontSize:18,fontFamily:"'Lora',serif",color:"#2C3E50" }}>{isNew ? "Nouveau dossier" : `Dossier ${d.reference||d.clientName}`}</h2>
            <button onClick={onClose} style={{ border:"none",background:"none",fontSize:22,cursor:"pointer",color:"#BDC3C7" }}>×</button>
          </div>

          {/* Référence + Client */}
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8 }}>
            <div><div style={lblStyle}>N° CLIENT</div>
              <input value={d.reference} onChange={e=>setD({...d,reference:e.target.value})} placeholder="ex: CTX-2025-001" autoFocus style={{ ...S.input }} /></div>
            <div><div style={lblStyle}>NOM DU DÉBITEUR</div>
              <input value={d.clientName} onChange={e=>setD({...d,clientName:e.target.value})} placeholder="Nom / Raison sociale" style={{ ...S.input }} /></div>
          </div>

          {/* Catégorie + Type de procédure */}
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8 }}>
            <div><div style={lblStyle}>CATÉGORIE</div>
              <select value={d.category} onChange={e=>setD({...d,category:e.target.value})} style={{ ...S.input,cursor:"pointer",color:d.category?"#2C3E50":"#999" }}>
                <option value="">— Catégorie —</option>
                {cSettings.categories.map(c=><option key={c.id} style={{color:"#2C3E50"}}>{c.name}</option>)}
              </select></div>
            <div><div style={lblStyle}>TYPE DE PROCÉDURE</div>
              <select value={d.type} onChange={e=>setD({...d,type:e.target.value})} style={{ ...S.input,cursor:"pointer",color:d.type?"#2C3E50":"#999" }}>
                <option value="">— Type —</option>
                {cSettings.types.map(t=><option key={t.id} style={{color:"#2C3E50"}}>{t.name}</option>)}
              </select></div>
          </div>

          {/* Priorité + Colonne Kanban */}
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8 }}>
            <div><div style={lblStyle}>PRIORITÉ</div>
              <select value={d.priority} onChange={e=>setD({...d,priority:e.target.value})} style={{ ...S.input,cursor:"pointer" }}>
                <option value="urgente">🔴 Urgente</option>
                <option value="haute">🟠 Haute</option>
                <option value="normale">🟡 Normale</option>
                <option value="basse">🟢 Basse</option>
              </select></div>
            <div><div style={lblStyle}>COLONNE KANBAN</div>
              <select value={d.status} onChange={e=>setD({...d,status:e.target.value})} style={{ ...S.input,cursor:"pointer",background:statusObj.bg,color:statusObj.color,fontWeight:600 }}>
                {cSettings.statuses.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select></div>
          </div>

          {/* 4) Statut du suivi */}
          <div style={{ marginBottom:8 }}>
            <div style={lblStyle}>STATUT DU SUIVI</div>
            <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>

                  style={{ border:`1px solid ${d.suiviStatus===ss.id?"#C0392B":"#E0E0E0"}`,background:d.suiviStatus===ss.id?"#C0392B":"white",color:d.suiviStatus===ss.id?"white":"#666",borderRadius:20,padding:"4px 12px",fontSize:10,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontWeight:d.suiviStatus===ss.id?700:400,transition:"all 0.15s" }}>{ss.name}</button>
              ))}
            </div>
          </div>

          {/* 6) Montant + Avocat — déplacés ici, format décimal */}
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8 }}>
            <div><div style={lblStyle}>MONTANT (€)</div>
              <input

            <div><div style={lblStyle}>AVOCAT / HUISSIER</div>
              <input value={d.avocat} onChange={e=>setD({...d,avocat:e.target.value})} placeholder="Me Dupont…" style={{ ...S.input }} /></div>
          </div>

          {/* 7) Procédure collective + Date déclaration de créance */}

            <div><div style={lblStyle}>PROCÉDURE COLLECTIVE</div>
              <select value={d.procedureCollective||""} onChange={e=>setD({...d,procedureCollective:e.target.value})} style={{ ...S.input,cursor:"pointer",color:d.procedureCollective?"#2C3E50":"#999" }}>
                <option value="">— Aucune —</option>
                <option value="sauvegarde">Sauvegarde</option>
                <option value="redressement">Redressement judiciaire</option>

            <div><div style={lblStyle}>DATE DÉCLARATION DE CRÉANCE</div>
              <input type="date" value={d.dateDeclarationCreance||""} onChange={e=>setD({...d,dateDeclarationCreance:e.target.value})} style={{ ...S.input,cursor:"pointer" }} /></div>

          {/* Dates : ouverture + échéance + 5) clôture */}

              <input type="date" value={d.dateOuverture} onChange={e=>setD({...d,dateOuverture:e.target.value})} style={{ ...S.input,cursor:"pointer" }} /></div>

                  onClick={()=>setD({...d,labels:(d.labels||[]).filter((_,j)=>j!==i)})}>🏷 {lbl} ×</span>

                ))}

          <div style={{ marginBottom:12 }}>

            {(d.subtasks||[]).map((st,i)=>{

                  <input value={st.title||""} onChange={e=>{ const ns=[...(d.subtasks||[])]; ns[i]={...ns[i],title:e.target.value}; setD({...d,subtasks:ns}); }}

                  <button onClick={()=>setD({...d,subtasks:(d.subtasks||[]).filter((_,j)=>j!==i)})}

          </div>

          {/* Notes */}
          <div style={{ marginBottom:12 }}>
            <div style={lblStyle}>NOTES / HISTORIQUE</div>

          </div>

          {/* 3) Pièces jointes */}
          <div style={{ marginBottom:12 }}>
            <div style={lblStyle}>PIÈCES JOINTES</div>
            {/* Zone drop */}
            <div
              onDragOver={e=>{e.preventDefault();setDraggingFile(true);}}
              onDragLeave={()=>setDraggingFile(false)}
              onDrop={e=>{e.preventDefault();setDraggingFile(false);handleFiles(e.dataTransfer.files);}}
              onClick={()=>fileInputRef.current?.click()}
              style={{ border:`2px dashed ${draggingFile?"#C0392B":"#E0E0E0"}`,borderRadius:8,padding:"14px",textAlign:"center",cursor:"pointer",background:draggingFile?"#FEF2F2":"#FAFAFA",marginBottom:8,transition:"all 0.15s" }}>
              <div style={{ fontSize:12,color:draggingFile?"#C0392B":"#AAA",fontFamily:"'Lora',serif" }}>📎 Glissez vos fichiers ici ou <u>cliquez pour parcourir</u></div>
              <input ref={fileInputRef} type="file" multiple style={{ display:"none" }} onChange={e=>handleFiles(e.target.files)} />
            </div>
            {/* Liste des pièces */}
            {(d.attachments||[]).length>0 && (
              <div style={{ display:"flex",flexDirection:"column",gap:4 }}>
                {(d.attachments||[]).map((att,i)=>(
                  <div key={att.id} style={{ display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#F8F8F8",borderRadius:6,border:"1px solid #E8E8E8" }}>
                    <span style={{ fontSize:14,flexShrink:0 }}>📄</span>
                    <input value={att.name} onChange={e=>{ const na=[...(d.attachments||[])]; na[i]={...na[i],name:e.target.value}; setD({...d,attachments:na}); }}
                      style={{ flex:1,border:"none",outline:"none",fontSize:12,background:"transparent",fontFamily:"'Lora',serif",color:"#2C3E50" }} />
                    <span style={{ fontSize:9,color:"#AAA",fontFamily:"'DM Mono',monospace",flexShrink:0 }}>{att.size?Math.round(att.size/1024)+"Ko":""}</span>
                    {att.dataUrl && <a href={att.dataUrl} download={att.name} style={{ fontSize:10,color:"#4F46E5",fontFamily:"'DM Mono',monospace",textDecoration:"none",flexShrink:0 }}>↓</a>}
                    <button onClick={()=>setD({...d,attachments:(d.attachments||[]).filter((_,j)=>j!==i)})}
                      style={{ border:"none",background:"none",cursor:"pointer",color:"#E8A0A0",fontSize:14,padding:0,lineHeight:1,flexShrink:0 }}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div style={{ padding:"14px 24px",borderTop:"1px solid #F0F0F0",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
          {!isNew && <span style={{ fontSize:10,color:"#AAA",fontFamily:"'DM Mono',monospace" }}>Ouvert le {d.dateOuverture||"—"}</span>}
          <div style={{ display:"flex",gap:8,marginLeft:"auto" }}>
            <button onClick={onClose} style={{ ...S.btn("#F0F0F0","#666") }}>Annuler</button>
            <button onClick={()=>{ if(d.reference.trim()||d.clientName.trim()){ onSave({...d,montant:montantRaw}); onClose(); } }}
              style={{ ...S.btn("#C0392B"),opacity:(d.reference.trim()||d.clientName.trim())?1:0.5 }}>
              {isNew?"Créer le dossier":"Enregistrer"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ContentieuxView() {
  const uid_fn = () => Math.random().toString(36).substr(2,9);
  const [cSettings, setCSettings] = useState(() => loadContentieuxSettings());
  const [dossiers, setDossiers]   = useState(() => { try { const s=localStorage.getItem(CONTENTIEUX_STORAGE_KEY); return s?JSON.parse(s):[]; } catch { return []; } });
  const [modal,      setModal]      = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [dragId,   setDragId]   = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [showClos, setShowClos] = useState(false);
  const [filterCat, setFilterCat] = useState("Toutes");
  const [search, setSearch]       = useState("");

  useEffect(() => { try { localStorage.setItem(CONTENTIEUX_STORAGE_KEY, JSON.stringify(dossiers)); } catch {} }, [dossiers]);

  const saveCSettings = s => { setCSettings(s); try { localStorage.setItem(CONTENTIEUX_SETTINGS_KEY, JSON.stringify(s)); } catch {} };
  const addDossier    = d => setDossiers(p => [d,...p]);
  const updDossier    = d => setDossiers(p => p.map(x => x.id===d.id?d:x));
  const [undoDossier, setUndoDossier] = useState(null);
  const undoTimerRef = useRef(null);
  const [showTrashCx, setShowTrashCx] = useState(false);
  const [trashCx, setTrashCx] = useState(() => { try { const s=localStorage.getItem("contentieux_trash_v1"); return s?JSON.parse(s):[]; } catch { return []; } });
  const saveTrashCx = t => { try { localStorage.setItem("contentieux_trash_v1", JSON.stringify(t)); } catch {} };

  const delDossier = id => {
    const found = dossiers.find(x => x.id===id);
    if (!found) return;
    setDossiers(p => p.filter(x => x.id!==id));
    const trashed = { ...found, deletedAt: new Date().toISOString() };
    setTrashCx(p => { const n=[...p,trashed]; saveTrashCx(n); return n; });
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    setUndoDossier(found);
    undoTimerRef.current = setTimeout(() => setUndoDossier(null), 10000);
  };
  const undoDeleteDossier = () => {
    if (!undoDossier) return;
    clearTimeout(undoTimerRef.current);
    setDossiers(p => [undoDossier,...p]);
    setTrashCx(p => { const n=p.filter(x=>x.id!==undoDossier.id); saveTrashCx(n); return n; });
    setUndoDossier(null);
  };
  const restoreFromTrashCx = id => {
    const r = trashCx.find(x=>x.id===id); if (!r) return;
    const { deletedAt, ...restored } = r;
    setDossiers(p => [restored,...p]);
    setTrashCx(p => { const n=p.filter(x=>x.id!==id); saveTrashCx(n); return n; });
  };
  const purgeTrashCx = id => setTrashCx(p => { const n=p.filter(x=>x.id!==id); saveTrashCx(n); return n; });

  const handleSave    = d => { if(dossiers.find(x=>x.id===d.id)) updDossier(d); else addDossier(d); };
  const openNew       = () => setModal({ id:uid_fn(),reference:"",clientName:"",montant:"",category:"",type:"",status:"identification",suiviStatus:"a_engager",priority:"normale",labels:[],subtasks:[],attachments:[],notes:"",avocat:"",dateOuverture:new Date().toISOString().split("T")[0],dateEcheance:"",dateCloture:"",procedureCollective:"",dateDeclarationCreance:"" });

  const handleDrop = colId => {
    if (!dragId) return;
    const d = dossiers.find(x => x.id===dragId);
    if (d && d.status!==colId) updDossier({...d, status:colId});
    setDragId(null); setDragOver(null);
  };

  const fmtE = v => v ? Number(v).toLocaleString("fr-FR",{minimumFractionDigits:2})+" €" : "—";
  const fmtD = v => v ? v.split("-").reverse().join("/") : "—";
  const isOverdueD = v => v && new Date(v) < new Date(new Date().toDateString());

  const activeDossiers = dossiers.filter(d => d.status !== "clos");
  const closDossiers   = dossiers.filter(d => d.status === "clos");
  const thirtyDaysAgoCx = new Date(Date.now()-30*864e5).toISOString();
  const activeTrashCx   = trashCx.filter(r=>r.deletedAt>thirtyDaysAgoCx);
  const trashDaysLeftCx = r => Math.max(0,Math.ceil((new Date(r.deletedAt).getTime()+30*864e5-Date.now())/864e5));

  // filtrage
  const filtered = d => {
    if (filterCat !== "Toutes" && d.category !== filterCat) return false;
    if (search && !d.clientName?.toLowerCase().includes(search.toLowerCase()) && !d.reference?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  };

  const cols = cSettings.statuses.filter(s => s.id !== "clos").map(st => ({
    ...st,
    items: activeDossiers.filter(d => d.status===st.id && filtered(d))
  }));

  // Totaux par colonne
  const totalMontant = dossiers.filter(d => d.status!=="clos").reduce((acc,d)=>acc+(parseFloat(d.montant)||0),0);

  const prioColors = { urgente:"#C0392B",haute:"#E67E22",normale:"#95A5A6",basse:"#27AE60" };
  const prioIcons  = { urgente:"⊛ P1",haute:"▲ P2",normale:"▬ P3",basse:"▼ P4" };

  /* ── Kanban Card ── */
  const KCard = ({ item }) => {
    const cat = cSettings.categories.find(c => c.name===item.category);
    const typeObj = cSettings.types.find(t => t.name===item.type);
    const overdue = isOverdueD(item.dateEcheance);
    return (
      <div draggable
        onDragStart={()=>setDragId(item.id)}
        onDragEnd={()=>{setDragId(null);setDragOver(null);}}
        style={{ background:dragId===item.id?"#FEF2F2":"white",borderRadius:10,padding:"10px 12px",
          borderLeft:`3px solid ${cat?.accent||"#C0392B"}`,cursor:"grab",
          boxShadow:"0 1px 4px rgba(0,0,0,0.06)",opacity:dragId===item.id?0.45:1,transition:"all 0.15s",
          border:`1px solid ${overdue&&!item.clos?"#FCA5A5":"#ECEAE5"}`,borderLeftWidth:3,borderLeftColor:cat?.accent||"#C0392B" }}
        onMouseEnter={e=>{if(dragId!==item.id){e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.1)";}}}
        onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.06)";}}>
        {/* Header */}
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6,gap:6 }}>
          <div>
            <div style={{ fontSize:9,fontFamily:"'Lora',serif",color:"#AAA",marginBottom:2 }}>{item.reference||"—"}</div>
            <div onClick={()=>setModal({...item})} style={{ fontSize:13,fontWeight:700,fontFamily:"'Lora',serif",color:"#2C3E50",lineHeight:1.3,cursor:"pointer" }}>{item.clientName||"Sans nom"}</div>
          </div>
          <div style={{ display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0 }}>
            <span style={{ fontSize:9,color:prioColors[item.priority||"normale"],fontWeight:700,fontFamily:"'Lora',serif" }}>{prioIcons[item.priority||"normale"]}</span>
            <button onClick={e=>{e.stopPropagation();delDossier(item.id);}} style={{ border:"none",background:"none",cursor:"pointer",color:"#E8A0A0",fontSize:12,padding:0,lineHeight:1 }}>×</button>
          </div>
        </div>
        {/* Montant */}
        {item.montant && <div style={{ fontSize:13,fontWeight:700,color:"#C0392B",fontFamily:"'Lora',serif",marginBottom:6 }}>{fmtE(item.montant)}</div>}
        {/* Badges */}
        <div style={{ display:"flex",gap:4,flexWrap:"wrap",marginBottom:item.dateEcheance||item.avocat?6:0 }}>
          {cat && <span style={{ fontSize:8,background:cat.bg,color:cat.accent,borderRadius:4,padding:"1px 6px",fontFamily:"'Lora',serif",fontWeight:700 }}>{cat.name}</span>}
          {typeObj && <span style={{ fontSize:8,background:"#F5F5F5",color:"#555",borderRadius:4,padding:"1px 6px",fontFamily:"'Lora',serif" }}>{typeObj.icon} {typeObj.name}</span>}
          {(item.labels||[]).map((lbl,i)=>{ const lObj=cSettings.labels.find(l=>l.name===lbl)||{color:"#C0392B",bg:"#FDEDEC"}; return <span key={i} style={{ fontSize:8,background:lObj.bg,color:lObj.color,borderRadius:20,padding:"1px 6px",fontFamily:"'Lora',serif",border:`1px solid ${lObj.color}20` }}>🏷 {lbl}</span>; })}
        </div>
        {/* Footer dates */}

                    </div>
                    <div style={{ display:"flex",gap:6,marginTop:6 }}>
                      <button onClick={()=>restoreFromTrashCx(r.id)} style={{ ...S.btn("#27AE60"),fontSize:10,padding:"5px 12px",flex:1 }}>↩ Restaurer</button>
                      <span style={{ fontSize:10,color:"#AAA",fontFamily:"'Lora',serif",alignSelf:"center" }}>J-{trashDaysLeftCx(r)}</span>
                      <button onClick={()=>purgeTrashCx(r.id)} style={{ ...S.btn("#E74C3C"),fontSize:10,padding:"5px 10px" }}>✕</button>
                    </div>
                  </div>

              </div>}
        </div>
      ) : (
        <>
      <div style={{ flex:1,overflowX:"auto",overflowY:"hidden",padding:"12px 16px",display:"flex",gap:12,alignItems:"flex-start" }}>
        {cols.map(col => (
          <div key={col.id}

            style={{ minWidth:240,flex:"0 0 240px",display:"flex",flexDirection:"column",maxHeight:"calc(100vh - 160px)" }}>
            {/* Col header */}
            <div style={{ padding:"10px 14px",background:col.bg,borderRadius:"10px 10px 0 0",border:`1px solid ${dragOver===col.id?"#C0392B":"#E8E8E8"}`,borderBottom:"none" }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:col.items.length>0?4:0 }}>
                <span style={{ fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace",color:col.color }}>{col.name.toUpperCase()}</span>
                <span style={{ fontSize:11,fontFamily:"'Lora',serif",color:col.color,background:"white",borderRadius:20,padding:"1px 8px",fontWeight:700 }}>{col.items.length}</span>
              </div>
              {col.items.length>0 && (
                <div style={{ fontSize:11,fontFamily:"'Lora',serif",color:col.color,fontWeight:700,opacity:0.85 }}>

      {/* Section clôturés */}

            cursor:"pointer", fontFamily:"'Lora',serif", fontWeight:600,
            display:"flex", alignItems:"center", gap:6 }}>

          <span style={{ background:showClos?"#065F46":"#E5E7EB", color:showClos?"white":"#6B7280",
            borderRadius:20, padding:"0 7px", fontSize:10, fontWeight:700 }}>{closDossiers.filter(filtered).length}</span>
        </button>
        {showClos && (
          <div style={{ marginTop:10 }}>
            {closDossiers.filter(filtered).length===0
              ? <div style={{ fontSize:12,color:"#AAA",fontFamily:"'Lora',serif",fontStyle:"italic",padding:"8px 0" }}>Aucun dossier clôturé</div>
              : <div style={{ display:"flex",gap:10,overflowX:"auto",padding:"4px 0 4px",alignItems:"flex-start" }}>
                  {closDossiers.filter(filtered).map(d => (
                    <div key={d.id} style={{ minWidth:230,flex:"0 0 230px", opacity:0.75 }}>
                      <div style={{ fontSize:9,fontFamily:"'Lora',serif",color:"#27AE60",fontWeight:700,
                        textAlign:"center",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.06em" }}>
                        ✓ Clôturé
                      </div>
                      <KCard item={d} />
                    </div>
                  ))}
                </div>}
          </div>
        )}
      </div>

      </> )}

      {undoDossier && (
        <div style={{ position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:9998,background:"#2C3E50",color:"white",borderRadius:12,padding:"12px 20px",boxShadow:"0 8px 24px rgba(0,0,0,0.25)",display:"flex",alignItems:"center",gap:16,fontFamily:"'Lora',serif",fontSize:12 }}>
          <span>🗑 <strong>"{(undoDossier.clientName||undoDossier.reference||"Dossier").slice(0,30)}"</strong> supprimé</span>
          <button onClick={undoDeleteDossier} style={{ background:"#27AE60",border:"none",borderRadius:6,color:"white",padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif",fontWeight:700 }}>↩ Annuler</button>
          <button onClick={()=>setUndoDossier(null)} style={{ background:"none",border:"none",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:16,padding:0 }}>×</button>
        </div>
      )}

      {modal && <ContentieuxDossierModal dossier={modal} cSettings={cSettings} onSave={handleSave} onClose={()=>setModal(null)} />}
      {showSettings && <ContentieuxSettingsPanel cSettings={cSettings} onSave={saveCSettings} onClose={()=>setShowSettings(false)} />}
    </div>
  );
}

/* ─── DEV LABEL CELL ─── */
function DevLabelCell({ task, devSettings }) {
  const [showMenu, setShowMenu] = useState(false);
  const [menuPos, setMenuPos] = useState({ top: 0, left: 0 });
  const btnRef = React.useRef(null);
  const menuRef = React.useRef(null);
  const openMenu = (e) => {
    e.stopPropagation();
    if (btnRef.current) {
      const r = btnRef.current.getBoundingClientRect();
      setMenuPos({ top: r.bottom + 4, left: r.left });
    }
    setShowMenu(m => !m);
  };
  useEffect(() => {
    if (!showMenu) return;
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target) && btnRef.current && !btnRef.current.contains(e.target))
        setShowMenu(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [showMenu]);
  const available = (devSettings.labels||[]).filter(l => !(task.labels||[]).includes(l.name));
  const dispatch = (labels) => window.dispatchEvent(new CustomEvent("devAddLabel", { detail: { id: task.id, labels } }));
  return (
    <div style={{ display:"flex",gap:3,alignItems:"center",flexShrink:0,flexWrap:"nowrap",overflow:"visible",position:"relative" }} onClick={e=>e.stopPropagation()}>
      {(task.labels||[]).map((lbl,i) => {
        const lObj=(devSettings.labels||[]).find(l=>l.name===lbl)||{color:"#4F46E5",bg:"#EEF2FF"};
        return (
          <span key={i} style={{ fontSize:9,background:lObj.bg,color:lObj.color,borderRadius:20,padding:"1px 6px",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap",border:`1px solid ${lObj.color}30`,display:"inline-flex",alignItems:"center",gap:2 }}>
            🏷 {lbl}
            <button onClick={e=>{e.stopPropagation();dispatch((task.labels||[]).filter((_,j)=>j!==i));}}
              style={{ border:"none",background:"none",cursor:"pointer",color:lObj.color,fontSize:10,padding:0,lineHeight:1 }}>×</button>
          </span>
        );
      })}
      <button ref={btnRef} onClick={openMenu}
        style={{ fontSize:9,border:"1px dashed #C7D2FE",background:"none",borderRadius:20,padding:"1px 5px",cursor:"pointer",color:"#4F46E5",fontFamily:"'DM Mono',monospace",flexShrink:0 }}>+</button>
      {showMenu && available.length > 0 && (
        <div ref={menuRef} style={{ position:"fixed",top:menuPos.top,left:menuPos.left,zIndex:9999,background:"white",border:"1px solid #E8E8E8",borderRadius:8,padding:6,boxShadow:"0 4px 16px rgba(0,0,0,0.12)",display:"flex",flexDirection:"column",gap:4,minWidth:140 }}>
          {available.map(l => (
            <button key={l.id} onClick={e=>{e.stopPropagation();dispatch([...(task.labels||[]),l.name]);setShowMenu(false);}}
              style={{ background:l.bg,color:l.color,border:`1px solid ${l.color}30`,borderRadius:20,padding:"3px 10px",fontSize:10,cursor:"pointer",fontFamily:"'DM Mono',monospace",textAlign:"left" }}>
              🏷 {l.name}
            </button>
          ))}
        </div>
      )}
      {showMenu && available.length === 0 && (
        <div style={{ position:"fixed",top:menuPos.top,left:menuPos.left,zIndex:9999,background:"white",border:"1px solid #E8E8E8",borderRadius:8,padding:"8px 12px",boxShadow:"0 4px 16px rgba(0,0,0,0.12)",fontSize:10,color:"#AAA",fontFamily:"'DM Mono',monospace" }}>
          Toutes les étiquettes sont ajoutées
        </div>
      )}
    </div>
  );
}

function DevTaskCard({ task, num, onDelete, onEdit, onSave, onToggle, devSettings, colWidths }) {
  const [hovered, setHovered] = useState(false);
  const catObj    = devSettings.categories.find(c => c.name===task.category);
  const typeObj   = devSettings.types.find(t => t.name===task.type);
  const statusObj = devSettings.statuses.find(s => s.id===task.status) || devSettings.statuses[0];
  const catBg     = catObj?.bg||"#F0F0F0";
  const catAccent = catObj?.accent||"#888";
  // 2) Mêmes icônes et couleurs que l'onglet Tâches
  const prioColor = PRIORITY_COLORS[task.priority||"normale"] || "#95A5A6";
  const prioIcon  = PRIORITY_ICONS[task.priority||"normale"]  || "▬";
  const cw = colWidths || { title:240, status:80, category:100, type:72, scope:90, labels:80 };
  return (
    <div onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)} onClick={()=>onEdit(task)}
      style={{ display:"flex",alignItems:"center",gap:7,paddingRight:6,borderLeft:`2px solid ${catAccent}`,marginBottom:1,
        background:hovered?"#F5F7FB":task.completed?"#FAFAFA":"white",opacity:task.completed?0.45:1,
        cursor:"pointer",transition:"background 0.1s",borderRadius:"0 3px 3px 0",height:25,overflow:"hidden" }}>
      <button onClick={e=>{e.stopPropagation();onToggle(task.id);}}
        style={{ width:14,height:14,borderRadius:"50%",flexShrink:0,border:`1.5px solid ${task.completed?catAccent:"#CCC"}`,background:task.completed?catAccent:"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"white",marginLeft:5 }}>{task.completed?"✓":""}</button>
      <span style={{ fontSize:10,color:"#CCC",fontFamily:"'Lora',serif",flexShrink:0,minWidth:16,textAlign:"right" }}>{num}</span>
      <span title={`Priorité ${task.priority}`} style={{ fontSize:10,color:prioColor,flexShrink:0,fontWeight:700,lineHeight:1,minWidth:12,textAlign:"center" }}>{prioIcon}</span>
      {/* Titre */}
      <span style={{ fontSize:10,fontWeight:500,color:task.completed?"#AAA":"#2C3E50",textDecoration:task.completed?"line-through":"none",fontFamily:"'Lora',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",width:cw.title,flexShrink:0 }}>{task.title}</span>
      {/* Statut */}
      <InlineSelect value={task.status} width={cw.status}
        options={devSettings.statuses.map(s=>({value:s.id,label:s.name,dot:s.color,style:{background:s.bg,color:s.color}}))}
        onChange={v=>{ const t={...task,status:v,completed:v==="done"}; (onSave||onEdit)(t); }} />
      {/* Catégorie */}
      <InlineSelect value={task.category||""} width={cw.category}
        options={[{value:"",label:"—",style:{color:"#AAA",background:"transparent"}},...devSettings.categories.map(c=>({value:c.name,label:c.name,dot:c.accent,style:{background:c.bg,color:c.accent}}))]}
        onChange={v=>{ (onSave||onEdit)({...task,category:v}); }} />
      {/* Type */}
      <InlineSelect value={task.type||""} width={cw.type}
        options={[{value:"",label:"—",style:{color:"#AAA",background:"transparent"}},...devSettings.types.map(t=>({value:t.name,label:`${t.icon||""} ${t.name}`.trim(),style:{background:"#F5F5F5",color:"#555"}}))]}
        onChange={v=>{ (onSave||onEdit)({...task,type:v}); }} />
      {/* 1) Périmètre — colonne fixe */}
      {task.scope
        ? <span style={{ fontSize:10,color:"#6B7280",fontFamily:"'Lora',serif",flexShrink:0,whiteSpace:"nowrap",background:"#F3F4F6",borderRadius:3,padding:"1px 6px",width:cw.scope||90,overflow:"hidden",textOverflow:"ellipsis" }}>📍 {task.scope}</span>
        : <span style={{ width:cw.scope||90,flexShrink:0 }} />}
      {/* 1) Étiquettes — colonne avec bouton + */}
      <div style={{ width:cw.labels||80,flexShrink:0,overflow:"visible" }}>
        <DevLabelCell task={task} devSettings={devSettings} />
      </div>
      {/* Espaceur */}
      <div style={{ flex:1 }} />
      {/* Version */}
      {task.version
        ? <span style={{ fontSize:10,fontFamily:"'Lora',serif",color:"#E67E22",background:"#FEF9EC",borderRadius:3,padding:"1px 5px",flexShrink:0,minWidth:60,textAlign:"right" }}>{task.version}</span>
        : <span style={{ minWidth:60,flexShrink:0 }} />}
      {/* Date cible */}
      {task.dueDate
        ? <span style={{ fontSize:10,color:"#95A5A6",fontFamily:"'Lora',serif",flexShrink:0,whiteSpace:"nowrap",minWidth:80,textAlign:"right" }}>⏱ {task.dueDate}</span>
        : <span style={{ minWidth:80,flexShrink:0 }} />}
      <button onClick={e=>{e.stopPropagation();onDelete(task.id);}}
        style={{ border:"none",background:"none",cursor:"pointer",color:hovered?"#E8A0A0":"transparent",fontSize:13,padding:"0 2px",transition:"color 0.1s",flexShrink:0,lineHeight:1,width:20 }}>×</button>
    </div>
  );
}

              ))}
              <button onClick={()=>setS({...s,types:[...s.types,{id:uid_fn(),name:"Nouveau",icon:"●"}]})} style={{ ...S.ghost,marginTop:10 }}>+ Ajouter</button>
            </>}
            {tab==="statuses" && <>
              {s.statuses.map(st => (
                <Row key={st.id}>
                  <span style={{ fontSize:10,fontWeight:700,background:st.bg,color:st.color,borderRadius:4,padding:"2px 8px",fontFamily:"'DM Mono',monospace",minWidth:70,textAlign:"center" }}>{st.name}</span>
                  <input value={st.name} onChange={e=>setS({...s,statuses:s.statuses.map(x=>x.id===st.id?{...x,name:e.target.value}:x)})} style={{ ...S.input,flex:1,padding:"5px 8px",fontSize:12 }} />
                  <span style={{ fontSize:9,color:"#AAA",fontFamily:"'DM Mono',monospace" }}>BG</span>
                  <input type="color" value={st.bg} onChange={e=>setS({...s,statuses:s.statuses.map(x=>x.id===st.id?{...x,bg:e.target.value}:x)})} style={{ width:28,height:28,border:"1px solid #E0E0E0",borderRadius:4,cursor:"pointer",padding:2 }} />
                  <span style={{ fontSize:9,color:"#AAA",fontFamily:"'DM Mono',monospace" }}>Txt</span>
                  <input type="color" value={st.color} onChange={e=>setS({...s,statuses:s.statuses.map(x=>x.id===st.id?{...x,color:e.target.value}:x)})} style={{ width:28,height:28,border:"1px solid #E0E0E0",borderRadius:4,cursor:"pointer",padding:2 }} />
                  <button onClick={()=>setS({...s,statuses:s.statuses.filter(x=>x.id!==st.id)})} style={{ border:"none",background:"none",cursor:"pointer",color:"#E8A0A0",fontSize:16 }}>×</button>
                </Row>
              ))}
              <button onClick={()=>setS({...s,statuses:[...s.statuses,{id:uid_fn(),name:"Nouveau",bg:"#F0F0F0",color:"#888"}]})} style={{ ...S.ghost,marginTop:10 }}>+ Ajouter</button>
            </>}
            {tab==="labels" && <>
              {s.labels.map(l => (
                <Row key={l.id}>
                  <span style={{ fontSize:10,background:l.bg,color:l.color,borderRadius:20,padding:"2px 10px",fontFamily:"'DM Mono',monospace",border:`1px solid ${l.color}30` }}>🏷 {l.name}</span>
                  <input value={l.name} onChange={e=>setS({...s,labels:s.labels.map(x=>x.id===l.id?{...x,name:e.target.value}:x)})} style={{ ...S.input,flex:1,padding:"5px 8px",fontSize:12 }} />
                  <span style={{ fontSize:9,color:"#AAA",fontFamily:"'DM Mono',monospace" }}>Txt</span>
                  <input type="color" value={l.color} onChange={e=>setS({...s,labels:s.labels.map(x=>x.id===l.id?{...x,color:e.target.value}:x)})} style={{ width:28,height:28,border:"1px solid #E0E0E0",borderRadius:4,cursor:"pointer",padding:2 }} />
                  <span style={{ fontSize:9,color:"#AAA",fontFamily:"'DM Mono',monospace" }}>Fond</span>
                  <input type="color" value={l.bg} onChange={e=>setS({...s,labels:s.labels.map(x=>x.id===l.id?{...x,bg:e.target.value}:x)})} style={{ width:28,height:28,border:"1px solid #E0E0E0",borderRadius:4,cursor:"pointer",padding:2 }} />
                  <button onClick={()=>setS({...s,labels:s.labels.filter(x=>x.id!==l.id)})} style={{ border:"none",background:"none",cursor:"pointer",color:"#E8A0A0",fontSize:16 }}>×</button>
                </Row>
              ))}
              <button onClick={()=>setS({...s,labels:[...s.labels,{id:uid_fn(),name:"Nouvelle",color:"#E67E22",bg:"#FEF9EC"}]})} style={{ ...S.btn("#E67E22"),marginTop:10,fontSize:11,padding:"6px 14px" }}>+ Nouvelle étiquette</button>
            </>}
          </div>
        </div>
        <div style={{ padding:"12px 20px",borderTop:"1px solid #F0F0F0",display:"flex",justifyContent:"flex-end",gap:8 }}>
          <button onClick={()=>setS(JSON.parse(JSON.stringify(DEV_DEFAULT_SETTINGS)))} style={{ ...S.btn("#F0F0F0","#666"),fontSize:11,padding:"6px 14px" }}>Réinitialiser</button>
          <button onClick={()=>{ onSave(s); onClose(); }} style={{ ...S.btn("#E67E22"),fontSize:11,padding:"6px 14px" }}>✓ Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

function DevView() {
  const uid_fn = () => Math.random().toString(36).substr(2,9);
  const today_fn = () => new Date().toISOString().split("T")[0];

  const [devSettings, setDevSettings] = useState(() => loadDevSettings());
  const [tasks, setTasks] = useState(() => { try { const s=localStorage.getItem(DEV_STORAGE_KEY); return s?JSON.parse(s):[]; } catch { return []; } });
  const [modal, setModal] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [filterCat,    setFilterCat]    = useState("Toutes");
  const [filterType,   setFilterType]   = useState("Tous");
  const [filterStatus, setFilterStatus] = useState("Actives");
  const [search, setSearch] = useState("");
  const [colWidths, setColWidths] = useState(() => { try { const s=localStorage.getItem(DEV_COL_WIDTHS_KEY); return s?JSON.parse(s):{title:220,status:75,category:100,type:70,scope:90,labels:80}; } catch { return {title:220,status:75,category:100,type:70,scope:90,labels:80}; } });
  const dragging = useRef(null);
  const isMobile = useIsMobile();

  useEffect(() => { try { localStorage.setItem(DEV_STORAGE_KEY,JSON.stringify(tasks)); } catch {} }, [tasks]);

  // Listener pour les étiquettes inline (DevLabelCell)
  useEffect(() => {
    const handler = (e) => {
      const { id, labels } = e.detail;
      setTasks(p => p.map(t => t.id === id ? { ...t, labels } : t));
    };
    window.addEventListener("devAddLabel", handler);
    return () => window.removeEventListener("devAddLabel", handler);
  }, []);

  const [undoDevTask, setUndoDevTask] = useState(null);
  const undoDevTimerRef = useRef(null);
  const [showTrashDev, setShowTrashDev] = useState(false);
  const [trashDev, setTrashDev] = useState(() => { try { const s=localStorage.getItem("devtracker_trash_v1"); return s?JSON.parse(s):[]; } catch { return []; } });
  const saveTrashDev = t => { try { localStorage.setItem("devtracker_trash_v1", JSON.stringify(t)); } catch {} };

  const addTask  = t => setTasks(p=>[t,...p]);
  const updTask  = t => setTasks(p=>p.map(x=>x.id===t.id?t:x));
  const delTask  = id => {
    const found = tasks.find(x=>x.id===id); if (!found) return;
    setTasks(p=>p.filter(x=>x.id!==id));
    const trashed = { ...found, deletedAt: new Date().toISOString() };
    setTrashDev(p=>{ const n=[...p,trashed]; saveTrashDev(n); return n; });
    if (undoDevTimerRef.current) clearTimeout(undoDevTimerRef.current);
    setUndoDevTask(found);
    undoDevTimerRef.current = setTimeout(() => setUndoDevTask(null), 10000);
  };
  const undoDeleteDev = () => {
    if (!undoDevTask) return;
    clearTimeout(undoDevTimerRef.current);
    setTasks(p=>[undoDevTask,...p]);
    setTrashDev(p=>{ const n=p.filter(x=>x.id!==undoDevTask.id); saveTrashDev(n); return n; });
    setUndoDevTask(null);
  };
  const restoreFromTrashDev = id => {
    const r = trashDev.find(x=>x.id===id); if (!r) return;
    const { deletedAt, ...restored } = r;
    setTasks(p=>[restored,...p]);
    setTrashDev(p=>{ const n=p.filter(x=>x.id!==id); saveTrashDev(n); return n; });
  };
  const purgeTrashDev = id => setTrashDev(p=>{ const n=p.filter(x=>x.id!==id); saveTrashDev(n); return n; });
  const togTask  = id => setTasks(p=>p.map(x=>x.id===id?{...x,completed:!x.completed,status:!x.completed?"done":x.status}:x));
  const handleSave = t => { if(tasks.find(x=>x.id===t.id)) updTask(t); else addTask(t); };
  const saveDevSettings = s => { setDevSettings(s); try { localStorage.setItem(DEV_SETTINGS_KEY,JSON.stringify(s)); } catch {} };
  const openNew = () => setModal({ id:uid_fn(),title:"",category:"",type:"",status:"backlog",priority:"normale",notes:"",dueDate:"",version:"",labels:[],completed:false,createdAt:new Date().toISOString() });

  const startResize = (col,e) => {
    e.preventDefault();
    const startX=e.clientX, startW=colWidths[col];
    const onMove=ev=>{ const nw=Math.max(40,startW+ev.clientX-startX); setColWidths(p=>{const n={...p,[col]:nw};try{localStorage.setItem(DEV_COL_WIDTHS_KEY,JSON.stringify(n));}catch{}return n;}); };
    const onUp=()=>{ window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
    window.addEventListener("mousemove",onMove); window.addEventListener("mouseup",onUp);
  };

  const displayed = tasks.filter(t => {
    if (filterCat!=="Toutes" && t.category!==filterCat) return false;
    if (filterType!=="Tous" && t.type!==filterType) return false;
    if (filterStatus==="Actives" && t.completed) return false;
    if (filterStatus==="Complétées" && !t.completed) return false;
    if (search && !t.title.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const thirtyDaysAgoDev = new Date(Date.now()-30*864e5).toISOString();
  const activeTrashDev   = trashDev.filter(r=>r.deletedAt>thirtyDaysAgoDev);
  const trashDaysLeftDev = r => Math.max(0,Math.ceil((new Date(r.deletedAt).getTime()+30*864e5-Date.now())/864e5));

  // Stats
  const total     = tasks.length;
  const pct = n => total>0?Math.round((n/total)*100):0;
  const statRows = devSettings.statuses.map(s => ({ ...s, count: tasks.filter(t=>t.status===s.id).length }));

  const FBtn = ({label,active,onClick,color}) => (
    <button onClick={onClick} style={{ border:`1px solid ${active?color||"#E67E22":"#E0E0E0"}`,background:active?color||"#E67E22":"white",color:active?"white":"#888",borderRadius:5,padding:"3px 9px",fontSize:10,cursor:"pointer",fontFamily:"'DM Mono',monospace",transition:"all 0.15s",whiteSpace:"nowrap" }}>{label}</button>
  );
  const ResizeHandle = ({col}) => (
    <span onMouseDown={e=>startResize(col,e)} style={{ display:"inline-block",width:6,cursor:"col-resize",userSelect:"none",flexShrink:0,marginLeft:2,alignSelf:"stretch",borderRight:"2px solid transparent",transition:"border-color 0.15s" }}
      onMouseEnter={e=>e.currentTarget.style.borderColor="#BDC3C7"} onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"} />
  );
  const ColHdr = ({label,col}) => (
    <div style={{ display:"flex",alignItems:"center",flexShrink:0,width:colWidths[col]||72 }}>
      <span style={{ fontSize:10,fontWeight:700,color:"white",fontFamily:"'Lora',serif",letterSpacing:"0.06em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{label}</span>
      <ResizeHandle col={col} />
    </div>
  );

  return (
    <div style={{ display:"flex",flexDirection:"column",height:"calc(100vh - 56px)" }}>
      {/* Toolbar */}
      <div style={{ background:"white",borderBottom:"1px solid #ECEAE5",padding:"7px 12px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",flexShrink:0 }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher…" style={{ ...S.input,width:140,padding:"4px 8px",fontSize:11 }} />
        <div style={{ width:2,height:20,background:"#FDDCB5",borderRadius:1,flexShrink:0 }} />
        {["Actives","Complétées","Toutes"].map(o=><FBtn key={o} label={o} active={filterStatus===o} onClick={()=>setFilterStatus(o)} />)}
        {!isMobile && <>
          <div style={{ width:2,height:20,background:"#FDDCB5",borderRadius:1,flexShrink:0 }} />
          {["Tous",...devSettings.types.map(t=>t.name)].map(o=><FBtn key={o} label={o} active={filterType===o} onClick={()=>setFilterType(o)} />)}
          <div style={{ width:2,height:20,background:"#FDDCB5",borderRadius:1,flexShrink:0 }} />
          {["Toutes",...devSettings.categories.map(c=>c.name)].map(c=>{ const co=devSettings.categories.find(x=>x.name===c); return <FBtn key={c} label={c} active={filterCat===c} onClick={()=>setFilterCat(c)} color={co?.accent} />; })}
        </>}
        <div style={{ flex:1 }} />
        <button onClick={()=>setShowTrashDev(p=>!p)}
          style={{ border:`1px solid ${showTrashDev?"#E67E22":"#E0E0E0"}`,background:showTrashDev?"#FEF9E7":"white",color:showTrashDev?"#E67E22":"#888",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace",display:"flex",alignItems:"center",gap:5 }}>
          🗑 {activeTrashDev.length>0&&<span style={{ background:"#E67E22",color:"white",borderRadius:10,fontSize:9,padding:"1px 5px" }}>{activeTrashDev.length}</span>}
        </button>
        <button onClick={()=>setShowSettings(true)} title="Paramètres Dev" style={{ border:"1px solid #FDDCB5",background:"#FEF9EC",color:"#E67E22",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace" }}>⚙ Paramètres</button>
        <button onClick={openNew} style={{ ...S.btn("#E67E22"),padding:"4px 14px",fontSize:11 }}>+ Nouvelle</button>
      </div>

      {/* Column headers */}
      <div style={{ display:"flex",alignItems:"center",gap:7,paddingLeft:5,paddingRight:6,borderBottom:"1px solid #0A1F50",background:"#102A63",flexShrink:0,userSelect:"none",height:25 }}>
        <div style={{ width:14,marginLeft:5,flexShrink:0 }} />
        <span style={{ fontSize:10,fontWeight:700,color:"white",fontFamily:"'Lora',serif",minWidth:16 }}>#</span>
        <span style={{ fontSize:10,fontWeight:700,color:"white",fontFamily:"'Lora',serif",minWidth:12 }}>P</span>
        <ColHdr label="ÉVOLUTION"  col="title" />
        <ColHdr label="STATUT"     col="status" />
        <ColHdr label="CATÉGORIE"  col="category" />
        <ColHdr label="TYPE"       col="type" />
        <ColHdr label="PÉRIMÈTRE"  col="scope" />
        <ColHdr label="ÉTIQUETTES" col="labels" />
        <div style={{ flex:1 }} />
        <span style={{ fontSize:10,fontWeight:700,color:"white",fontFamily:"'Lora',serif",minWidth:60,textAlign:"right" }}>VERSION</span>
        <span style={{ fontSize:10,fontWeight:700,color:"white",fontFamily:"'Lora',serif",minWidth:80,textAlign:"right" }}>DATE CIBLE</span>
        <span style={{ width:20,flexShrink:0 }} />
      </div>

      {/* List */}
      <div style={{ flex:1,overflowY:"auto",padding:"4px 12px 8px" }}>
        {displayed.length===0 ? (
          <div style={{ textAlign:"center",padding:"50px 0",color:"#CCC" }}>
            <div style={{ fontSize:32,marginBottom:10 }}>⌥</div>
            <div style={{ fontFamily:"'Lora',serif",fontSize:14 }}>Aucune évolution trouvée</div>
          </div>
        ) : displayed.map((t,i) => <DevTaskCard key={t.id} task={t} num={i+1} onDelete={delTask} onEdit={m=>setModal({...m})} onToggle={togTask} devSettings={devSettings} colWidths={colWidths} />)}
      </div>

      {/* Stats footer */}
      <div style={{ padding:"5px 12px",borderTop:"1px solid #F0F0F0",background:"white",flexShrink:0,display:"flex",gap:14,flexWrap:"wrap",alignItems:"center" }}>
        {statRows.map(s => (
          <span key={s.id} style={{ fontSize:9,fontFamily:"'Lora',serif",color:s.count>0?s.color:"#CCC",whiteSpace:"nowrap" }}>
            <span style={{ fontWeight:700 }}>{s.name}</span> {s.count} <span style={{ opacity:0.6 }}>({pct(s.count)}%)</span>
          </span>
        ))}
        <span style={{ flex:1,textAlign:"right",fontSize:9,color:"#CCC",fontFamily:"'Lora',serif" }}>{displayed.length} affiché{displayed.length!==1?"s":""} / {total} total</span>
      </div>

      {showTrashDev && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:2000,display:"flex",flexDirection:"column",padding:"40px 20px",backdropFilter:"blur(4px)" }}
          onClick={()=>setShowTrashDev(false)}>
          <div style={{ background:"white",borderRadius:14,width:"100%",maxWidth:700,margin:"0 auto",maxHeight:"80vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)" }}
            onClick={e=>e.stopPropagation()}>
            <div style={{ padding:"16px 20px",borderBottom:"1px solid #F0F0F0",fontSize:14,fontWeight:700,fontFamily:"'Lora',serif",color:"#2C3E50" }}>🗑 Corbeille — évolutions supprimées (30 jours)</div>
            {activeTrashDev.length===0
              ? <div style={{ textAlign:"center",padding:"40px",color:"#CCC",fontFamily:"'Lora',serif" }}>Corbeille vide</div>
              : <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12,padding:"16px" }}>
                  {activeTrashDev.map(r=>{
                    const cat=devSettings.categories.find(c=>c.name===r.category);
                    const st=devSettings.statuses.find(s=>s.id===r.status)||devSettings.statuses[0];
                    return (
                      <div key={r.id} style={{ opacity:0.8 }}>
                        <div style={{ background:"#FAFAFA",borderRadius:10,padding:"10px 12px",border:`1px dashed #E0E0E0`,borderLeft:`3px solid ${cat?.accent||"#E67E22"}` }}>
                          <div style={{ fontSize:11,fontWeight:700,fontFamily:"'Lora',serif",color:"#888",marginBottom:4 }}>{r.title||"Sans titre"}</div>
                          <div style={{ display:"flex",gap:4,flexWrap:"wrap" }}>
                            {cat&&<span style={{ fontSize:8,background:cat.bg,color:cat.accent,borderRadius:3,padding:"1px 6px",fontFamily:"'Lora',serif",fontWeight:700 }}>{cat.name}</span>}
                            {st&&<span style={{ fontSize:8,background:st.bg,color:st.color,borderRadius:3,padding:"1px 6px",fontFamily:"'Lora',serif" }}>{st.name}</span>}
                          </div>
                        </div>
                        <div style={{ display:"flex",gap:6,marginTop:6 }}>
                          <button onClick={()=>restoreFromTrashDev(r.id)} style={{ ...S.btn("#27AE60"),fontSize:10,padding:"5px 12px",flex:1 }}>↩ Restaurer</button>
                          <span style={{ fontSize:10,color:"#AAA",fontFamily:"'Lora',serif",alignSelf:"center" }}>J-{trashDaysLeftDev(r)}</span>
                          <button onClick={()=>purgeTrashDev(r.id)} style={{ ...S.btn("#E74C3C"),fontSize:10,padding:"5px 10px" }}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                </div>}
          </div>
        </div>
      )}
      {undoDevTask && (
        <div style={{ position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:9998,background:"#2C3E50",color:"white",borderRadius:12,padding:"12px 20px",boxShadow:"0 8px 24px rgba(0,0,0,0.25)",display:"flex",alignItems:"center",gap:16,fontFamily:"'Lora',serif",fontSize:12 }}>
          <span>🗑 <strong>"{(undoDevTask.title||"Évolution").slice(0,30)}"</strong> supprimée</span>
          <button onClick={undoDeleteDev} style={{ background:"#27AE60",border:"none",borderRadius:6,color:"white",padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"'Lora',serif",fontWeight:700 }}>↩ Annuler</button>
          <button onClick={()=>setUndoDevTask(null)} style={{ background:"none",border:"none",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:16,padding:0 }}>×</button>
        </div>
      )}
      {modal && <DevTaskModal task={modal} devSettings={devSettings} onSave={handleSave} onClose={()=>setModal(null)} />}
      {showSettings && <DevSettingsPanel devSettings={devSettings} onSave={saveDevSettings} onClose={()=>setShowSettings(false)} />}
    </div>
  );
}

function SettingsView({ settings, onSave }) {
  const [s, setS] = useState(JSON.parse(JSON.stringify({ ...DEFAULT_SETTINGS, ...settings, hiddenTabs: settings.hiddenTabs || [], labels: settings.labels || DEFAULT_SETTINGS.labels, groqKey: settings.groqKey || "" })));
  const [tab, setTab] = useState("categories");
  const Tab = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{ border: "none", background: "none", padding: "8px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: tab === id ? "#102A63" : "#888", borderBottom: `2px solid ${tab === id ? "#102A63" : "transparent"}`, fontWeight: tab === id ? 700 : 400 }}>{label}</button>
  );

  const addCat  = () => setS({ ...s, categories: [...s.categories, { id: uid(), name: "Nouvelle catégorie", bg: "#F0F0F0", accent: "#888888" }] });
  const updCat  = (id, field, val) => setS({ ...s, categories: s.categories.map(c => c.id === id ? { ...c, [field]: val } : c) });
  const delCat  = (id) => setS({ ...s, categories: s.categories.filter(c => c.id !== id) });

  const addType = () => setS({ ...s, types: [...s.types, { id: uid(), name: "Nouveau type", icon: "●" }] });
  const updType = (id, field, val) => setS({ ...s, types: s.types.map(t => t.id === id ? { ...t, [field]: val } : t) });
  const delType = (id) => setS({ ...s, types: s.types.filter(t => t.id !== id) });

  const addStat = () => setS({ ...s, statuses: [...s.statuses, { id: uid(), name: "Nouveau statut", bg: "#F0F0F0", color: "#888888" }] });
  const updStat = (id, field, val) => setS({ ...s, statuses: s.statuses.map(st => st.id === id ? { ...st, [field]: val } : st) });
  const delStat = (id) => setS({ ...s, statuses: s.statuses.filter(st => st.id !== id) });

  const addLabel  = () => setS({ ...s, labels: [...(s.labels||[]), { id: uid(), name: "Nouvelle étiquette", color: "#888888", bg: "#F0F0F0" }] });
  const updLabel  = (id, field, val) => setS({ ...s, labels: (s.labels||[]).map(l => l.id === id ? { ...l, [field]: val } : l) });
  const delLabel  = (id) => setS({ ...s, labels: (s.labels||[]).filter(l => l.id !== id) });

  const toggleTab = id => {
    const hidden = s.hiddenTabs || [];
    setS({ ...s, hiddenTabs: hidden.includes(id) ? hidden.filter(x => x !== id) : [...hidden, id] });
  };

  const Row = ({ children }) => <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #F5F5F5" }}>{children}</div>;
  const [profiles, setProfiles] = useState(() => loadUserProfiles());
  const [newProfile, setNewProfile] = useState({ name: "", role: "user", email: "" });
  const addProfile  = () => { if (!newProfile.name.trim()) return; const p = [...profiles, { ...newProfile, id: uid(), createdAt: new Date().toISOString() }]; setProfiles(p); saveUserProfiles(p); setNewProfile({ name: "", role: "user", email: "" }); };
  const delProfile  = (id) => { if (profiles.find(p=>p.id===id)?.role==="owner") return; const p = profiles.filter(x=>x.id!==id); setProfiles(p); saveUserProfiles(p); };
  const updProfile  = (id, field, val) => { const p = profiles.map(x=>x.id===id?{...x,[field]:val}:x); setProfiles(p); saveUserProfiles(p); };

  return (
