<script>

  apiKey: "AIzaSyAigQeZBObjPtqfxr6MrJZxtrORlQ-OStM",

  appId: "1:302859991450:web:9eb287d1fd570a7ed66223"
});
const _db = firebase.firestore();
const _auth = firebase.auth();

const SYNC_KEYS = ["taskmanager_v4", "taskmanager_settings_v1", "taskmanager_meetings_v1"];
let _uid = null;
let _debounce = {};
let _reactMounted = false;
let _remoteCheckInterval = null;
// Timestamp of the LAST time THIS device wrote to Firestore
// Remote check only reloads if Firestore ts > this value + 10s buffer
let _myLastWriteTs = 0;

const _origSetItem = Storage.prototype.setItem;
const _origGetItem = Storage.prototype.getItem;
const _origRemoveItem = Storage.prototype.removeItem;

Storage.prototype.setItem = function(key, value) {
  _origSetItem.call(this, key, value);
  if (this === window.localStorage && _uid && SYNC_KEYS.includes(key)) {
    clearTimeout(_debounce[key]);
    _debounce[key] = setTimeout(() => {
      const ts = Date.now();
      _myLastWriteTs = ts; // Record when WE wrote
      const docKey = key.replace(/[^a-zA-Z0-9_]/g, '_');
      _db.collection('users').doc(_uid).collection('ls').doc(docKey)
        .set({ value: value, ts: ts })
        .catch(e => console.error('Firestore save error:', e));
    }, 1000);
  }
};

function showScreen(id) {
  document.querySelectorAll('.fb-screen').forEach(el => el.style.display = 'none');
  const el = document.getElementById(id);
  if (el) el.style.display = 'flex';
}

function mountReact() {
  showScreen('fb-app');
  _reactMounted = true;
  if (window._doMount) window._doMount();
  else window._pendingMount = true;
}

// Check for remote changes every 10s
// Silently update localStorage and notify React instead of reloading the page
function startRemoteCheck(uid) {
  if (_remoteCheckInterval) clearInterval(_remoteCheckInterval);
  _remoteCheckInterval = setInterval(async () => {
    if (!_reactMounted || !_uid) return;
    try {
      const key = 'taskmanager_v4';
      const docKey = key.replace(/[^a-zA-Z0-9_]/g, '_');
      const snap = await _db.collection('users').doc(uid).collection('ls').doc(docKey).get();
      if (snap.exists && snap.data() && snap.data().ts) {
        const remoteTs = snap.data().ts;
        const now = Date.now();
        // Only sync if:
        // - remote is newer than our last write by more than 15 seconds
        // - remote is not from the future (sanity check)
        if (remoteTs > _myLastWriteTs + 15000 && remoteTs <= now + 5000) {
          const localVal = _origGetItem.call(localStorage, key);
          const remoteVal = snap.data().value;
          if (localVal !== remoteVal) {
            console.log('Remote change from another device - silent sync');
            // Update localStorage silently without page reload
            _origSetItem.call(localStorage, key, remoteVal);
            _myLastWriteTs = remoteTs; // prevent re-trigger
            // Notify React app to re-read from localStorage
            window.dispatchEvent(new CustomEvent('remoteDataUpdated', { detail: { key } }));
          }
        }
      }
    } catch(e) {}
  }, 10000);
}

async function loadAndMount(uid) {
  _uid = uid;
  _myLastWriteTs = Date.now(); // Treat load as a "write" to avoid immediate reload
  showScreen('fb-loading');
  try {
    for (const key of SYNC_KEYS) {
      const docKey = key.replace(/[^a-zA-Z0-9_]/g, '_');
      const snap = await _db.collection('users').doc(uid).collection('ls').doc(docKey).get();
      if (snap.exists && snap.data() && snap.data().value) {
        _origSetItem.call(localStorage, key, snap.data().value);
      }
    }
  } catch(e) { console.warn('Load error:', e); }
  startRemoteCheck(uid);
  mountReact();
}

_auth.onAuthStateChanged(user => {
  if (user) {
    loadAndMount(user.uid);
  } else {
    _uid = null;
    _reactMounted = false;
    if (_remoteCheckInterval) clearInterval(_remoteCheckInterval);
    SYNC_KEYS.forEach(k => _origRemoveItem.call(localStorage, k));
    showScreen('fb-login');
    document.getElementById('root').innerHTML = '';
  }
});

async function fbSubmit(isRegister) {
  const email = document.getElementById('fb-email').value;
  const password = document.getElementById('fb-password').value;
  const btn = document.getElementById('fb-btn');
  btn.disabled = true; btn.textContent = '⟳ Connexion…';
  document.getElementById('fb-error').style.display = 'none';
  try {
    if (isRegister) await _auth.createUserWithEmailAndPassword(email, password);
    else await _auth.signInWithEmailAndPassword(email, password);
  } catch(err) {
    const msgs = {
      'auth/user-not-found':'Aucun compte avec cet email.',
      'auth/wrong-password':'Mot de passe incorrect.',
      'auth/email-already-in-use':'Cet email est déjà utilisé.',
      'auth/weak-password':'Mot de passe trop court (6 caractères min).',
      'auth/invalid-email':'Adresse email invalide.',
      'auth/invalid-credential':'Email ou mot de passe incorrect.',
    };
    document.getElementById('fb-error').textContent = msgs[err.code] || err.message;
    document.getElementById('fb-error').style.display = 'block';
    btn.disabled = false;
    btn.textContent = isRegister ? '✦ Créer mon compte' : '→ Se connecter';
  }
}

let _fbIsRegister = false;
function toggleMode() {
  _fbIsRegister = !_fbIsRegister;
  document.getElementById('fb-btn').textContent = _fbIsRegister ? '✦ Créer mon compte' : '→ Se connecter';
  document.getElementById('fb-btn').onclick = () => fbSubmit(_fbIsRegister);
  document.getElementById('fb-toggle').textContent = _fbIsRegister ? "J'ai déjà un compte → Se connecter" : "Pas encore de compte → S'inscrire";
  document.getElementById('fb-title').textContent = _fbIsRegister ? 'CRÉER UN COMPTE' : 'CONNEXION';
}

async function fbResetPassword() {
  const email = document.getElementById('fb-email').value.trim();
  if (!email) {
    document.getElementById('fb-error').textContent = 'Entrez votre email pour réinitialiser le mot de passe.';
    document.getElementById('fb-error').style.display = 'block';
    return;
  }
  try {
    await _auth.sendPasswordResetEmail(email);
    document.getElementById('fb-error').style.color = '#27AE60';
    document.getElementById('fb-error').textContent = 'Email de réinitialisation envoyé ! Vérifiez votre boite mail.';
    document.getElementById('fb-error').style.display = 'block';
  } catch(err) {
    document.getElementById('fb-error').style.color = '#C0392B';
    document.getElementById('fb-error').textContent = err.code === 'auth/user-not-found' ? 'Aucun compte avec cet email.' : err.message;
    document.getElementById('fb-error').style.display = 'block';
  }
}

async function fbLogout() {
  if (!window._logoutConfirm) {
    window._logoutConfirm = true;
    const btn = document.getElementById('fb-logout-btn');
    if (btn) { btn.style.background='#B91C1C'; btn.textContent='⚠ Confirmer ?'; }
    setTimeout(() => {
      window._logoutConfirm = false;
      const b = document.getElementById('fb-logout-btn');
      if (b) { b.style.background='#102A63'; b.textContent='⏻ Déconnexion'; }
    }, 3000);
  } else {
    await _auth.signOut();
  }
}

/* ─── RESPONSIVE HOOK ─── */
function useIsMobile() {
  const [m, setM] = useState(() => window.innerWidth < 640);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 640);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return m;
}

function fmtCotEur(v) {
  if (v===""||v===null||v===undefined) return "—";
  const n = parseFloat(String(v).replace(/[\s\u00A0]/g,"").replace(",","."));
  if (isNaN(n)) return "—";
  return n.toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0})+" €";
}

        <div style={{ padding:"10px 24px 18px", display:"flex", justifyContent:"flex-end", gap:8 }}>
          <button onClick={onClose} style={{ ...S.btn("#F0F0F0","#666"), fontSize:11, padding:"7px 14px" }}>Annuler</button>
          <button onClick={()=>onSave(d)} style={{ ...S.btn("#102A63"), fontSize:11, padding:"7px 14px" }}>✓ Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

/* ── CotationView (calquée sur TasksView) ── */
function CotationView({ settings }) {
  const [cotations, setCotations] = React.useState(()=>loadCotations());
  const [modal, setModal]         = React.useState(null);
  const [noteModal, setNoteModal] = React.useState(null);
  const [search, setSearch]       = React.useState("");
  const [filterStatus, setFilterStatus] = React.useState("Tous");
  const [filterLabel,  setFilterLabel]  = React.useState("Toutes");
  const [sortCol,  setSortCol]  = React.useState(null);
  const [sortDir,  setSortDir]  = React.useState("asc");
  const [colWidths, setColWidths] = React.useState(()=>{ try{ const s=localStorage.getItem(COT_COL_WIDTHS_KEY); return s?{...DEFAULT_COT_WIDTHS,...JSON.parse(s)}:DEFAULT_COT_WIDTHS; }catch{ return DEFAULT_COT_WIDTHS; }});

  const saveData = (list) => { setCotations(list); saveCotations(list); };
  const handleSave = (d) => {
    const list = d.id ? cotations.map(c=>c.id===d.id?d:c) : [...cotations,{...d,id:Date.now().toString()}];
    saveData(list); setModal(null);
  };
  const handleDelete = (id) => { if(confirm("Supprimer cette demande ?")) saveData(cotations.filter(c=>c.id!==id)); };

  const startResize = (col, e) => {
    e.preventDefault();
    const startX=e.clientX, startW=colWidths[col];
    const onMove = ev => { const nw=Math.max(40,startW+ev.clientX-startX); setColWidths(w=>({...w,[col]:nw})); localStorage.setItem(COT_COL_WIDTHS_KEY,JSON.stringify({...colWidths,[col]:nw})); };
    const onUp = ()=>{ document.removeEventListener("mousemove",onMove); document.removeEventListener("mouseup",onUp); };
    document.addEventListener("mousemove",onMove); document.addEventListener("mouseup",onUp);
  };

  const FBtn = ({label,active,onClick,color}) => (
    <button onClick={onClick} style={{ border:`1px solid ${active?color||"#102A63":"#E0E0E0"}`, background:active?color||"#102A63":"white",
      color:active?"white":"#666", borderRadius:20, padding:"3px 12px", cursor:"pointer",
      fontFamily:"'Lora',serif", fontSize:10, fontWeight:active?700:400, flexShrink:0 }}>{label}</button>
  );

  const displayed = cotations
    .filter(c => filterStatus==="Tous" || (filterStatus==="En cours" ? !["done","refused"].includes(c.status) : COT_STATUSES.find(s=>s.label===filterStatus)?.id===c.status))
    .filter(c => filterLabel==="Toutes" || COT_LABELS.find(l=>l.label===filterLabel)?.id===c.label)
    .filter(c => !search || [c.clientName,c.clientCode,c.requester].some(v=>(v||"").toLowerCase().includes(search.toLowerCase())))
    .sort((a,b) => {
      if (!sortCol) {
        const ra = COT_PRIOS.find(p=>p.id===a.priority)?.rank??2;
        const rb = COT_PRIOS.find(p=>p.id===b.priority)?.rank??2;
        return ra-rb;
      }
      let va=a[sortCol]||"", vb=b[sortCol]||"";
      if(["authorizedAmount","need","obtainedAmount"].includes(sortCol)){
        va=parseFloat(String(va).replace(",","."))||0;
        vb=parseFloat(String(vb).replace(",","."))||0;
      }
      const cmp=va.toString().localeCompare(vb.toString(),"fr",{sensitivity:"base"});
      return sortDir==="asc"?cmp:-cmp;
    });

  const handleSort = (col) => { if(sortCol===col){ setSortDir(d=>d==="asc"?"desc":"asc"); }else{ setSortCol(col); setSortDir("asc"); }};
  const si = (col) => sortCol===col?(sortDir==="asc"?" ▲":" ▼"):"";

  const totAuth = displayed.reduce((s,c)=>s+(parseFloat(String(c.authorizedAmount||0).replace(",","."))||0),0);
  const totNeed = displayed.reduce((s,c)=>s+(parseFloat(String(c.need||0).replace(",","."))||0),0);
  const totObt  = displayed.reduce((s,c)=>s+(parseFloat(String(c.obtainedAmount||0).replace(",","."))||0),0);

  const colOrder = ["clientName","clientCode","requestDate","requester","status","authorizedAmount","need","obtainedAmount","label","closeDate"];
  const gridTpl = "28px 44px " + colOrder.map(k=>colWidths[k]+"px").join(" ") + " 30px 30px";

  const ColH = ({col,label,right}) => (
    <div style={{ position:"relative", overflow:"hidden", textAlign:right?"right":"left", paddingRight:right?10:0 }}>
      <span onClick={()=>handleSort(col)} style={{ fontSize:9, fontWeight:700, color:"white", fontFamily:"'Lora',serif", cursor:"pointer", whiteSpace:"nowrap", userSelect:"none" }}>
        {label}{si(col)}
      </span>
      <div onMouseDown={e=>startResize(col,e)} style={{ position:"absolute", right:0, top:0, bottom:0, width:6, cursor:"col-resize", zIndex:10 }} />
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"auto" }}>
      {/* ── Toolbar identique Tâches ── */}
      <div style={{ background:"white", borderBottom:"1px solid #ECEAE5", padding:"4px 12px", display:"flex", flexDirection:"column", gap:4, flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"nowrap" }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher…" className="search-input-small"
            style={{ ...S.input, width:140, padding:"4px 8px", fontSize:10 }} />
          <div style={{ width:1, height:20, background:"#E8E8E8", flexShrink:0 }} />
          {["Tous","En cours","À faire","En attente","Bloqué","Refusé","Fait"].map(o=><FBtn key={o} label={o} active={filterStatus===o} onClick={()=>setFilterStatus(o)} />)}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"nowrap" }}>
          <div style={{ width:1, height:20, background:"#E8E8E8", flexShrink:0 }} />
          {["Toutes",...COT_LABELS.map(l=>l.label)].map(o=>{
            const lb=COT_LABELS.find(l=>l.label===o);
            return <FBtn key={o} label={o} active={filterLabel===o} onClick={()=>setFilterLabel(o)} color={lb?.color} />;
          })}
          <div style={{ flex:1 }} />
          <button onClick={()=>{setColWidths(DEFAULT_COT_WIDTHS);localStorage.removeItem(COT_COL_WIDTHS_KEY);}} title="Réinitialiser colonnes"
            style={{ border:"1px solid #E0E0E0", background:"white", color:"#AAA", borderRadius:5, padding:"2px 9px", fontSize:10, cursor:"pointer", fontFamily:"'DM Mono',monospace" }}>↺</button>
          <button onClick={()=>setModal({})} style={{ ...S.btn("#102A63"), padding:"4px 14px", fontSize:11 }}>+ Nouvelle</button>
        </div>
      </div>

      /* ── Sous-titre ── */}
      <div style={{ padding:"8px 12px 4px", background:"#F7F6F3" }}>
        <span style={{ fontSize:11, color:"#999", fontFamily:"'DM Mono',monospace" }}>
          {displayed.length} demande{displayed.length!==1?"s":""} · {cotations.filter(c=>!["done","refused"].includes(c.status)).length} en cours
        </span>
      </div>

      {/* ── Tableau ── */}
      <div style={{ overflowX:"auto", background:"white", borderTop:"1px solid #ECEAE5" }}>
        {/* Header */}
        <div style={{ display:"grid", gridTemplateColumns:gridTpl, padding:"4px 8px", background:"#102A63", minWidth:"max-content", alignItems:"center" }}>
          <div/>
          <div style={{ fontSize:9, fontWeight:700, color:"white", fontFamily:"'Lora',serif" }}>PRIO.</div>
          <ColH col="clientName"       label="CLIENT"    />
          <ColH col="clientCode"       label="CODE"      />
          <ColH col="requestDate"      label="DATE DEM." />
          <ColH col="requester"        label="DEMANDEUR" />
          <ColH col="status"           label="STATUT"    />
          <ColH col="authorizedAmount" label="ENCOURS"   right />
          <ColH col="need"             label="BESOIN"    right />
          <ColH col="obtainedAmount"   label="OBTENU"    right />
          <ColH col="label"            label="ÉTIQUETTE" />
          <ColH col="closeDate"        label="CLÔTURE"   />
          <div/>
          <div/>
        </div>

        {/* Lignes */}
        {displayed.length===0 ? (
          <div style={{ fontFamily:"'Lora',serif", textAlign:"center", padding:"30px 0", color:"#BBB", fontSize:13 }}>Aucune demande</div>
        ) : displayed.map((c,i)=>{
          const st=COT_STATUSES.find(s=>s.id===c.status)||COT_STATUSES[0];
          const lb=COT_LABELS.find(l=>l.id===c.label)||COT_LABELS[0];
          const pr=COT_PRIOS.find(p=>p.id===(c.priority||"normal"))||COT_PRIOS[2];
          return (
            <div key={c.id} style={{ display:"grid", gridTemplateColumns:gridTpl, padding:"3px 8px",
              borderBottom:"1px solid #F5F5F5", background:i%2===0?"white":"#FAFAFA",
              alignItems:"center", minWidth:"max-content" }}>
              <div><button onClick={e=>{e.stopPropagation(); const next=clients.map(x=>x.id===c.id?{...x, closed:!x.closed}:x); saveClients(next); if(selected?.id===c.id) setSelected({...c, closed:!c.closed}); }} style={{ width:18, height:18, borderRadius:"50%", border:`2px solid ${c.closed ? "#27AE60" : "#BDC3C7"}`, background:c.closed ? "#27AE60" : "white", cursor:"pointer", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"white", padding:0, lineHeight:1 }}>✓</button></div>
              {/* Prio */}
              <div style={{ display:"flex", alignItems:"center", gap:2 }}>
                {c.priority==="urgent"&&<span style={{ fontSize:9, color:"#E74C3C" }}>▲</span>}

              {/* Client */}
              <div style={{ fontSize:12, fontFamily:"'Lora',serif", color:"#2C3E50", fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", cursor:"pointer" }}
                onClick={()=>setModal(c)}><input type="checkbox" checked={!!c.closed} onClick={e=>e.stopPropagation()} onChange={e=>{ e.stopPropagation(); const next=clients.map(x=>x.id===c.id?{...x, closed:e.target.checked}:x); saveClients(next); if(selected?.id===c.id) setSelected({...c, closed:e.target.checked}); }} style={{ width:14, height:14, cursor:"pointer", flexShrink:0 }} />{c.clientName||"—"}</div>

              {/* Montants */}
              <div style={{ fontSize:11, fontFamily:"'Lora',serif", color:"#2C3E50", textAlign:"right", paddingRight:10 }}>{fmtCotEur(c.authorizedAmount)}</div>

              </div>
              {/* Note + Actions */}
              <div style={{ display:"flex", justifyContent:"center" }}>
                <button onClick={()=>setNoteModal({id:c.id,notes:c.notes||""})}
                  style={{ background:"none", border:"none", cursor:"pointer", fontSize:13, opacity:c.notes?1:0.3, color:c.notes?"#102A63":"#999" }}>💬</button>
              </div>
              <div style={{ display:"flex", gap:3, justifyContent:"center" }}>
                <button onClick={()=>setModal(c)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:12, opacity:0.5 }} title="Modifier">✎</button>
                <button onClick={()=>handleDelete(c.id)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:12, color:"#E74C3C", opacity:0.5 }} title="Supprimer">×</button>
              </div>
            </div>
          );
        })}

        {/* Footer totaux */}
        {displayed.length>0&&(
          <div style={{ display:"grid", gridTemplateColumns:gridTpl, padding:"5px 8px", background:"#F8F9FB", borderTop:"2px solid #ECEAE5", minWidth:"max-content", alignItems:"center" }}>
            <div/><div/><div/><div/><div/><div/><div/>
            <div style={{ fontSize:11, fontWeight:700, color:"#102A63", fontFamily:"'Lora',serif", textAlign:"right", paddingRight:10 }}>{fmtCotEur(totAuth)}</div>
            <div style={{ fontSize:11, fontWeight:700, color:"#102A63", fontFamily:"'Lora',serif", textAlign:"right", paddingRight:10 }}>{fmtCotEur(totNeed)}</div>
            <div style={{ fontSize:11, fontWeight:700, color:"#065F46", fontFamily:"'Lora',serif", textAlign:"right", paddingRight:10 }}>{fmtCotEur(totObt)}</div>
            <div/><div/><div/><div/>

      </div>

      {/* Modal note */}
      {noteModal&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:"white", borderRadius:12, width:480, boxShadow:"0 16px 48px rgba(0,0,0,0.15)" }}>
            <div style={{ padding:"14px 18px", borderBottom:"1px solid #F0F0F0", fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:700, color:"#102A63" }}>NOTE</div>
            <div style={{ padding:"14px 18px" }}><RichTextArea value={noteModal.notes} onChange={v=>setNoteModal(p=>({...p,notes:v}))} placeholder="Saisir une note…" rows={5} /></div>
            <div style={{ padding:"10px 18px 16px", display:"flex", justifyContent:"flex-end", gap:8 }}>
              <button onClick={()=>setNoteModal(null)} style={{ ...S.btn("#F0F0F0","#666"), fontSize:10, padding:"6px 12px" }}>Annuler</button>
              <button onClick={()=>{ const u=cotations.map(c=>c.id===noteModal.id?{...c,notes:noteModal.notes}:c); saveData(u); setNoteModal(null); }}
                style={{ ...S.btn("#102A63"), fontSize:10, padding:"6px 12px" }}>✓ Enregistrer</button>
            </div>
          </div>
        </div>
      )}

      {modal!==null&&<CotationModal cotation={modal} onSave={handleSave} onClose={()=>setModal(null)} />}
    </div>
  );
}

function loadSettings() {
  try {
    const s = localStorage.getItem(SETTINGS_KEY);
    if (!s) { const b = localStorage.getItem(SETTINGS_KEY + "_backup"); if (b) { try { const p = JSON.parse(b); return { categories: p.categories || DEFAULT_SETTINGS.categories, types: p.types || DEFAULT_SETTINGS.types, statuses: p.statuses || DEFAULT_SETTINGS.statuses, hiddenTabs: p.hiddenTabs || [], labels: p.labels || DEFAULT_SETTINGS.labels, groqKey: (p.groqKey || "").trim(), showAiDebug: p.showAiDebug || false }; } catch {} } return DEFAULT_SETTINGS; }
    const parsed = JSON.parse(s);
    return {
      categories: parsed.categories || DEFAULT_SETTINGS.categories,
      types: parsed.types || DEFAULT_SETTINGS.types,
      statuses: parsed.statuses || DEFAULT_SETTINGS.statuses,
      hiddenTabs: parsed.hiddenTabs || [],
      labels: parsed.labels || DEFAULT_SETTINGS.labels,
      groqKey: (parsed.groqKey || "").trim(),
      suiviTypes: parsed.suiviTypes || DEFAULT_SETTINGS.suiviTypes,
    };
  } catch { return DEFAULT_SETTINGS; }
}
function saveSettings(s) {
  try {
    const clean = { ...s, groqKey: (s.groqKey || "").trim() };
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(clean));
    localStorage.setItem(SETTINGS_KEY + "_backup", JSON.stringify(clean));
  } catch {}
}

/* ─── 7) STOPWATCH WIDGET ─── */
function StopwatchWidget({ task, onStop, onClose }) {
  const [running, setRunning] = useState(true);
  const [elapsed, setElapsed] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    if (running) ref.current = setInterval(() => setElapsed(e => e + 1), 1000);
    else clearInterval(ref.current);
    return () => clearInterval(ref.current);
  }, [running]);
  const handleStop = () => { clearInterval(ref.current); onStop(elapsed); };
  return (
    <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 9000, background: "white", borderRadius: 14, boxShadow: "0 8px 32px rgba(0,0,0,0.18)", padding: "14px 18px", minWidth: 240, border: "2px solid #102A63" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <div style={{ fontSize: 11, fontWeight: 700, fontFamily: "'DM Mono',monospace", color: "#AAA", letterSpacing: "0.08em" }}>⏱ CHRONOMÈTRE</div>
        <button onClick={onClose} style={{ border: "none", background: "none", cursor: "pointer", color: "#BDC3C7", fontSize: 16 }}>×</button>
      </div>
      <div style={{ fontSize: 11, fontFamily: "'Lora',serif", color: "#2C3E50", marginBottom: 10, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{task.title}</div>
      <div style={{ fontSize: 32, fontWeight: 700, fontFamily: "'DM Mono',monospace", color: "#102A63", textAlign: "center", marginBottom: 12 }}>{fmtTime(elapsed)}</div>
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={() => setRunning(r => !r)} style={{ ...S.btn(running ? "#E67E22" : "#27AE60"), flex: 1, padding: "7px 0", fontSize: 11 }}>{running ? "⏸ Pause" : "▶ Reprendre"}</button>
        <button onClick={handleStop} style={{ ...S.btn("#C0392B"), flex: 1, padding: "7px 0", fontSize: 11 }}>⏹ Arrêter</button>
      </div>
      {task.totalTime > 0 && (
        <div style={{ marginTop: 8, fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace", textAlign: "center" }}>Temps cumulé : {fmtTime(task.totalTime)}</div>
      )}
    </div>
  );
}

/* ── IA inline correction button for RichTextArea ── */
function RichTextAiBtn({ editorRef, groqKey, onChange }) {
  const [loading, setLoading] = React.useState(false);
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open]);

  const actions = [
    { label: "✎ Corriger orthographe", prompt: "Corrige l'orthographe et la grammaire de ce texte sans changer le sens ni le style. Réponds UNIQUEMENT avec le texte corrigé en HTML simple, sans markdown ni backticks." },
    { label: "↺ Reformuler", prompt: "Reformule ce texte de façon plus claire et professionnelle. Réponds UNIQUEMENT avec le texte reformulé en HTML simple, sans markdown ni backticks." },
    { label: "▼ Résumer", prompt: "Fais un résumé concis de ce texte. Réponds UNIQUEMENT avec le résumé en HTML simple, sans markdown ni backticks." },
    { label: "+ Développer", prompt: "Développe ce texte en ajoutant plus de détails pertinents. Réponds UNIQUEMENT avec le texte développé en HTML simple, sans markdown ni backticks." },
  ];

  const run = async (prompt) => {
    setOpen(false);
    const txt = editorRef.current?.innerText?.trim();
    if (!txt) return;
    setLoading(true);
    try {
      const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${groqKey}` },
        body: JSON.stringify({ model: "llama-3.3-70b-versatile", max_tokens: 1024, temperature: 0.3,
          messages: [
            { role: "system", content: "Tu es un assistant de rédaction. Réponds uniquement avec le texte demandé, sans explication." },
            { role: "user", content: `${prompt}\n\nTexte:\n${txt}` }
          ]
        })
      });
      const data = await resp.json();
      const result = data.choices?.[0]?.message?.content?.trim();
      if (result && editorRef.current) {
        editorRef.current.innerHTML = result;
        onChange(result);
      }
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
      <button type="button" onMouseDown={(e) => { e.preventDefault(); setOpen(o => !o); }}
        disabled={loading}
        style={{ border: "1px solid #102A63", background: loading ? "#EEF4FF" : "white", borderRadius: 4, padding: "2px 8px",
          fontSize: 11, cursor: loading ? "wait" : "pointer", fontFamily: "'DM Mono',monospace", color: "#102A63", lineHeight: 1.5, fontWeight: 700 }}>
        {loading ? "⟳ IA…" : "✦ IA"}
      </button>
      {open && (
        <div style={{ position: "absolute", top: "100%", left: 0, zIndex: 9999, background: "white", border: "1px solid #E8E8E8",
          borderRadius: 8, boxShadow: "0 4px 16px rgba(0,0,0,0.12)", padding: 4, minWidth: 180, marginTop: 2 }}>
          {actions.map(a => (
            <button key={a.label} type="button" onMouseDown={(e) => { e.preventDefault(); run(a.prompt); }}
              style={{ display: "block", width: "100%", textAlign: "left", border: "none", background: "none",
                padding: "6px 10px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#333", borderRadius: 4 }}
              onMouseEnter={e => e.currentTarget.style.background = "#F5F7FB"}
              onMouseLeave={e => e.currentTarget.style.background = "none"}>
              {a.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function RichTextArea({ value, onChange, placeholder, rows = 5, showAi = false, groqKey = "" }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current && ref.current.innerHTML !== (value || "")) ref.current.innerHTML = value || ""; }, []);
  const exec = (cmd, val = null) => { ref.current.focus(); document.execCommand(cmd, false, val); onChange(ref.current.innerHTML); };
  const insertChecklist = () => {
    ref.current.focus();
    document.execCommand("insertHTML", false, '<ul style="list-style:none;padding-left:0"><li><input type="checkbox">&nbsp; </li></ul>');
    onChange(ref.current.innerHTML);
  };
  const ToolBtn = ({ cmd, label, title, val }) => (
    <button type="button" onMouseDown={(e) => { e.preventDefault(); exec(cmd, val); }} title={title}
      style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 4, padding: "2px 7px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#555", lineHeight: 1.5, minWidth: 24 }}>{label}</button>
  );
  return (
    <div style={{ border: "1px solid #E8E8E8", borderRadius: 8, overflow: "hidden", background: "#FAFAFA" }}>
      <div style={{ display: "flex", gap: 4, padding: "5px 8px", borderBottom: "1px solid #F0F0F0", background: "white", flexWrap: "wrap", alignItems: "center" }}>
        <ToolBtn cmd="bold"   label={<strong>G</strong>} title="Gras" />
        <ToolBtn cmd="underline" label={<u>S</u>} title="Souligner" />
        <ToolBtn cmd="italic" label={<em>I</em>} title="Italique" />
        <div style={{ width: 1, height: 16, background: "#E8E8E8", margin: "0 2px" }} />
        <BulletMenu onInsert={(html) => { ref.current.focus(); document.execCommand("insertHTML", false, html); onChange(ref.current.innerHTML); }} />
        <button type="button" onMouseDown={(e) => { e.preventDefault(); insertChecklist(); }} title="Check-list"
          style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 4, padding: "2px 7px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#555", lineHeight: 1.5 }}>☑ Check</button>
        <ToolBtn cmd="indent"  label="→" title="Retrait" />
        <ToolBtn cmd="outdent" label="←" title="Ôter retrait" />
        <div style={{ width: 1, height: 16, background: "#E8E8E8", margin: "0 2px" }} />
        {/* 4) text color menu */}
        <ColorMenu onSelect={(c) => exec("foreColor", c)} />
        <HighlightMenu onSelect={(c) => { ref.current.focus(); document.execCommand("hiliteColor", false, c); onChange(ref.current.innerHTML); }} />
        <div style={{ width: 1, height: 16, background: "#E8E8E8", margin: "0 2px" }} />
        <button type="button" onMouseDown={(e) => { e.preventDefault(); exec("undo"); }} title="Annuler (Ctrl+Z)"
          style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 4, padding: "2px 7px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#555", lineHeight: 1.5 }}>↩ Annuler</button>
        <button type="button" onMouseDown={(e) => { e.preventDefault(); ref.current.focus(); document.execCommand("insertHTML", false, "<hr style='border:none;border-top:2px solid #ECEAE5;margin:12px 0;'/>"); onChange(ref.current.innerHTML); }} title="Séparateur"
          style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 4, padding: "2px 7px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#555", lineHeight: 1.5 }}>— Sépar.</button>
        {showAi && groqKey && (
          <RichTextAiBtn editorRef={ref} groqKey={groqKey} onChange={onChange} />
        )}
      </div>
      <div ref={ref} contentEditable suppressContentEditableWarning
        onKeyDown={(e) => {
          if (e.key === "Enter") {
            const sel = window.getSelection();
            if (sel && sel.anchorNode) {
              const li = sel.anchorNode.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
              const parentLi = li.closest ? li.closest("li") : null;
              if (parentLi && parentLi.querySelector('input[type="checkbox"]')) {
                e.preventDefault();
                document.execCommand("insertHTML", false, "</li><li><input type=\"checkbox\">&nbsp; </li>");
                onChange(ref.current.innerHTML);
              }
            }
          }
        }}
        onInput={(e) => onChange(e.currentTarget.innerHTML)}
        data-placeholder={placeholder}
        style={{ minHeight: rows * 22, padding: "8px 12px", fontSize: 13, fontFamily: "'Lora',serif", color: "#2C3E50", outline: "none", lineHeight: 1.7 }} />
      <style>{`[contenteditable]:empty:before{content:attr(data-placeholder);color:#BDC3C7;pointer-events:none;font-style:italic}`}</style>
    </div>
  );
}

function AIAssistant({ text, onApply, onClose, settings }) {
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState("correct");
  const run = async () => {
    setLoading(true); setResult("");
    const stripped = text ? text.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim() : "";
    const prompts = {
      correct:   `Corrige les fautes d'orthographe et de grammaire du texte suivant en conservant exactement le sens et le style. Renvoie uniquement le texte corrigé, sans commentaire ni explication :\n\n${stripped}`,
      rephrase:  `Reformule le texte suivant de façon plus claire et professionnelle. Renvoie uniquement le texte reformulé, sans commentaire ni explication :\n\n${stripped}`,
      summarize: `Résume le texte suivant en 2-3 phrases. Renvoie uniquement le résumé, sans commentaire ni explication :\n\n${stripped}`,
      bullets:   `Transforme le texte suivant en une liste à puces concise. Renvoie uniquement la liste, sans commentaire ni explication :\n\n${stripped}`,
    };
    if (!settings ) {
      setResult("⚠️ Clé API manquante — configurez-la dans Paramètres ⚙");
      setLoading(false);
      return;
    }
    try {
      const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${(settings && settings.groqKey) || ""}`,
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompts[mode] }],
        }),
      });
      if (!resp.ok) { const err = await resp.json().catch(() => ({})); setResult(`Erreur API (${resp.status}) : ${err?.error?.message || "inconnue"}`); setLoading(false); return; }
      const data = await resp.json();
      setResult(data.choices?.[0]?.message?.content || "Erreur : réponse vide.");
    } catch (e) { setResult(`Erreur de connexion : ${e.message}`); }
    setLoading(false);
  };
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 4000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, backdropFilter: "blur(3px)", background: "rgba(0,0,0,0.3)" }} onMouseDown={(e) => { if (e.target === e.currentTarget) e.currentTarget._mdOutside = true; }}

      <div style={{ background: "white", borderRadius: 14, width: "100%", maxWidth: 520, boxShadow: "0 20px 60px rgba(0,0,0,0.2)", overflow: "hidden", borderTop: "4px solid #102A63" }}>
        <div style={{ padding: "16px 20px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50" }}>🤖 Assistant IA</div>
            <button onClick={onClose} style={{ border: "none", background: "none", fontSize: 20, cursor: "pointer", color: "#BDC3C7" }}>×</button>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
            {[{ v: "correct", l: "✓ Corriger" }, { v: "rephrase", l: "↺ Reformuler" }, { v: "summarize", l: "◎ Résumer" }, { v: "bullets", l: "• Lister" }].map(o => (

            ))}

          <div style={{ background: "#F8F8F6", borderRadius: 8, padding: "10px 12px", fontSize: 12, fontFamily: "'Lora',serif", color: "#888", marginBottom: 10, maxHeight: 80, overflowY: "auto" }}>
            <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#AAA", marginBottom: 4 }}>TEXTE ORIGINAL</div>
            <div dangerouslySetInnerHTML={{ __html: text || "(vide)" }} style={{ lineHeight: 1.5 }} />

/* ─── 3) RECURRENCE MODULE (Outlook-style) ─── */
// recurrence stored as object: { type, interval, weekDays, monthDay, monthWeek, monthWeekDay, endType, endCount, endDate }
// or "none" string for no recurrence

function parseRec(v) {
  if (!v || v === "none") return { type: "none" };
  if (typeof v === "string") return { type: v, interval: 1 }; // legacy
  return v;
}
function recLabel(v) {
  const r = parseRec(v);
  if (r.type === "none") return null;
  const types = { daily: "Quotidienne", weekly: "Hebdomadaire", monthly: "Mensuelle", yearly: "Annuelle" };
  const base = types[r.type] || r.type;
  const intv = r.interval > 1 ? ` (tous les ${r.interval} ${r.type === "daily" ? "jours" : r.type === "weekly" ? "semaines" : r.type === "monthly" ? "mois" : "ans"})` : "";
  return `🔄 ${base}${intv}`;
}

const WEEK_DAYS = [
  { v: 1, l: "Lun" }, { v: 2, l: "Mar" }, { v: 3, l: "Mer" },
  { v: 4, l: "Jeu" }, { v: 5, l: "Ven" }, { v: 6, l: "Sam" }, { v: 0, l: "Dim" },
];
const MONTH_WEEKS = [
  { v: 1, l: "1ère" }, { v: 2, l: "2ème" }, { v: 3, l: "3ème" }, { v: 4, l: "4ème" }, { v: -1, l: "Dernière" },
];

function RecurrenceModule({ value, dueDate, onChange }) {
  const [open, setOpen] = useState(false);
  const [r, setR] = useState(() => parseRec(value));

  // Sync external value
  useEffect(() => { setR(parseRec(value)); }, []);

  const upd = (patch) => { const next = { ...r, ...patch }; setR(next); onChange(next); };

  // Toggle weekday
  const toggleDay = (d) => {
    const days = r.weekDays || [];
    const next = days.includes(d) ? days.filter(x => x !== d) : [...days, d];
    upd({ weekDays: next });
  };

  const label = recLabel(value);

  const SelStyle = { ...S.input, padding: "5px 8px", fontSize: 12, cursor: "pointer", width: "auto" };
  const NumInput = ({ val, onCh, min = 1, max = 99 }) => (
    <input type="number" min={min} max={max} value={val || 1} onChange={e => onCh(Math.max(min, Math.min(max, parseInt(e.target.value) || 1)))}
      style={{ ...S.input, width: 56, padding: "5px 8px", fontSize: 12, textAlign: "center" }} />
  );

  return (
    <div style={{ marginBottom: 10 }}>
      <button type="button" onClick={() => setOpen(o => !o)}
        style={{ ...S.input, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", justifyContent: "space-between", background: open ? "#F0F5FF" : "#FAFAFA", borderColor: open ? "#C7D2FE" : "#E8E8E8" }}>
        <span style={{ color: label ? "#102A63" : "#999", fontSize: 13 }}>{label || "🔄 Récurrence — aucune"}</span>
        <span style={{ fontSize: 10, color: "#AAA" }}>{open ? "▲" : "▼"}</span>
      </button>

      {open && (
        <div style={{ border: "1px solid #E8E8E8", borderTop: "none", borderRadius: "0 0 8px 8px", background: "white", padding: "14px 14px 10px" }}>
          {/* Type */}
          <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
            {[{ v: "none", l: "Aucune" }, { v: "daily", l: "Journalière" }, { v: "weekly", l: "Hebdomadaire" }, { v: "monthly", l: "Mensuelle" }, { v: "yearly", l: "Annuelle" }].map(o => (
              <button key={o.v} type="button" onClick={() => upd({ type: o.v })}
                style={{ border: `1px solid ${r.type === o.v ? "#102A63" : "#E0E0E0"}`, background: r.type === o.v ? "#102A63" : "white", color: r.type === o.v ? "white" : "#666", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>{o.l}</button>
            ))}
          </div>

          {r.type !== "none" && (
            <>
              {/* Interval */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555", whiteSpace: "nowrap" }}>Répéter toutes les</span>
                <NumInput val={r.interval || 1} onCh={v => upd({ interval: v })} />
                <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>
                  {{ daily: "jour(s)", weekly: "semaine(s)", monthly: "mois", yearly: "an(s)" }[r.type]}
                </span>
              </div>

              {/* Weekly: day picker */}
              {r.type === "weekly" && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>JOURS DE LA SEMAINE</div>
                  <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                    {WEEK_DAYS.map(d => {
                      const active = (r.weekDays || []).includes(d.v);
                      return (
                        <button key={d.v} type="button" onClick={() => toggleDay(d.v)}
                          style={{ border: `1px solid ${active ? "#102A63" : "#E0E0E0"}`, background: active ? "#102A63" : "white", color: active ? "white" : "#666", borderRadius: 6, padding: "4px 8px", fontSize: 11, cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>{d.l}</button>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Monthly: day of month OR week position */}
              {r.type === "monthly" && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>OCCURRENCE MENSUELLE</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {/* Option 1: day N of month */}
                    <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                      <input type="radio" name="monthMode" checked={r.monthMode !== "weekday"} onChange={() => upd({ monthMode: "day" })} />
                      <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Le jour</span>
                      <NumInput val={r.monthDay || (dueDate ? new Date(dueDate).getDate() : 1)} onCh={v => upd({ monthDay: v, monthMode: "day" })} min={1} max={31} />
                      <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>du mois</span>
                    </label>
                    {/* Option 2: Nth weekday of month */}
                    <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", flexWrap: "wrap" }}>
                      <input type="radio" name="monthMode" checked={r.monthMode === "weekday"} onChange={() => upd({ monthMode: "weekday" })} />
                      <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Le</span>
                      <select value={r.monthWeek || 1} onChange={e => upd({ monthWeek: parseInt(e.target.value), monthMode: "weekday" })} style={SelStyle}>
                        {MONTH_WEEKS.map(w => <option key={w.v} value={w.v}>{w.l}</option>)}
                      </select>
                      <select value={r.monthWeekDay ?? 1} onChange={e => upd({ monthWeekDay: parseInt(e.target.value), monthMode: "weekday" })} style={SelStyle}>
                        {WEEK_DAYS.map(d => <option key={d.v} value={d.v}>{d.l}</option>)}
                      </select>
                      <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>du mois</span>
                    </label>
                  </div>
                </div>
              )}

              {/* Yearly: month + day */}
              {r.type === "yearly" && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Chaque année le</span>
                  <NumInput val={r.yearDay || (dueDate ? new Date(dueDate).getDate() : 1)} onCh={v => upd({ yearDay: v })} min={1} max={31} />
                  <select value={r.yearMonth ?? (dueDate ? new Date(dueDate).getMonth() : 0)} onChange={e => upd({ yearMonth: parseInt(e.target.value) })} style={SelStyle}>
                    {["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"].map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
              )}

              {/* End condition */}
              <div style={{ borderTop: "1px solid #F0F0F0", paddingTop: 10, marginTop: 2 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#AAA", fontFamily: "'DM Mono',monospace", marginBottom: 8 }}>FIN DE RÉCURRENCE</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                    <input type="radio" name="endType" checked={!r.endType || r.endType === "never"} onChange={() => upd({ endType: "never" })} />
                    <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Jamais</span>
                  </label>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                    <input type="radio" name="endType" checked={r.endType === "count"} onChange={() => upd({ endType: "count" })} />
                    <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Après</span>
                    <NumInput val={r.endCount || 10} onCh={v => upd({ endCount: v, endType: "count" })} min={1} max={999} />
                    <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>occurrence(s)</span>
                  </label>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                    <input type="radio" name="endType" checked={r.endType === "date"} onChange={() => upd({ endType: "date" })} />
                    <span style={{ fontSize: 12, fontFamily: "'DM Mono',monospace", color: "#555" }}>Le</span>
                    <input type="date" value={r.endDate || ""} onChange={e => upd({ endDate: e.target.value, endType: "date" })}
                      style={{ ...S.input, width: "auto", padding: "4px 8px", fontSize: 12, cursor: "pointer" }} />
                  </label>
                </div>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

              <button onClick={() => setD({ ...d, inMyDay: !d.inMyDay })} title={d.inMyDay ? "Retirer de Ma journée" : "Ajouter à Ma journée"}
                style={{ border: `1px solid ${d.inMyDay ? "#E67E22" : "#E0E0E0"}`, background: d.inMyDay ? "#FEF9E7" : "white", borderRadius: 8, padding: "4px 8px", fontSize: 14, cursor: "pointer", color: d.inMyDay ? "#E67E22" : "#BDC3C7" }}>☀</button>
              {/* 7) Stopwatch */}
              {!isNew && <button onClick={() => setStopwatch(true)} title="Chronomètre"
                style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 8, padding: "4px 8px", fontSize: 14, cursor: "pointer", color: "#BDC3C7" }}>⏱</button>}
              {/* 5) Send mail */}
              <button onClick={sendMail} title="Envoyer par mail"
                style={{ border: "1px solid #E0E0E0", background: "white", borderRadius: 8, padding: "4px 10px", fontSize: 12, cursor: "pointer", color: "#BDC3C7", fontFamily: "'DM Mono',monospace" }}>@</button>
              <button onClick={onClose} style={{ border: "none", background: "none", fontSize: 22, cursor: "pointer", color: "#BDC3C7" }}>×</button>
            </div>
          </div>

          {/* Time tracked */}
          {d.totalTime > 0 && (
            <div style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: "#F0F5FF", borderRadius: 8 }}>
              <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#102A63" }}>⏱ Temps enregistré : <strong>{fmtTime(d.totalTime)}</strong></span>
            </div>
          )}

          <input value={d.title} onChange={(e) => setD({ ...d, title: e.target.value })} placeholder="Titre de la tâche…" autoFocus style={{ ...S.input, fontSize: 10, marginBottom: 12 }} />

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
            <select value={d.category} onChange={(e) => setD({ ...d, category: e.target.value })} style={{ ...S.input, fontSize: 10, cursor: "pointer", color: d.category ? "#2C3E50" : "#999" }}>
              <option value="">— Catégorie —</option>
              {settings.categories.map((c) => <option key={c.id} style={{ color: "#2C3E50" }}>{c.name}</option>)}
            </select>
            <select value={d.type} onChange={(e) => setD({ ...d, type: e.target.value })} style={{ ...S.input, fontSize: 10, cursor: "pointer", color: d.type ? "#2C3E50" : "#999" }}>
              <option value="">— Type —</option>
              {(() => { const ORD = ["task","quick","report","meeting","analyse"]; return [...settings.types].sort((a,b) => { const ia=ORD.indexOf(a.id); const ib=ORD.indexOf(b.id); return (ia<0?99:ia)-(ib<0?99:ib); }); })().map((t) => <option key={t.id} style={{ color: "#2C3E50" }}>{t.name}</option>)}
            </select>
            <select value={d.priority} onChange={(e) => setD({ ...d, priority: e.target.value })} style={{ ...S.input, fontSize: 10, cursor: "pointer" }}>
              <option value="urgente">⊛ P1 — Urgente</option>
              <option value="haute">▲ P2 — Haute</option>
              <option value="normale">▬ P3 — Normale</option>
              <option value="basse">▼ P4 — Basse</option>
            </select>
            {/* 3) Status in modal */}
            <select value={d.status} onChange={(e) => { const s = e.target.value; setD({ ...d, status: s, completed: s === "done" }); }} style={{ ...S.input, fontSize: 10, cursor: "pointer", background: statusObj.bg, color: statusObj.color, fontWeight: 600 }}>
              {settings.statuses.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>

          {/* Étiquettes */}
          <div style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5, flexWrap: "wrap" }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", letterSpacing: "0.06em" }}>ÉTIQUETTES</span>
              {d.labels.map((lbl, i) => {
                const lObj = (settings.labels||[]).find(l => l.name === lbl) || { color: "#4F46E5", bg: "#EEF2FF" };
                return (
                  <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 4, background: lObj.bg, color: lObj.color, borderRadius: 20, padding: "2px 8px", fontSize: 10, fontFamily: "'DM Mono',monospace", border: `1px solid ${lObj.color}30` }}>
                    🏷 {lbl}
                    <button type="button" onClick={() => setD({ ...d, labels: d.labels.filter((_, j) => j !== i) })}
                      style={{ border: "none", background: "none", cursor: "pointer", color: lObj.color, fontSize: 11, padding: 0, lineHeight: 1 }}>×</button>
                  </span>
                );
              })}
              <button type="button" onClick={() => setShowLabelInput(l => !l)}
                style={{ border: "1px dashed #C7D2FE", background: "none", borderRadius: 20, padding: "2px 8px", fontSize: 10, cursor: "pointer", color: "#4F46E5", fontFamily: "'DM Mono',monospace" }}>+ Étiquette</button>
            </div>
            {showLabelInput && (
              <div ref={labelPickerRef} onMouseDown={(e)=>e.stopPropagation()} onClick={(e)=>e.stopPropagation()} style={{ display: "flex", flexWrap: "wrap", gap: 6, padding: "8px", background: "#F8F8F8", borderRadius: 8, border: "1px solid #E8E8E8" }}>
                {(settings.labels||[]).filter(l => !d.labels.includes(l.name)).map(l => (
                  <button key={l.id} type="button"
                    onClick={() => { setD({ ...d, labels: [...d.labels, l.name] }); setShowLabelInput(false); }}
                    style={{ background: l.bg, color: l.color, border: `1px solid ${l.color}40`, borderRadius: 20, padding: "3px 10px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>
                    🏷 {l.name}
                  </button>
                ))}
                {(settings.labels||[]).filter(l => !d.labels.includes(l.name)).length === 0 &&
                  <span style={{ fontSize: 10, color: "#AAA", fontFamily: "'DM Mono',monospace" }}>Toutes les étiquettes sont déjà ajoutées</span>}
              </div>
            )}
          </div>

          {/* 3) Full recurrence module */}
          <RecurrenceModule value={d.recurrence} dueDate={d.dueDate} onChange={rec => setD({ ...d, recurrence: rec })} />

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", marginBottom: 4, letterSpacing: "0.06em" }}>DATE DE CRÉATION</div>
              <input type="date" value={d.createdAt ? d.createdAt.split("T")[0] : today()} onChange={(e) => setD({ ...d, createdAt: e.target.value + "T00:00:00.000Z" })} onClick={(e) => { try { e.currentTarget.showPicker(); } catch(_) {} }} style={{ ...S.input, fontSize: 10, cursor: "pointer" }} />
            </div>
            <div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", marginBottom: 4, letterSpacing: "0.06em" }}>DATE D'ÉCHÉANCE</div>
              <input type="date" value={d.dueDate} onChange={(e) => setD({ ...d, dueDate: e.target.value })} onClick={(e) => { try { e.currentTarget.showPicker(); } catch(_) {} }} style={{ ...S.input, fontSize: 10, cursor: "pointer" }} />
            </div>
          </div>

          <select value={d.reminder} onChange={(e) => setD({ ...d, reminder: e.target.value })} style={{ ...S.input, fontSize: 10, cursor: "pointer", marginBottom: 10 }}>
            <option value="none">Pas de rappel</option>
            <option value="same">Le jour même</option>
            <option value="30min">30 minutes avant</option>
            <option value="1h">1 heure avant</option>
            <option value="2h">2 heures avant</option>
            <option value="1d">La veille</option>
            <option value="2d">2 jours avant</option>
          </select>

          {/* Notes with AI button */}
          <div style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#102A63", fontFamily: "'Lora',serif", letterSpacing: "0.06em" }}>NOTES</div>
              {/* 10) AI assistant trigger */}
              <button onClick={() => setShowAI(true)} style={{ border: "1px solid #C7D2FE", background: "#EEF2FF", borderRadius: 6, padding: "2px 8px", fontSize: 10, cursor: "pointer", fontFamily: "'DM Mono',monospace", color: "#4F46E5" }}>🤖 IA</button>
            </div>
            <RichTextArea value={d.notes} onChange={(v) => setD({ ...d, notes: v })} placeholder="Notes optionnelles…" rows={5} />
          </div>

          {/* Subtasks */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#999", letterSpacing: "0.08em", fontFamily: "'DM Mono',monospace", marginBottom: 6 }}>SOUS-TÂCHES</div>
            {d.subtasks.map((s) => <SubtaskRow key={s.id} sub={s} onChange={updSub} onDelete={() => delSub(s.id)} onOpenDetail={setSubDetail} />)}
            <button onClick={addSub} style={{ ...S.ghost, marginTop: 6 }}>+ Ajouter une sous-tâche</button>
          </div>
        </div>

        <div style={{ padding: "14px 24px", borderTop: "1px solid #F0F0F0", display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <button onClick={onClose} style={{ ...S.btn("#F0F0F0", "#666") }}>Annuler</button>
          <button onClick={() => { if (d.title.trim()) { onSave(d); onClose(); } }} style={{ ...S.btn(catAccent), opacity: d.title.trim() ? 1 : 0.5 }}>
            {isNew ? "Créer la tâche" : "Enregistrer"}
          </button>
        </div>
      </div>

      {subDetail && <SubtaskDetailModal sub={subDetail} cats={settings.categories} types={settings.types} onSave={updSub} onPromote={promoteSub} onClose={() => setSubDetail(null)} />}
      {showAI && <AIAssistant text={d.notes} onApply={(v) => setD({ ...d, notes: v })} onClose={() => setShowAI(false)} settings={settings} />}
      {stopwatch && <StopwatchWidget task={d} onStop={(secs) => { setD(prev => ({ ...prev, totalTime: (prev.totalTime || 0) + secs })); setStopwatch(false); }} onClose={() => setStopwatch(false)} />}
    </div>
  );
}

/* ─── COMMENT POPOVER ─── */
function CommentPopover({ task, catBg, catAccent, onSave, onClose }) {

    <div style={{ position: "fixed", inset: 0, zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, backdropFilter: "blur(2px)", background: "rgba(0,0,0,0.25)" }} onMouseDown={(e) => { if (e.target === e.currentTarget) e.currentTarget._mdOutside = true; }}
      onMouseUp={(e) => { if (e.target === e.currentTarget && e.currentTarget._mdOutside) { e.currentTarget._mdOutside = false; onClose(); } }}>
      <div style={{ background: "white", borderRadius: 12, width: 420, boxShadow: "0 12px 40px rgba(0,0,0,0.18)", overflow: "hidden", borderTop: `3px solid ${catAccent}` }}>
        <div style={{ padding: "14px 16px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 12, fontWeight: 700, fontFamily: "'Lora',serif", color: "#2C3E50", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 340 }}>💬 {task.title}</div>
            <button onClick={onClose} style={{ border: "none", background: "none", fontSize: 18, cursor: "pointer", color: "#BDC3C7" }}>×</button>
          </div>
          <RichTextArea value={text} onChange={setText} placeholder="Ajouter un commentaire…" rows={5} />
        </div>
        <div style={{ padding: "10px 16px", borderTop: "1px solid #F0F0F0", display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <button onClick={onClose} style={{ ...S.btn("#F0F0F0", "#666"), padding: "6px 12px", fontSize: 11 }}>Annuler</button>
          <button onClick={() => { onSave(text); onClose(); }} style={{ ...S.btn("#102A63"), padding: "6px 12px", fontSize: 11 }}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}


/* ─── LABEL CELL ─── */
function LabelCell({ task, settings }) {
  const [showMenu, setShowMenu] = useState(false);
  const [menuPos, setMenuPos] = useState({ top: 0, left: 0 });
  const btnRef = React.useRef(null);
  const openMenu = () => {
    if (btnRef.current) {
      const r = btnRef.current.getBoundingClientRect();
      setMenuPos({ top: r.bottom + 4, left: r.left });
    }
    setShowMenu(m => !m);
  };
  const available = (settings.labels||[]).filter(l => !(task.labels||[]).includes(l.name));
  const dispatch = (labels) => window.dispatchEvent(new CustomEvent("addLabel", { detail: { id: task.id, labels } }));
  return (
    <div style={{ display: "flex", gap: 3, alignItems: "center", flexShrink: 0, flexWrap: "nowrap", overflow: "visible", maxWidth: 200, position: "relative" }} onClick={e => e.stopPropagation()}>
      {(task.labels || []).map((lbl, i) => {
        const lObj = (settings.labels||[]).find(l => l.name === lbl) || { color: "#4F46E5", bg: "#EEF2FF" };
        return (
          <span key={i} style={{ fontSize: 9, background: lObj.bg, color: lObj.color, borderRadius: 20, padding: "1px 6px", fontFamily: "'Lora',serif", whiteSpace: "nowrap", border: `1px solid ${lObj.color}30`, display: "inline-flex", alignItems: "center", gap: 2 }}>
            🏷 {lbl}
            <button onClick={() => dispatch((task.labels||[]).filter((_,j) => j !== i))}
              style={{ border: "none", background: "none", cursor: "pointer", color: lObj.color, fontSize: 10, padding: 0, lineHeight: 1 }}>×</button>
          </span>
        );
      })}
      <button ref={btnRef} onClick={openMenu}
        style={{ fontSize: 9, border: "1px dashed #C7D2FE", background: "none", borderRadius: 20, padding: "1px 5px", cursor: "pointer", color: "#4F46E5", fontFamily: "'Lora',serif", flexShrink: 0 }}>+</button>
      {showMenu && available.length > 0 && (
        <div style={{ position: "fixed", top: menuPos.top, left: menuPos.left, zIndex: 9999, background: "white", border: "1px solid #E8E8E8", borderRadius: 8, padding: "6px", boxShadow: "0 4px 16px rgba(0,0,0,0.12)", display: "flex", flexDirection: "column", gap: 4, minWidth: 140 }}>
          {available.map(l => (
            <button key={l.id} onClick={() => { dispatch([...(task.labels||[]), l.name]); setShowMenu(false); }}
              style={{ background: l.bg, color: l.color, border: `1px solid ${l.color}30`, borderRadius: 20, padding: "3px 10px", fontSize: 10, cursor: "pointer", fontFamily: "'Lora',serif", textAlign: "left" }}>
              🏷 {l.name}
            </button>
          ))}
        </div>
      )}
      {showMenu && available.length === 0 && (
        <div style={{ position: "fixed", top: menuPos.top, left: menuPos.left, zIndex: 9999, background: "white", border: "1px solid #E8E8E8", borderRadius: 8, padding: "8px 12px", boxShadow: "0 4px 16px rgba(0,0,0,0.12)", fontSize: 10, color: "#AAA", fontFamily: "'Lora',serif" }}>
          Toutes les étiquettes sont ajoutées
        </div>
      )}
    </div>
  );
}

/* ─── TASK CARD ─── */
function TaskCard({ task, num, onDelete, onToggle, onEdit, onSaveComment, colWidths, settings }) {
  const [hovered, setHovered] = useState(false);
  const [showComment, setShowComment] = useState(false);
  const catObj  = settings.categories.find(c => c.name === task.category);
  const typeObj = settings.types.find(t => t.name === task.type);
  const catBg     = catObj?.bg      || "#F0F0F0";
  const catAccent = catObj?.accent  || "#888";
  const statusObj = settings.statuses.find(s => s.id === task.status) || settings.statuses[0];
  const doneSubs  = task.subtasks?.filter(s => s.completed).length || 0;
  const totalSubs = task.subtasks?.length || 0;
  const ds  = isOverdue(task.dueDate) && !task.completed ? "overdue" : isToday(task.dueDate) ? "today" : daysBefore(task.dueDate, 2) ? "soon" : "ok";
  const dc  = { overdue: "#C0392B", today: "#E67E22", soon: "#F39C12", ok: "#95A5A6" };
  const prioColor = PRIORITY_COLORS[task.priority] || "#DDD";
  const prioIcon  = PRIORITY_ICONS[task.priority]  || "▬";
  const hasComment = task.notes && task.notes.replace(/<[^>]*>/g, "").trim().length > 0;
  // 3) Blocked tasks are dimmed
  const isBlocked = task.status === "blocked";

  return (
    <>
      <div onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)} onClick={() => onEdit(task)}
        style={{ display: "flex", alignItems: "center", gap: 7, paddingRight: 6, borderLeft: `2px solid ${catAccent}`, marginBottom: 1, background: hovered ? "#F5F7FB" : task.completed ? "#FAFAFA" : "white", opacity: task.completed ? 0.45 : isBlocked ? 0.6 : 1, cursor: "pointer", transition: "background 0.1s", borderRadius: "0 3px 3px 0", height: 28, overflow: "hidden" }}>
        <button onClick={(e) => { e.stopPropagation(); onToggle(task.id); }}
          style={{ width: 14, height: 14, borderRadius: "50%", flexShrink: 0, border: `1.5px solid ${task.completed ? catAccent : "#CCC"}`, background: task.completed ? catAccent : "white", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 7, color: "white", transition: "all 0.15s", marginLeft: 5 }}>{task.completed ? "✓" : ""}</button>
        <span style={{ fontSize: 10, color: "#CCC", fontFamily: "'Lora',serif", flexShrink: 0, minWidth: 16, textAlign: "right" }}>{num}</span>
        <span title={`Priorité ${task.priority}`} style={{ fontSize: 10, color: prioColor, flexShrink: 0, fontWeight: 700, lineHeight: 1, minWidth: 12, textAlign: "center" }}>{prioIcon}</span>
        <button onClick={(e) => { e.stopPropagation(); window.dispatchEvent(new CustomEvent("toggleMyDay", { detail: { id: task.id } })); }}
          title={task.inMyDay ? "Retirer de Ma journée" : "Ajouter à Ma journée"}
          style={{ border: "none", background: "none", cursor: "pointer", fontSize: 10, padding: 0, width: 16, flexShrink: 0, lineHeight: 1, textAlign: "center", color: task.inMyDay ? "#E67E22" : "#D0D0D0", transition: "color 0.15s" }}>☀</button>
        <span style={{ fontSize: 10, fontWeight: 500, color: task.completed ? "#AAA" : "#2C3E50", textDecoration: task.completed ? "line-through" : "none", fontFamily: "'Lora',serif", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", width: colWidths.title, flexShrink: 0 }}>{task.title}</span>
        {totalSubs > 0 ? <span style={{ fontSize: 10, color: "#BBB", fontFamily: "'Lora',serif", flexShrink: 0, minWidth: 28 }}>{doneSubs}/{totalSubs}✓</span> : <span style={{ minWidth: 28, flexShrink: 0 }} />}
        {/* 3) Status badge */}
        <span style={{ fontSize: 10, fontWeight: 700, background: statusObj.bg, color: statusObj.color, borderRadius: 3, padding: "1px 5px", fontFamily: "'Lora',serif", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.status || 72, overflow: "hidden", textOverflow: "ellipsis" }}>{statusObj.name}</span>
        <span style={{ fontSize: 10, fontWeight: 700, background: catBg, color: catAccent, borderRadius: 3, padding: "1px 5px", fontFamily: "'Lora',serif", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.category, overflow: "hidden", textOverflow: "ellipsis" }}>{task.category}</span>
        <span style={{ fontSize: 10, color: "#555", fontFamily: "'Lora',serif", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.type, overflow: "hidden", textOverflow: "ellipsis" }}>{typeObj?.icon || ""} {task.type}</span>
        <LabelCell task={task} onSaveComment={onSaveComment} settings={settings} />
        <div style={{ flex: 1 }} />

        {parseRec(task.recurrence).type !== "none" && <span title={recLabel(task.recurrence) || ""} style={{ fontSize: 10, flexShrink: 0, opacity: 0.5 }}>🔄</span>}
        {task.totalTime > 0 && <span title={`Temps : ${fmtTime(task.totalTime)}`} style={{ fontSize: 10, color: "#102A63", fontFamily: "'Lora',serif", flexShrink: 0, opacity: 0.6 }}>⏱{fmtTime(task.totalTime)}</span>}
        {task.reminder && task.reminder !== "none" && <span style={{ fontSize: 10, flexShrink: 0, opacity: 0.4 }}>🔔</span>}
        {task.createdAt && <span style={{ fontSize: 10, color: "#BDC3C7", fontFamily: "'Lora',serif", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.created, textAlign: "right" }}>+ {fmtDate(task.createdAt.split("T")[0])}</span>}
        <span style={{ width: 16, flexShrink: 0 }} />
        {task.dueDate ? <span style={{ fontSize: 10, color: dc[ds], fontFamily: "'Lora',serif", flexShrink: 0, whiteSpace: "nowrap", width: colWidths.due, textAlign: "right" }}>{ds === "overdue" ? "⚠" : ds === "today" ? "●" : "○"} {fmtDate(task.dueDate)}</span> : <span style={{ width: colWidths.due, flexShrink: 0 }} />}
        <button onClick={(e) => { e.stopPropagation(); setShowComment(true); }} title={hasComment ? "Voir / modifier la note" : "Ajouter une note"}
          style={{ border: hasComment ? "1px solid #102A63" : "1px solid #D0D0D0", background: hasComment ? "#EEF2FF" : "#F5F5F5", borderRadius: 5, cursor: "pointer", fontSize: 11, padding: "1px 5px", flexShrink: 0, lineHeight: 1, color: hasComment ? "#102A63" : "#999", transition: "all 0.1s" }}>{hasComment ? "💬" : "＋"}</button>
        <button onClick={(e) => { e.stopPropagation(); onDelete(task.id); }}
          style={{ border: "none", background: "none", cursor: "pointer", color: hovered ? "#E8A0A0" : "transparent", fontSize: 13, padding: "0 2px", transition: "color 0.1s", flexShrink: 0, lineHeight: 1 }}>×</button>
      </div>
      {showComment && <CommentPopover task={task} catBg={catBg} catAccent={catAccent} onSave={(txt) => onSaveComment(task.id, txt)} onClose={() => setShowComment(false)} />}
    </>
  );
}

/* ─── MOBILE TASK CARD ─── */

  const typeObj = settings.types.find(t => t.name === task.type);

  const catAccent = catObj?.accent || "#888";
  const statusObj = settings.statuses.find(s => s.id === task.status) || settings.statuses[0];
  const doneSubs  = task.subtasks?.filter(s => s.completed).length || 0;
  const ds  = isOverdue(task.dueDate) && !task.completed ? "overdue" : isToday(task.dueDate) ? "today" : daysBefore(task.dueDate, 2) ? "soon" : "ok";
  const dc  = { overdue: "#C0392B", today: "#E67E22", soon: "#F39C12", ok: "#95A5A6" };
  const hasComment = task.notes && task.notes.replace(/<[^>]*>/g, "").trim().length > 0;
